uncertainty_semantics:
  type: point_estimate_only
  note: >
    Each value is a deterministic mass_excess_mev point estimate computed by applying the
    frozen fitted semi-empirical formula to obtain binding energy, converting to atomic mass
    via physics_lab.engines.nuclear_mass_baselines.semi_empirical_atomic_mass_u, and then
    converting to mass excess via physics_lab.engines.nuclear_masses.mass_excess_keV_from_atomic_mass_u.
    uncertainty_mev is intentionally null; this entry is a chain-wise extrapolation control
    for future reveal comparison, not a confidence-ranked forecast. All four targets are
    even-even nuclei with Z=50 (magic proton number), so the pairing contribution is
    uniformly positive and decreases slowly as A increases.

reveal_conditions:
  reveal_trigger: >
    A future maintainer-reviewed nuclear mass dataset or source manifest added after
    registration contains measured or reviewably convertible values for one or more
    target nuclides in this entry.
  comparison_data_reference: >
    future data/nuclear_masses/<reviewed-future-source>.yaml or reviewed source manifest
    committed after this registry timestamp
  reveal_owner: maintainer or maintainer-authorized review agent
  no_peek_rule: >
    After registration, do not alter the frozen model id, coefficient note, target nuclides,
    predicted values, or reveal rule. Later comparison must be a separate reviewed task and
    may reveal a subset of targets only. The Sn-120 anchor in NMD-0002 must not be used
    to retroactively adjust these predictions.

limitations:
  - Prospective registry variant only; not a claim or result package.
  - No sandbox candidate is being promoted; this is a chain-wise extrapolation control.
  - Targets are selected against committed repository datasets only; no live external source
    was fetched during registration.
  - The base fitted model has no shell-closure correction; the approaching N=82 magic neutron
    number at Sn-128 is not captured by the smooth SEMF, making this a deliberate stress test
    for chain-wise generalization.
  - All targets are even-even isotopes; the pairing contribution is uniformly included and
    provides no discriminatory signal across the chain.
  - The model was fitted on NMD-0002 (11 nuclei); Sn-120 is the only Sn anchor in that slice.
    Extrapolation along the Sn chain is a generalization test with a single training anchor.
  - Any agent-proposed follow-up variant must freeze its model, target set, and source state
    in a separate registry entry before reveal.

review_boundary:
