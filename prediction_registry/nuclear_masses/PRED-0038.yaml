uncertainty_semantics:
  type: point_estimate_only
  note: >
    Each value is a deterministic mass_excess_mev point estimate computed by
    applying the frozen SEMF formula with the pairing term rewritten as
    pairing_sign(Z, N) * aP / A (1/A scaling) to obtain binding energy,
    converting to atomic mass via the Z*HYDROGEN_ATOM_MASS_U +
    N*NEUTRON_MASS_U - B/u relation used in
    physics_lab.engines.nuclear_mass_baselines, and then converting to mass
    excess via (atomic_mass_u - A) * ATOMIC_MASS_UNIT_MEV.
    uncertainty_mev is intentionally null; this entry is a minimal-complexity
    pairing-scaling control for future reveal comparison. The divergence
    between PRED-0001 (1/sqrt(A) scaling) and this entry on the same target
    batch quantifies how much the alternate inverse-A pairing form shifts
    predictions for even-even targets; odd-A targets remain identical by
    construction.

reveal_conditions:
  reveal_trigger: >
    A future maintainer-reviewed nuclear mass dataset or source manifest
    added after registration contains measured or reviewably convertible
    values for one or more target nuclides in this entry.
  comparison_data_reference: >
    future data/nuclear_masses/<reviewed-future-source>.yaml or reviewed
    source manifest committed after this registry timestamp
  reveal_owner: maintainer or maintainer-authorized review agent
  no_peek_rule: >
    After registration, do not alter the frozen model id, coefficient note,
    pairing scaling form, target nuclides, predicted values, or reveal
    rule. Later comparison must be a separate reviewed task and may reveal
    a subset of targets only.

limitations:
  - Prospective registry variant only; not a claim or result package.
  - No sandbox candidate is being promoted; this is a pairing-scaling
    minimal-complexity control.
  - Targets are selected against committed repository datasets only; no
    live external source was fetched during registration.
  - The 1/A pairing scaling falls off much faster with mass number than
    the canonical 1/sqrt(A) form, so this variant is expected to
    underweight pairing for medium and heavy nuclei and is not a fitted
    improvement.
  - The pairing-scaling rewrite is a deliberate minimal-complexity probe;
    odd-A targets are unchanged by construction, while even-even targets
    are shifted toward less binding (higher mass excess) and odd-odd
    targets would be shifted toward more binding.
  - No shell, magic-number, neutron-rich, or asymmetry correction is
    introduced; the only difference vs PRED-0001 is the pairing-term
    scaling.
  - Any agent-proposed follow-up variant must freeze its model, target
    set, and source state in a separate registry entry before reveal.

review_boundary:
  retrospective_equivalence_forbidden: true
  pre_reveal_claim_promotion_allowed: false
  post_reveal_claim_promotion_requires_review: true
  canonical_result_allowed_pre_reveal: false
