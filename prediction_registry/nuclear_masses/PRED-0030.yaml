uncertainty_semantics:
  type: point_estimate_only
  note: >
    Each value is a deterministic mass_excess_mev point estimate computed by applying the
    frozen asymmetry-enhanced semi-empirical formula to obtain binding energy, converting to
    atomic mass via physics_lab.engines.nuclear_mass_baselines.semi_empirical_atomic_mass_u,
    and then converting to mass excess via physics_lab.engines.nuclear_masses.mass_excess_keV_from_atomic_mass_u.
    uncertainty_mev is intentionally null; this entry is an asymmetry-sensitivity isotope-chain
    control for future reveal comparison. The divergence between PRED-0029 (base model) and
    this entry on the Zn chain quantifies how much a 15% asymmetry perturbation shifts predictions
    for a mid-mass neutron-rich chain with no training anchor.

reveal_conditions:
