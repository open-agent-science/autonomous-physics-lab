    A future maintainer-reviewed nuclear mass dataset or source manifest added after
    registration contains measured or reviewably convertible values for one or more
    target nuclides in this entry.
  comparison_data_reference: >
    future data/nuclear_masses/<reviewed-future-source>.yaml or reviewed source manifest
    committed after this registry timestamp
  reveal_owner: maintainer or maintainer-authorized review agent
  no_peek_rule: >
    After registration, do not alter the frozen model id, coefficient note, target nuclides,
    predicted values, or reveal rule. Later comparison must be a separate reviewed task and
    may reveal a subset of targets only. The asymmetry coefficient perturbation (1.15x) must
    not be adjusted after later measurements become visible.

limitations:
  - Prospective registry variant only; not a claim or result package.
  - No sandbox candidate is being promoted; this is an asymmetry-sensitivity chain control.
  - Targets are selected against committed repository datasets only; no live external source
    was fetched during registration.
  - Zinc (Z=30) is entirely absent from NMD-0002; the model has no Zn-specific training anchor,
    making all four predictions pure extrapolations. Any agreement with future measurements
    would reflect the smooth SEMF's global fit, not Zn-specific calibration.
  - The +15% asymmetry perturbation is a deliberate sensitivity probe; it is not a fitted
    improvement and is expected to increase prediction error for well-measured nuclei.
  - The mass excess delta between this entry and the base model grows with (N-Z)^2/A, from
    +3.4 MeV at Zn-68 to +9.5 MeV at Zn-74, making the Zn-74 target maximally sensitive
    to the asymmetry perturbation in this batch.
  - All targets are even-even nuclei; the pairing contribution is uniformly positive and
    identical to the base model (only the asymmetry term is perturbed).
  - Any agent-proposed follow-up variant must freeze its model, target set, and source state
    in a separate registry entry before reveal.

