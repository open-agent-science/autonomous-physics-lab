uncertainty_semantics:
  type: point_estimate_only
  note: >
    Each value is a deterministic mass_excess_mev point estimate computed by
    applying the frozen SEMF formula with the Coulomb term rewritten as
    aC * Z^2 / A^(1/3) (Z^2 form) to obtain binding energy, converting to
    atomic mass via the Z*HYDROGEN_ATOM_MASS_U + N*NEUTRON_MASS_U - B/u
    relation used in physics_lab.engines.nuclear_mass_baselines, and then
    converting to mass excess via (atomic_mass_u - A) * ATOMIC_MASS_UNIT_MEV.
    uncertainty_mev is intentionally null; this entry is a minimal-complexity
    Coulomb-form control for future reveal comparison. The divergence between
    PRED-0001 (Z*(Z-1) form) and this entry on the same target batch
    quantifies how much the textbook self-Coulomb-included form shifts
    predictions for the frontier next-row controls.

reveal_conditions:
  reveal_trigger: >
    A future maintainer-reviewed nuclear mass dataset or source manifest
    added after registration contains measured or reviewably convertible
    values for one or more target nuclides in this entry.
  comparison_data_reference: >
    future data/nuclear_masses/<reviewed-future-source>.yaml or reviewed
    source manifest committed after this registry timestamp
  reveal_owner: maintainer or maintainer-authorized review agent
  no_peek_rule: >
    After registration, do not alter the frozen model id, coefficient note,
    Coulomb-form rewrite, target nuclides, predicted values, or reveal
    rule. Later comparison must be a separate reviewed task and may reveal
    a subset of targets only.

limitations:
  - Prospective registry variant only; not a claim or result package.
  - No sandbox candidate is being promoted; this is a Coulomb-form
    minimal-complexity control.
  - Targets are selected against committed repository datasets only; no
    live external source was fetched during registration.
  - The Z^2 Coulomb form ignores self-Coulomb subtraction and overstates
    the Coulomb repulsion relative to the canonical Z*(Z-1) form; the
    predicted shift is +aC*Z/A^(1/3) for every target and is not a fitted
    improvement.
  - The Coulomb-form rewrite is a deliberate minimal-complexity probe; it
    is expected to systematically reduce binding (raise mass excess)
    relative to PRED-0001 for non-trivial Z and is not expected to improve
    agreement with future measurements.
  - No shell, magic-number, neutron-rich, or odd-even correction is
    introduced; the only difference vs PRED-0001 is the Coulomb-term form.
  - Any agent-proposed follow-up variant must freeze its model, target
    set, and source state in a separate registry entry before reveal.

review_boundary:
