  comparison_data_reference: >
    future data/nuclear_masses/<reviewed-future-source>.yaml or reviewed source manifest committed
    after this registry timestamp
  reveal_owner: maintainer or maintainer-authorized review agent
  no_peek_rule: >
    After registration, do not alter the frozen model id, coefficient note, target nuclides,
    predicted values, or reveal rule. Later comparison must be a separate reviewed task and may
    reveal a subset of targets only.
limitations:
  - Prospective registry variant only; not a claim or result package.
  - No TASK-0201 pairing sandbox candidate is being promoted; this is a null-pairing control.
  - Targets are selected against committed repository datasets only; no live external source was
    fetched during registration.
  - Removing the pairing term entirely is a deliberate ablation control; a null-pairing model is
    known to be empirically inferior for even-even and odd-odd nuclei.
  - Odd-A targets in this batch (Co-59, Ni-61) show no difference from PRED-0023 or the base model
    and serve as negative controls confirming the pairing-insensitivity of odd-A predictions.
  - The comparison between PRED-0023 and PRED-0024 across the same target batch quantifies the
    even-even / odd-odd pairing sensitivity without requiring a held-out measurement.
  - Any agent-proposed follow-up variant must freeze its model, target set, and source state in a
    separate registry entry before reveal.
