uncertainty_semantics:
  type: point_estimate_only
  note: >
    Each value is a deterministic mass_excess_mev point estimate obtained by converting the frozen
    null-pairing semi-empirical binding-energy prediction to atomic mass and then to mass excess.
    uncertainty_mev is intentionally null; this entry is a null-pairing control that removes the
    odd-even staggering term entirely, providing a lower bound on what the pairing term contributes.
    The target batch is identical to PRED-0023 to allow direct pairing-sensitivity comparison when
    later measurements are reviewed.
reveal_conditions:
