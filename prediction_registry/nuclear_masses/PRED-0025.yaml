uncertainty_semantics:
  type: point_estimate_only
  note: >
    Each value is a deterministic mass_excess_mev point estimate obtained by adding the frozen
    TASK-0200 shell Gaussian control term to the RESULT-0015 fitted semi-empirical binding energy,
    then converting the resulting atomic mass to mass excess. uncertainty_mev is intentionally null.
    This entry is a shell-aware negative control for future reveal comparison, not a confidence-ranked
    forecast.

