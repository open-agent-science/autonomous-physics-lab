      asymmetry=23.846557883948485, pairing=15.990845113398912.
      The registered correction is an additive residual-style control with
      r_corr = c_sz * s_z + c_sn * s_n,
      s_z = exp(-d(Z, MAGIC)^2 / (2 * sigma^2)),
      s_n = exp(-d(N, MAGIC)^2 / (2 * sigma^2)),
      MAGIC = (2, 8, 20, 28, 50, 82, 126), sigma = 2.
      Frozen coefficients are copied from AGENT-RUN-0009 full-NMD-0002 fit for HYP-PROPOSAL-0028:
      c_sz = -1.5599853542897564 MeV, c_sn = 3.2082046765215466 MeV.
      TASK-0200 classified the family ALLOW_ONLY_AS_NEGATIVE_CONTROL after structured-holdout failure,
      so this entry is a prospective control only and not a promoted shell-model claim.
