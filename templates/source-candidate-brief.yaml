# Source Candidate Brief Template
#
# Copy this shape into a review note or task proposal input when a Fresh Source
# Scout evaluates a published source candidate. Keep this as a brief, not a
# committed machine-readable source index.

brief_id: SOURCE-CANDIDATE-BRIEF-XXXX
task_id: TASK-XXXX
campaign_id: ""
scout:
  contributor_id: ""
  agent_id: ""
  reviewed_by: ""
  created_utc: YYYY-MM-DD

source_candidate:
  title: ""
  authors: []
  publication_year: null
  stable_locators:
    doi: null
    arxiv: null
    archive_url: null
    source_url: null
    repository_release: null
  citation_note: ""
  source_surface:
    artifact_type: ""  # paper | supplementary_table | archive_snapshot | api_endpoint | repository_release | figure | other
    table_or_figure_locator: null
    value_bearing_artifact_known: false
    redistributable_without_permission: null

campaign_fit:
