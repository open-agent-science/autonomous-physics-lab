  blocker_type: null  # T1_access | T2_extraction_tool | T3_coverage | T4_snapshot_approval | none
  blocker_reason: ""
  next_allowed_lane: ""  # source_review | acquisition_pinning | extraction_planning | coverage_expansion | row_curation | blocker_preservation
  follow_up_proposal_needed: false

guardrails:
  rows_curated: false
