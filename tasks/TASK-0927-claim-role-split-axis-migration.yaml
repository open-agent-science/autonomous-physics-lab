  - "CLAIM-0001 and CLAIM-0009 are honestly scoped but are calibration/known-physics, not active scientific claims; the migration records that without downgrading to DRAFT, without a RETIRED_TO_CALIBRATION status, and without rewriting history."
  - "The policy vocabulary (novelty_class, claim_role, active_scientific_claim) lands in docs/claim-promotion-policy.md in the same PR so the ledger and the policy stay consistent."

input:
