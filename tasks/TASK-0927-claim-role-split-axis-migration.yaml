    - "docs/reviews/legacy-claim-novelty-audit-and-calibration-migration.md"
    - "claims/CLAIM-0001-pendulum-period-amplitude.md"
    - "claims/CLAIM-0009-anharmonic-oscillator-period.md"
    - "docs/claim-promotion-policy.md"
  planning_context: >
    Execute the maintainer-approved migration: add novelty_class:
    calibration_known_physics, claim_role: calibration_memory, and
    active_scientific_claim: false to CLAIM-0001 and CLAIM-0009 as a
    forward-dated disposition section (support_status PARTIALLY_SUPPORTED and
    review_tier MAINTAINER_REVIEWED preserved verbatim); extend the claim
    promotion policy with the role/novelty field vocabulary and the rule that
    role classification never mutates support or review status.

requirements:
  - "Add the three fields to CLAIM-0001 and CLAIM-0009 as a dated forward disposition citing the Decision Day memo; do NOT change status, review tier, evidence links, or historical review notes."
  - "Extend docs/claim-promotion-policy.md with the split-axis vocabulary (novelty_class | claim_role | active_scientific_claim) and the no-status-mutation rule; keep the existing Novelty Classification Gate intact."
