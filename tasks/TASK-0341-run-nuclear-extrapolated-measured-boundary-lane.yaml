id: TASK-0341
title: "Run nuclear extrapolated-measured boundary hypothesis lane"
type: autonomous_research_pilot
status: REVIEW_READY
difficulty: high
priority: medium

strategy_alignment:
  - "Test whether baseline residual structure changes near measured-versus-extrapolated data boundaries."
  - "Separate source/status effects from physical correction claims."
  - "Keep the lane sandbox-only and explicit about data-quality limitations."

input:
  mode: workflow
  related_domain: nuclear_mass_surface
  related_objects:
    - "docs/campaigns/nuclear-mass-surface.md"
    - "results/EXP-0012/RUN-0001/result.yaml"
    - "data/nuclear_masses/post_ame2020_holdout.yaml"
  planning_context: >
    Some nuclear-mass rows may be measured while others are extrapolated or
    source-class dependent. This lane tests whether residual behavior changes
    around that boundary and whether any candidate survives after source/status
    controls are applied.

requirements:
  - "Audit which repository-pinned rows expose measured/extrapolated or source-class status; preserve a blocker if the flags are insufficient."
  - "Generate 3-6 bounded boundary candidates only if source/status flags are usable."
  - "Include measured-only, extrapolated-only, source-shuffled, and smooth-A controls where possible."
  - "Run 1-3 candidates through a deterministic sandbox if the source flags pass preflight."
  - "Report primary error deltas plus measured/extrapolated, edge-of-known-surface, neutron-rich, magic-region, and high-error subset diagnostics."
  - "Frame any positive signal as data-boundary diagnostic evidence, not as a physical law."
  - "Do not fetch live data, add PRED files, run reveal scoring, or promote claims."

accepted_outputs:
  - "scripts/run_nuclear_extrapolated_measured_boundary_lane.py or an equivalent deterministic runner if flags pass preflight"
  - "agent_runs/AGENT-RUN-0028/agent_run.yaml"
  - "agent_runs/AGENT-RUN-0028/metrics.json or a preflight blocker metrics note"
  - "agent_runs/AGENT-RUN-0028/report.md"
  - "docs/reviews/nuclear-extrapolated-measured-boundary-lane.md"
  - "tests/test_nuclear_extrapolated_measured_boundary_lane.py if a runner is added"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
