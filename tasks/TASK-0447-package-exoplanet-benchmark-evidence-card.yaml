id: TASK-0447
title: "Package exoplanet benchmark evidence card"
type: documentation
status: REVIEW_READY
difficulty: medium
priority: high

strategy_alignment:
  - "Make the strongest current APL science-output surface shareable without overclaiming."
  - "Give scientists and public contributors one stable, linkable explanation of the Exoplanet benchmark diagnostic."
  - "Translate scorecard-approved wording into a reusable evidence card that points back to deterministic artifacts."

input:
  mode: workflow
  related_domain: exoplanet_mass_radius
  related_objects:
    - "docs/campaigns/public-science-dashboard.md"
    - "docs/reviews/exoplanet-failure-map-result-promotion-scorecard.md"
    - "docs/reviews/exoplanet-compact-subneptune-matched-control-audit.md"
    - "docs/campaigns/exoplanet-mass-radius.md"
    - "agent_runs/AGENT-RUN-0042/metrics.json"
  planning_context: >
    TASK-0404 allows BENCHMARK_SUMMARY_ONLY public wording for the exoplanet
    failure-map artifact set. The maintainer wants result summaries that can
    be reposted or linked by external readers while preserving limitations.
    This task packages a stable evidence card for the compact-radius
    benchmark diagnostic.

requirements:
  - "Create a compact, linkable evidence card for the exoplanet compact-radius benchmark diagnostic."
  - "Use only wording allowed by docs/reviews/exoplanet-failure-map-result-promotion-scorecard.md."
  - "Include the current result in plain language, evidence links, limitations, forbidden wording, and next validation steps."
  - "Reference the dashboard and campaign page so readers can navigate from summary to evidence."
  - "Do not create claims, knowledge, predictions, or canonical result artifacts."
  - "Do not imply composition, habitability, target priority, atmospheric inference, or a new mass-radius law."

accepted_outputs:
  - "docs/results/exoplanet-compact-radius-benchmark-card.md"
  - "optional link update in docs/campaigns/public-science-dashboard.md"
  - "optional link update in docs/campaigns/exoplanet-mass-radius.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
