id: TASK-0736
title: "Document local source-secret handshake for key-gated acquisition"
type: repository_hardening
status: REVIEW_READY
difficulty: low
priority: high

strategy_alignment:
  - "Keep key-gated source acquisition moving without leaking secrets or prematurely recording blockers."
  - "Make the maintainer-run acquisition lane reusable across campaigns instead of Materials-only."
  - "Give agents a safe, presence-only protocol for asking for local keys."

input:
  mode: workflow
  related_domain: cross_campaign_source_acquisition
  related_objects:
    - "docs/source-acquisition-lane.md"
    - "agents/data-acquisition.yaml"
    - "docs/runbooks/materials-snapshot-acquisition-runbook.md"
    - ".apl-local-secrets.env.example"
  planning_context: >
    Materials Project MD-0002 acquisition needs a local `MP_API_KEY`. The
    reusable lesson is broader: when any campaign needs a maintainer-held API
    key, login, cookie, or private artifact, agents should first ask for the
    exact local secret and safe setup path, not immediately publish a blocker.

requirements:
  - "Add a tracked, empty local-secrets example that names `MP_API_KEY` without storing any real secret."
  - "Ignore the filled local secrets file in git so it cannot be committed accidentally."
  - "Add a cross-platform helper so agents can check required variables and run key-gated child commands without shell-specific sourcing."
  - "Document the cross-campaign key-gated acquisition handshake: ask for the exact env var, verify only SET/not set, and record a blocker only after maintainer confirmation or safe setup failure."
  - "Update the data-acquisition role so agents know to use the handshake before declaring key-gated work blocked."
  - "Update the Materials Project acquisition runbook to use the shared local-secrets pattern."
  - "Do not commit, print, log, or partially reveal any secret value."
  - "Do not change unrelated task states or generated task-view files."

accepted_outputs:
  - ".apl-local-secrets.env.example"
  - ".gitignore update for the filled local secrets file"
  - "scripts/apl_local_secrets.py"
  - "tests/test_local_secrets.py"
  - "docs/local-source-secrets.md"
  - "docs/source-acquisition-lane.md update"
  - "agents/data-acquisition.yaml update"
  - "docs/runbooks/materials-snapshot-acquisition-runbook.md update"

result_artifact_policy:
  required: false
  reason: "Repository/source-acquisition hardening task; no scientific RESULT or PRED artifact is expected."
  evidence:
    - "docs/local-source-secrets.md"
    - ".apl-local-secrets.env.example"
    - "scripts/apl_local_secrets.py"
    - "agents/data-acquisition.yaml"

validation:
  commands:
    - "python3 -m pytest tests/test_local_secrets.py"
    - "python3 -m pytest tests/test_docs_links.py tests/test_data_redistribution_declarations.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
