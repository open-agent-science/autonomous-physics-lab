id: TASK-0631
title: "Plan Materials MD-0002 acquisition preflight package"
type: scientific_dataset
status: DONE
difficulty: medium
priority: medium

strategy_alignment:
  - "Prepare MD-0002 only if the MD-0001 result/dataset decision says widening is the right next durable output."
  - "Keep Materials acquisition source-pinned and bounded before any wider dataset rows are fetched."
  - "Separate dataset publication value from material-design or discovery claims."

input:
  mode: planning_only
  related_domain: materials_property_residuals
  related_objects:
    - "tasks/TASK-0614-adjudicate-materials-md0001-result-path.yaml"
    - "docs/reviews/materials-md0002-wider-replication-slice-plan.md"
    - "docs/reviews/materials-md0001-split-sensitivity-audit.md"
    - "data/materials/source_manifest.yaml"
  planning_context: >
    TASK-0602 selected stable ternary oxides as the MD-0002 candidate slice,
    but TASK-0614 should first decide whether the next durable output is
    result promotion, dataset packaging, MD-0002 widening, or do-not-promote.

requirements:
  - "Start only after TASK-0614 recommends `MD0002_WIDENING_FIRST` or otherwise explicitly authorizes an MD-0002 acquisition preflight."
  - "Define a no-live-fetch acquisition package for Materials Project stable ternary oxides, including query contract, row cap, checksum plan, version pin, citation/reuse metadata, and holdout/no-peek manifest plan."
  - "Do not fetch live Materials Project rows or commit MD-0002 values in this task."
  - "Keep formation energy and band gap axes separate, with band gap treated as split-fragile unless a later task shows otherwise."
  - "Do not make materials-design, synthesis, device, biomedical, prediction, claim, or discovery statements."

accepted_outputs:
  - "docs/reviews/materials-md0002-acquisition-preflight-package.md"
  - "optional update to data/materials/source_manifest.yaml with metadata-only acquisition-plan entry"
  - "optional follow-up task recommendation for maintainer-run acquisition"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
