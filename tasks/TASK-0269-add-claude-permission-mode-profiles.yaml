id: TASK-0269
title: "Add autonomous Claude permission profile and setup-script opt-in"
type: contributor_experience
status: REVIEW_READY
difficulty: low
priority: medium

strategy_alignment:
  - "Preserve the existing safe onboarding default while adding an explicit, committed opt-in for fully autonomous Claude Code sessions."
  - "Avoid ad-hoc edits of the gitignored settings.local.json for autonomous setups."
  - "Enable supervised autonomous task loops to run without per-command approval prompts."

input:
  mode: workflow
  related_domain: contributor_experience
  related_objects:
    - "CLAUDE.md"
    - "scripts/apl_setup_worktree.sh"
    - ".claude/settings.json"
    - "tasks/TASK-0255-add-worktree-settings-sync-script.yaml"
    - "tasks/TASK-0258-track-claude-settings-baseline.yaml"
  planning_context: >
    TASK-0255 added the worktree setup script that copies a personal
    settings.local.json into new worktrees. TASK-0258 made .claude/settings.json
    a tracked shared baseline. Contributors and agents still have to hand-edit
    the gitignored local override to opt into a fully autonomous mode, which
    is friction-prone and creates inconsistent setups across worktrees.
    This task adds a committed autonomous profile and a --mode flag on the
    setup script so that autonomous setups are explicit and consistent. The
    existing default no-flag onboarding behavior is preserved unchanged.

requirements:
  - "Add .claude/profiles/autonomous.json with Bash(*) plus the standard /tmp/apl-* Read/Write/Edit entries used elsewhere in the baseline."
  - "Add .claude/profiles/README.md explaining what the autonomous profile allows, when to use it, and when not to use it."
  - "Extend scripts/apl_setup_worktree.sh with a --mode autonomous flag that writes the committed autonomous profile to .claude/settings.local.json."
  - "Preserve the existing no-flag behavior (copy personal settings.local.json from the main repo root) without changes."
  - "Keep the script idempotent: if .claude/settings.local.json already exists, exit 0 without overwriting in every mode."
  - "Update CLAUDE.md First Action section by appending the autonomous opt-in command; do not change the default safe onboarding path that runs the script without flags."
  - "Do not change the committed .claude/settings.json baseline as part of this task."
  - "Do not modify global Claude settings under ~/.claude/ as part of this task."

accepted_outputs:
  - ".claude/profiles/autonomous.json"
  - ".claude/profiles/README.md"
  - "scripts/apl_setup_worktree.sh (extended with --mode autonomous flag, executable)"
  - "CLAUDE.md First Action section appended with autonomous opt-in"

validation:
  commands:
    - "bash -n scripts/apl_setup_worktree.sh"
    - "scripts/apl_setup_worktree.sh --help"
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - claude_code
  - codex
  - llm_agent
