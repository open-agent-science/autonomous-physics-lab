    memory.

requirements:
  - "Start only after TASK-0712 is DONE."
  - "Replay the relevant validator checks after the boundary fix using deterministic code."
  - "Report pass/fail/inconclusive behavior, remaining boundary limitations, and publication tier recommendation."
  - "Do not claim general symbolic reasoning, proof of physical law, or open-ended dimensional intelligence."

accepted_outputs:
  - "docs/reviews/dimensional-validator-gate-a-replay-decision.md"
