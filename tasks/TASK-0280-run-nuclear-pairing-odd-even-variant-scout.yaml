id: TASK-0280
title: "Run nuclear pairing and odd-even variant scout"
type: autonomous_research_pilot
status: READY
difficulty: high
priority: high

strategy_alignment:
  - "Provide a third parallel Nuclear variant lane with a disjoint hypothesis family."
  - "Explore pairing and odd-even residual behavior without mutating frozen prediction entries."
  - "Make agent-generated negative results useful instead of letting them disappear."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "experiments/EXP-0012-nuclear-mass-baseline-residual-benchmark.yaml"
    - "results/RESULT-0015-nuclear-mass-baseline-residual-benchmark.md"
    - "docs/notes/nuclear-prediction-variant-factory.md"
    - "docs/reviews/nuclear-prediction-factory-slate-002-feature-terms.md"
  planning_context: >
    Pairing and odd-even structure is a natural parallel lane because it is
    scientifically distinct from shell-neighborhood and neutron-rich scouts.
    This task lets an agent test bounded candidate variants while preserving
    registry discipline and avoiding premature reveal or claim language.

requirements:
  - "Generate 6-10 bounded pairing, odd-even, parity, or local-staggering hypotheses, then reject weak or duplicate ideas before sandbox evaluation."
  - "Use only repository-pinned datasets, existing baseline artifacts, and deterministic local code; do not fetch live measurements."
  - "Compare candidates against the frozen RESULT-0015 baseline and relevant pairing or odd-even subsets."
  - "Include at least one negative or near-null control and preserve its result."
  - "Report MAE/RMSE or the closest existing project metric, subset behavior, complexity, limitations, and verdict."
  - "Do not edit prediction_registry/nuclear_masses/ or create new frozen PRED entries in this task."
  - "Do not promote discovery claims or imply a new nuclear mass law."

accepted_outputs:
  - "docs/reviews/nuclear-pairing-odd-even-variant-scout-001.md"
  - "optional sandbox artifact path under agent_runs/ or results/ if required by the existing workflow"
  - "updated tests only if code or reusable tooling is changed"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
