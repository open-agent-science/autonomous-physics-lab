requirements:
  - "Review the TASK-0888 blocker and the existing proposal-stage Exoplanet artifacts, without fetching live catalog rows or rerunning metrics."
  - "Present decision options: create a minimal negative/control identity in a later task, keep review-note-only memory, or wait for a future source-version trigger."
