id: TASK-0878
title: "Implement a canonical DZ10 parity reference only after the AMDC source scout lands"
type: scientific_benchmark
status: REVIEW_READY
closeout: review
difficulty: high
priority: medium

strategy_alignment:
  - "TASK-0823 landed a useful published-variant Duflo-Zuker baseline but did not reproduce canonical AMDC parity."
  - "TASK-0853 landed PARITY_REFERENCE_AVAILABLE with an AMDC mirror and numeric fixture, while keeping source-byte redistribution not cleared."
  - "A parity implementation could materially strengthen the Nuclear baseline, but it must not reopen TASK-0823 or mutate RESULT-0025."
  - "The implementation route must remain metadata-only by default unless a maintainer records source-rights approval for vendoring."

input:
