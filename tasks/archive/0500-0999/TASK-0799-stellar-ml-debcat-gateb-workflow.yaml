id: TASK-0799
title: "Repackage Stellar M-L DEBCat benchmark as a physics-lab engine workflow (Gate B replayable)"
type: tooling_reliability
status: DONE
closeout: review
difficulty: medium
priority: high

strategy_alignment:
  - "Unblock the AGENT_PUBLISHED -> AGENT_VALIDATED transition for RESULT-0022 by making it regenerable via `physics-lab run`, the model the Gate B validator supports; this directly unblocks the seeded TASK-0776 Gate B replay."
  - "Mirror the merged TASK-0786 Materials repackaging exactly, reusing the shared Phase-0 (example-config schema + runner dispatch) already in main."
  - "Preserve the exact Textbook Formula Audit scope: alpha=3.5 is inadequate as the sole frozen baseline on one committed DEBCat slice, NOT falsified as a universal textbook relation."

input:
  mode: planning_only
  related_domain: textbook_formula_audit
  related_objects:
    - "tasks/TASK-0764-package-stellar-ml-gate-a-result.yaml"
    - "tasks/TASK-0776-run-stellar-ml-result0022-gate-b-replay.yaml"
    - "tasks/TASK-0786-materials-md0002-gateb-workflow.yaml"
    - "results/EXP-0015/RUN-0001/result.yaml"
    - "physics_lab/workflows/materials_md0002_formation_energy.py"
    - "scripts/replay_stellar_ml_result.py"
    - "scripts/run_stellar_ml_stage_control_audit.py"
  planning_context: >
    RESULT-0022 was published with command `python3 scripts/replay_stellar_ml_result.py --check`,
    which the Gate B validator cannot re-run (not a `physics-lab run` command and it
    does not regenerate a result.yaml), so TASK-0776 is blocked. TASK-0786 already
    landed the Materials equivalent and the shared schema/runner dispatch. This task
    adds a `stellar_ml_debcat_baseline_benchmark` engine workflow that regenerates
    the full result.yaml from committed CC-BY-4.0 DEBCat rows (baselines, controls,
    split-sensitivity, by-stage diagnostic, and per-model scores), and migrates
    EXP-0015 to that command. Second of the two serialized workflow PRs.

requirements:
  - "Add a deterministic engine + workflow that regenerate `results/EXP-0015/RUN-0001/result.yaml` with numbers identical (within 1e-9) to the published RESULT-0022 (alphas, null, split-sensitivity, shuffle controls, by-stage diagnostic, scores)."
  - "Register the new `workflow` value in the example-config schema and the runner dispatch; add the example config."
  - "Migrate EXP-0015 by running the new workflow (not hand-editing); switch only `command`/`code_reference`, preserve all metrics, verdict, scope/limitation wording, and `published_by`; keep `review_tier: AGENT_PUBLISHED` (no promotion here)."
  - "Retain `scripts/replay_stellar_ml_result.py` as a thin `--check` wrapper over the new engine; do not duplicate logic."
  - "Add tests mirroring the Materials workflow path: engine determinism, CLI-run shape, and a Gate B pass under an INDEPENDENT agent identity."
  - "Do not change RESULT-0022 numbers, promote any CLAIM/KNOW, state a universal mass-luminosity law, or alter the DEBCat rows/holdout."

accepted_outputs:
  - "physics_lab/engines/stellar_ml_debcat_baseline_result.py and physics_lab/workflows/stellar_ml_debcat_baseline.py."
  - "examples/stellar_ml_debcat_baseline_benchmark.yaml plus the example-config schema and runner dispatch updates."
  - "Migrated `results/EXP-0015/RUN-0001/` artifacts regenerated by the workflow (command/code_reference switched; numbers preserved)."
  - "tests/test_stellar_ml_debcat_baseline_result.py covering engine determinism, CLI run, and independent-agent Gate B replay."

result_artifact_policy:
  required: false
  reason: "Tooling-reliability repackaging that makes an existing RESULT Gate B replayable; preserves the result's numbers and tier, creates no new RESULT or PRED."
  evidence:
    - "results/EXP-0015/RUN-0001/result.yaml"
    - "physics_lab/workflows/stellar_ml_debcat_baseline.py"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_stellar_ml_debcat_baseline_result.py tests/test_agent_replay_validation.py tests/test_result_publication_gate.py"
    - "python3 -m physics_lab.cli run examples/stellar_ml_debcat_baseline_benchmark.yaml --output-dir /tmp/stellar-gateb"
    - "python3 scripts/apl_check_result_publication.py results/EXP-0015/RUN-0001/result.yaml"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
