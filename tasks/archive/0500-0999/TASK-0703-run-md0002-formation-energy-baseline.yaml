id: TASK-0703
title: "Run MD-0002 formation-energy baseline benchmark"
type: scientific_benchmark
status: DONE
closeout: review
difficulty: high
priority: high

strategy_alignment:
  - "Produce the next likely high-value APL scientific benchmark result from the Materials campaign."
  - "Test whether the MD-0001 formation-energy composition signal survives on a larger stable-ternary-oxide slice."
  - "Preserve null, split-sensitive, or negative outcomes as durable scientific memory."

input:
  mode: workflow
  related_domain: materials_property_residuals
  related_objects:
    - "tasks/TASK-0701-predeclare-md0002-benchmark-and-control-plan.yaml"
    - "tasks/TASK-0702-validate-md0002-acquisition-and-freeze-holdout.yaml"
    - "docs/reviews/materials-md0002-acquisition-go-no-go.md"
  planning_context: >
    TASK-0702 validated the MD-0002 acquisition and confirmed the deterministic
    no-peek holdout freeze, so this task can now run the first formation-energy
    benchmark under the predeclared control plan. Band gap remains
    diagnostic-only and must not be mixed into the primary verdict.

requirements:
  - "Start only after TASK-0701 and TASK-0702 are complete."
  - "Use only committed MD-0002 rows and frozen holdout assignments; no live fetch."
  - "Report train/validation/holdout metrics, null baselines, cation-group/cation-pair baselines, structure/prototype slices, and split-sensitivity seeds."
  - "Preserve failure, null-beats-baseline, or split-fragile outcomes; do not force a positive result."
  - "Do not recommend materials, syntheses, devices, biomedical uses, or promote materials-law claims."

accepted_outputs:
  - "hypothesis_proposals/materials-property-residuals/HYP-PROPOSAL-0059-md0002-formation-energy-baseline.yaml"
  - "experiment_proposals/materials-property-residuals/EXP-PROPOSAL-0025-md0002-formation-energy-baseline.yaml"
  - "agent_runs/AGENT-RUN-0072/agent_run.yaml"
  - "agent_runs/AGENT-RUN-0072/metrics.json"
  - "agent_runs/AGENT-RUN-0072/report.md"
  - "docs/reviews/materials-md0002-formation-energy-baseline-benchmark.md"

result_artifact_policy:
  required: false
  reason: >
    TASK-0703 executes and preserves the sandbox benchmark, but does not
    authorize new protected hypotheses/ or experiments/ identities required
    for canonical RESULT packaging.
  evidence:
    - "agent_runs/AGENT-RUN-0072/agent_run.yaml"
    - "docs/reviews/materials-md0002-formation-energy-baseline-benchmark.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 scripts/validate_fast.py"
    - "python3 -m pytest -n0 -m full_repo"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
