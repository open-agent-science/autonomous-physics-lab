id: TASK-0615
title: "Build Atomic Pizzocaro source-to-row extraction ledger"
type: scientific_dataset
status: DONE
difficulty: high
priority: high

strategy_alignment:
  - "Remove the Atomic row-admissibility bottleneck through a reusable source-to-row ledger, not prose interpretation."
  - "Turn pinned Pizzocaro source artifacts into either an admissible second-source row path or precise blocker memory."
  - "Exercise the source-to-row pattern needed by Quantum, Stellar, and future fresh-data campaigns."

input:
  mode: workflow
  related_domain: atomic_clock_residuals
  related_objects:
    - "docs/reviews/atomic-pizzocaro-yb-sr-row-admissibility-gate.md"
    - "data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/provenance.yaml"
    - "data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/Yb-Sr-ratio-measurements-IPPP.csv"
    - "data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/Yb-Sr-ratio-measuremets.csv"
    - "docs/reviews/atomic-first-benchmark-covariance-policy.md"
  planning_context: >
    TASK-0567 kept Pizzocaro row admissibility blocked because the source-file
    to row-of-record mapping, direct-vs-derived class, covariance semantics,
    and campaign-window binding are not frozen. This task builds a
    source-to-row extraction ledger over the already committed source artifacts
    without adding benchmark rows yet.

requirements:
  - "Use only the committed Pizzocaro source artifacts; do not fetch live data."
  - "Map each candidate row surface: Figure 2b summary, VLBI/IPPP/PPP time-series section, and any per-window final values visible in the CSV files."
  - "For each candidate surface, record source file, section locator, row count, ratio orientation, value columns, uncertainty columns, MJD/campaign-window fields, processing path, and direct-vs-derived class."
  - "Recommend at most one row-of-record surface for future curation, or preserve a blocker if none is suitable."
  - "Do not add `data/atomic_clocks/acr-*.yaml` rows, run cross-source benchmarks, fit constants drift, create predictions, or promote claims."
  - "Route the final output through docs/result-promotion-protocol.md."

accepted_outputs:
  - "docs/reviews/atomic-pizzocaro-source-to-row-extraction-ledger.md"
  - "optional machine-readable extraction ledger under data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/"
  - "optional follow-up task recommendation for row curation or blocker preservation"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_atomic_clock_source_manifest.py tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
