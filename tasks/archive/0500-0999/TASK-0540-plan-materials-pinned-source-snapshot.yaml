id: TASK-0540
title: "Plan Materials pinned source snapshot"
type: scientific_dataset
status: SUPERSEDED
difficulty: medium
priority: high

strategy_alignment:
  - "Move Materials Property Residuals from scaffold-only toward a real source-gated benchmark surface."
  - "Select a license-clean, version-pinnable first source before any material-property values are ingested."
  - "Keep materials work high-throughput without weakening provenance or overclaim guardrails."

input:
  mode: workflow
  related_domain: materials_property_residuals
  related_objects:
    - "docs/campaigns/materials-property-residuals.md"
    - "campaign_profiles/materials-property-residuals.yaml"
    - "docs/fresh-data-intake-protocol.md"
  planning_context: >
    Superseded by TASK-0547 and TASK-0548: Materials Project was selected,
    registered, narrowed to a stable-binary-oxides pilot, and pinned as the first
    checksummed Materials source dataset. Create a fresh bounded task if a wider
    Materials source comparison or second source is needed.

requirements:
  - "Compare at least three candidate source classes from the campaign scaffold for license, public accessibility, version pinning, checksum feasibility, row provenance, and first-property suitability."
  - "Recommend exactly one first source and one first property axis for a future pinned snapshot task, or declare a blocker if no source is admissible."
  - "Define the future snapshot artifact shape, checksum policy, retrieval boundary, and maintainer-supplied artifact requirements."
  - "Keep computed and measured provenance separate; do not mix DFT-computed and experimental rows under one metric."
  - "Do not fetch live database rows, add values, build a loader, run residual metrics, or make material-discovery/property-prediction claims."
  - "Route the final output through docs/result-promotion-protocol.md."

accepted_outputs:
  - "docs/reviews/materials-pinned-source-snapshot-plan.md"
  - "data/materials/source_manifest.yaml or source-manifest update with metadata-only candidate/source state"
  - "optional docs/campaigns/materials-property-residuals.md update only if the first-source posture changes"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
