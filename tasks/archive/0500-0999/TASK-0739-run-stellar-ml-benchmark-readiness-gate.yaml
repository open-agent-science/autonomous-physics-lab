id: TASK-0739
title: "Run Stellar M-L benchmark-readiness gate after DEBCat Route 2"
type: scientific_validation
status: DONE
closeout: review
difficulty: medium
priority: high

strategy_alignment:
  - "Decide whether the DEBCat Route 2 extractor/sample package is enough to unblock the first empirical Stellar M-L audit."
  - "Keep public-safe storage, luminosity provenance, holdout freeze, and local reproduction constraints explicit before metrics."
  - "Avoid launching TASK-0709 until the benchmark input boundary is reviewed."

input:
  mode: planning_only
  related_domain: textbook_formula_audit
  related_objects:
    - "tasks/TASK-0708-curate-stellar-debcat-row-package.yaml"
    - "tasks/TASK-0709-run-stellar-ml-first-empirical-audit.yaml"
    - "docs/reviews/stellar-ml-debcat-row-package.md"
    - "docs/reviews/stellar-ml-debcat-storage-route-decision.md"
    - "data/textbook_formula_audit/stellar_ml/debcat_component_rows.sample.yaml"
    - "scripts/extract_debcat_stellar_ml_rows.py"
  planning_context: >
    TASK-0708 curated a Route 2 DEBCat package with a deterministic local
    extractor and non-substitutive samples, but did not assert benchmark
    readiness. This gate decides whether TASK-0709 may run against locally
    reproduced rows without committing the full dataset.

requirements:
  - "Use only committed extractor, sample, provenance, storage-route, luminosity-policy, and holdout artifacts."
  - "Verify whether local reproduction plus sample/ledger evidence satisfies the benchmark-readiness boundary without redistributing the full DEBCat table."
  - "State whether TASK-0709 should become READY, remain BLOCKED, or be rewritten for a local-extractor benchmark route."
  - "Do not fit the mass-luminosity exponent, compute residual metrics, or create RESULT/CLAIM artifacts."
  - "Do not commit raw debs.dat or the full normalized DEBCat row set."

accepted_outputs:
  - "docs/reviews/stellar-ml-benchmark-readiness-after-route2.md"
  - "optional minimal update to tasks/TASK-0709-run-stellar-ml-first-empirical-audit.yaml if the unblock condition changes"
  - "optional minimal update to tasks/TASK-0740-run-stellar-ml-route2-local-benchmark.yaml if the local-extractor route is authorized"

result_artifact_policy:
  required: false
  reason: "Benchmark-readiness gate; no scientific RESULT or PRED artifact is expected."
  evidence:
    - "docs/reviews/stellar-ml-benchmark-readiness-after-route2.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_stellar_ml_debcat_rows.py tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
