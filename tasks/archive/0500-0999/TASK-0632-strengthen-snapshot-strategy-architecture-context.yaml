id: TASK-0632
title: "Strengthen snapshot strategy and architecture context"
type: snapshot_tooling
status: DONE
difficulty: low
priority: high

strategy_alignment:
  - "Make maintainer snapshots more useful for strategy agents and repository architects."
  - "Expose the current strategy, mission, campaign profiles, and architecture structure without creating a new static agent-facing cache."
  - "Keep snapshot generation read-only and token-conscious while preserving enough context for planning."

input:
  mode: workflow
  related_domain: maintainer_snapshot
  related_objects:
    - "scripts/apl_snapshot.sh"
    - "physics_lab/registry/snapshot.py"
    - "tests/test_snapshot.py"
    - "docs/strategy.md"
    - "missions/current.yaml"
    - "campaign_profiles/"
  planning_context: >
    The snapshot front page already summarizes dynamic strategy state, but the
    shell snapshot did not include the full authoritative strategy and mission
    source files as dedicated blocks. Strategy and architect agents also need a
    compact directory/file structure view to reason about repository architecture
    without reading every file.

requirements:
  - "Add a clearly labeled snapshot section for current strategy and mission source files."
  - "Include `docs/strategy.md`, `missions/current.yaml`, campaign profile catalog/profile files, and core strategy/curator/factory/public-gate docs in that section."
  - "Add a compact architecture directory/file structure section that excludes noisy local/generated directories."
  - "Do not add a committed static cache or generated agent-facing index."
  - "Keep the snapshot read-only and avoid running validation or experiment commands."
  - "Add regression coverage so future edits do not remove the strategy/mission/profile/structure sections."

accepted_outputs:
  - "scripts/apl_snapshot.sh"
  - "tests/test_snapshot.py"
  - "docs/reviews/snapshot-strategy-architecture-context-review.md"

validation:
  commands:
    - "python3 -m pytest tests/test_snapshot.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
