id: TASK-0740
title: "Run Stellar M-L Route 2 local-extractor benchmark"
type: scientific_benchmark
status: DONE
closeout: review
difficulty: high
priority: high

strategy_alignment:
  - "Produce the first empirical Textbook Formula Audit benchmark only after Route 2 benchmark-readiness passes."
  - "Test the frozen mass-luminosity baseline on locally reproduced DEBCat rows without redistributing the full catalogue."
  - "Preserve range-aware, uncertainty-aware, and negative outcomes as scientific memory."

input:
  mode: workflow
  related_domain: textbook_formula_audit
  related_objects:
