  planning_context: >
    If TASK-0739 authorizes the local-extractor route, this task runs the first
    empirical Stellar M-L audit using locally reproduced DEBCat rows, frozen
    system-level holdout lanes, and the predeclared alpha=3.5 baseline.

requirements:
  - "Start only after TASK-0739 explicitly authorizes the Route 2 local-extractor benchmark path."
  - "Fetch/verify DEBCat only through the approved local artifact path; do not commit raw debs.dat or the full normalized row set."
  - "Use the frozen physical-binary-system holdout lanes before any residual inspection."
  - "Report per-slice metrics, uncertainty handling, derived-luminosity sensitivity, and limitations."
  - "Do not claim a universal stellar law, stellar-evolution result, or discovery."

