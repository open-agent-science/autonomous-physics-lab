id: TASK-0606
title: "Scout Atomic second Yb/Sr fallback source beyond Pizzocaro"
type: scientific_dataset
status: DONE
difficulty: medium
priority: medium

strategy_alignment:
  - "Reduce Atomic dependence on a single Pizzocaro row-admissibility outcome."
  - "Keep Atomic source-readiness moving without fitting constants drift or weakening covariance policy."
  - "Prepare a fallback path toward the first Yb/Sr cross-source consistency benchmark."

input:
  mode: planning_only
  related_domain: atomic_clock_residuals
  related_objects:
    - "tasks/TASK-0567-run-atomic-pizzocaro-row-admissibility-gate.yaml"
    - "docs/reviews/atomic-pizzocaro-source-artifact-review.md"
    - "docs/reviews/atomic-second-source-fallback-triage.md"
    - "docs/reviews/atomic-first-benchmark-covariance-policy.md"
    - "data/atomic_clocks/source_manifest.yaml"
  planning_context: >
    TASK-0567 remains the main Atomic row-admissibility task. This task scouts
    one additional fallback source path so Atomic is not blocked on a single
    source outcome. It is source metadata only and must not ingest values.

requirements:
  - "Identify one candidate Yb/Sr or closely compatible optical-clock comparison source not already exhausted by prior blockers."
  - "Report stable locator, publication/release timing, value-bearing table/figure availability, covariance notes, campaign-window semantics, checksum feasibility, and license/reuse posture."
  - "Do not copy frequency-ratio values, fit constants drift, add derived constraints, curate rows, run cross-source metrics, or promote claims."
  - "State whether the candidate should become a source-artifact package task, remain a blocker, or be rejected as duplicate/derived."

accepted_outputs:
  - "docs/reviews/atomic-second-yb-sr-fallback-source-scout.md"
  - "optional metadata-only source_manifest update if a candidate is admissible"
  - "optional follow-up task proposal for a source-artifact package"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_atomic_clock_source_manifest.py tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
