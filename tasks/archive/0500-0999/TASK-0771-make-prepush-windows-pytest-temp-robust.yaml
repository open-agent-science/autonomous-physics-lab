    - "scripts/apl_prepush_check.py"
    - "scripts/apl_agent_doctor.py"

validation:
  commands:
    - "python3 -m pytest tests/test_prepush_check.py tests/test_agent_doctor.py"
    - "python3 -m ruff check scripts/apl_prepush_check.py scripts/apl_agent_doctor.py physics_lab/registry/prepush_check.py tests/test_prepush_check.py tests/test_agent_doctor.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

