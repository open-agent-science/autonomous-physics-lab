id: TASK-0704
title: "Curate Atomic Nemitz 2016 ACR-0002 Yb/Sr row gate"
type: scientific_dataset
status: DONE
closeout: review
difficulty: high
priority: high

strategy_alignment:
  - "Use the cleanest second-source path for the first Atomic Yb/Sr cross-source benchmark."
  - "Avoid forcing Pizzocaro aggregation after the PSD gate preserved the blocker."
  - "Keep high-precision atomic-clock rows source-pinned, uncertainty-aware, and free of constants-drift claims."

input:
  mode: planning_only
  related_domain: atomic_clock_residuals
  related_objects:
    - "docs/reviews/atomic-pizzocaro-row-admissibility-after-psd-covariance.md"
    - "docs/reviews/atomic-second-source-yb-sr-row-gate.md"
    - "docs/notes/atomic-clock-source-candidates.md"
    - "data/atomic_clocks/source_manifest.yaml"
    - "tasks/TASK-0456-run-first-atomic-yb-sr-cross-source-consistency-benchmark.yaml"
  planning_context: >
    TASK-0686 preserved the Pizzocaro aggregation blocker and recommended
    Nemitz 2016 as the primary path to a second admissible Yb/Sr row. This
    task decides whether an ACR-0002 row can be curated from the pinned Nemitz
    source surface, or preserves the exact blocker.

requirements:
  - "Review version-of-record versus arXiv table identity, campaign window, observable axis, units, uncertainty transcription, and checksum/source provenance."
  - "If admissible, commit exactly one narrow ACR-0002 direct Yb/Sr row or a minimal row package with explicit uncertainty and row-role fields."
  - "If blocked, preserve a row-gate review that states the single missing evidence path."
  - "Do not compare against Beloy, compute consistency metrics, fit constants drift, create RESULT/PRED/CLAIM artifacts, or make fundamental-physics interpretation."

accepted_outputs:
  - "data/atomic_clocks/acr-0002-nemitz-2016-direct-ratio.yaml or a blocker review explaining why it cannot be committed"
  - "docs/reviews/atomic-nemitz-acr0002-row-curation-gate.md"
  - "optional data/atomic_clocks/source_manifest.yaml metadata update"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_atomic_clock_source_manifest.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
