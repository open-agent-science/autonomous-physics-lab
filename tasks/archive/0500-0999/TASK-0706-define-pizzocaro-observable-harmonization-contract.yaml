  planning_context: >
    TASK-0686 rejected per-window Beloy/Pizzocaro benchmark admission because
    Pizzocaro windows are fractional deviations while Beloy carries an absolute
    frequency ratio. This task defines, or rejects, a narrow harmonization
    contract for future sensitivity-only diagnostics.

requirements:
  - "State whether Pizzocaro fractional deviation windows can be mapped to a Beloy-comparable residual axis without creating an absolute row."
  - "If yes, define the exact observable mapping, units, uncertainty/covariance labels, diagonal comparator, and approximate-covariance sensitivity label."
  - "If no, preserve a do-not-run blocker that explains what source evidence is missing."
  - "Do not compute metrics, aggregate windows, commit acr rows, fit drift, or promote claims."

accepted_outputs:
  - "docs/reviews/atomic-pizzocaro-observable-harmonization-contract.md"

result_artifact_policy:
