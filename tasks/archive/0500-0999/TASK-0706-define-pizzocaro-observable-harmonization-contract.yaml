id: TASK-0706
title: "Define Pizzocaro observable-harmonization contract for Atomic diagnostics"
type: benchmark_protocol
status: DONE
difficulty: medium
priority: medium

strategy_alignment:
  - "Preserve useful Pizzocaro work without pretending it already unblocks the Yb/Sr benchmark."
  - "Separate fractional-deviation windows from absolute-ratio rows before any Beloy comparison."
  - "Create a future sensitivity-only diagnostic path if Nemitz remains blocked."

input:
  mode: planning_only
  related_domain: atomic_clock_residuals
  related_objects:
    - "docs/reviews/atomic-pizzocaro-row-admissibility-after-psd-covariance.md"
    - "data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/vlbi_per_window_diagnostic_ledger.yaml"
