  reason: >
    Planning-only observable-harmonization contract; defines a sensitivity-only
    diagnostic residual axis and preserves benchmark/publication blockers, but
    produces no scientific RESULT artifact.
  evidence:
    - "docs/reviews/atomic-pizzocaro-observable-harmonization-contract.md"

validation:
