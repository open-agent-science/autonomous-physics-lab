id: TASK-0786
title: "Repackage Materials MD-0002 formation-energy benchmark as a physics-lab engine workflow (Gate B replayable)"
type: tooling_reliability
status: DONE
closeout: review
difficulty: medium
priority: high

strategy_alignment:
  - "Unblock the AGENT_PUBLISHED -> AGENT_VALIDATED transition for RESULT-0021 by making it regenerable via `physics-lab run`, the model the Gate B validator already supports."
  - "Collapse the bespoke `--check` replay off-ramp into the canonical engine-workflow path (the same one EXP-0013 uses), rather than weakening Gate B to accept arbitrary scripts."
  - "Keep the architecture durable: a thin per-benchmark workflow adapter, not a speculative generic benchmark-DSL engine, per the Architect long-horizon scope review."

input:
  mode: planning_only
  related_domain: materials_property_residuals
  related_objects:
    - "tasks/TASK-0765-package-materials-md0002-gate-a-result.yaml"
    - "tasks/TASK-0775-run-materials-result0021-gate-b-replay.yaml"
    - "results/EXP-0014/RUN-0001/result.yaml"
    - "physics_lab/workflows/textbook_exact_reference.py"
    - "physics_lab/engines/materials_md0002_baseline.py"
    - "physics_lab/registry/agent_replay_validation.py"
    - "scripts/replay_materials_md0002_result.py"
  planning_context: >
    RESULT-0021 was published with command `python3 scripts/replay_*.py --check`,
    which the Gate B validator cannot re-run (not a `physics-lab run` command and
    it does not regenerate a result.yaml), so TASK-0775 was blocked. This task
    adds a `materials_md0002_formation_energy_benchmark` engine workflow that
    regenerates the full result.yaml from committed data, reusing the frozen
    TASK-0703 benchmark engine for the canonical numbers, and migrates EXP-0014
    to that command. Designed under the APL Architect role as the Materials
    MD-0002 workflow migration; any Stellar workflow migration must use its own
    future task id.

requirements:
  - "Add a deterministic engine + workflow that regenerate `results/EXP-0014/RUN-0001/result.yaml` with numbers identical (within 1e-9) to the published RESULT-0021."
  - "Register the new `workflow` value in the example-config schema and the runner dispatch; add the example config."
  - "Migrate EXP-0014 by running the new workflow (not hand-editing); switch only `command`/`code_reference`, preserve all metrics, verdict, scope/limitation wording, and `published_by`; keep `review_tier: AGENT_PUBLISHED` (no promotion here)."
  - "Retain `scripts/replay_materials_md0002_result.py` as a thin `--check` wrapper over the new engine; do not duplicate logic."
  - "Add tests mirroring the textbook exact-reference path: engine determinism, CLI-run shape, and a Gate B pass under an INDEPENDENT agent identity."
  - "Do not change RESULT-0021 numbers, promote any CLAIM/KNOW, pin the result in golden-results.yaml, or alter the MD-0002 dataset/holdout."
  - "Modifying the canonical `results/EXP-0014/RUN-*` artifacts is an intended, authorized part of this migration."

accepted_outputs:
  - "physics_lab/engines/materials_md0002_formation_energy_result.py and physics_lab/workflows/materials_md0002_formation_energy.py."
  - "examples/materials_md0002_formation_energy_benchmark.yaml plus the example-config schema and runner dispatch updates."
  - "Migrated `results/EXP-0014/RUN-0001/` artifacts regenerated by the workflow (command/code_reference switched; numbers preserved)."
  - "tests/test_materials_md0002_formation_energy_result.py covering engine determinism, CLI run, and independent-agent Gate B replay."

result_artifact_policy:
  required: false
  reason: "Tooling-reliability repackaging that makes an existing RESULT Gate B replayable; preserves the result's numbers and tier, creates no new RESULT or PRED."
  evidence:
    - "results/EXP-0014/RUN-0001/result.yaml"
    - "physics_lab/workflows/materials_md0002_formation_energy.py"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_materials_md0002_formation_energy_result.py tests/test_agent_replay_validation.py tests/test_result_publication_gate.py tests/test_textbook_stefan_boltzmann_exact_reference.py"
    - "python3 -m physics_lab.cli run examples/materials_md0002_formation_energy_benchmark.yaml --output-dir /tmp/md0002-gateb"
    - "python3 scripts/apl_check_result_publication.py results/EXP-0014/RUN-0001/result.yaml"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
