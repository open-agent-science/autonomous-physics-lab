id: TASK-0579
title: "Run Materials MD-0001 band-gap null-control audit"
type: scientific_benchmark
status: DONE
difficulty: medium
priority: high

strategy_alignment:
  - "Stress-test the weaker MD-0001 band-gap axis before interpreting residual structure."
  - "Prefer null-control evidence over a premature materials model story."
  - "Keep benchmark diagnostics separate from material recommendations."

input:
  mode: workflow
  related_domain: materials_property_residuals
  related_objects:
    - "docs/reviews/materials-md0001-baseline-residual-benchmark.md"
