    The first MD-0001 benchmark found a clearer composition-aware advantage for
    formation energy than for band gap. This task tests whether the band-gap
    residual pattern survives simple null controls before any agent treats it
    as a scientific signal.

requirements:
  - "Use the committed MD-0001 dataset and frozen holdout semantics only."
  - "Audit the band-gap axis with at least two deterministic controls such as label shuffle, composition-group shuffle, or nearest/global null comparisons."
  - "Keep formation-energy metrics as reference context only; do not merge axes into one score."
  - "Do not add new rows, change holdout membership, or make material-design claims."
  - "Route the final output through docs/result-promotion-protocol.md."

accepted_outputs:
  - "agent_runs/AGENT-RUN-0058/metrics.json"
  - "agent_runs/AGENT-RUN-0058/report.md"
