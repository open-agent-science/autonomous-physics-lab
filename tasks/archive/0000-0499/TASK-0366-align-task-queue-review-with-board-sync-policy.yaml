id: TASK-0366
title: "Align task-queue review with post-merge board sync policy"
type: tooling_fix
status: DONE
difficulty: low
priority: high

strategy_alignment:
  - "Stop maintainer review from requiring generated task navigation in task-queue PRs."
  - "Align review-agent behavior with the PR template and post-merge Sync Active Board action."
  - "Reduce merge friction for fast scientific task-queue waves."

input:
  mode: workflow
  related_domain: tooling
  related_objects:
    - "physics_lab/registry/maintainer_review.py"
    - "tests/test_maintainer_review.py"
    - ".github/pull_request_template.md"
    - "docs/maintainer-review-agent.md"
  planning_context: >
    TASK-0358 moved generated task navigation to a post-merge GitHub Action
    and the PR template tells agents not to commit `tasks/ACTIVE.md` or
    `docs/task-views/*.md` from routine task PRs. The maintainer review agent
    still blocked TASK-QUEUE PRs that omitted those generated files. This task
    aligns the deterministic review policy with the newer board-sync policy.

requirements:
  - "Do not require TASK-QUEUE PRs to change `tasks/ACTIVE.md`."
  - "Do not require TASK-QUEUE PRs to change `docs/task-views/*.md`."
  - "Keep canonical task-file status validation for TASK-QUEUE PRs."
  - "Keep generated navigation changes allowed when present, but make them advisory because post-merge sync normally owns them."
  - "Add regression coverage for a TASK-QUEUE PR that changes only canonical task YAML."
  - "Do not weaken protected-artifact blockers or PR-template metadata checks."

accepted_outputs:
  - "physics_lab/registry/maintainer_review.py"
  - "tests/test_maintainer_review.py"
  - "docs/maintainer-review-agent.md"
  - "tasks/TASK-0366-align-task-queue-review-with-board-sync-policy.yaml"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_maintainer_review.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
