id: TASK-0155
title: "Run second autonomous research pilot on dimensional-analysis validator"
type: autonomous_research_pilot
status: DONE
difficulty: high
priority: medium

strategy_alignment:
  - "Verify that the Phase B loop generalizes beyond pendulum to a second low-risk campaign."
  - "Use dimensional-analysis validator as a bounded pilot with deterministic checks and low discovery pressure."
  - "Stress-test proposal filtering, duplicate rejection, and negative-result preservation on a different campaign shape."

input:
  mode: workflow
  related_domain: autonomous_research
  related_objects:
    - "campaign_profiles/dimensional-analysis-validator.yaml"
    - "docs/autonomous-research-loop.md"
    - "agent_runs/"
    - "hypothesis_proposals/"
    - "experiment_proposals/"
  planning_context: >
    Once the first pendulum pilot and PR packaging layer exist, run one second
    pilot on the dimensional-analysis validator campaign to confirm the loop is
    not pendulum-specific and that low-risk validator work can also flow
    through autonomy without touching canonical result memory.

requirements:
  - "Do not start until TASK-0152, TASK-0153, and TASK-0154 are complete."
  - "Generate 5 to 10 dimensional-analysis hypothesis or challenge-item proposals."
  - "Reject duplicates or weak items explicitly before sandbox execution."
  - "Run the validator only through sandbox outputs and preserve limitations."
  - "Produce one reviewable sandbox result draft and one pilot review note."
  - "Do not touch canonical results/, claims/, or accepted knowledge in this pilot."

accepted_outputs:
  - "hypothesis_proposals/dimensional-analysis/HYP-PROPOSAL-0006-rc-time-constant.yaml"
  - "hypothesis_proposals/dimensional-analysis/HYP-PROPOSAL-0007-lc-angular-frequency.yaml"
  - "hypothesis_proposals/dimensional-analysis/HYP-PROPOSAL-0008-distance-plus-velocity.yaml"
  - "hypothesis_proposals/dimensional-analysis/HYP-PROPOSAL-0009-dimensionless-ratio-suspicious.yaml"
  - "hypothesis_proposals/dimensional-analysis/HYP-PROPOSAL-0010-projectile-range-limit-fail.yaml"
  - "hypothesis_proposals/dimensional-analysis/HYP-PROPOSAL-0011-compton-wavelength-duplicate-rejected.yaml"
  - "hypothesis_proposals/dimensional-analysis/HYP-PROPOSAL-0012-natural-unit-energy-mass-rejected.yaml"
  - "hypothesis_proposals/dimensional-analysis/HYP-PROPOSAL-0013-rayleigh-jeans-duplicate-rejected.yaml"
  - "experiment_proposals/dimensional-analysis/EXP-PROPOSAL-0003-validator-boundary-batch.yaml"
  - "agent_runs/AGENT-RUN-0003/agent_run.yaml"
  - "agent_runs/AGENT-RUN-0003/metrics.json"
  - "agent_runs/AGENT-RUN-0003/report.md"
  - "agent_runs/AGENT-RUN-0003/limitations.md"
  - "agent_runs/AGENT-RUN-0003/preflight.md"
  - "agent_runs/AGENT-RUN-0003/review_summary.md"
  - "docs/reviews/autonomous-dimensional-validator-pilot-01.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
