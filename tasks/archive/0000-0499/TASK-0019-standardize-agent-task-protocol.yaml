id: TASK-0019
title: "Standardize agent branch, commit, and pull request protocol"
type: agent_workflow
status: DONE
difficulty: medium
priority: high

strategy_alignment:
  - "Reduce contributor handoff ambiguity before the broader private multi-agent dry run."
  - "Create one canonical execution protocol for Codex, Claude Code, humans, and other agents."
  - "Keep task-based branch and review discipline consistent across repository entrypoints."

input:
  mode: workflow
  related_objects:
    - TASK-0012
    - TASK-0018
  planning_context: "Canonical branch, commit, PR, and task-state protocol for repository contributors."

requirements:
  - "Create one canonical protocol document for task execution."
  - "Standardize branch naming, commit messages, PR titles, and task-state transitions."
  - "Update agent and contributor entrypoints to reference the canonical protocol."
  - "Keep scientific claim restrictions conservative and explicit."
  - "Do not add new physics implementation or change committed result artifacts."

accepted_outputs:
  - "docs/agent-task-protocol.md"
  - "CLAUDE.md"
  - "updated agent and contributor docs"
  - "updated pull request template"
  - "updated task board"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli run examples/pendulum.yaml --output-dir /tmp/apl-pendulum"
    - "python3 -m physics_lab.cli run examples/damped_oscillator.yaml --output-dir /tmp/apl-damped"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"
    - "git diff --exit-code"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
