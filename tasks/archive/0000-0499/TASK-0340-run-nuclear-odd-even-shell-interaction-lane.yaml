id: TASK-0340
title: "Run nuclear odd-even shell-interaction hypothesis lane"
type: autonomous_research_pilot
status: DONE
difficulty: high
priority: high

strategy_alignment:
  - "Open a new Nuclear lane that tests interactions between pairing behavior and shell proximity."
  - "Avoid re-running the old pairing-only or shell-axis-only hypothesis families."
  - "Require matched controls so interaction terms are not mistaken for simple parity or shell effects."

input:
  mode: workflow
  related_domain: nuclear_mass_surface
  related_objects:
    - "docs/campaigns/nuclear-mass-surface.md"
    - "docs/reviews/nuclear-shell-axis-post-audit-decision.md"
    - "results/EXP-0012/RUN-0001/result.yaml"
    - "data/nuclear_masses/post_ame2020_holdout.yaml"
  planning_context: >
    Pairing and shell proximity have each been explored in earlier Nuclear
    work, but their interaction has not been isolated as a bounded lane. This
    task asks whether odd-even residual behavior changes near shell closures
    or mid-shell regions, while keeping shell-axis evidence diagnostic-only.

requirements:
  - "Generate 4-8 bounded interaction candidates combining parity/odd-even terms with shell-distance or mid-shell proxies."
  - "Compare interaction candidates against pairing-only, shell-only, smooth-A, and shuffled-interaction controls."
  - "Run 1-3 selected candidates through a deterministic sandbox."
  - "Report primary error deltas plus even-even, odd-even, odd-odd, magic-Z, magic-N, light-A, and neutron-rich diagnostics."
  - "Reject terms whose gains are explained by a lower-complexity pairing-only or shell-only control."
  - "Preserve negative and inconclusive outcomes."
  - "Do not add prediction registry entries, live source comparisons, claims, or result promotions."

accepted_outputs:
  - "scripts/run_nuclear_odd_even_shell_interaction_lane.py or an equivalent deterministic runner"
  - "agent_runs/AGENT-RUN-0027/agent_run.yaml"
  - "agent_runs/AGENT-RUN-0027/metrics.json"
  - "agent_runs/AGENT-RUN-0027/report.md"
  - "docs/reviews/nuclear-odd-even-shell-interaction-lane.md"
  - "tests/test_nuclear_odd_even_shell_interaction_lane.py if a runner is added"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
