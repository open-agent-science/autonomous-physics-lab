id: TASK-0423
title: "Add homogeneous science PR batch review protocol"
type: maintainer_workflow
status: DONE
difficulty: medium
priority: medium

strategy_alignment:
  - "Prevent review overload during a 50-agent pilot without weakening scientific review gates."
  - "Allow batch handling only for same-kind science PRs with separate evidence artifacts."
  - "Keep merge decisions tied to validation, review-agent verdicts, and explicit limitations."

input:
  mode: workflow
  related_domain: maintainer_review
  related_objects:
    - "docs/maintainer-review-agent.md"
    - "docs/automation/maintainer-routine-mode.md"
    - "docs/review-checklists/maintainer-pr-review-checklist.md"
    - "docs/result-promotion-protocol.md"
    - "docs/result-promotion-scorecard.md"
  planning_context: >
    A 50-agent pilot will produce many similar PRs: source triage, residual
    scout, adversarial controls, negative-result notes, and evidence cards.
    Maintainers need a way to review homogeneous batches efficiently while
    preserving each PR's evidence, limitations, review tier, and review verdict.

requirements:
  - "Define what counts as a homogeneous science PR batch, such as same campaign, same task type, same validation surface, and disjoint write paths."
  - "Require every PR in the batch to have its own review-agent verdict, validation result, and limitations section."
  - "Define when batch review is forbidden, including mixed campaign artifacts, result promotion, prediction reveal scoring, claim edits, or conflicting write surfaces."
  - "Allow result/prediction publication PRs in a batch only when they have the same artifact class, same review tier, and separate Gate A/Gate B evidence blocks."
  - "Define a batch summary artifact that lists PR number, task id, verdict, risk, changed artifacts, and follow-up action."
  - "Do not authorize automatic claim promotion or automatic merge of scientifically ambiguous PRs."
  - "Do not build a dashboard or external review service."

accepted_outputs:
  - "docs/automation/homogeneous-science-pr-batch-review.md"
  - "docs/reviews/homogeneous-science-pr-batch-review-protocol.md"
  - "optional update to docs/maintainer-review-agent.md"
  - "optional lightweight batch summary template"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
