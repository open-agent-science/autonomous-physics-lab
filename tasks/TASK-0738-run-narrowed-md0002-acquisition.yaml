id: TASK-0738
title: "Run narrowed MD-0002 maintainer-gated acquisition"
type: scientific_dataset
status: BLOCKED
closeout: review
difficulty: high
priority: high

strategy_alignment:
  - "Produce the benchmark-ready MD-0002 dataset only after the narrowed predicate is reviewed."
  - "Convert the Materials campaign from cap-stopped source work into a pinned dataset with frozen no-peek splits."
  - "Preserve the acquisition-to-benchmark boundary before TASK-0702 and TASK-0703."

input:
  mode: workflow
  related_domain: materials_property_residuals
  related_objects:
    - "tasks/TASK-0737-define-md0002-narrowed-predicate.yaml"
    - "tasks/TASK-0702-validate-md0002-acquisition-and-freeze-holdout.yaml"
    - "data/materials/md0002_holdout_manifest.yaml"
    - "docs/local-source-secrets.md"
  planning_context: >
    After TASK-0737 selects a narrowed predicate, this task performs the
    maintainer-gated MD-0002 acquisition using MP_API_KEY outside the repository
    and commits the pinned raw snapshot, normalized formation-energy and
    band-gap files, and frozen holdout/no-peek manifest.

requirements:
  - "Start only after TASK-0737 is DONE and names the approved narrowed predicate."
  - "Use the repository local source-secret handshake; never commit MP_API_KEY or local secret files."
  - "Stop and preserve a blocker if the narrowed query still exceeds the reviewed cap or misses required source/version/field metadata."
  - "Commit only source-pinned, attribution-complete, computed_dft Materials Project rows allowed by the approved predicate."
  - "Do not compute baselines, residuals, rankings, device/synthesis guidance, predictions, or claims."

accepted_outputs:
  - "data/materials/snapshots/materials_project_md0002_<database_version>.json"
  - "data/materials/md-0002-materials-project-formation-energy.yaml"
  - "data/materials/md-0002-materials-project-band-gap.yaml"
  - "data/materials/md0002_holdout_manifest.yaml"
  - "docs/reviews/materials-md0002-narrowed-acquisition-runbook-result.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_materials_md0002_schema_fixture.py tests/test_data_redistribution_declarations.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
