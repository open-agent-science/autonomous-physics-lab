id: TASK-0541
title: "Finalize Materials holdout manifest and schema reconciliation"
type: scientific_validation
status: REVIEW_READY
difficulty: medium
priority: high

strategy_alignment:
  - "Reconcile the landed MD-0001 Materials Project dataset with a benchmark-ready holdout/no-peek manifest."
  - "Keep property kind, units, structure semantics, and computed-vs-measured provenance explicit before any baseline."
  - "Prevent the first Materials baseline from choosing splits after seeing residuals."

input:
  mode: workflow
  related_domain: materials_property_residuals
  related_objects:
    - "docs/campaigns/materials-property-residuals.md"
    - "campaign_profiles/materials-property-residuals.yaml"
    - "docs/fresh-data-intake-protocol.md"
  planning_context: >
    TASK-0547 and TASK-0548 landed the first pinned Materials Project pilot
    dataset (`MD-0001`) and a row schema for stable binary oxides. This task is
    no longer a pre-ingestion schema sketch. It now reconciles the committed
    dataset with a holdout/no-peek manifest and any missing schema details
    needed before the first Materials baseline/residual benchmark runs.

requirements:
  - "Use the committed MD-0001 Materials Project stable-binary-oxides dataset; do not fetch or ingest new rows."
  - "Review `data/materials/schema.md` against the actual MD-0001 row fields and add only missing schema semantics required for benchmark safety."
  - "Create a holdout/no-peek manifest for MD-0001 that declares pre-score split options such as composition family, cation group, structure prototype, property range, and source version."
  - "Keep `formation_energy_per_atom` and `band_gap` as separate axes; do not pool property kinds."
  - "Represent computed, measured, model-derived, and excluded rows as distinct provenance/row classes for future widening, even though MD-0001 is computed DFT only."
  - "Do not choose benchmark thresholds after inspecting residuals, run baseline metrics, or make materials-discovery claims."
  - "Route the final output through docs/result-promotion-protocol.md."

accepted_outputs:
  - "data/materials/schema.md reconciliation update if needed"
  - "data/materials/holdout_manifest.yaml"
  - "docs/reviews/materials-holdout-manifest-and-schema-reconciliation.md"
  - "tests for schema validation or fixture loading if a loader/schema validator is added"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
