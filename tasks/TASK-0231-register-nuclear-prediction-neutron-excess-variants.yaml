id: TASK-0231
title: "Register nuclear prediction variants for neutron-excess and asymmetry controls"
type: scientific_validation
status: READY
difficulty: medium
priority: high

strategy_alignment:
  - "Scale Nuclear Mass Surface prediction work through bounded, reviewable registry variants."
  - "Make neutron-rich generalization risk explicit in prospective entries."
  - "Separate asymmetry-control forecasts from retrospective post-AME2020 scoring."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "prediction_registry/nuclear_masses/PRED-TEMPLATE.yaml"
    - "docs/prediction-registry-policy.md"
    - "docs/reviews/nuclear-prediction-registry-entry-review.md"
    - "docs/reviews/autonomous-nuclear-neutron-rich-batch-01.md"
    - "docs/notes/nuclear-prediction-variant-expansion-wave.md"
    - "results/EXP-0012/RUN-0001/result.yaml"
  planning_context: >
    Neutron-rich residual behavior remains a hard generalization surface. This
    lane registers two bounded neutron-excess or asymmetry-control variants for
    later reveal without treating the post-AME2020 benchmark as blind
    prediction evidence.

requirements:
  - "Create exactly two prospective registry entries unless the maintainer approves a larger batch."
  - "Use the suggested ids PRED-0027 and PRED-0028 unless a parallel branch collision requires renumbering before review."
  - "Compute quantity mass_excess_mev deterministically; do not leave calculation as LLM text."
  - "Freeze the neutron-excess or asymmetry variant formula, coefficients, target set, source state, uncertainty semantics, and reveal conditions."
  - "Keep target choices repo-prospective and avoid reusing committed measured or post-AME2020 holdout rows."
  - "Add or update tests for schema validity, target consistency, repo-prospective target checks, and deterministic value reproduction when code is added."
  - "Do not use live external data fetching, reveal comparisons, or claim/result/knowledge promotion."

accepted_outputs:
  - "prediction_registry/nuclear_masses/PRED-0027.yaml"
  - "prediction_registry/nuclear_masses/PRED-0028.yaml"
  - "docs/reviews/nuclear-prediction-variants-neutron-excess-controls.md"
  - "updated tests covering the new prediction entries"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
