id: TASK-0235
title: "Register nuclear prediction variants for uncertainty and ensemble-style controls"
type: scientific_validation
status: READY
difficulty: medium
priority: medium

strategy_alignment:
  - "Scale Nuclear Mass Surface prediction work through bounded, reviewable registry variants."
  - "Separate point-estimate forecasts from uncertainty or ensemble semantics."
  - "Make confidence wording testable and conservative before future reveal."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "prediction_registry/nuclear_masses/PRED-TEMPLATE.yaml"
    - "docs/prediction-registry-policy.md"
    - "docs/reviews/nuclear-prediction-registry-entry-review.md"
    - "docs/notes/nuclear-prediction-variant-expansion-wave.md"
    - "results/EXP-0012/RUN-0001/result.yaml"
  planning_context: >
    PRED-0001 through PRED-0020 use point estimates only. This lane lets an
    agent register two conservative uncertainty or ensemble-style control
    variants, provided uncertainty semantics are explicit and not presented as
    calibrated predictive confidence unless justified.

requirements:
  - "Create exactly two prospective registry entries unless the maintainer approves a larger batch."
  - "Use the suggested ids PRED-0035 and PRED-0036 unless a parallel branch collision requires renumbering before review."
  - "Compute quantity mass_excess_mev deterministically; do not leave calculation as LLM text."
  - "Freeze the uncertainty or ensemble-control formula, coefficients, target set, source state, uncertainty semantics, and reveal conditions."
  - "If uncertainty_mev is numeric, state whether it is heuristic, interval-like, or derived by deterministic calibration."
  - "Add or update tests for schema validity, target consistency, repo-prospective target checks, and deterministic value reproduction when code is added."
  - "Do not use live external data fetching, reveal comparisons, or claim/result/knowledge promotion."

accepted_outputs:
  - "prediction_registry/nuclear_masses/PRED-0035.yaml"
  - "prediction_registry/nuclear_masses/PRED-0036.yaml"
  - "docs/reviews/nuclear-prediction-variants-uncertainty-controls.md"
  - "updated tests covering the new prediction entries"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
