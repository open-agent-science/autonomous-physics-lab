id: TASK-0648
title: "Run Exoplanet residual gate-revision go/no-go review"
type: research_quality_gate
status: DONE
difficulty: medium
priority: high

strategy_alignment:
  - "Decide whether Exoplanets should stay closed until material source growth or change its declared target."
  - "Avoid repeated metadata scouts when the current reopen gate keeps returning WAIT."
  - "Keep Exoplanet virality grounded in negative/control memory rather than habitability or target-priority claims."

input:
  mode: planning_only
  related_domain: exoplanet_mass_radius
  related_objects:
