    - "docs/reviews/exoplanet-exo0003-metadata-trigger-scout.md"
    - "docs/reviews/exoplanet-second-snapshot-negative-memory-routing.md"
    - "data/exoplanets/second_snapshot_reopen_coverage_gate.yaml"
  planning_context: >
    EXO-0003 metadata trigger returned WAIT. The campaign needs a deliberate
    decision: keep the gate unchanged, revise the target, or pause Exoplanet
    execution until source growth changes.

requirements:
  - "Review the current reopen gate, latest metadata scout, and negative/control memory."
  - "Recommend exactly one route: keep gate unchanged, propose a revised gate, or pause Exoplanet execution except source monitoring."
  - "If a revised gate is recommended, specify the new scientific question and why it avoids p-hacking."
  - "Do not fetch rows, run residual metrics, make planet-law claims, or mention habitability/target priority."

accepted_outputs:
  - "docs/reviews/exoplanet-gate-revision-go-no-go.md"
