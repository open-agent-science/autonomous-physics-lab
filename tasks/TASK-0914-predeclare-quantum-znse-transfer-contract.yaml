    survival threshold, and output routing.

requirements:
  - "Choose one of: STRICT_NO_REFIT_TRANSFER_CONTRACT_READY, NEGATIVE_MEMORY_ONLY, or NEEDS_MAINTAINER_DECISION."
  - "Freeze the row ids, InP/ZnSe separation, size-axis harmonization or sensitivity framing, model family, fixed inputs, controls, and survival threshold before any new benchmark."
  - "Preserve the failed effective-mass route as negative memory; do not tune masses, exponents, geometry, or correction terms on ZnSe."
