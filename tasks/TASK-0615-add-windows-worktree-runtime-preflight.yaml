id: TASK-0615
title: "Add Windows worktree runtime preflight"
type: workflow_hardening
status: READY
difficulty: medium
priority: medium

strategy_alignment:
  - "Improve cross-platform agent execution without weakening validation gates."
  - "Reduce repeated Windows/worktree setup friction before validation, commit, and review."
  - "Keep diagnostics advisory and deterministic rather than hiding real test failures."

input:
  mode: workflow
  related_domain: agent_capacity
  related_objects:
    - "tasks/proposals/20260606-sviti-windows-worktree-runtime-preflight.yaml"
    - "scripts/apl_agent_doctor.py"
    - "docs/cross-platform-compatibility.md"
    - "docs/agent-task-protocol.md"
  planning_context: >
    Windows and sandboxed worktrees can lose time to missing root virtualenvs,
    pytest temp permission failures, and git index-lock write errors. Extend the
    diagnostic path so agents can identify these mechanical issues before
    treating them as task blockers or weakening validation.

requirements:
  - "Expose or document a repo-root Python resolver usable from worktrees when .venv is only present in the main checkout."
  - "Recommend a workspace-local pytest basetemp for sandboxed Windows runs without changing canonical CI validation."
  - "Detect likely git index-lock sandbox write failures and point to the protocol escalation path."
  - "Keep the doctor/preflight diagnostic-only; do not install packages, mutate global PATH, or relax validation."
  - "Work for Codex, Claude Code, and human terminals on Windows, macOS, and Linux."

accepted_outputs:
  - "apl_agent_doctor extension or compact runtime preflight helper"
  - "tests or documented dry-run coverage for worktree runtime diagnostics"
  - "documentation update in the agent protocol or cross-platform notes"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_agent_doctor.py tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
