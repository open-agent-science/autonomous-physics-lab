id: TASK-0642
title: "Map Nuclear do-not-repeat diagnostic lanes"
type: negative_result_memory
status: DONE
difficulty: medium
priority: high

strategy_alignment:
  - "Prevent agents from rerunning exhausted Nuclear slices that already produced negative or diagnostic memory."
  - "Convert repeated audit outcomes into a compact campaign go/no-go map."
  - "Preserve useful null results as first-class scientific memory."

input:
  mode: planning_only
  related_domain: nuclear_mass_surface
  related_objects:
    - "docs/reviews/nmd0003-factory-negative-result-promotion-preflight.md"
