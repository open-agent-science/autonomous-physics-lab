id: TASK-0561
title: "Move generated campaign catalog under campaign_profiles"
type: repo_architecture
status: READY
difficulty: medium
priority: high

strategy_alignment:
  - "Clean repository root before public opening without weakening campaign tooling."
  - "Keep volatile agent-facing state dynamic or generated from canonical sources, not hand-maintained twice."
  - "Preserve the campaign portfolio registry while reducing top-level directory sprawl."

input:
  mode: workflow
  related_domain: repository_architecture
  related_objects:
    - "campaigns/catalog.yaml"
    - "campaign_profiles/"
    - "scripts/generate_campaign_catalog.py"
    - "docs/campaign-registry.md"
    - "docs/repository-map.md"
  planning_context: >
    `campaigns/catalog.yaml` is a useful generated portfolio registry, but the
    root-level `campaigns/` directory contains only that generated file. Move the
    generated catalog into `campaign_profiles/` so profile source files and their
    generated aggregate view live together.

requirements:
  - "Do not remove the generated campaign catalog functionality."
  - "Do not turn the catalog into a hand-maintained source of truth."
  - "Keep `campaign_profiles/*.yaml` portfolio blocks as the editable source."
  - "Update code, tests, schemas, scripts, docs, and task references that point to `campaigns/catalog.yaml`."
  - "Remove the root `campaigns/` directory only after all live references are migrated."
  - "Do not add a new static agent-facing board or duplicate campaign index."
  - "Preserve cross-platform path handling with `pathlib.Path`."

accepted_outputs:
  - "Generated catalog path moved to `campaign_profiles/catalog.yaml` or another clearly documented file under `campaign_profiles/`."
  - "`scripts/generate_campaign_catalog.py` writes and checks the new catalog path."
  - "Campaign catalog loaders and validators read the new path."
  - "Tests updated for the new path and stale-catalog checks."
  - "Docs updated to explain `campaign_profiles/*.yaml` as editable profiles and the colocated catalog as generated output."
  - "Legacy references to `campaigns/catalog.yaml` are either migrated or explicitly documented as historical task references when they should not be rewritten."
  - "Root `campaigns/` directory removed if it becomes empty."

validation:
  commands:
    - "python3 scripts/generate_campaign_catalog.py --check"
    - "python3 -m pytest tests/test_campaign_registry.py tests/test_task_campaign_index.py"
    - "python3 -m ruff check scripts/generate_campaign_catalog.py physics_lab/registry"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
