id: TASK-0051
title: "Define hypothesis register schema and launch entry micro-task track"
type: benchmark_planning
status: REVIEW_READY
difficulty: low
priority: high

strategy_alignment:
  - "Creates a structured path for any agent to contribute a new testable physics hypothesis."
  - "Enforces hypothesis lifecycle discipline from AGENTS.md: PROPOSED → FORMALIZED → TESTING."
  - "Builds public scientific memory with machine-readable, verifiable hypothesis records."

input:
  mode: planning_only
  related_domain: hypothesis_lifecycle
  related_objects:
    - "docs/scientific-micro-task-protocol.md"
    - "AGENTS.md"
    - "docs/notes/particle-mass-relation-track.md"
    - "docs/notes/thought-experiment-consistency-suite.md"
    - "tasks/TASK-0037-reproduce-koide-charged-lepton-relation.yaml"
    - "tasks/proposals/20260503-roman-hypothesis-register-protocol.yaml"
  planning_context: >
    Define the hypothesis register: schema for machine-readable entries,
    lifecycle transition rules, and at least 5 seed hypotheses as examples.
    Each entry must include: id, title, domain, mathematical_form, assumptions,
    falsification_test, claim_ceiling, status. Entries at PROPOSED must not
    be promoted without a verification task.

requirements:
  - "Define machine-readable hypothesis register schema (YAML)."
  - "Required entry fields: id, title, domain, mathematical_form, assumptions, falsification_test, claim_ceiling, status."
  - "Lifecycle states must match AGENTS.md vocabulary."
  - "Provide at least 5 seed hypothesis entries in PROPOSED status."
  - "Seed entries must not use overclaim language."
  - "Do not implement full falsification code in this task."
  - "Do not promote any hypothesis automatically."

accepted_outputs:
  - "physics_lab/schemas/hypothesis_register_entry.schema.json"
  - "hypothesis_register/ directory with 5 seed entries (HRE-0001–HRE-0005)"
  - "docs/notes/hypothesis-register-protocol.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"
    - "git diff --exit-code"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
