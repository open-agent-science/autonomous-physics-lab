id: TASK-0881
title: "Handle org-blocked board-sync pull-request creation with App fallback"
type: infrastructure
status: REVIEW_READY
closeout: review
difficulty: low
priority: high
strategy_alignment:
  - "Keep public protected-branch maintenance automation deterministic and non-red."
input:
  mode: workflow
  related_domain: "maintainer_automation"
  related_objects:
    - ".github/workflows/sync-active-board.yml"
    - "physics_lab/registry/maintainer_review.py"
    - "docs/task-views/release.md"
  planning_context: |
    After TASK-0880 routed Sync Active Board through generated closeout PRs,
    the first post-merge run pushed the generated branch successfully but failed
    to create the PR because organization policy disallows GitHub Actions from
    creating or approving pull requests.
requirements:
  - "Keep main branch protection intact."
  - "Prefer a narrow APL Board Sync GitHub App token for unattended PR creation."
  - "Do not require broad default workflow token permissions."
  - "Treat organization-policy PR-creation denial as a warning after the generated branch is safely pushed."
  - "Allow maintainer-review to accept generated board-sync PRs that only update docs/task-views/*.md under the github-actions board-sync branch and [skip-board-sync] title guard."
accepted_outputs:
  - ".github/workflows/sync-active-board.yml"
  - "docs/agent-task-protocol.md"
  - "docs/maintainer-review-agent.md"
  - "docs/review-checklists/task-closeout-checklist.md"
  - "physics_lab/registry/maintainer_review.py"
  - "tests/test_maintainer_review.py"
  - "tasks/TASK-0881-board-sync-org-policy-fallback.yaml"
  - "Optional APL Board Sync GitHub App credential contract documented for maintainers."
validation:
  commands:
    - "python3 -m pytest tests/test_maintainer_review.py tests/test_docs_links.py tests/test_validate_repo_board_staleness_severity.py tests/test_validate_repo_auto_sync.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"
    - "git diff --check"
can_be_done_by:
  - maintainer
  - codex
  - llm_agent
