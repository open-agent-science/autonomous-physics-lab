id: TASK-0117
title: "Add maintainer review and closeout Mermaid flow"
type: documentation
status: REVIEW_READY
difficulty: low
priority: medium

strategy_alignment:
  - "Make maintainer review and task closeout easier to understand for invited contributors."
  - "Reduce process confusion in the private contributor pilot."
  - "Provide a visible, motivating docs task for new contributors and their agents."

input:
  mode: workflow
  related_domain: contributor_workflow
  related_objects:
    - "docs/maintainer-review-agent.md"
    - "docs/contributing-workflow.md"
    - "docs/agent-task-protocol.md"
  planning_context: >
    This is a newcomer-friendly documentation task. It should add one clear
    Mermaid diagram showing the maintainer review and post-merge closeout
    flow, without changing the underlying repository protocol. Suggested
    starting surfaces: docs/maintainer-review-agent.md and
    docs/contributing-workflow.md. A good first PR shape is one diagram and a
    short explanatory paragraph.

requirements:
  - "Add one clear Mermaid flow for review -> merge -> closeout lifecycle."
  - "Keep wording aligned with current maintainer review and closeout protocol."
  - "Keep the first PR within the listed docs files and the diagram itself."
  - "Prefer one concise diagram over a large architecture rewrite."
  - "Do not change claim, experiment, or result semantics."

accepted_outputs:
  - "Mermaid diagram for maintainer review and closeout flow"
  - "small surrounding docs update for orientation"

validation:
  commands:
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
