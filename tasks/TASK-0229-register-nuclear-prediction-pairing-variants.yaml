id: TASK-0229
title: "Register nuclear prediction variants for pairing and odd-even controls"
type: scientific_validation
status: REVIEW_READY
difficulty: medium
priority: high

strategy_alignment:
  - "Scale Nuclear Mass Surface prediction work through bounded, reviewable registry variants."
  - "Make odd-even and pairing behavior testable later without promoting second-batch sandbox candidates."
  - "Preserve negative and control evidence discipline around pairing-sensitive forecasts."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "prediction_registry/nuclear_masses/PRED-TEMPLATE.yaml"
    - "docs/prediction-registry-policy.md"
    - "docs/reviews/nuclear-prediction-registry-entry-review.md"
    - "docs/reviews/second-nuclear-sandbox-batch-adversarial-review.md"
    - "docs/notes/nuclear-prediction-variant-expansion-wave.md"
    - "results/EXP-0012/RUN-0001/result.yaml"
  planning_context: >
    The second nuclear sandbox batch found no pairing candidate ready for
    promotion. This lane still lets agents register bounded pairing or odd-even
    control variants for future reveal, provided they are framed as prospective
    controls rather than validated improvements.

requirements:
  - "Create exactly two prospective registry entries unless the maintainer approves a larger batch."
  - "Use the suggested ids PRED-0023 and PRED-0024 unless a parallel branch collision requires renumbering before review."
  - "Compute quantity mass_excess_mev deterministically; do not leave calculation as LLM text."
  - "Freeze the pairing or odd-even variant formula, coefficients, target set, source state, uncertainty semantics, and reveal conditions."
  - "State explicitly that no TASK-0201 pairing sandbox candidate is being promoted."
  - "Add or update tests for schema validity, target consistency, repo-prospective target checks, and deterministic value reproduction when code is added."
  - "Do not use live external data fetching, reveal comparisons, or claim/result/knowledge promotion."

accepted_outputs:
  - "prediction_registry/nuclear_masses/PRED-0023.yaml"
  - "prediction_registry/nuclear_masses/PRED-0024.yaml"
  - "docs/reviews/nuclear-prediction-variants-pairing-controls.md"
  - "updated tests covering the new prediction entries"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
