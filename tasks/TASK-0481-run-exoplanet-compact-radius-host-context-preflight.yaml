id: TASK-0481
title: "Run exoplanet compact-radius host-context preflight"
type: scientific_validation
status: READY
difficulty: medium
priority: high

strategy_alignment:
  - "Check whether host-star metadata can support a meaningful compact-radius residual audit."
  - "Keep source coverage and missingness visible before adding host-context hypotheses."
  - "Avoid overinterpreting selection effects as planet physics."

input:
  mode: workflow
  related_domain: exoplanet_mass_radius
  related_objects:
    - "data/exoplanets/exo-0001-pscomppars-snapshot.yaml"
    - "docs/reviews/exoplanet-host-uncertainty-selection-effects.md"
    - "docs/reviews/exoplanet-compact-subneptune-matched-control-audit.md"
  planning_context: >
    Host context may explain part of compact-radius residual stress, but field
    coverage and missingness can dominate. This task is a preflight before any
    host-metallicity or irradiation hypothesis.

requirements:
  - "Use only committed exoplanet snapshot fields."
  - "Report coverage and missingness for host Teff, metallicity if present, stellar radius if present, and equilibrium-temperature proxies if present."
  - "Identify which host-context axes are benchmark-usable and which are blocked by missingness."
  - "Do not fit a correction model."
  - "Do not infer habitability, composition, atmospheres, or target priority."

accepted_outputs:
  - "docs/reviews/exoplanet-compact-radius-host-context-preflight.md"
  - "optional metrics JSON under agent_runs/AGENT-RUN-XXXX/ if code is used"
  - "tests for any reusable field-coverage helper"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
