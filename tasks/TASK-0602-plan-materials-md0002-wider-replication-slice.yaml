id: TASK-0602
title: "Plan Materials MD-0002 wider replication slice"
type: scientific_dataset
status: DONE
difficulty: high
priority: high

strategy_alignment:
  - "Prepare a larger Materials replication dataset only after MD-0001 produced a weak but real benchmark signal."
  - "Keep widening source-first, license-aware, and benchmark-bounded."
  - "Make future Materials datasets reusable without moving them to a separate repository prematurely."

input:
  mode: planning_only
  related_domain: materials_property_residuals
  related_objects:
    - "docs/campaigns/materials-property-residuals.md"
    - "docs/reviews/materials-md0001-baseline-residual-benchmark.md"
    - "docs/reviews/materials-md0001-band-gap-null-control-audit.md"
    - "docs/reviews/materials-md0001-benchmark-promotion-preflight.md"
    - "data/materials/README.md"
  planning_context: >
    MD-0001 is useful but small. This task defines the next wider Materials
    slice, likely ternary oxides or a larger binary/ternary Materials Project
    subset, without fetching rows. The plan should be strong enough that a
    later acquisition task can pin version, license, schema, and holdout rules.

requirements:
  - "Choose one MD-0002 candidate scope and justify it against scientific value, row count, source availability, license, and overclaim risk."
  - "Define property axes, inclusion/exclusion rules, computed-vs-measured provenance, units, and holdout/no-peek split candidates."
  - "State how MD-0002 would retest the MD-0001 band-gap and formation-energy findings."
  - "Do not fetch source data, add rows, compute metrics, promote claims, or move datasets to a separate repository."
  - "Recommend a concrete acquisition task only if the source/version/citation plan is clear."

accepted_outputs:
  - "docs/reviews/materials-md0002-wider-replication-slice-plan.md"
  - "docs/campaigns/materials-property-residuals.md (minimal pointer to the MD-0002 plan)"
  - "acquisition follow-up described in the plan (not assigned a canonical id; maintainer/TASK-0614 to formalize)"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
