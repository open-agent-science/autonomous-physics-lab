    - "data/materials/md-0002-materials-project-stable-ternary-oxides.yaml"
    - "data/materials/snapshots/materials_project_md0002_2026.04.13.json"
    - "data/materials/md0002_holdout_manifest.yaml"
  planning_context: >
    Dependency corrected: the cap-stopped TASK-0699 produced no dataset; the
    value-bearing MD-0002 acquisition landed via TASK-0738. This task validates
    that committed acquisition is source-pinned and holdout-frozen before any
    benchmark scoring (TASK-0703).

requirements:
  - "Start only after TASK-0738 lands the committed MD-0002 dataset, snapshot, and pinned holdout manifest (done; loader physics_lab/datasets/materials_md0002.py validates the shape)."
  - "Verify snapshot checksum, row counts, database_version, attribution, source fields, and excluded-row reasons."
  - "Confirm the holdout/no-peek split was frozen deterministically (depends only on material_id ordering) before any scoring."
  - "Do not compute baselines, residuals, rankings, or claims."

accepted_outputs:
  - "docs/reviews/materials-md0002-acquisition-validation-and-holdout-freeze.md"
  - "optional task-status recommendation for the first MD-0002 benchmark"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_materials_md0002_schema_fixture.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
