id: TASK-0119
title: "Add thought-experiment campaign orientation note"
type: documentation
status: DONE
difficulty: low
priority: low

strategy_alignment:
  - "Prepare the thought-experiment line for safer contributor onboarding in v0.3."
  - "Make planning-only campaign surfaces less ambiguous without rushing implementation."
  - "Provide a useful low-risk writing task for new contributors and their agents."

input:
  mode: workflow
  related_domain: thought_experiments
  related_objects:
    - "docs/campaigns/thought-experiment-consistency.md"
    - "docs/mission-control.md"
    - "docs/scientific-micro-task-protocol.md"
  planning_context: >
    This task should write a short orientation note for the thought-experiment
    campaign explaining safe contribution scope, what counts as a useful
    planning contribution, and what not to claim yet. It is intentionally
    suitable for new contributors or contributor-guided agents. Suggested
    starting surfaces: docs/campaigns/thought-experiment-consistency.md and
    docs/mission-control.md. A good first PR shape is one short note and one
    small cross-link update.

requirements:
  - "Explain safe contribution scope for the thought-experiment campaign."
  - "List a few good first-step contribution patterns."
  - "Keep the first PR within campaign-note and cross-link surfaces only."
  - "State what should not be claimed or implemented yet."
  - "Keep the note aligned with current private-alpha scope."

accepted_outputs:
  - "thought-experiment campaign orientation note"
  - "small cross-link from an existing campaign or onboarding surface"

validation:
  commands:
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
