id: TASK-0820
title: "Prepare a common-scheme particle-mass guardrail preflight"
type: scientific_source_curation
status: REVIEW_READY
closeout: review
difficulty: medium
priority: low

strategy_alignment:
  - "Preserve RESULT-0011 as useful AGENT_VALIDATED negative memory while keeping CLAIM-0007 conservative."
  - "Test whether the mixed quark mass scheme/scale limitation can be reduced by a narrow source-policy task before any Gate C wording."
  - "Avoid broad particle-mass numerology search by constraining the question to source semantics and one fixed falsifier target."

input:
