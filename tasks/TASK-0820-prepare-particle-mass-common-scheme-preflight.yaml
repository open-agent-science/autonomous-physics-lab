    standard Koide target, but CLAIM-0007 should stay DRAFT because the quark
    rows use mixed mass schemes/scales. This task asks whether a common-scale or
    scheme-consistent source route exists for a narrow future rerun. It does not
    run the rerun or search formulas.

requirements:
  - "Assess one common-scale or scheme-consistent source route for up-type and down-type quark masses, including citation, scale/scheme semantics, uncertainties, and compatibility with the fixed standard Koide target."
  - "State whether charged-lepton rows would remain unchanged or need a parallel provenance note."
  - "Return one verdict: `COMMON_SCHEME_RERUN_READY_FOR_TASK`, `SOURCE_SCHEME_BLOCKED`, or `NEEDS_MAINTAINER_SOURCE_DECISION`."
  - "Do NOT run a relation search, fit constants, add particle families, edit CLAIM-0007 status, change RESULT-0011 metrics, or create knowledge artifacts."
  - "Stop with `PARTICLE_COMMON_SCHEME_BLOCKED` if a source route cannot be defined without ambiguous scheme/scale mixing."
