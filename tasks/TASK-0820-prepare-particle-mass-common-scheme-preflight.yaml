accepted_outputs:
  - "`docs/reviews/particle-mass-common-scheme-preflight.md` with source-route assessment, scheme/scale table, blocker or future task recommendation, and no-claim wording."
  - "Optional patch-style note for future task wording only; no result, claim, or data mutation."
  - "Output-routing summary: destination source/scheme readiness, no RESULT/PRED/CLAIM/KNOW change, CLAIM-0007 Gate C blocker stated."

result_artifact_policy:
