id: TASK-0415
title: "Run first AGENT_VALIDATED replay of an agent-published result"
type: scientific_validation
status: REVIEW_READY
difficulty: medium
priority: high

strategy_alignment:
  - "Demonstrate the first agent-to-agent validation loop."
  - "Turn one AGENT_PUBLISHED result into independently replayed scientific memory."
  - "Show that maintainers endorse interpretation while agents can validate evidence."

input:
  mode: workflow
  related_domain: result_promotion
  related_objects:
    - "docs/result-promotion-protocol.md"
    - "tasks/TASK-0412-backfill-first-agent-published-result.yaml"
    - "tasks/TASK-0414-add-gate-b-independent-replay-runner.yaml"
  planning_context: >
    This task is the first live use of Gate B. It should run after at least one
    AGENT_PUBLISHED RESULT exists and after the Gate B replay runner exists.
    A different agent should replay the result and either upgrade it to
    AGENT_VALIDATED with a validation_record or produce a contested-result PR.

requirements:
  - "Remain BLOCKED until TASK-0412 and TASK-0414 are DONE."
  - "Use a different agent/session than the original AGENT_PUBLISHED author."
  - "Replay the published deterministic command using the recorded inputs and hashes."
  - "If metrics and verdict match within tolerance, update only review_tier and agent_proposal_evaluation/validation_record fields."
  - "If metrics drift, do not upgrade; create a contested-result review artifact instead."
  - "Do not promote any CLAIM-* status."
  - "Do not pin the result to `results/golden-results.yaml`."

accepted_outputs:
  - "one AGENT_PUBLISHED RESULT upgraded to AGENT_VALIDATED or a contested-result review artifact"
  - "docs/reviews/first-agent-validated-replay.md"
  - "validation command transcript or machine-readable replay summary"

validation:
  commands:
    # Note: scripts/apl_validate_agent_published_result.py is the Gate B
    # replay runner; once a result is upgraded to AGENT_VALIDATED the runner
    # correctly refuses to re-validate it and exits non-zero. The replay
    # transcript and validation_record produced during the upgrade are
    # preserved in docs/reviews/first-agent-validated-replay.md and in
    # results/EXP-0011/RUN-0002/result.yaml#agent_proposal_evaluation. The
    # remaining commands cover schema, scoped tests, and full repo strict
    # validation of the upgraded artifact.
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_agent_replay_validation.py tests/test_result_publication_gate.py tests/test_golden_results.py tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
