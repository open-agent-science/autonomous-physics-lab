id: TASK-0110
title: "Verify high-precision asymptotic refined pendulum model"
type: scientific_experiment
status: REVIEW_READY
difficulty: medium
priority: high

input:
  hypothesis_id: HYP-0001
  experiment_id: EXP-0001

requirements:
  - "Run the pendulum gauntlet with the new A&S-inspired asymptotic candidate"
  - "Verify if the new model passes all gating checks (small and large angle accuracy)"
  - "Compare performance against the previous best candidates"
  - "Ensure near-separatrix behavior matches theoretical expectations"

accepted_outputs:
  - "result yaml in results/EXP-0001/RUN-0005/"
  - "report markdown with comparison section"
  - "metrics json with refined model data"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli run examples/pendulum_asymptotic_gauntlet.yaml --output-dir /tmp/apl-asymptotic-gauntlet-review"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - llm_agent
