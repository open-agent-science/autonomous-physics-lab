proposal_id: 20260613-roman-exoplanet-snapshot-dedup
title: "De-duplicate the ~31 MB NASA Exoplanet PSCompPars raw CSV + YAML snapshots to one canonical artifact"
status: PROPOSED
type: repository_hardening
priority: low

proposed_by:
  contributor_id: roman
  agent_id: claude

strategy_alignment:
  - "Reduce committed repository weight before public launch without losing reproducible provenance."
  - "Keep one canonical, redistributable copy of each third-party dataset rather than duplicate raw + normalized payloads."

summary: >
  The NASA Exoplanet Archive PSCompPars snapshots are committed twice: as raw
  CSV (data/exoplanets/raw/exo-pscomppars-*.csv) and as normalized YAML
  (data/exoplanets/exo-000{1,2}-pscomppars-snapshot.yaml), totalling ~31 MB of
  the same payload. Both are redistributable (NASA open access; declared in
  data/DATA_LICENSES.yaml), so this is repository hygiene, not a licensing issue.

rationale: >
  Carrying the same catalogue twice roughly doubles its footprint in clone size
  and history. Keeping one canonical artifact plus a loader/rebuild path is
  cleaner. This is explicitly a P2 optimization and must not lose any field
  needed downstream.

input:
  mode: planning_only
  related_domain: repository_hardening
  related_objects:
    - "data/exoplanets/exo-0001-pscomppars-snapshot.yaml"
    - "data/exoplanets/exo-0002-pscomppars-snapshot.yaml"
    - "data/exoplanets/raw/exo-pscomppars-20260523T171549Z.csv"
    - "data/exoplanets/raw/exo-pscomppars-second-snapshot-20260604T185011Z.csv"
    - "data/exoplanets/source_manifest.yaml"
    - "data/DATA_LICENSES.yaml"
  planning_context: >
    Decide one canonical artifact (likely the normalized YAML, which carries row
    classes + per-row source references) and a loader/rebuild path for the other,
    only after confirming the YAML reproduces every field needed from the raw CSV.

requirements:
  - "Keep the proposal atomic"
  - "Confirm the normalized YAML reproduces all downstream-needed fields of the raw CSV before removing either; do not auto-delete the raw artifact until this is verified."
  - "Keep one canonical artifact + a loader/rebuild path; preserve checksums and the NASA acknowledgement/provenance."
  - "Update data/DATA_LICENSES.yaml and the exoplanet source manifest paths to match the canonical set."
  - "If history-size reduction is wanted, fold any blob removal into the freeze-time TASK-0732 runbook rather than a separate force-push."

accepted_outputs:
  - "canonical exoplanet snapshot artifact + loader/rebuild path"
  - "updated data/DATA_LICENSES.yaml and source manifest paths"

validation:
  commands:
    - "python3 -m pytest tests/test_data_redistribution_declarations.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

promotion:
  canonical_task_id: null
  decision: pending
  notes: "P2 hygiene follow-up from the TASK-0733 data-licensing audit; not a launch blocker."
