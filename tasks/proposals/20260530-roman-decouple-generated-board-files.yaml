proposal_id: 20260530-roman-decouple-generated-board-files
title: "Decouple generated board files from the committed working tree"
status: PROPOSED
type: maintainer_workflow
priority: medium

proposed_by:
  contributor_id: "roman"
  agent_id: "claude"

strategy_alignment:
  - "Remove an entire class of agent-flow friction (F1/F2 in TASK-0466) at its architectural root rather than patching each symptom."
  - "Keep the parallel-PR conflict-avoidance goal (post-merge auto-generation) while ending the cases where derived board state surfaces as a hard error during routine task flow."
  - "Reduce cold-start and cross-session confusion for the planned multi-agent wave."

summary: >
  Evaluate and decide how to decouple the generated board files
  (tasks/ACTIVE.md and docs/task-views/*.md) from the committed working tree so
  that routine task work never has to regenerate, commit, or restore them. The
  post-merge Sync Active Board GitHub Action already regenerates them on main,
  so agents are told not to commit them; this proposal asks the maintainer to
  choose the cleaner long-term shape and removes the residual friction.

rationale: >
  TASK-0466 fixed five concrete friction points; two of them (F1 mission-action
  staleness on REVIEW_READY, and F2 the live auto-sync smoke test dirtying the
  board during the required pytest run) share one root cause: derived/generated
  state lives inside the committed tree and is coupled to canonical state.
  Symptoms recur whenever a process regenerates the board: the working tree goes
  dirty, the review tool blocks on "git status not clean", and agents must
  manually restore files they are explicitly forbidden to commit. Patching each
  surface (validate-repo severity, per-test restore guards, review-tool
  cleanliness checks) is whack-a-mole.

  This proposal is a planning/architecture task: survey the options, weigh the
  trade-offs against the original parallel-PR conflict-avoidance goal and the
  human-navigability of ACTIVE.md, and record a maintainer decision. It does not
  implement the change; a follow-up canonical task does that once an option is
  chosen.

  Candidate options to evaluate (non-exhaustive):
    - Option A — generate on demand only: stop committing tasks/ACTIVE.md and
      docs/task-views/*.md; produce them as CI artifacts / via a local command;
      keep canonical task YAML as the single source of truth. Pro: eliminates
      the friction class outright. Con: loses the in-repo browsable board and
      any external links to those paths.
    - Option B — keep committed but treat as strictly ephemeral everywhere:
      ensure no test, validator, or review step ever leaves them dirty, and the
      review tool ignores them when assessing cleanliness. Pro: preserves the
      browsable board. Con: ongoing discipline; coupling remains.
    - Option C — hybrid: keep a lightweight committed pointer/board, move the
      heavy generated views to artifacts; or move generated views under a path
      that tooling treats as generated by convention.

  The deliverable is a reviewed recommendation plus, if the maintainer accepts
  it, a scoped follow-up canonical task. No board behavior changes in this
  proposal PR.

input:
  mode: planning_only
  related_domain: cross_campaign_quality
  related_objects:
    - "tasks/ACTIVE.md"
    - "docs/task-views/research.md"
    - "docs/task-views/support.md"
    - "docs/task-views/release.md"
    - "physics_lab/registry/repository.py"
    - "physics_lab/registry/generated_state.py"
    - "tests/test_validate_repo_auto_sync.py"
    - "docs/agent-task-protocol.md"
  planning_context: >
    Follow-up to TASK-0466. F1 and F2 there share one root cause: the generated
    board files (tasks/ACTIVE.md, docs/task-views/*.md) are committed to the
    tree and coupled to canonical task state, so any process that regenerates
    them dirties the tree and blocks routine flow. This planning task surveys
    the generation/validation/consumption path and asks the maintainer to choose
    between generate-on-demand, committed-but-ephemeral, or a hybrid shape. It
    changes no board behavior; it produces a decision note and, if accepted, a
    scoped follow-up canonical task.

requirements:
  - "Keep the proposal atomic and planning-only; do not change board generation or committed board files in the proposal PR."
  - "Survey how tasks/ACTIVE.md and docs/task-views/*.md are generated, validated, and consumed (post-merge action, validate-repo staleness severity, --auto-sync, human/doc links)."
  - "Document the F1/F2 friction class from TASK-0466 as the motivating evidence."
  - "Lay out at least options A (generate-on-demand), B (committed-but-ephemeral), and C (hybrid) with explicit trade-offs against the parallel-PR conflict-avoidance goal and board browsability."
  - "Recommend one option and the migration path, but leave the decision and any canonical task id to the maintainer."
  - "Do not promote claims automatically."

accepted_outputs:
  - "canonical task spec (a scoped follow-up TASK-XXXX description the maintainer can accept)"
  - "docs update (an architecture decision note capturing options and recommendation)"

validation:
  commands:
    - "./scripts/validate_quick.sh"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

promotion:
  canonical_task_id: null
  decision: pending
  notes: >
    Architect-role follow-up to TASK-0466. Addresses the shared root cause of
    F1/F2 (generated board state coupled to the committed tree). Planning-only;
    implementation is deferred to a maintainer-accepted canonical task.
