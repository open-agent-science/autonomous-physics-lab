  contributor_id: roman
  agent_id: codex

strategy_alignment:
  - "Keep potentially interesting future scientific directions visible without diluting Nuclear Mass Surface as the current flagship."
  - "Treat quantum-dot work as a theory/computation/dataset campaign that starts from scaffold, source policy, holdouts, and baseline residuals."

summary: >
  Explore a future APL campaign around quantum size effects in semiconductor
  quantum dots, focused on theory, computation, dataset comparison, and
  visualization rather than lab protocols or synthesis recipes.

rationale: >
  Quantum dots may be a strong follow-on campaign surface because they offer
  measurable size-dependent phenomena, compact theory models, and clear
  visualization opportunities. Maintainer direction promoted this proposal into
  a canonical task queue on 2026-05-13, with the campaign still blocked from
  autonomous formula search until scaffold, dataset, holdout, and baseline work
  land.

input:
  mode: planning_only
  related_domain: condensed_matter
  related_objects: []
  planning_context: >
    Scope a campaign around quantum size effects and simple computational or
    dataset-backed checks. Exclude synthesis procedures, hazardous chemistry
    guidance, device fabrication instructions, and biomedical claims.

requirements:
  - "Keep the proposal atomic."
  - "Focus on theory, computational models, dataset analysis, and visualization only."
  - "Do not include synthesis recipes, chemical handling, device fabrication, or biomedical claims."
  - "Use the canonical task queue for future work; do not start autonomous formula search before the blocked prerequisites are complete."

accepted_outputs:
  - "campaign proposal"
  - "future canonical task spec if later accepted"

