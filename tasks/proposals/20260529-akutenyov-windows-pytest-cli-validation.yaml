id: TASK-PROPOSAL-windows-pytest-cli-validation
proposal_type: canonical_task
status: PROPOSED
title: "Make Windows pytest and CLI validation path handling robust"
type: developer_infrastructure
priority: medium
difficulty: medium

proposer:
  contributor_id: akutenyov
  github_username: akutenyov
  agent_tool: codex
  source_context: TASK-0446 local validation follow-up

summary: >
  Add a canonical developer-infrastructure task to make the repository's pytest
  and CLI validation workflow robust on Windows. During TASK-0446 execution,
  task-specific validation and CI passed, but local full-suite pytest initially
  produced many PermissionError [WinError 5] failures from temporary path
  handling. After forcing pytest to use an external basetemp, the suite reduced
  to a small set of unrelated failures, including a Windows Python launcher
  subprocess issue. This proposal captures that follow-up so it can be handled
  as a focused repository-infrastructure task rather than mixed into a science
  provenance PR.

problem_statement: >
  Windows contributors should be able to run the repository's standard pytest
  and CLI validation commands without false-negative failures caused by
  repository-root temp path cleanup, accidental path materialization inside the
  checkout, or ambiguous use of a bare python launcher instead of the active
  interpreter. These failures obscure real validation status and make task PR
  handoff less reliable.

observed_failures:
  - "PermissionError: [WinError 5] Access is denied during full pytest on Windows when temporary paths were created under or near the repository checkout."
  - "Full pytest improved after setting PYTEST_ADDOPTS=--basetemp=$env:TEMP\\apl-pytest-task-0446."
  - "A remaining subprocess failure reported: Python was not found; run without arguments to install from the Microsoft Store."
  - "Strict validation smoke tests can obscure task-local success when unrelated repository mission references are stale or missing."

proposed_task:
  id: TASK-XXXX
  title: "Make Windows pytest and CLI validation path handling robust"
  type: developer_infrastructure
  status: READY
  difficulty: medium
  priority: medium
  strategy_alignment:
    - "Improve contributor reliability on Windows workstations used by human reviewers and agents."
    - "Reduce false-negative validation failures caused by local path, temp-dir, and Python launcher differences."
    - "Keep scientific validation deterministic without weakening repository validation rules."
  input:
    mode: workflow
    related_domain: repository_validation
    related_objects:
      - "tests/test_result_publication_gate.py"
      - "tests/test_validate_repo_auto_sync.py"
      - "tests/test_pendulum.py"
      - "tests/test_damped_oscillator.py"
      - "tests/test_active_board.py"
      - "tests/test_review_git.py"
      - "pyproject.toml"
      - "docs/agent-task-protocol.md"
    planning_context: >
      During TASK-0446 execution on Windows, the task-specific exoplanet tests,
      ruff, example runs, and non-strict repository validation passed. The full
      pytest suite initially produced many PermissionError [WinError 5] failures
      when pytest temporary paths were created under the repository checkout.
      Re-running with an explicit external basetemp reduced the failure surface,
      but several Windows-specific failures remained, including a Python launcher
      issue where a test subprocess reported: "Python was not found; run without
      arguments to install from the Microsoft Store". This task should make the
      repository's test and CLI validation path handling robust on Windows
      without relaxing scientific validation semantics.
  requirements:
    - "Reproduce or characterize the Windows failure modes from TASK-0446 using a clean working tree."
    - "Ensure tests that create temporary repositories, worktrees, generated task views, agent runs, or result artifacts use pytest tmp_path/tmp_path_factory or another external temp directory, not repository-root-derived accidental paths."
    - "Audit subprocess invocations in tests and helpers so Windows uses sys.executable or the active Python interpreter instead of relying on a bare python launcher when that would be ambiguous."
    - "Preserve Linux/macOS behavior and existing CI expectations."
    - "Do not weaken validate-repo, strict validation, scientific memory checks, or result publication gates."
    - "Do not commit generated task navigation files unless the task explicitly requires a board-sync change."
    - "Do not modify scientific result artifacts, claims, predictions, datasets, or benchmark outputs."
  accepted_outputs:
    - "Windows-safe test/helper changes for temp directory and subprocess Python handling."
    - "One or more regression tests covering the Windows path/interpreter behavior."
    - "Documentation note or maintainer note explaining the Windows validation workaround or new supported behavior."
    - "Evidence that task-specific and repository validation commands were run."
  validation:
    commands:
      - "python -m ruff check ."
      - "python -m pytest tests/test_result_publication_gate.py tests/test_validate_repo_auto_sync.py tests/test_pendulum.py tests/test_damped_oscillator.py"
      - "python -m pytest"
      - "python -m physics_lab.cli validate-repo ."
      - "python -m physics_lab.cli validate-repo . --strict --fail-on-warnings"
  windows_validation_notes:
    recommended_commands:
      - "$env:PYTEST_ADDOPTS=\"--basetemp=$env:TEMP\\apl-pytest-windows-validation\""
      - "python -m pytest"
      - "Remove-Item Env:\\PYTEST_ADDOPTS"
    expected_behavior: >
      Full pytest should not fail with repository-root PermissionError caused by
      temporary path handling. Tests that need Python subprocesses should use the
      active interpreter path rather than relying on a Windows Store python alias.
  risk_level: medium
  forbidden_changes:
    - "do not disable failing tests"
    - "do not skip Windows tests broadly without a narrow documented reason"
    - "do not relax strict repository validation to hide real repository errors"
    - "do not treat local Windows environment issues as scientific result failures"
    - "do not modify committed results/ artifacts"
    - "do not promote claims or knowledge entries"
  can_be_done_by:
    - human
    - codex
    - claude_code
    - llm_agent

review_notes:
  - "Maintainer should assign the canonical TASK-XXXX id if accepted."
  - "The proposal is intentionally scoped to validation infrastructure, not to TASK-0446's exoplanet checksum semantics."
  - "The task should remain separate from science result, claim, prediction, or dataset work."

validation:
  commands:
    - "python -m physics_lab.cli validate-repo ."
    - "python -m physics_lab.cli validate-repo . --strict --fail-on-warnings"
