proposal_id: 20260529-akutenyov-windows-pytest-cli-validation
title: "Make Windows pytest and CLI validation path handling robust"
status: ACCEPTED
type: developer_infrastructure
priority: medium

proposed_by:
  contributor_id: akutenyov
  agent_id: codex

strategy_alignment:
  - "Improve contributor reliability on Windows workstations used by human reviewers and agents."
  - "Reduce false-negative validation failures caused by local path, temp-dir, and Python launcher differences."
  - "Keep scientific validation deterministic without weakening repository validation rules."

summary: >
  Propose a focused developer-infrastructure task to make the repository's pytest
  and CLI validation workflow robust on Windows. During TASK-0446 execution,
  task-specific validation and CI passed, but local full-suite pytest initially
  produced many PermissionError [WinError 5] failures from temporary path
  handling. After forcing pytest to use an external basetemp, the suite reduced
  to a small set of unrelated failures, including a Windows Python launcher
  subprocess issue. This proposal captures that follow-up so it can be handled
  as a focused repository-infrastructure task rather than mixed into a science
  provenance PR.

rationale: >
  Windows contributors should be able to run the repository's standard pytest
  and CLI validation commands without false-negative failures caused by
  repository-root temp path cleanup, accidental path materialization inside the
  checkout, or ambiguous use of a bare python launcher instead of the active
  interpreter. The observed local failures included PermissionError [WinError 5]
  during full pytest, improvement after setting PYTEST_ADDOPTS to use an
  external basetemp, and a subprocess failure reporting that Python was not
  found and suggesting the Microsoft Store alias. These failures obscure real
  validation status and make task PR handoff less reliable.

input:
  mode: planning_only
  related_domain: repository_validation
  related_objects:
    - "tests/test_result_publication_gate.py"
    - "tests/test_validate_repo_auto_sync.py"
    - "tests/test_pendulum.py"
    - "tests/test_damped_oscillator.py"
    - "tests/test_active_board.py"
    - "tests/test_review_git.py"
    - "pyproject.toml"
    - "docs/agent-task-protocol.md"
  planning_context: >
    The future canonical task should reproduce or characterize the Windows
    failure modes from TASK-0446 using a clean working tree. It should audit
    tests and helpers that create temporary repositories, worktrees, generated
    task views, agent runs, or result artifacts so they use pytest tmp_path,
    tmp_path_factory, or another external temporary directory rather than
    repository-root-derived accidental paths. It should also audit subprocess
    invocations so Windows uses sys.executable or the active Python interpreter
    instead of relying on a bare python launcher where that would be ambiguous.

requirements:
  - "Keep the proposal atomic and scoped to Windows pytest/CLI validation robustness."
  - "Do not disable failing tests."
  - "Do not skip Windows tests broadly without a narrow documented reason."
  - "Do not relax strict repository validation to hide real repository errors."
  - "Do not treat local Windows environment issues as scientific result failures."
  - "Do not modify committed results/ artifacts."
  - "Do not promote claims or knowledge entries."
  - "Preserve Linux/macOS behavior and existing CI expectations."

accepted_outputs:
  - "canonical task spec for Windows pytest and CLI validation path robustness"
  - "scope note listing the observed TASK-0446 Windows failure modes"
  - "validation plan covering ruff, targeted pytest, full pytest, and validate-repo"
  - "maintainer decision on whether to assign a canonical TASK-XXXX id"

validation:
  commands:
    - "python -m physics_lab.cli validate-repo ."
    - "python -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

promotion:
  canonical_task_id: TASK-0469
  decision: accepted
  notes: >
    Accepted as TASK-0469 during the proposal backlog triage sweep. The
    resulting task remains separate from TASK-0446 so checksum provenance and
    Windows validation hardening stay independently reviewable.
