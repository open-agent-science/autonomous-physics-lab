proposal_id: 20260505-roman-microtask-pr-title-protocol
title: "Define PR title format for microtask PRs without a canonical TASK-XXXX"
status: PROPOSED
type: agent_workflow
priority: medium

proposed_by:
  contributor_id: roman
  agent_id: claude

strategy_alignment:
  - "Ensure agent workflow protocol covers all PR types, including microtask-only contributions."
  - "Prevent ambiguity that forces agents to invent ad hoc PR title formats."

summary: >
  The current agent-task-protocol.md defines PR title formats for canonical
  task PRs (TASK-XXXX: ...) and proposal PRs (TASK-PROPOSAL: ...), but does
  not specify a format for microtask PRs that have no parent canonical TASK-XXXX.
  This gap was discovered while testing the Agent Work Menu: a microtask
  contribution produced a PR with no approved title convention.

rationale: >
  Microtask PRs are a supported contribution pattern (docs/scientific-micro-task-protocol.md)
  but the agent-task-protocol.md PR title rule only lists TASK-XXXX and TASK-PROPOSAL
  formats. Without a defined format for microtask PRs, agents either invent
  inconsistent titles or incorrectly reference a canonical task. A short,
  explicit rule (e.g. "microtask(<queue-id>): ...") would close this gap and
  make microtask PRs reviewable under the same fast-review lane.

input:
  mode: planning_only
  related_domain: agent_workflow
  related_objects:
    - "docs/agent-task-protocol.md"
    - "docs/scientific-micro-task-protocol.md"
    - "docs/agent-work-menu.md"
    - "docs/maintainer-review-agent.md"
  planning_context: >
    Discovered gap while testing the Agent Work Menu (TASK-0078). Agent added
    DA-017 to the challenge set (microtask DAV-001) and opened PR #89 with
    title format "microtask(DAV-001): ..." which has no canonical backing in
    the protocol docs.

requirements:
  - "Add a microtask PR title format to docs/agent-task-protocol.md."
  - "Suggested format: microtask(<queue-id>): <short description>"
  - "Specify that microtask PRs do not require a canonical TASK-XXXX file."
  - "Specify which review lane applies (fast review)."
  - "Update docs/maintainer-review-agent.md if the review checklist needs a microtask row."

accepted_outputs:
  - "updated docs/agent-task-protocol.md with microtask PR title rule"
  - "updated docs/maintainer-review-agent.md if needed"

validation:
  commands:
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

promotion:
  canonical_task_id: null
  decision: pending
  notes: "Maintainer should assign TASK-XXXX id before implementation begins."
