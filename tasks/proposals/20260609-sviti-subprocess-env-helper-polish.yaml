proposal_id: 20260609-sviti-subprocess-env-helper-polish
title: "Polish subprocess environment helper placement and regression coverage"
status: ACCEPTED
type: developer_infrastructure
priority: low

proposed_by:
  contributor_id: sviti
  agent_id: codex

strategy_alignment:
  - "Keep subprocess environment guardrails reusable without making them look GitHub-PR-specific."
  - "Strengthen regression coverage for dependency discovery without broadening CI requirements."
  - "Preserve the safe additive shape of TASK-0623 while making a later cleanup reviewable."

summary: >
  After the TASK-0623 subprocess environment guardrail lands, consider a small
  follow-up that moves the inherited-environment override helper to a neutral
  module and adds a direct child-process import regression. This keeps the
  first guardrail small while giving the helper a clearer long-term home.

rationale: >
  TASK-0623 intentionally added the guardrail in the existing PR-capability
  module because that module already owned proxy, PATH, GitHub CLI, and tool
  discovery environment helpers. That was the safest first change. A later
  cleanup can make the helper less PR-specific and prove the original CI
  failure mode more directly by launching a child Python process that imports
  a repository dependency under inherited env overrides.

input:
  mode: planning_only
  related_domain: repository_validation
  related_objects:
    - TASK-0623
    - tasks/proposals/20260606-sviti-subprocess-env-guardrail.yaml
    - physics_lab/registry/pr_capability.py
    - tests/test_pr_capability.py
    - tests/test_task_claiming.py
    - docs/cross-platform-compatibility.md
  planning_context: >
    This is a follow-up proposal, not a correction required for TASK-0623.
    It should be considered only after the TASK-0623 PR is reviewed or merged,
    so the first guardrail stays low-risk for other agents and environments.

requirements:
  - "Move or alias the inherited-environment override helper into a neutral module such as physics_lab.registry.subprocess_env, while preserving backward compatibility if TASK-0623 has already exported it from pr_capability."
  - "Add a child-process regression test that launches sys.executable with env overrides and imports at least one repository dependency expected in CI, such as yaml."
  - "Keep intentional minimal-env tests allowed when the test name or comment says missing dependency, missing tool, or minimal environment behavior is the scenario under test."
  - "Update documentation references if the helper's canonical import path changes."
  - "Do not change production helper behavior except for the import-path cleanup or compatibility alias."
  - "Do not add a broad static scanner for env={...} unless the allowlist/comment convention is proven low-noise."
  - "Do not relax CI, dependency, or repository validation requirements."

accepted_outputs:
  - "Neutral subprocess environment helper module or documented canonical import path"
  - "Backward-compatible alias or migration note if needed"
  - "Direct child-process dependency-import regression test"
  - "Documentation update for the canonical helper location"
  - "Maintainer decision on whether to assign a canonical TASK-XXXX id"

