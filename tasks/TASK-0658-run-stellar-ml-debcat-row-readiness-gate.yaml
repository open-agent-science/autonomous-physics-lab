    - "tasks/TASK-0657-define-stellar-ml-debcat-holdout-protocol.yaml"
    - "docs/reviews/textbook-stellar-ml-source-candidate-admissibility.md"
  planning_context: >
    TASK-0628 has packaged the DEBCat metadata-only source artifact, and
    TASK-0657 has defined the holdout/no-leakage protocol. This readiness gate
    can now run: it decides whether row curation can proceed or whether the
    license/luminosity/source blocker should be preserved explicitly.

requirements:
  - "Start only after TASK-0628 source packaging and a holdout/no-leakage protocol are merged."
  - "Determine whether DEBCat provides enough admissible mass, luminosity, uncertainty, and system identifiers for a first row package."
  - "Do not fit mass-luminosity exponents or create benchmark metrics in this task."
  - "If luminosity evidence is missing or model-derived only, preserve a blocker review."

accepted_outputs:
  - "docs/reviews/stellar-ml-debcat-row-readiness-gate.md"
  - "optional data/textbook_formula_audit/source_manifest.yaml metadata-only update"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
