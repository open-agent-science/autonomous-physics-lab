id: TASK-0658
title: "Run Stellar M-L DEBCat row-readiness gate"
type: scientific_dataset
status: DONE
difficulty: high
priority: high

strategy_alignment:
  - "Turn the DEBCat source artifact into an admissibility decision before empirical M-L metrics."
  - "Keep direct dynamical masses separate from model-derived luminosity or Gaia-only substitutes."
  - "Prevent premature Stellar formula claims."

input:
  mode: planning_only
  related_domain: textbook_formula_audit
  related_objects:
