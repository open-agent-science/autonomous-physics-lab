id: TASK-0390
title: "Harden onboarding prompt against premature worktree setup"
type: contributor_experience
status: REVIEW_READY
difficulty: low
priority: high

strategy_alignment:
  - "Keep first-run onboarding smooth for fresh clones and external agents."
  - "Prevent agents from running worktree setup helpers before a task is chosen."
  - "Keep the branch/worktree protocol unchanged after task selection."

input:
  mode: workflow
  related_domain: onboarding
  related_objects:
    - "README.md"
    - "physics_lab/registry/mission_control.py"
  planning_context: >
    A fresh Claude Code run in a new repository clone attempted to run
    `scripts/apl_setup_worktree.sh` during onboarding before the user selected
    a task. The helper then failed because `.claude/settings.local.json` is a
    local-only file and was not present in that fresh clone. The fix should keep
    worktree/setup behavior unchanged, but clarify that onboarding agents only
    read context and show options before the user chooses a task.

requirements:
  - "Do not change support, maintainer, or full autonomous agent prompt semantics except for safer wording."
  - "Clarify that onboarding agents must not run worktree or setup helpers before the user chooses a task."
  - "Keep worktree and setup helper semantics unchanged after task selection."
  - "Keep the task branch/worktree requirement clear so agents do not forget it later."

accepted_outputs:
  - "README.md"
  - "physics_lab/registry/mission_control.py"
  - "tests/test_mission_control.py"

validation:
  commands:
    - "python3 -m pytest tests/test_mission_control.py -q"
    - "python3 scripts/apl_mission.py --onboarding"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
