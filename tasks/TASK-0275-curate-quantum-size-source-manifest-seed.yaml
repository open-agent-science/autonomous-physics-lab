id: TASK-0275
title: "Curate quantum-size source manifest seed after schema"
type: scientific_dataset
status: BLOCKED
difficulty: high
priority: high

strategy_alignment:
  - "Move Quantum Size Effects from schema-only foundation toward a pinned data source surface."
  - "Keep source provenance, measurement semantics, and inclusion decisions reviewable before any baseline benchmark."
  - "Avoid live scraping or ad hoc table mixing while preparing TASK-0225."

input:
  mode: workflow
  related_domain: condensed_matter
  related_objects:
    - "tasks/TASK-0223-add-quantum-dot-size-effect-dataset-schema-and-source-manifest.yaml"
    - "docs/campaigns/quantum-size-effects.md"
    - "campaign_profiles/quantum-size-effects.yaml"
  planning_context: >
    This task is blocked until TASK-0223 defines the repository-native dataset
    schema and source-manifest format. Once the schema exists, a small source
    manifest seed should identify candidate published datasets and inclusion
    decisions for the first baseline benchmark without yet running model
    comparisons.

requirements:
  - "Start only after TASK-0223 is DONE or explicitly accepted by the maintainer as sufficient for source-manifest seeding."
  - "Create a small reviewed source-manifest seed for the first quantum-size benchmark, following the schema and source policy from TASK-0223."
  - "Separate absorption peak, emission peak, and bandgap sources by property kind."
  - "Record citation, year, material family, measurement semantics, inclusion/exclusion status, and checksum or pinned-copy policy when applicable."
  - "Do not fetch live data into canonical memory unless the schema/source policy explicitly allows it."
  - "Do not include synthesis recipes, chemical handling guidance, device fabrication instructions, or biomedical claims."
  - "Do not run baseline model comparisons or autonomous hypothesis search."

accepted_outputs:
  - "updated data/quantum_dots/source_manifest.yaml or a task-scoped source-manifest seed path defined by TASK-0223"
  - "docs/reviews/quantum-size-source-manifest-seed-review.md"
  - "updated tests if source-manifest validation is added"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
