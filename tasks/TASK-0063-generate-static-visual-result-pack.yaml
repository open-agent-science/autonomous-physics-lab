id: TASK-0063
title: "Generate static visual result pack for Pendulum and Koide"
type: scientific_visualization
status: READY
difficulty: medium
priority: high

strategy_alignment:
  - "Turn existing benchmark evidence into legible release-facing visuals without adding dashboard infrastructure."
  - "Reduce the gap between strong scientific artifacts and what contributors or readers can quickly understand."
  - "Support a v0.2 scientific-campaign release candidate with reproducible static figures."

input:
  mode: workflow
  related_domain: scientific_campaign_release
  related_objects:
    - "docs/results/pendulum-gauntlet-100-summary.md"
    - "docs/results/koide-charged-lepton-reproduction.md"
    - "docs/results/koide-tau-holdout.md"
    - "results/EXP-0001/RUN-0003/"
    - "results/EXP-0004/RUN-0004/"
    - "results/EXP-0005/RUN-0005/"
    - "docs/status.md"
    - "docs/mission-control.md"
  planning_context: >
    APL already has reproducible benchmark artifacts, but visual summaries are
    still uneven across campaigns. Create a reproducible static figure pack so
    README, Mission Control, and future public summaries can point to clear,
    honest images instead of text only.

requirements:
  - "Create a reproducible script for generating static result figures from canonical artifacts."
  - "Create docs/figures/pendulum-gauntlet-leaderboard.png."
  - "Create docs/figures/pendulum-error-curve.png."
  - "Create docs/figures/pendulum-failure-modes.png."
  - "Create docs/figures/koide-tau-holdout.png."
  - "Create docs/figures/koide-q-deviation.png."
  - "Create docs/results/visual-summary.md linking the figure set."
  - "Add short visual links from README.md to the most important result figures."
  - "Keep all captions and surrounding wording conservative and non-explanatory."
  - "Do not add dashboard, web app, or interactive plotting surfaces."
  - "Do not promote any scientific claim automatically."

accepted_outputs:
  - "scripts/generate_result_figures.py"
  - "docs/figures/pendulum-gauntlet-leaderboard.png"
  - "docs/figures/pendulum-error-curve.png"
  - "docs/figures/pendulum-failure-modes.png"
  - "docs/figures/koide-tau-holdout.png"
  - "docs/figures/koide-q-deviation.png"
  - "docs/results/visual-summary.md"
  - "updated README.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"
    - "git diff --exit-code"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
