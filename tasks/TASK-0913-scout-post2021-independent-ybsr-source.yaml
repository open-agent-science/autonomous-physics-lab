    experimentally distinct from Beloy/BACON, Nemitz/RIKEN, Pizzocaro/INRIM,
    and McGrew/NIST Yb/Yb. Stop before values.

requirements:
  - "Scout exactly one post-2021 candidate primary absolute neutral-clock Yb/Sr publication or source route."
  - "Record locator, direct-row status, license/reuse posture, uncertainty/covariance visibility, lab/network overlap, campaign epoch, and version-drift risk without transcribing values."
  - "Return READY_FOR_SOURCE_ARTIFACT, BLOCKED_NO_INDEPENDENT_SOURCE, or NEEDS_MAINTAINER_DECISION."
