id: TASK-0286
title: "Run nuclear mid-mass and isotope-chain gap scout"
type: autonomous_research_pilot
status: REVIEW_READY
difficulty: high
priority: high

strategy_alignment:
  - "Probe the registry coverage gap surfaced by TASK-0272 without adding more frozen PRED entries."
  - "Give agents a bounded sandbox lane that targets underrepresented mid-mass and isotope-chain behavior."
  - "Test whether current residual features generalize away from the overrepresented frontier-next-row targets."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "docs/reviews/nuclear-prediction-registry-coverage-audit.md"
    - "docs/reviews/nuclear-prediction-registry-status-after-pred-0062.md"
    - "data/nuclear_masses/nuclear_prediction_registry_coverage.yaml"
    - "data/nuclear_masses/post_ame2020_holdout.yaml"
    - "results/EXP-0012/RUN-0001/result.yaml"
  planning_context: >
    The registry coverage audit shows broad neutron-rich, frontier, shell, and
    pairing coverage, but mid-mass coverage remains thin and isotope-chain
    coverage should stay visible as a distinct reveal slice. This task runs a
    sandbox-only scout focused on those gaps, without editing the frozen
    prediction registry.

requirements:
  - "Generate 6 to 10 bounded mid-mass or isotope-chain residual hypotheses and reject leakage-prone, row-memorizing, or duplicate candidates before execution."
  - "Execute at most 3 to 5 sandbox candidates plus at least one near-null or negative control."
  - "Evaluate against the frozen RESULT-0015 baseline using committed repository data only."
  - "Report primary, mid-mass, isotope-chain, and frontier-contrast metrics so improvements do not hide frontier regressions."
  - "Preserve negative, dormant, and overfit outcomes as review evidence."
  - "Do not write new prediction_registry/nuclear_masses/PRED-*.yaml files."
  - "Do not fetch live measurements, run real reveal scoring, update claims, or promote sandbox outcomes."

accepted_outputs:
  - "scripts/run_nuclear_midmass_isotope_gap_scout.py or an equivalent deterministic runner"
  - "agent_runs/AGENT-RUN-0015/agent_run.yaml"
  - "agent_runs/AGENT-RUN-0015/metrics.json"
  - "agent_runs/AGENT-RUN-0015/report.md"
  - "docs/reviews/nuclear-midmass-isotope-gap-scout-001.md"
  - "tests/test_nuclear_midmass_isotope_gap_scout.py if a runner is added"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
