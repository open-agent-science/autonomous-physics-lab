id: TASK-0233
title: "Register nuclear prediction variants for mass-region stratified controls"
type: scientific_validation
status: SUPERSEDED
difficulty: medium
priority: low

strategy_alignment:
  - "Scale Nuclear Mass Surface prediction work through bounded, reviewable registry variants."
  - "Make light, medium, and heavy mass-region behavior distinguishable in future reveal comparisons."
  - "Avoid one-size-fits-all claims from a single aggregate score."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "prediction_registry/nuclear_masses/PRED-TEMPLATE.yaml"
    - "docs/prediction-registry-policy.md"
    - "docs/reviews/nuclear-prediction-registry-entry-review.md"
    - "docs/notes/nuclear-prediction-variant-expansion-wave.md"
    - "results/EXP-0012/RUN-0001/result.yaml"
  planning_context: >
    Future reveal comparisons should be able to distinguish where a variant
    works or fails. This lane registers two mass-region stratified control
    variants, such as region-specific coefficient controls or target batches
    designed to separate low-A, mid-A, and high-A behavior. After the
    TASK-0249 factory and TASK-0253 ranking helper landed, this manual lane is
    paused behind the factory-first path: prefer TASK-0250 and a reviewed
    selected slate before filling manual PRED-0031/PRED-0032 gaps.

requirements:
  - "Closed during blocked-task hygiene as superseded by the nuclear prediction factory, selected slate registration, and registry evidence summary; reopen only through a fresh maintainer-approved task if a hand-curated mass-region pair is still needed."
  - "Do not start unless the maintainer explicitly reactivates this manual lane, or unless TASK-0250 shows that a hand-curated mass-region control pair is still needed."
  - "Create exactly two prospective registry entries unless the maintainer approves a larger batch."
  - "Use the suggested ids PRED-0031 and PRED-0032 unless a parallel branch collision requires renumbering before review."
  - "Compute quantity mass_excess_mev deterministically; do not leave calculation as LLM text."
  - "Freeze the mass-region variant formula, coefficients, target set, source state, uncertainty semantics, and reveal conditions."
  - "Explain which mass region each entry stresses and why aggregate metrics alone would hide that behavior."
  - "Add or update tests for schema validity, target consistency, repo-prospective target checks, and deterministic value reproduction when code is added."
  - "Do not use live external data fetching, reveal comparisons, or claim/result/knowledge promotion."

accepted_outputs:
  - "prediction_registry/nuclear_masses/PRED-0031.yaml"
  - "prediction_registry/nuclear_masses/PRED-0032.yaml"
  - "docs/reviews/nuclear-prediction-variants-mass-region-controls.md"
  - "updated tests covering the new prediction entries"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
