id: TASK-0557
title: "Document repository map and artifact lifecycle classes"
type: repo_architecture
status: DONE
difficulty: low
priority: high

strategy_alignment:
  - "Make the repository easier for humans and new agents to navigate without moving public artifact paths prematurely."
  - "Separate core scientific memory, active campaign surfaces, generated/local work areas, and legacy or experimental registries."
  - "Reduce root-level confusion while preserving stable paths used by validation, snapshots, task YAML, and review docs."

input:
  mode: workflow
  related_domain: repository_architecture
  related_objects:
    - "docs/architecture.md"
    - "docs/architecture-index.md"
    - "AGENTS.md"
    - "README.md"
    - "docs/legacy/constants-verification/"
    - "approximation_probes/"
    - "docs/legacy/hypothesis-register/"
    - "campaigns/catalog.yaml"
    - "campaign_profiles/"
  planning_context: >
    The maintainer wants the top-level repository to feel cleaner for humans.
    TASK-0558 has already archived two legacy root registries under
    docs/legacy/. This task adds a concise repository map and lifecycle
    vocabulary so readers can distinguish active core surfaces from legacy,
    experimental, generated, local, and review artifacts.

requirements:
  - "Create or update a human-facing repository map that groups current top-level paths by role."
  - "Define lifecycle classes such as core, active campaign, scientific memory, sandbox evidence, generated navigation, local/generated checkout artifact, experimental, legacy, and deprecated."
  - "Mark `docs/legacy/constants-verification/`, `docs/legacy/hypothesis-register/`, and `approximation_probes/` with explicit lifecycle roles."
  - "Clarify the difference between `campaigns/catalog.yaml` and `campaign_profiles/`."
  - "State that any further broad path moves must wait for a migration task that updates loaders, validators, links, tests, snapshots, and agent instructions."
  - "Do not move files, delete scientific memory, or introduce a new static agent-facing index."

accepted_outputs:
  - "docs/repository-map.md or an equivalent strengthened architecture page"
  - "links from README.md, AGENTS.md, or docs/architecture.md where useful"
  - "notes identifying which root paths are stable contracts versus cleanup candidates"
  - ".gitignore updated for local `_worktrees/` checkout artifacts"
  - "live docs/code comments redirected away from retired `tasks/ACTIVE.md` wording"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
