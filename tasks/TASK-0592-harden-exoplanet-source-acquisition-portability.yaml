id: TASK-0592
title: "Harden Exoplanet source-acquisition portability checks"
type: workflow_hardening
status: REVIEW_READY
difficulty: medium
priority: medium

strategy_alignment:
  - "Reduce repeat source-acquisition failures before additional Exoplanet reopen or benchmark gates."
  - "Keep Exoplanet data-readiness work portable across Windows, macOS, Linux, Codex, Claude Code, and human contributors."
  - "Separate workflow hardening from scientific scoring, prediction registration, and claim promotion."

input:
  mode: workflow
  related_domain: exoplanet_mass_radius
  related_objects:
    - "tasks/proposals/20260604-akutenyov-exoplanet-acquisition-portability.yaml"
    - "tasks/TASK-0565-run-exoplanet-second-snapshot-acquisition.yaml"
    - "data/exoplanets/second_snapshot_manifest.yaml"
    - "data/exoplanets/snapshot_plans/pscomppars_query.adql"
    - "scripts/acquire_exoplanet_second_snapshot.py"
    - "scripts/apl_task_pr_helper.py"
    - "scripts/apl_review_pr.py"
    - "physics_lab/datasets/exoplanets.py"
    - "docs/runbooks/exoplanet-second-snapshot-acquisition-runbook.md"
  planning_context: >
    TASK-0565 completed the second Exoplanet source acquisition, but exposed
    repeatable portability and review-flow risks: text line-ending checksum
    drift across platforms, large YAML load timeout risk, safe YAML loading
    review false positives, and Git safe.directory friction in PR/review
    helpers. This task hardens those workflow surfaces without fetching new
    data or changing scientific outputs.

requirements:
  - "Define and document a single LF-canonical checksum rule for text artifacts while preserving raw byte checksums for raw source files."
  - "Add or update focused tests that exercise Windows/Linux checksum parity for query contracts and normalized YAML source artifacts."
  - "Keep YAML parsing on safe loaders and avoid patterns that maintainer review tooling flags as unsafe."
  - "Audit PR helper/review helper behavior under Codex safe.directory ownership constraints and implement or document a narrow workaround."
  - "Do not fetch new source data, compute residual metrics, score targets, write predictions, promote claims, or promote knowledge."
  - "Report whether any behavior changed for existing Exoplanet source artifacts; expected scientific-output change is none."

accepted_outputs:
  - "updated source-acquisition checksum documentation or runbook notes"
  - "focused portability tests for LF-canonical text checksums and committed source artifacts"
  - "safe YAML loader implementation or review-rule adjustment, if needed"
  - "narrow PR helper/review helper safe-directory handling improvement or documented maintainer workaround"
  - "validation evidence showing the implementation does not change scientific outputs"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_exoplanet_second_snapshot_acquisition.py tests/test_exoplanet_mass_radius_dataset_schema.py"
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
