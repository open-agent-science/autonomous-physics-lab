    BASELINE_READY and states the next unblock path.

requirements:
  - "Start only after TASK-0704 is merged."
  - "Use committed Beloy and Nemitz row/source/covariance artifacts only; no live fetch."
  - "Classify Atomic as BASELINE_READY or not, and state whether TASK-0456 can proceed."
  - "Do not compute benchmark metrics, fit constants drift, or promote claims."

accepted_outputs:
  - "docs/reviews/atomic-baseline-readiness-after-nemitz-acr0002.md"
