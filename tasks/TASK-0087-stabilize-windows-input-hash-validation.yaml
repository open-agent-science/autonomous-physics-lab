id: TASK-0087
title: "Stabilize strict input-hash validation across Windows line endings"
type: repository_validation
status: REVIEW_READY
difficulty: low
priority: high

strategy_alignment:
  - "Keep strict repository validation usable for contributors on Windows without weakening scientific artifact integrity."
  - "Prevent false task-closeout blockers caused by checkout line-ending conversion rather than real input drift."
  - "Preserve deterministic validation for binary artifacts while normalizing known text surfaces."

input:
  mode: workflow
  related_domain: repository_validation
  related_objects:
    - "physics_lab/workflows/artifacts.py"
    - "physics_lab/registry/repository.py"
    - "results/EXP-0001/RUN-0001/result.yaml"
  planning_context: >
    A Windows contributor hit strict validation failure on a result snapshot
    input file even though the underlying content had not changed. The
    repository currently hashes raw bytes for strict input drift checks and
    does not define a repository-wide line-ending policy, which allows LF/CRLF
    checkout differences to look like result drift.

requirements:
  - "Make strict input hash validation stable across LF and CRLF checkouts for known text input files."
  - "Do not weaken binary artifact integrity checks."
  - "Add a repository line-ending policy that keeps canonical text files on LF."
  - "Add regression coverage for CRLF text snapshots while preserving true drift detection."
  - "Update tasks/ACTIVE.md through the canonical sync flow."

accepted_outputs:
  - "updated physics_lab/workflows/artifacts.py"
  - "updated tests covering CRLF-safe input hash validation"
  - ".gitattributes"
  - "tasks/TASK-0087-stabilize-windows-input-hash-validation.yaml"
  - "updated tasks/ACTIVE.md"

validation:
  commands:
    - "python3 -m pytest tests/test_damped_oscillator.py"
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"
    - "git diff --exit-code"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
