  planning_context: >
    Pairing, odd-even, and odd-A residual structure is a bounded follow-up
    family that can run in parallel with shell-aware work while preserving
    reviewable sandbox boundaries.

requirements:
  - "Generate 3 to 6 pairing, odd-even, or odd-A residual hypothesis proposals."
  - "Reject proposals that duplicate HYP-PROPOSAL-0021, HYP-PROPOSAL-0022, or existing negative controls."
