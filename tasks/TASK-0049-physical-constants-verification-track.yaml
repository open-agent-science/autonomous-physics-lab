id: TASK-0049
title: "Define and launch physical constants verification micro-task track"
type: benchmark_planning
status: READY
difficulty: low
priority: medium

strategy_alignment:
  - "Extends verification-first discipline to fundamental physical constants."
  - "Provides a safe, deterministic contribution path for any agent."
  - "Each micro-task produces a reproducible result completable in minutes."

input:
  mode: planning_only
  related_domain: fundamental_constants
  related_objects:
    - "docs/scientific-micro-task-protocol.md"
    - "tasks/TASK-0027-units-and-constants-reference.yaml"
    - "tasks/proposals/20260503-roman-physical-constants-verification-track.yaml"
  planning_context: >
    Define the constants-verification track: enumerate at least 10 candidate
    micro-tasks, define the result artifact format (symbolic derivation +
    numerical check + verdict), and produce a sample result artifact for one
    constant demonstrating the format. Each micro-task verifies one derived
    physical constant from base CODATA values using SymPy/SciPy.

requirements:
  - "Enumerate at least 10 candidate constant-verification micro-tasks."
  - "Define result artifact format: symbolic derivation + numerical check + verdict."
  - "Verify one sample constant as a worked example (e.g. fine-structure constant α)."
  - "Code must be deterministic; no external API calls at runtime."
  - "State claim ceiling: 'verified to tolerance X from CODATA YYYY'."
  - "Do not promote results to project-level claims automatically."
  - "Align with docs/scientific-micro-task-protocol.md."

accepted_outputs:
  - "docs note describing the constants-verification track and micro-task list"
  - "sample result artifact for one constant"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"
    - "git diff --exit-code"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
