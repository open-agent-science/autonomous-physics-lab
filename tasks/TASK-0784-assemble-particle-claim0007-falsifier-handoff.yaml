    Particle-mass relations are a mature guardrail campaign. RESULT-0011
    preserves the first falsifier MVP result, but CLAIM-0007 remains DRAFT and
    should not be strengthened without a maintainer-facing evidence map.

requirements:
  - "Read CLAIM-0007, RESULT-0011, Koide campaign summary, and numerology guardrails before writing the handoff."
  - "Map which claim wording is supported, unsupported, or too broad under RESULT-0011 and earlier Koide/particle results."
  - "State source, scheme, scale, uncertainty, random-baseline, and complexity-penalty limitations."
  - "Recommend only maintainer decision options; do not edit CLAIM-0007 status, evidence list, knowledge artifacts, result metrics, or golden results."
