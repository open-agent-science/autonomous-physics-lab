id: TASK-0894
title: "Independently replay (Gate B) the Thermophysical ThermoML Tb Joback transfer RESULT-0026"
type: scientific_replay_validation
status: DONE
closeout: review
difficulty: medium
priority: high

strategy_alignment:
  - "TASK-0869 published RESULT-0026 (EXP-0020): a bounded ThermoML Tb family-stratified Joback transfer at AGENT_PUBLISHED, VALID_IN_RANGE but family-dependent (esters/lactones miss the 5 K survival margin; Joback aggregate MAE 14.926 K)."
  - "The result record itself calls for Gate B: replay the same command and compare aggregate and per-family metrics before any tier upgrade."
  - "A clean replay can move the ThermoML Tb transfer slice from AGENT_PUBLISHED toward AGENT_VALIDATED while preserving the frozen-estimator, source-rights, and no-claim boundaries."

input:
  mode: workflow
  related_domain: thermophysical_property_estimation
  related_objects:
    - "docs/campaigns/thermophysical-property-residuals.md"
    - "results/EXP-0020/RUN-0001/result.yaml"
    - "results/EXP-0020/RUN-0001/metrics.json"
    - "results/EXP-0020/RUN-0001/report.md"
    - "results/EXP-0020/RUN-0001/gate_a_report.md"
    - "data/thermophysical/thermoml_tb_audit_fixture.yaml"
    - "data/thermophysical/source_manifest.yaml"
    - "scripts/run_thermoml_tb_family_transfer.py"
    - "docs/reviews/thermoml-joback-source-readiness-scout.md"
  planning_context: >
    RESULT-0026 is a bounded audit of the frozen published Joback Tb estimator's
    family-stratified out-of-family transfer against experimental ThermoML
    measurements, run under the maintainer-approved local-fetch posture (no
    archive vendoring). EXP-0020/RUN-0001 carries a full physics-lab workflow
    and a PASS implementation-fidelity gate. The aggregate verdict is
    VALID_IN_RANGE but family-dependent. This task runs the independent Gate B
    replay only; it does not extend scope.

requirements:
  - "Replay the committed RESULT-0026 / EXP-0020 workflow from clean outputs and compare aggregate AND per-family metrics, input hashes, code reference, verdict vocabulary, and limitations against the published artifact."
  - "Keep the frozen Joback implementation, compound-identity and group-assignment rules, the chemical-family taxonomy, the implementation-fidelity gate, the 5 K family-survival margin, controls, and tolerances unchanged."
  - "Preserve the ThermoML source-rights / local-fetch posture: do NOT re-fetch beyond the cleared scope, vendor the raw archive, or commit a substantial normalized corpus; cite the ThermoML Archive per NIST request."
  - "Run as a DIFFERENT agent than the RESULT-0026 publisher (Gate B independence): do not self-validate the original run."
  - "Explicitly compare the headline values: Joback MAE 14.925825 K, best non-oracle MAE 43.427943 K, margin 28.502118 K, 7/8 families clearing, and esters/lactones as the failed family."
  - "Do not refit, change RESULT-0026 metrics, alter the bounded verdict vocabulary, create a CLAIM/KNOW/PRED artifact, or claim the estimator is validated or refuted beyond the in-scope family-holdout transfer."
  - "If aggregate or per-family metrics drift beyond tolerance, the fidelity gate does not reproduce, or the packaging is not actually replayable, stop with CONTESTED_RESULT or GATE_B_BLOCKED and record the blocker."
  - "If replay passes, record Gate B status and any permitted review-metadata update under the result-promotion protocol without maintainer endorsement."

accepted_outputs:
  - "A Gate B replay review note under docs/reviews/ with an aggregate AND per-family metric-drift table, the pass/contest verdict, limitations, and no-claim wording."
  - "A validation record or review-metadata update only if the established result-promotion protocol allows it for independent replay."
  - "Output-routing summary: Gate A existing, Gate B pass/blocked/contested, claim impact none, knowledge impact none, public wording still bounded family-stratified transfer audit only."

result_artifact_policy:
  required: false
  reason: "Independent replay of an existing AGENT_PUBLISHED result (RESULT-0026); no new RESULT should be created."
  evidence:
    - "results/EXP-0020/RUN-0001/result.yaml"
    - "docs/reviews/thermoml-result0026-gate-b-replay.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_joback_tb.py tests/test_thermoml_family_transfer.py tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
