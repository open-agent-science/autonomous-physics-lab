id: TASK-0250
title: "Run first nuclear prediction factory candidate slate"
type: scientific_validation
status: READY
difficulty: high
priority: high

strategy_alignment:
  - "Use the new Nuclear Mass Surface factory to scale beyond hand-written two-entry PRED lanes."
  - "Generate many deterministic candidates first, then select only a reviewed subset for registry."
  - "Keep pre-reveal prediction work reviewable, non-claiming, and free of live external measurements."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "physics_lab/engines/nuclear_prediction_variants.py"
    - "scripts/generate_nuclear_prediction_variants.py"
    - "examples/nuclear_prediction_variant_factory.yaml"
    - "docs/notes/nuclear-prediction-variant-factory.md"
    - "docs/notes/nuclear-prediction-variant-expansion-wave.md"
    - "results/EXP-0012/RUN-0001/result.yaml"
  planning_context: >
    TASK-0249 added a deterministic variant factory. The next useful step is
    not immediate registry expansion, but a larger candidate slate that makes
    agents compare model diversity, target coverage, coefficient sensitivity,
    and leakage risk before any selected PRED entries are committed.

requirements:
  - "Create a larger factory config with at least 30 and at most 80 draft candidates."
  - "Use only committed repository sources; keep source_state.live_external_fetch_allowed=false."
  - "Include multiple target batches and bounded coefficient transforms covering smooth, pairing, ablation, and conservative sensitivity controls."
  - "Run the factory script to produce a candidate slate summary and draft PRED YAML into an explicit /tmp output directory."
  - "Commit the config and a review summary, but do not commit generated draft PRED YAML files."
  - "Summarize candidate diversity, target coverage, largest coefficient sensitivities, duplicate or redundant candidates, and recommended candidates for later registry selection."
  - "Keep all wording pre-reveal and below claim/result/knowledge promotion."

accepted_outputs:
  - "examples/nuclear_prediction_factory_slate_001.yaml"
  - "docs/reviews/nuclear-prediction-factory-slate-001.md"
  - "updated docs/notes/nuclear-prediction-variant-factory.md if workflow guidance changes"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 scripts/generate_nuclear_prediction_variants.py examples/nuclear_prediction_factory_slate_001.yaml --write-drafts --output-dir /tmp/apl-nuclear-factory-slate-001"
    - "python3 -m physics_lab.cli validate examples/nuclear_prediction_factory_slate_001.yaml"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
