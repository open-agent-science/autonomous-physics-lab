id: TASK-0691
title: "Auto-close safe tasks via a direct board-sync commit after merge"
type: maintainer_workflow
status: READY
difficulty: high
priority: high

strategy_alignment:
  - "Remove per-task hand-crafted closeout PRs for the safe majority — one mechanism, no phases."
  - "Safety comes from a deterministic guard, a green-main gate, and easy revert, not from a watching period."
  - "Keep result-bearing, follow-up-spawning, and unblocking tasks on the review path."

input:
  mode: workflow
  related_domain: maintainer_workflow
  related_objects:
    - "physics_lab/registry/closeout_sweep.py"
    - "physics_lab/registry/task_closeout.py"
    - ".github/workflows/sync-active-board.yml"
    - "physics_lab/schemas/task.schema.json"
    - "docs/maintainer-review-agent.md"
  planning_context: >
    Closeout content is already vetted by the pre-merge review agent plus green
    CI before merge, and closing a safe task is a trivially revertible status
    flip that touches no scientific artifact. So after a task PR merges, safe
    tasks are closed immediately via a direct board-sync commit on main (the
    pattern Sync Active Board already uses, and AGENTS.md permits for closeout
    DONE). One task, no phases. NOTE: closeout review was the checkpoint that
    twice caught a red main (full_repo) this cycle; the green-main gate is only
    meaningful once full_repo PR/nightly visibility lands, so land that with or
    before this.

requirements:
  - "Add an optional per-task `closeout` field to task.schema.json (enum [auto, review]); it is an opt-out: `closeout: review` forces manual closeout even when otherwise safe."
  - "After a task PR merges, auto-close to DONE any task that is: REVIEW_READY in main; bound to a GitHub-metadata-verified merged canonical PR; not `closeout: review`; whose merged PR touched no protected artifact (claims/, results/, prediction_registry/, experiments/, knowledge/, public-release state); and that does NOT unblock any other task."
  - "Apply the closeout as a direct `chore(board-sync): close out <ids> [skip-board-sync]` commit on main, only when main CI is green; idempotent, logged, and maintainer-overridable."
  - "Never auto-unblock dependent BLOCKED tasks; route all deterministic unblocks, result-bearing, follow-up-spawning, and `closeout: review` tasks to a review-needed list for maintainer or Scientific Curator decision."
  - "Thoroughly unit/integration test the guard and binding (positive and negative cases) — this is the primary safety mechanism — and provide a `--dry-run` report mode for on-demand spot-checks."
  - "Document the safe-auto vs review-path boundary in docs/maintainer-review-agent.md; keep manual closeout available."

accepted_outputs:
  - "optional per-task `closeout` field in task.schema.json"
  - "direct board-sync auto-closeout for safe tasks, green-main-gated, immediate after merge"
  - "protected-artifact + no-unblock guard and PR-binding verification with positive/negative tests"
  - "`--dry-run` report mode"
  - "docs/maintainer-review-agent.md boundary note"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_closeout_sweep.py tests/test_maintainer_review.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
