id: TASK-0636
title: "Create Atomic Pizzocaro per-window diagnostic ledger"
type: scientific_dataset
status: DONE
difficulty: high
priority: high

strategy_alignment:
  - "Move Atomic Clock Residuals from source-blocked review prose toward machine-readable source-to-row readiness memory."
  - "Preserve Pizzocaro VLBI evidence without pretending correlated windows are independent benchmark rows."
  - "Clarify whether a future covariance reconstruction can unblock an Atomic Yb/Sr benchmark."

input:
  mode: workflow
  related_domain: atomic_clock_residuals
  related_objects:
