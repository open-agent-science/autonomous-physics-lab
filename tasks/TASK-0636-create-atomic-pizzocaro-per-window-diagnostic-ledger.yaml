    - "docs/reviews/atomic-first-benchmark-covariance-policy.md"
    - "physics_lab/engines/atomic_clock_residuals.py"
  planning_context: >
    TASK-0627 preserved a COV_BLOCKED_SHARED_SYSTEMATICS blocker and
    recommended a per-window diagnostic ledger. This task creates that ledger
    without treating the windows as benchmark-ready independent rows.

requirements:
  - "Use only committed Pizzocaro source artifacts; do not fetch live data."
  - "Create a machine-readable per-window diagnostic ledger with stable window ids, MJD fields, ratio orientation, component uncertainty fields, and covariance-state labels."
  - "Mark the ledger diagnostic-only unless a committed covariance reconstruction clears the existing Atomic covariance policy."
  - "Do not add benchmark rows to data/atomic_clocks/acr-*.yaml in this task."
  - "Do not run constants-drift fits, cross-source benchmarks, predictions, claims, knowledge, or result artifacts."
  - "Route the final output through docs/result-promotion-protocol.md."

accepted_outputs:
