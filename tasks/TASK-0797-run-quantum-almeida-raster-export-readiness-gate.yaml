    Almeida Figure 1b / SI Figure S2b raster/source page or a replayable
    WebPlotDigitizer-class export with calibration and uncertainty metadata.
    The maintainer-supplied version-of-record Figure 2b asset is now available
    (SHA-256 3b7a37c9...e68e2ce, CC-BY 4.0). The size axis was digitized by the
