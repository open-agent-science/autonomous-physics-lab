id: TASK-0375
title: "Add shared source manifest minimum schema"
type: schema_extension
status: REVIEW_READY
difficulty: high
priority: high

strategy_alignment:
  - "Standardize minimum source metadata across active fresh-data campaigns."
  - "Make source admissibility machine-checkable before row curation."
  - "Separate campaign-specific row schemas from shared provenance and artifact semantics."

input:
  mode: workflow
  related_domain: cross_campaign_data_policy
  related_objects:
    - "physics_lab/schemas/exoplanet_mass_radius.schema.json"
    - "physics_lab/schemas/quantum_dot_size_effect.schema.json"
    - "physics_lab/schemas/nuclear_mass_prediction.schema.json"
    - "data/atomic_clocks/source_manifest_template.yaml"
    - "docs/notes/fresh-data-source-policy.md"
  planning_context: >
    Active campaigns already have campaign-specific manifests and schemas, but
    there is no shared minimum source manifest contract for DOI/arXiv/archive
    locator, retrieval date, checksum, artifact type, redistribution status,
    row class, inclusion status, blocker reason, and extraction method.

requirements:
  - "Define a shared minimum source-manifest schema or schema sketch for cross-campaign use."
  - "Include DOI/arXiv/archive locator, retrieval date, artifact type, checksum, redistribution status, license/citation notes, row class, inclusion status, blocker reason, and extraction method fields."
  - "Show how campaign-specific manifests can extend the shared minimum without losing local semantics."
  - "Add at least one metadata-only example manifest that contains no new external values."
  - "Do not rewrite existing campaign manifests unless the task keeps the change metadata-only and non-breaking."

accepted_outputs:
  - "physics_lab/schemas/source_manifest_minimum.schema.json"
  - "docs/source-manifest-minimum-schema.md"
  - "templates/source_manifest_minimum.yaml"
  - "docs/reviews/source-manifest-minimum-schema-review.md"
  - "tests/test_source_manifest_minimum_schema.py"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
