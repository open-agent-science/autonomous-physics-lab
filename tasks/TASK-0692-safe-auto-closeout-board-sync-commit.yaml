id: TASK-0692
title: "Hybrid safe auto-closeout: dry-run, then direct board-sync commit for the strict safe subset"
type: maintainer_workflow
status: BLOCKED
difficulty: high
priority: high

strategy_alignment:
  - "Remove per-task hand-crafted closeout PRs for the safe majority, at full speed once the classifier is proven."
  - "Trust the pre-merge-reviewed content; earn direct-main writes with a short dry-run instead of a permanent PR checkpoint."
  - "Keep result-bearing, follow-up-spawning, and unblocking tasks on the review path forever."

input:
  mode: workflow
  related_domain: maintainer_workflow
  related_objects:
    - "physics_lab/registry/closeout_sweep.py"
    - "physics_lab/registry/task_closeout.py"
    - ".github/workflows/sync-active-board.yml"
    - "scripts/apl_closeout_sweep.py"
    - "docs/maintainer-review-agent.md"
  planning_context: >
    Hybrid path chosen by the maintainer. Closeout content is already vetted by
    the pre-merge review agent plus green CI before merge, so a batched-PR
    closeout would mainly re-review the AUTOMATION, not the science. The
    classifier is narrow and deterministic, and a wrong status flip is trivially
    revertible. So instead of a permanent batched-PR phase, the same mechanism
    has a report->commit switch: a short dry-run earns a direct board-sync
    commit (the pattern Sync Active Board already uses, and AGENTS.md permits for
    closeout DONE). Deterministic dependent-unblocks and any result/follow-up
    task always stay on the review path.

requirements:
  - "Start only after TASK-0691 is merged (per-task closeout field exists)."
  - "Phase 0 (dry-run): the sweep reports, per REVIEW_READY-with-merged-PR task, auto-safe vs review-needed with the reason, and writes nothing. Keep it dry-run for 1-2 closeout waves to confirm the classification is correct."
  - "Auto-safe requires ALL: `closeout: auto`; GitHub-metadata-verified merged canonical PR; the merged PR touched no protected artifact (claims/, results/, prediction_registry/, experiments/, knowledge/, public-release state); and the task does NOT unblock any other task."
  - "Phase 1 (after a clean dry-run): flip only the strict auto-safe subset to DONE via a direct `chore(board-sync): close out <ids> [skip-board-sync]` commit on main, consistent with the Sync Active Board action, and only when main CI is green."
  - "Never auto/direct-unblock dependent BLOCKED tasks; route all deterministic unblocks, result-bearing, follow-up-spawning, and `closeout: review` tasks to a review-needed list for maintainer or Scientific Curator decision."
  - "Make the protected-artifact + no-unblock guard mandatory and tested; the direct commit must be idempotent, logged, maintainer-overridable, and must never run on a red main (depends on full_repo PR/main visibility)."
  - "Document the dry-run->direct-commit boundary and the review-path-forever set in docs/maintainer-review-agent.md; keep manual closeout available."

accepted_outputs:
  - "closeout sweep dry-run report (auto-safe vs review-needed) with reasons"
  - "direct board-sync auto-closeout for the strict safe subset, green-main-gated, behind the dry-run graduation"
  - "protected-artifact + no-unblock guard with tests"
  - "docs/maintainer-review-agent.md hybrid boundary note"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_closeout_sweep.py tests/test_maintainer_review.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
