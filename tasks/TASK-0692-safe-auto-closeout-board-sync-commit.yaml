id: TASK-0692
title: "Safe auto-closeout: direct board-sync commit after merge for the strict safe subset"
type: maintainer_workflow
status: BLOCKED
difficulty: high
priority: high

strategy_alignment:
  - "Remove per-task hand-crafted closeout PRs for the safe majority, at full speed."
  - "Make safety come from tests + an opt-in field + a protected-artifact guard + a green-main gate + revertibility, not from a watching period."
  - "Keep result-bearing, follow-up-spawning, and unblocking tasks on the review path forever."

input:
  mode: workflow
  related_domain: maintainer_workflow
  related_objects:
    - "physics_lab/registry/closeout_sweep.py"
    - "physics_lab/registry/task_closeout.py"
    - ".github/workflows/sync-active-board.yml"
    - "scripts/apl_closeout_sweep.py"
    - "docs/maintainer-review-agent.md"
  planning_context: >
    Closeout content is already vetted by the pre-merge review agent plus green
    CI before merge, and closing a safe task is a trivially revertible status
    flip that touches no scientific artifact. So safe tasks are auto-closed
    immediately after merge via a direct board-sync commit (the pattern Sync
    Active Board already uses, and AGENTS.md permits for closeout DONE). A
    mandatory dry-run watching period is not used; the real safety is a
    well-tested deterministic classifier, an opt-in `closeout` field, a
    protected-artifact + no-unblock guard, a green-main gate, and easy revert.
    A `--dry-run` mode stays available for on-demand spot-checks. NOTE: closeout
    review was the checkpoint that twice caught a red main (full_repo) this
    cycle; removing it means full_repo PR/nightly visibility should land
    first/with this so the green-main gate is meaningful.

requirements:
  - "Start only after TASK-0691 is merged (per-task closeout field exists)."
  - "Auto-safe requires ALL: `closeout: auto`; GitHub-metadata-verified merged canonical PR; the merged PR touched no protected artifact (claims/, results/, prediction_registry/, experiments/, knowledge/, public-release state); and the task does NOT unblock any other task."
  - "On merge, flip the strict auto-safe subset to DONE immediately via a direct `chore(board-sync): close out <ids> [skip-board-sync]` commit on main, only when main CI is green."
  - "Provide a `--dry-run` mode that reports auto-safe vs review-needed with reasons and writes nothing; it is an on-demand spot-check, not a mandatory phase."
  - "Never auto/direct-unblock dependent BLOCKED tasks; route all deterministic unblocks, result-bearing, follow-up-spawning, and `closeout: review` tasks to a review-needed list for maintainer or Scientific Curator decision."
  - "Make the protected-artifact + no-unblock guard and the classifier mandatory and thoroughly unit/integration tested (positive and negative cases) — this is the primary safety mechanism."
  - "The direct commit must be idempotent, logged, maintainer-overridable, and must never run on a red main; recommend landing full_repo PR/nightly visibility first so 'green main' detects full_repo breakage."
  - "Document the safe-auto vs review-path boundary in docs/maintainer-review-agent.md; keep manual closeout available."

accepted_outputs:
  - "direct board-sync auto-closeout for the strict safe subset, green-main-gated, immediate after merge"
  - "`--dry-run` report mode (auto-safe vs review-needed, with reasons)"
  - "protected-artifact + no-unblock guard and classifier with positive/negative tests"
  - "docs/maintainer-review-agent.md boundary note"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_closeout_sweep.py tests/test_maintainer_review.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
