id: TASK-0425
title: "Migrate agents/example-agent.yaml test fixture out of agents/ into tests/fixtures/"
type: workflow_protocol
status: REVIEW_READY
difficulty: low
priority: medium

strategy_alignment:
  - "Keep agents/ as a directory of active agent role soul files only, with no legacy test fixtures mixed in."
  - "Resolve the duplicate follow-up created while TASK-0424 was still in draft: the TASK-0424 PR now performs this fixture migration directly."
  - "Avoid future confusion where a reader of agents/ thinks example-agent.yaml is a current agent role."

input:
  mode: workflow
  related_domain: cross_campaign_workflow
  related_objects:
    - "agents/example-agent.yaml"
    - "agents/README.md"
    - "tests/test_pendulum.py"
    - "tests/test_damped_oscillator.py"
  planning_context: >
    TASK-0424 originally left the legacy agents/example-agent.yaml fixture in
    place, then was updated before merge to perform this migration directly.
    This task is therefore resolved by the TASK-0424 PR: the fixture moves to
    tests/fixtures/, the two referencing tests point at the new path, and
    agents/ becomes a directory of active role soul files plus its template
    and README.

requirements:
  - "Confirm tests/fixtures/example-agent.yaml exists and agents/example-agent.yaml is removed."
  - "Confirm tests/test_pendulum.py and tests/test_damped_oscillator.py point at the new fixture path."
  - "Confirm agents/README.md no longer documents a legacy file."
  - "Confirm tests/test_agent_role_soul_files.py no longer excludes example-agent.yaml from role-file conformance."
  - "Confirm validation passes after the move."
  - "Do not modify any docs/agent-*.md deep protocol file."

accepted_outputs:
  - "tests/fixtures/example-agent.yaml (moved from agents/example-agent.yaml)"
  - "tests/test_pendulum.py (path update)"
  - "tests/test_damped_oscillator.py (path update)"
  - "agents/README.md (legacy section removal)"
  - "tests/test_agent_role_soul_files.py (NON_ROLE_FILES update)"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_pendulum.py tests/test_damped_oscillator.py tests/test_agent_role_soul_files.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
