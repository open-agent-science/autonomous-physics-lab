id: TASK-0456
title: "Run first Atomic Yb/Sr cross-source consistency benchmark"
type: scientific_benchmark
status: REVIEW_READY
difficulty: high
priority: high

strategy_alignment:
  - "Turn Atomic from curated rows into a narrow, reviewable benchmark only after readiness gates pass."
  - "Compare independent Yb/Sr direct frequency-ratio rows without constants-drift or new-physics framing."
  - "Produce the first scientist-readable Atomic benchmark artifact if source, covariance, loader, and holdout gates allow it."

input:
  mode: workflow
  related_domain: atomic_clock_residuals
  related_objects:
    - "tasks/TASK-0705-rerun-atomic-baseline-readiness-after-nemitz.yaml"
    - "docs/reviews/atomic-baseline-readiness-after-nemitz-acr0002.md"
    - "data/atomic_clocks/acr-0001-beloy-2021-direct-ratios.yaml"
    - "data/atomic_clocks/acr-0002-nemitz-2016-direct-ratio.yaml"
    - "data/atomic_clocks/acr-0001-beloy-2021-cross-ratio-covariance-approximation.yaml"
  planning_context: >
    TASK-0705 classified Atomic as BASELINE_READY for this first exploratory
    diagonal-only Yb/Sr cross-source diagnostic. The expected benchmark is a
    narrow Yb/Sr cross-source consistency comparison between Beloy 2021 and
    Nemitz 2016, with covariance and source limitations visible. It is not a
    constants-drift, new-constant, anomaly, or new-physics task.

requirements:
  - "Start only if TASK-0705 classifies Atomic as BASELINE_READY and explicitly authorizes this narrow benchmark shape."
  - "Use only committed rows and committed source/covariance artifacts; no live fetch."
  - "Compare independent Yb/Sr direct-ratio rows with uncertainty and covariance treatment declared before computing metrics."
  - "Report consistency metrics, uncertainty treatment, and limitations; preserve null, inconclusive, or inconsistent outcomes."
  - "Do not fit broad constants drift, infer new physics, create prediction entries, or promote claims."
  - "Use conservative verdict vocabulary such as CONSISTENT_WITHIN_UNCERTAINTY, INCONCLUSIVE, or SOURCE_LIMITED."

accepted_outputs:
  - "agent_runs/AGENT-RUN-0071/metrics.json"
  - "agent_runs/AGENT-RUN-0071/report.md"
  - "scripts/atomic_yb_sr_consistency_diagnostic.py"
  - "docs/reviews/atomic-yb-sr-cross-source-consistency-benchmark.md"
  - "optional RESULT candidate only if the task scope is amended by maintainer approval and Gate A passes"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
