id: TASK-0234
title: "Register nuclear prediction variants for negative-control families"
type: scientific_validation
status: READY
difficulty: medium
priority: medium

strategy_alignment:
  - "Scale Nuclear Mass Surface prediction work through bounded, reviewable registry variants."
  - "Make attractive-but-risky correction ideas falsifiable instead of quietly discarded."
  - "Preserve negative-control discipline for later reveal comparisons."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "prediction_registry/nuclear_masses/PRED-TEMPLATE.yaml"
    - "docs/prediction-registry-policy.md"
    - "docs/reviews/nuclear-prediction-registry-entry-review.md"
    - "docs/notes/nuclear-prediction-variant-expansion-wave.md"
    - "results/EXP-0012/RUN-0001/result.yaml"
  planning_context: >
    Some plausible correction families should be expected to overfit, collapse
    under holdout, or fail transfer. This lane registers two explicitly labeled
    negative-control prediction variants so later reveal can calibrate the
    registry against bad or fragile ideas.

requirements:
  - "Create exactly two prospective registry entries unless the maintainer approves a larger batch."
  - "Use the suggested ids PRED-0033 and PRED-0034 unless a parallel branch collision requires renumbering before review."
  - "Compute quantity mass_excess_mev deterministically; do not leave calculation as LLM text."
  - "Freeze the negative-control variant formula, coefficients, target set, source state, uncertainty semantics, and reveal conditions."
  - "Explain why each variant is attractive and why it is expected to be fragile."
  - "Add or update tests for schema validity, target consistency, repo-prospective target checks, and deterministic value reproduction when code is added."
  - "Do not use live external data fetching, reveal comparisons, or claim/result/knowledge promotion."

accepted_outputs:
  - "prediction_registry/nuclear_masses/PRED-0033.yaml"
  - "prediction_registry/nuclear_masses/PRED-0034.yaml"
  - "docs/reviews/nuclear-prediction-variants-negative-controls.md"
  - "updated tests covering the new prediction entries"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
