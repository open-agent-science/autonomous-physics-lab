    M-L relation and returned TRANSFERS_TO_HIGH_MASS_UNDER_CONTROLS: the relation
    clears the predeclared survival margin over its best control on the disjoint
    high-mass holdout while degrading gracefully. That run is currently a dated
    sandbox review note. This task packages it as a Gate-A-compliant RESULT so it
    can be promoted: deterministic, pinned, replayable. It does NOT refit the
    relation, edit RESULT-0022, or assert a claim (Gate C / claim promotion is a
    separate maintainer step).

requirements:
  - "Package the TASK-0837 transfer run as a Gate-A-compliant RESULT under the textbook/stellar campaign: pinned command, code_reference, input_file_hashes, engine_version, git_commit, and a deterministic byte-reproducible replay. Do NOT refit the relation or change the frozen DEBCat slice."
  - "Report the predeclared survival margin over the best control and the graceful out-of-range degradation, with the experimental-judge note (DEBCat dynamical masses)."
  - "Set review_tier_proposed to AGENT_PUBLISHED only if the Gate-A packaging is complete and the run is independently replayable; otherwise keep it sandbox + a packaging-blocker note. Do NOT self-validate (Gate B must be a different agent)."
  - "Scope the result honestly: a single validated relation transferring to one disjoint high-mass regime under controls; NOT a universal law, discovery, or stellar-structure conclusion. No claim/PRED/KNOW created (Gate C is maintainer-only)."
  - "Output-routing summary: Gate A status, the transfer margin, the proposed review tier, and the Gate-B-replay handoff for a different agent."

accepted_outputs:
