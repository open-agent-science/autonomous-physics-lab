id: TASK-0178
title: "Run second nuclear-mass sandbox batch after independent audit"
type: autonomous_research_pilot
status: SUPERSEDED
difficulty: high
priority: medium

strategy_alignment:
  - "Continue Nuclear Mass Surface only after the first strong sandbox candidate is independently audited."
  - "Avoid multiplying an unverified residual-pattern family across more agent outputs."
  - "Keep second-batch nuclear work sandbox-only, robustness-gated, holdout-aware, and negative-result preserving."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "tasks/TASK-0173-independent-audit-hyp-proposal-0021.yaml"
    - "campaign_profiles/nuclear-mass-surface.yaml"
    - "docs/nuclear-mass-holdout-protocol.md"
    - "tasks/TASK-0190-define-nuclear-candidate-robustness-gate.yaml"
    - "tasks/TASK-0196-add-reviewed-post-ame2020-row-level-holdout-dataset.yaml"
    - "tasks/TASK-0197-run-post-ame2020-row-level-time-split-benchmark.yaml"
    - "agent_runs/AGENT-RUN-0005/"
    - "agent_runs/AGENT-RUN-0007/"
    - "hypothesis_proposals/nuclear-mass/"
  planning_context: >
    A second nuclear-mass sandbox batch is useful only after HYP-PROPOSAL-0021
    has been independently replayed and audited, after a robustness gate makes
    clear which follow-up patterns are allowed, and after post-AME2020
    validation moves beyond the source-manifest-only guard. Until then, this
    task should remain blocked so agents do not scale a potentially
    cherry-picked, split-sensitive, leakage-sensitive, or untested time-split
    pattern. After TASK-0190, TASK-0196, and TASK-0197 landed, the broad
    umbrella remains blocked in favor of narrower controlled lanes:
    TASK-0200, TASK-0201, TASK-0202, and TASK-0204. Use those tasks for the
    next private-agent cycle rather than starting this broad batch directly.

requirements:
  - "Closed during blocked-task hygiene as superseded by narrower completed second-batch lanes TASK-0200, TASK-0201, TASK-0202, and TASK-0204; create a fresh bounded task if a new nuclear batch is needed."
  - "Do not start until TASK-0173 is DONE, TASK-0190 is DONE, TASK-0196 is DONE, TASK-0197 is DONE, and maintainer review explicitly allows follow-up work."
  - "Prefer the narrower TASK-0200, TASK-0201, TASK-0202, and TASK-0204 lanes for the next cycle; keep this umbrella blocked unless the maintainer explicitly reopens it."
  - "Generate a second bounded batch of nuclear-mass residual hypotheses under the existing campaign profile."
  - "Reject weak or duplicate candidates before execution."
  - "Run only sandbox experiments; do not update canonical results, claims, accepted knowledge, or datasets."
  - "Preserve at least one negative or overfit result if present."
  - "Compare every candidate against the frozen baseline, documented holdout protocol, and robustness gate."
  - "Include a robustness-gate section for every executed candidate with outcome, split-sensitivity summary, leakage review, complexity note, negative control, post-AME2020 status, and limitations."
  - "Report primary holdout, split-sensitivity, post-AME2020 time-split, robustness classification, and no-claim-promotion status for every executed candidate."
  - "Do not treat AGENT-RUN-0007 as active benchmark evidence; use it only as guard context."

accepted_outputs:
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-00XX-*.yaml"
  - "experiment_proposals/nuclear-mass/EXP-PROPOSAL-00XX-*.yaml"
  - "agent_runs/AGENT-RUN-00XX/agent_run.yaml"
  - "agent_runs/AGENT-RUN-00XX/metrics.json"
  - "agent_runs/AGENT-RUN-00XX/report.md"
  - "docs/reviews/autonomous-nuclear-mass-pilot-02.md"
  - "robustness-gate section in each run report using docs/nuclear-mass-robustness-gate.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

