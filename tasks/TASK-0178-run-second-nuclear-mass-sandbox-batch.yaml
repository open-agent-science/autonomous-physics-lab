    leakage-sensitive pattern.

requirements:
  - "Do not start until TASK-0173 is DONE and its audit does not block follow-up work."
  - "Generate a second bounded batch of nuclear-mass residual hypotheses under the existing campaign profile."
  - "Reject weak or duplicate candidates before execution."
  - "Run only sandbox experiments; do not update canonical results, claims, accepted knowledge, or datasets."
  - "Preserve at least one negative or overfit result if present."
  - "Compare every candidate against the frozen baseline and documented holdout protocol."

accepted_outputs:
