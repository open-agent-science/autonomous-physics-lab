id: TASK-0108
title: "Add microtask PR support to maintainer review helper"
type: maintainer_workflow
status: DONE
difficulty: medium
priority: high

strategy_alignment:
  - "Keep maintainer review aligned with the repository's current task and microtask protocols."
  - "Reduce false protocol blockers when contributors use canonical microtask PR flows."
  - "Preserve fast review for narrow scientific microtask batches without weakening safety checks."

input:
  mode: workflow
  related_domain: maintainer_review
  related_objects:
    - "physics_lab/registry/maintainer_review.py"
    - "docs/agent-task-protocol.md"
    - "docs/maintainer-review-agent.md"
    - "docs/scientific-micro-task-protocol.md"
  planning_context: >
    The repository documentation now permits microtask PRs with canonical
    branch and title formats, but the deterministic maintainer review helper
    still recognizes only task, proposal, and closeout PRs. This causes helper
    verdicts to fall out of sync with current protocol and incorrectly block
    otherwise valid microtask PRs during maintainer review.

requirements:
  - "Teach the maintainer review helper to recognize canonical microtask branch names."
  - "Teach the maintainer review helper to recognize microtask(<queue-id>): ... PR titles."
  - "Do not require a canonical TASK-XXXX file for microtask PR review."
  - "Verify that the referenced microtask queue id maps to a file under tasks/microtasks/."
  - "Keep existing task, proposal, and closeout review behavior intact."
  - "Add regression tests covering at least one valid microtask PR and one invalid queue-id case."

accepted_outputs:
  - "updated physics_lab/registry/maintainer_review.py with canonical microtask PR support"
  - "updated tests/test_maintainer_review.py with microtask PR coverage"
  - "updated tasks/ACTIVE.md reflecting TASK-0108 state"

validation:
  commands:
    - "python3 -m pytest tests/test_maintainer_review.py"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
