queue_id: pendulum-formula-falsification
campaign: pendulum-formula-falsification
campaign_status: active
selection_guidance:
  - "Prefer narrow approximation, diagnostics, and wording tasks."
  - "Do not change canonical result artifacts in routine microtask work."
microtasks:
  - id: PFF-001
    campaign: pendulum-formula-falsification
    title: Propose one even candidate family using x = sin^2(theta/2)
    type: formula-family-proposal
    estimated_effort: 15-30 minutes
    recommended_for:
      - codex
      - claude
      - human
    autonomy_level:
      - agent_can_complete
      - human_review_required
    expected_output: "One short note that defines the family, why it is dimensionless, and what benchmark window it targets."
    validation:
      - "Show the family is even in theta."
      - "State at least one expected failure regime."
    risk_level: low
    forbidden_claims:
      - "exact symbolic proof"
      - "universal pendulum validity"
      - "real-world pendulum performance without damping analysis"
  - id: PFF-002
