    status_reason: "Covered by docs/notes/dimensional-analysis-microtask-batch-02.md."
    campaign: dimensional-analysis-validator
    title: Add one SUSPICIOUS challenge item that is dimensionally balanced but physically questionable
    type: challenge-entry
    estimated_effort: 15-25 minutes
    recommended_for:
      - codex
      - human
    autonomy_level:
      - agent_can_complete
      - human_review_required
    expected_output: "One challenge entry plus a note on why balance alone does not guarantee a safe formula."
    validation:
      - "State the expected verdict as SUSPICIOUS."
      - "State the missing physical assumption."
    risk_level: medium
    forbidden_claims:
      - "dimensionally balanced means correct"
      - "physical interpretation settled"
      - "validator equivalent to full physics reasoning"
