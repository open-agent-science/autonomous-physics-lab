queue_id: dimensional-analysis-validator
campaign: dimensional-analysis-validator
campaign_status: active_with_validator_and_pilot
selection_guidance:
  - "Prefer new boundary cases, repeatable classification runs, and assumption-explicit examples not already covered by existing notes."
  - "The validator and first autonomous pilot already exist; do not frame remaining work as implementation pending."
microtasks:
  - id: DAV-001
    status: completed
    status_reason: "Covered by docs/notes/dav-001-hubble-law.md and dimensional-analysis batch notes."
    campaign: dimensional-analysis-validator
    title: Add one clearly dimensionally valid formula to the challenge set
    type: challenge-entry
    estimated_effort: 10-20 minutes
    recommended_for:
      - codex
      - claude
      - human
    autonomy_level:
      - agent_can_complete
      - human_review_required
    expected_output: "One challenge entry with explicit SI base-dimension rationale."
    validation:
      - "State the expected verdict as VALID."
      - "Show the SI dimension balance explicitly."
    risk_level: low
    forbidden_claims:
      - "validator already passes it"
      - "full engine support exists"
      - "physical correctness fully established"
  - id: DAV-002
    status: completed
    status_reason: "Covered by docs/notes/dav-002-bernoulli-density-mismatch.md and dimensional-analysis batch notes."
    campaign: dimensional-analysis-validator
    title: Add one clearly dimensionally invalid formula to the challenge set
