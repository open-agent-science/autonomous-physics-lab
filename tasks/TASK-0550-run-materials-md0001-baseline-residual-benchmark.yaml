id: TASK-0550
title: "Run first Materials MD-0001 baseline residual benchmark"
type: scientific_benchmark
status: READY
difficulty: high
priority: high

strategy_alignment:
  - "Turn APL's first reusable Materials dataset into the first reviewable Materials benchmark result."
  - "Use conservative baselines and null controls before any materials-property correction search."
  - "Keep formation energy and band gap on separate residual axes with no material-discovery claim."

input:
  mode: workflow
  related_domain: materials_property_residuals
  related_objects:
    - "data/materials/md-0001-materials-project-formation-energy.yaml"
    - "data/materials/md-0001-materials-project-band-gap.yaml"
    - "data/materials/materials_snapshot_manifest.yaml"
    - "data/materials/schema.md"
    - "tests/test_materials_dataset.py"
    - "docs/reviews/materials-binary-oxides-dataset.md"
    - "docs/result-promotion-protocol.md"
  planning_context: >
    TASK-0548 landed MD-0001: a pinned Materials Project stable-binary-oxides
    pilot with 169 rows and two separate computed-DFT property axes. The next
    useful scientific step after TASK-0541 lands the holdout/no-peek manifest
    is a first conservative baseline/residual benchmark over the committed rows
    only, reported as benchmark evidence, not a materials-discovery result.
    Keep this task blocked until the holdout boundary is committed so the first
    Materials benchmark does not need an avoidable replay.

requirements:
  - "Use only committed MD-0001 rows and the committed snapshot manifest; no live external fetch."
  - "Analyze `formation_energy_per_atom` and `band_gap` as separate axes; never pool the metrics."
  - "Declare all baselines and null controls before reporting metrics. At minimum include a global-mean/median null and one simple composition-aware baseline per axis."
  - "Use the TASK-0541 holdout/no-peek manifest; do not substitute a temporary split unless a maintainer explicitly amends this task."
  - "Report MAE/RMSE and residual summaries per axis, including interpretable slices by cation group, formula family where feasible, spacegroup/prototype where feasible, and property range."
  - "Do not train complex ML models, propose material candidates, infer synthesis/design guidance, or create material-discovery claims."
  - "Route the final output through docs/result-promotion-protocol.md and keep any result scoped to the MD-0001 benchmark."

accepted_outputs:
  - "examples/benchmarks/materials_md0001_baseline.yaml or equivalent deterministic benchmark config"
  - "agent_runs/AGENT-RUN-XXXX/metrics.json"
  - "agent_runs/AGENT-RUN-XXXX/report.md"
  - "docs/reviews/materials-md0001-baseline-residual-benchmark.md"
  - "tests for any new materials baseline helper"
  - "optional docs/campaigns/materials-property-residuals.md update if the campaign posture changes"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_materials_dataset.py"
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
