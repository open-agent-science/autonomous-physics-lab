id: TASK-0188
title: "Implement post-AME2020 time-split nuclear mass benchmark guard"
type: scientific_validation
status: DONE
difficulty: high
priority: high

strategy_alignment:
  - "Evaluate nuclear-mass residual candidates against a harder time-split surface instead of relying only on configured internal holdouts."
  - "Compare AI-generated correction candidates against the frozen baseline under the same pinned benchmark contract."
  - "Report failures, regressions, and uncertainty-aware metrics before any follow-up batch is treated as promising."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "tasks/TASK-0187-curate-post-ame2020-nuclear-mass-holdout-dataset.yaml"
    - "results/EXP-0012/RUN-0001/result.yaml"
    - "agent_runs/AGENT-RUN-0005/"
    - "agent_runs/AGENT-RUN-0006/"
    - "docs/reviews/nuclear-split-sensitivity-replay.md"
  planning_context: >
    TASK-0187 now provides a reviewed post-AME2020 source manifest. PR #253
    intentionally implemented the conservative activation guard only: it records
    an INCONCLUSIVE source-manifest-only dry run and refuses active benchmark
    metrics until reviewed row-level holdout data exists. The real row-level
    time-split benchmark is tracked separately by TASK-0196 and TASK-0197.

requirements:
  - "Do not start until TASK-0187 is DONE or the maintainer explicitly supplies a reviewed post-AME2020 holdout artifact."
  - "Evaluate the frozen nuclear baseline only when a row-level post-AME2020 holdout exists."
  - "Evaluate HYP-PROPOSAL-0021 and approved sandbox comparators only after row-level data is committed."
  - "Report source-manifest-only guard state as INCONCLUSIVE, not as active benchmark metrics."
  - "Include baseline-relative and split-sensitivity context only as limitations until row-level time-split scoring exists."
  - "Preserve the guard outcome; do not promote claims or canonical knowledge."

accepted_outputs:
  - "physics_lab/registry/post_ame2020_holdout.py"
  - "docs/reviews/post-ame2020-nuclear-time-split-benchmark.md"
  - "agent_runs/AGENT-RUN-0007/agent_run.yaml"
  - "agent_runs/AGENT-RUN-0007/metrics.json"
  - "agent_runs/AGENT-RUN-0007/report.md"
  - "agent_runs/AGENT-RUN-0007/preflight.md"
  - "agent_runs/AGENT-RUN-0007/limitations.md"
  - "agent_runs/AGENT-RUN-0007/review_summary.md"
  - "tests/test_post_ame2020_time_split_benchmark.py"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
