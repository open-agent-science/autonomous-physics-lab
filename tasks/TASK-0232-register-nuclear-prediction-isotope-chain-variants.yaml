id: TASK-0232
title: "Register nuclear prediction variants for isotope-chain extrapolation controls"
type: scientific_validation
status: READY
difficulty: medium
priority: high

strategy_alignment:
  - "Scale Nuclear Mass Surface prediction work through bounded, reviewable registry variants."
  - "Probe chain-wise extrapolation risk with prospective forecasts rather than random-split comfort."
  - "Keep target-set design explicit and reviewable."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "prediction_registry/nuclear_masses/PRED-TEMPLATE.yaml"
    - "docs/prediction-registry-policy.md"
    - "docs/reviews/nuclear-prediction-registry-entry-review.md"
    - "docs/nuclear-mass-holdout-protocol.md"
    - "docs/notes/nuclear-prediction-variant-expansion-wave.md"
    - "results/EXP-0012/RUN-0001/result.yaml"
  planning_context: >
    Isotope-chain extrapolation is methodologically different from random
    nuclide masking. This lane registers two prospective variants that make
    chain-wise target selection and extrapolation assumptions explicit.

requirements:
  - "Create exactly two prospective registry entries unless the maintainer approves a larger batch."
  - "Use the suggested ids PRED-0029 and PRED-0030 unless a parallel branch collision requires renumbering before review."
  - "Compute quantity mass_excess_mev deterministically; do not leave calculation as LLM text."
  - "Freeze the isotope-chain variant formula, coefficients, target set, source state, uncertainty semantics, and reveal conditions."
  - "Explain the chain selection rule and why it is a generalization stress test."
  - "Add or update tests for schema validity, target consistency, repo-prospective target checks, and deterministic value reproduction when code is added."
  - "Do not use live external data fetching, reveal comparisons, or claim/result/knowledge promotion."

accepted_outputs:
  - "prediction_registry/nuclear_masses/PRED-0029.yaml"
  - "prediction_registry/nuclear_masses/PRED-0030.yaml"
  - "docs/reviews/nuclear-prediction-variants-isotope-chain-controls.md"
  - "updated tests covering the new prediction entries"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo ."
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
