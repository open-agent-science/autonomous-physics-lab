id: TASK-0278
title: "Run nuclear shell-neighborhood variant scout"
type: autonomous_research_pilot
status: DONE
difficulty: high
priority: high

strategy_alignment:
  - "Keep Nuclear Mass Surface busy with bounded parallel hypothesis testing while the registry audit and reveal dry-run proceed."
  - "Explore shell-neighborhood correction ideas without immediately expanding the frozen prediction registry."
  - "Preserve negative and inconclusive results as reviewable scientific memory."

input:
  mode: workflow
  related_domain: nuclear_physics
  related_objects:
    - "experiments/EXP-0012-nuclear-mass-baseline-residual-benchmark.yaml"
    - "results/RESULT-0015-nuclear-mass-baseline-residual-benchmark.md"
    - "docs/notes/nuclear-prediction-variant-factory.md"
    - "docs/reviews/nuclear-prediction-factory-slate-002-feature-terms.md"
  planning_context: >
    The registry is frozen through PRED-0062, but agents still need useful
    Nuclear work in parallel. This scout lane lets one agent generate and test
    bounded shell-neighborhood hypotheses around magic numbers and shell
    closure residual structure, while keeping registry commits and reveal
    comparison out of scope.

requirements:
  - "Generate 6-10 bounded shell-neighborhood hypotheses or feature variants, then reject weak or duplicate ideas before running any sandbox evaluation."
  - "Use only repository-pinned datasets, existing baseline artifacts, and deterministic local code; do not fetch live measurements."
  - "Compare candidates against the frozen RESULT-0015 baseline and relevant shell/magic-number subsets."
  - "Include at least one negative or near-null control and preserve its result."
  - "Report MAE/RMSE or the closest existing project metric, subset behavior, complexity, limitations, and verdict."
  - "Do not edit prediction_registry/nuclear_masses/ or create new frozen PRED entries in this task."
  - "Do not promote discovery claims or imply a new nuclear mass law."

accepted_outputs:
  - "docs/reviews/nuclear-shell-neighborhood-variant-scout-001.md"
  - "optional sandbox artifact path under agent_runs/ or results/ if required by the existing workflow"
  - "updated tests only if code or reusable tooling is changed"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
