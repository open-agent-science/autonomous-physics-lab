id: TASK-0752
title: "Map portfolio open-data lanes and propose parallel-safe campaign prioritization"
type: dataset_workflow
status: REVIEW_READY
closeout: review
difficulty: low
priority: high

strategy_alignment:
  - "Keep every active campaign moving on a bounded, parallel-safe lane while ranking priority by open-data availability and result-proximity."
  - "Make Materials and Stellar M-L (both open-data, both near a first frontier result) the parallel leads rather than concentrating on one campaign."
  - "Generalize the open-licensed-first rule (TASK-0751) from a per-source check into a portfolio prioritization, without abandoning source-starved campaigns."

input:
  mode: workflow
  related_domain: cross_campaign_source_acquisition
  planning_context: >
    Maintainer-directed create-and-execute task. The project already produces
    durable outputs (10 CLAIMs) only from the mature classical/particle
    campaigns; the source-readiness frontier has produced no promoted RESULT yet
    because it is gated on source-to-row acquisition. Two frontier campaigns are
    now near a first promotable result on OPEN data and can be driven in
    parallel: Materials (MD-0002 formation-energy chain) and Stellar M-L (Route 2
    DEBCat SANDBOX_PASS). With many agents available, the right shape is a
    priority ranking plus a live, disjoint, parallel-safe lane for every active
    campaign, so nothing is abandoned and agents do not collide. This task writes
    that lane map as a recommendation; it does not edit missions/current.yaml.
  related_objects:
    - "docs/fresh-data-intake-protocol.md"
    - "docs/reviews/quantum-open-licensed-first-source-selection-application.md"
    - "docs/current-missions.md"
    - "missions/current.yaml"
    - "campaign_profiles/"

requirements:
  - "Rank active campaigns by open-data availability and result-proximity, and record the ranking rationale."
  - "Give every active campaign one bounded, parallel-safe next lane with a disjoint write surface so many agents can run concurrently without collision."
  - "Name the two open-data parallel leads (Materials, Stellar M-L) and their nearest path to a first frontier RESULT."
  - "State explicitly that this is a recommendation; any missions/current.yaml change requires maintainer sign-off."
  - "Do not abandon any campaign, weaken any source/license/holdout/overclaim gate, curate rows, fetch live data, or promote a claim."

accepted_outputs:
  - "docs/reviews/portfolio-open-data-lane-map.md"
  - "docs/current-missions.md (one-line pointer to the lane map)"

result_artifact_policy:
  required: false
  reason: "Portfolio prioritization / workflow recommendation task; no scientific RESULT or PRED artifact is expected."
  evidence:
    - "docs/reviews/portfolio-open-data-lane-map.md"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
