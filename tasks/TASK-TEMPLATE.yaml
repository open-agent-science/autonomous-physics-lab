# Canonical task template.
# For new task ideas without a maintainer-assigned TASK-XXXX id, use
# tasks/proposals/TASK-PROPOSAL-TEMPLATE.yaml instead.

id: TASK-XXXX
title: ""
type: ""
status: PROPOSED
difficulty: medium
priority: medium

# Optional closeout policy. Omit (default) to allow safe auto-closeout, or set
# `closeout: review` to force a manual closeout decision even when otherwise safe
# (use for tasks that produce a result, spawn follow-ups, or need a human call).
# closeout: review

strategy_alignment:
  - ""

input:
  # Choose exactly one input shape.
  #
  # Science execution task:
  # hypothesis_id: HYP-XXXX
  # experiment_id: EXP-XXXX
  #
  # Planning-only task:
  # mode: planning_only
  # related_domain: particle_physics
  # related_objects: []
  # planning_context: "What this planning task is setting up"
  #
  # Workflow task:
  # mode: workflow
  # related_objects: []
  # planning_context: "What this workflow or contributor task is coordinating"
  mode: planning_only
  related_domain: ""
  related_objects: []
  planning_context: ""

requirements:
  - "Use deterministic code"
  - "Keep claims range-aware"
  - "Do not promote claims automatically"
  - "Do not change unrelated task-state transitions or commit generated navigation from routine task PRs. Own-task REVIEW_READY transition is allowed when required by the canonical task protocol."

accepted_outputs:
  - "code reference"
  - "tests"
  - "docs update"

# Result-artifact policy. A task that is marked DONE is expected to link a
# scientific RESULT (results/.../result.yaml) or a registered PRED artifact,
# UNLESS its `type` is on the no-result exemption list in
# physics_lab/registry/scientific_memory_integrity.py (e.g. tooling_fix,
# documentation, repository_hardening). If this task legitimately produces no
# RESULT/PRED artifact and its type is NOT exempt (tooling, docs, workflow,
# infra, audit, planning), declare that explicitly here, or strict closeout
# validation will warn (done_task_without_result). See docs/agent-task-protocol.md.
# result_artifact_policy:
#   required: false
#   reason: "Tooling/docs/workflow task; no scientific RESULT artifact is expected."
#   evidence:
#     - "path/to/the/code/or/doc/this/task/produced"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
