id: TASK-0426
title: "Cross-reference agent role profiles from docs/agent-catalog.md"
type: workflow_protocol
status: READY
difficulty: low
priority: medium

strategy_alignment:
  - "Keep docs/agent-catalog.md (narrative authority) and agents/<role>.yaml (activation-ready role profiles) in sync."
  - "Make it obvious to a reader of agent-catalog that compact role profiles exist under agents/ for active roles."
  - "Close the operational gap created by TASK-0424: role profiles exist but the catalog does not link to them."

input:
  mode: workflow
  related_domain: cross_campaign_workflow
  related_objects:
    - "docs/agent-catalog.md"
    - "agents/README.md"
    - "agents/architect.yaml"
    - "agents/review-agent.yaml"
    - "agents/scientific-curator.yaml"
    - "agents/researcher.yaml"
    - "agents/task-proposal-agent.yaml"
    - "agents/microtask-agent.yaml"
  planning_context: >
    TASK-0424 introduced agents/<role>.yaml role profiles for six active roles
    (architect, review-agent, scientific-curator, researcher,
    task-proposal-agent, microtask-agent), plus a README and a template.
    docs/agent-catalog.md is the existing narrative authority that
    describes 8 agent paths in long form. The catalog does not yet link
    to the new role profiles. A reader of the catalog therefore does not
    know that an activation-ready compact file exists for each role.
    This task adds a 'Role profile' line under each catalog entry that has
    a matching agents/<role>.yaml, and adds a new top-level section that
    introduces agents/ as the role-profile directory.

requirements:
  - "Add a 'Role profile' link line to each agent path entry in docs/agent-catalog.md where a matching agents/<role>.yaml exists."
  - "Add a short top-level section (2-4 paragraphs) introducing agents/ as the role-profile directory, explaining the convention from agents/README.md."
  - "Add a new entry for the Architect role under 'Contributor-Facing' or a new 'Repository-Architecture-Facing' subsection (the catalog currently has no Architect entry)."
  - "For agent paths that do not yet have a role profile (e.g. Maintainer Automation modes, planned roles), keep the existing entry unchanged but note 'Role profile: not yet authored' for clarity."
  - "Do not modify any agents/<role>.yaml file or any deep protocol document (docs/maintainer-review-agent.md, docs/scientific-campaign-curator.md, docs/agent-task-protocol.md, docs/agent-operating-model.md, etc.)."
  - "Add a test that confirms every agents/<role>.yaml with status: active is linked from docs/agent-catalog.md (extends or sits beside tests/test_agent_role_profiles.py)."

accepted_outputs:
  - "docs/agent-catalog.md (Role profile lines added, Architect entry added, agents/ section added)"
  - "tests/test_agent_role_profiles.py (new test: catalog links every active role) OR a new tests/test_agent_catalog_links.py"

validation:
  commands:
    - "python3 -m ruff check ."
    - "python3 -m pytest tests/test_agent_role_profiles.py tests/test_docs_links.py"
    - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

can_be_done_by:
  - human
  - codex
  - claude_code
  - llm_agent
