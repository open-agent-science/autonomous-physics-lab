strategy_alignment:
  - "Use mature deterministic benchmarks as quality-floor scientific surfaces for the larger agent wave."
  - "Turn existing Anharmonic evidence into a clear promotion/no-promotion decision rather than rerunning weak sandbox loops."
  - "Keep public-facing result paths conservative and replayable."

input:
  mode: planning_only
  related_domain: anharmonic_oscillator
  related_objects:
