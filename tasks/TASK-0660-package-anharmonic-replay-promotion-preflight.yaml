  planning_context: >
    Anharmonic Oscillator is a mature deterministic benchmark and a useful
    eighth active campaign surface for the Scientific Director pool. The next
    useful task is not new formula search; it is a concise result-promotion
    preflight that states whether the replayed benchmark can become a stronger
    public evidence card, needs independent replay, or should remain limited.

requirements:
  - "Review the canonical experiment/result/summary and route the artifact through docs/result-promotion-protocol.md."
  - "State Gate A/Gate B readiness, replay needs, numerical validation references, and public wording limits."
  - "Identify at most one follow-up task only if it directly unblocks AGENT_VALIDATED or negative-memory status."
  - "Do not add new formulas, claims, predictions, or breakthrough wording."

accepted_outputs:
