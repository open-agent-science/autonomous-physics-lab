validation:
  commands:
    - "python -m ruff check ."
    - "python -m pytest -n 0 --basetemp=.pytest-basetemp-helper tests/test_anharmonic_oscillator.py tests/test_docs_links.py"
    - "python -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

