# Materials Property Residuals Source Manifest (placeholder)
#
# Value-free source policy created by the TASK-0439 campaign scaffold.
# A source must appear here, with verified license/version/checksum policy,
# before any dataset file may reference it. No live external fetching is
# permitted; sources must be pinned at commit time by a future snapshot task.
#
# Required fields per future entry (defined by a later schema task):
#   source_id        — short unique identifier used in dataset files
#   title            — database or compilation title
#   provider         — database/provider name
#   version          — pinned database version or release tag
#   record_locator   — API/record locator or citation
#   properties       — list of property_kind values (with units)
#   provenance       — computed_dft | measured | model_only
#   license_note     — redistribution / reuse terms
#   checksum_policy   — doi_pinned | sha256_file | url_archived
#   inclusion_decision — accepted | excluded
#   notes            — provenance and scope notes

manifest_version: "1"
campaign_id: materials-property-residuals
status: first_snapshot_pinned
created_by:
  contributor_id: roman
  agent_id: claude
live_external_fetch_allowed: false
no_values_recorded_here: true

# One source registered (Materials Project). This manifest itself records no
# measurement values; the pinned snapshot + checksum live under snapshots/ and
# the curated rows in the md-*.yaml dataset files (TASK-0548). Materials Project
# requires a personal API key, so the fetch is maintainer-run and the key is
# never committed.
sources:
  - source_id: materials-project
    title: "The Materials Project"
    provider: "Materials Project (LBNL)"
    version: "2025.09.25"   # Materials Project database_version, pinned by TASK-0548
    record_locator: "https://api.materialsproject.org (mp-api summary endpoint)"
    landing_page: "https://next-gen.materialsproject.org/"
    citation: "A. Jain et al., 'Commentary: The Materials Project: A materials genome approach to accelerating materials innovation', APL Materials 1, 011002 (2013), doi:10.1063/1.4812323."
    properties:
      - formation_energy_per_atom  # eV/atom
      - band_gap                   # eV
    materials:
      - "open-ended (bounded by the runbook query at acquisition time)"
    provenance: computed_dft
    dft_functional: "GGA / GGA+U (per Materials Project convention; record per record)"
    measurement_type: theoretical_calculation
    license_note: "Materials Project data are licensed CC BY 4.0; redistribution of curated rows is allowed WITH attribution. Attribution + citation are mandatory in any committed dataset. The API key is never committed."
    attribution_text: "Data from The Materials Project (materialsproject.org), licensed CC BY 4.0; cite Jain et al., APL Materials 1, 011002 (2013)."
    checksum_policy: sha256_file
    access: api_key_required_maintainer_run
    inclusion_decision: accepted
    notes: >
      Registered by TASK-0547 as the first open, redistributable Materials source
      (CC BY 4.0). First snapshot pinned by TASK-0548: the maintainer ran the
      acquisition runbook with their own MP_API_KEY (never committed) for a bounded
      pilot scope (stable binary oxides, database_version 2025.09.25, 169 rows).
      JARVIS-DFT (NIST) remains the fallback after a separate license/source note.

candidate_source_classes_for_future_review:
  - "Open computed-property databases (JARVIS-DFT, Materials Project, OQMD, AFLOW) with DFT functional and version recorded."
  - "Curated experimental property compilations with explicit primary-source citation."
  - "Reference/model-only descriptors, admissible only as explicitly excluded context."

# Metadata-only transfer-route note (TASK-0817). Records a ready/blocked route
# without adding any dataset rows or values; see the scout note for full detail.
transfer_route_notes:
  - route_id: md0002-disjoint-asite-cation-family
    status: ready_for_future_task
    scouted_by_task: TASK-0817
    scout_note: docs/reviews/materials-independent-transfer-route-scout.md
    route_class: disjoint_chemistry_family_within_committed_source
    source_id: materials-project
    dataset_family: MD-0002
    property_axis: formation_energy_per_atom
    provenance_class: computed_dft
    live_external_fetch_required: false
    depends_on: TASK-0809
    depends_on_status: done_compatible_not_blocking
    summary: >
      A disjoint A-site cation-family holdout (alkali+3d-transition vs
      alkaline-earth+3d-transition) is feasible on the committed MD-0002
      formation-energy slice with no live fetch: the 362 included rows partition
      exhaustively into 225 alkali-transition and 137 alkaline-earth-transition
      rows, leakage-free, and the holdout manifest already pre-authorizes that
      family split vocabulary. No rows, metrics, RESULT, claim, or knowledge are
      created here.

global_limitations:
  - "One source registered (Materials Project, CC BY 4.0); measurement values live in the md-*.yaml dataset files, not in this manifest."
  - "Computed and measured properties must stay on separate residual axes with explicit provenance."
  - "Do not live-fetch or run benchmarks from this manifest; the dataset is a pinned snapshot only."
