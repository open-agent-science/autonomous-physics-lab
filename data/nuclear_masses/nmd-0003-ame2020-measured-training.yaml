dataset_id: NMD-0003
title: AME2020 measured-row nuclear-mass training surface
status: curated
description: 'Source-gated AME2020 measured-row training surface for Nuclear Mass
  Surface factory and residual diagnostics. Rows with AME2020 # estimated-value markers
  and primary post-AME2020 holdout nuclides are excluded from this training dataset.'
source_policy: Pinned AME2020 ASCII mass table parsed from the IAEA AMDC mirror. The
  raw source file is not vendored; its URL, checksum, byte size, format notes, citation,
  and redistribution boundary are recorded in data/nuclear_masses/nmd-0003-source-manifest.yaml.
  Default training eligibility is measured rows only.
