row_filters:
  include_rules:
  - Rows must come from Table 2 of the reviewed NST publisher JATS XML artifact.
  - Rows must have a post-AME2020 source reference dated 2021 through 2024.
  - Rows must preserve AME2020 comparison extrapolation markers separately from new measured values.
  exclusion_rules:
  - Rows overlapping the frozen NMD-0002 baseline slice are retained for audit but excluded from primary scoring.
  - No row is used for benchmark metrics in TASK-0196.
