      surface: 16.287719114297985
      coulomb: 0.6829963405221187
      asymmetry: 22.041540119261434
      pairing: 10.351073973927111
    rationale: >
      Any future residual-feature sprint that uses the region-stratified
      readiness baseline should also report the single-vector OLS audit
      baseline so improvements are not hidden by region-aware flexibility.

  inherited_control_baseline:
    baseline_id: inherited_result0015_nmd0002_frozen
    fit_policy: frozen_external
    validation_mae_mev: 4.979318
    validation_rmse_mev: 6.253063
    coefficients:
      volume: 15.51423612106804
      surface: 17.2931812095177
      coulomb: 0.6878156091568888
      asymmetry: 23.846557883948485
      pairing: 15.990845113398912

readiness_decision:
  future_bounded_residual_feature_sprint_allowed: true
  allowed_only_if:
    - "Use committed NMD-0003 measured rows only."
    - "Use stratified_interleaved_70_30 as the primary validation gate."
    - "Compare against the frozen primary readiness baseline and the required global OLS audit baseline."
    - "Keep sorted_aZN_70_30 as extrapolation diagnostic only."
    - "Do not score post-AME2020 holdout rows."
    - "Do not write PRED, CLAIM, KNOW, or discovery wording."
    - "Use disjoint residual-feature families from already rejected/control-dominated TASK-0517 slate unless explicitly justified."
  blocked_until_changed:
    - "Any sprint that still uses sorted_aZN_70_30 as the sole readiness gate."
    - "Any sprint that refits baselines after inspecting residual-feature holdout behavior."
    - "Any sprint that introduces leakage-sensitive local-curvature features without a dedicated no-leakage implementation."

output_routing:
  task_verdict: STRATIFIED_BASELINE_GATE_FROZEN
  canonical_destination: data/nuclear_masses/nmd-0003-stratified-baseline-gate.yaml
  review_tier: none
  gate_a_status: not_attempted
  gate_b_status: not_applicable
  claim_impact: none
  knowledge_impact: none
  result_impact: no RESULT artifact created
  limitations:
    - "Retrospective AME2020 measured-row readiness gate, not post-AME2020 reveal scoring."
    - "Region-stratified coefficients are a baseline readiness contract, not residual-feature evidence."
    - "Future result promotion still requires a scoped benchmark task and maintainer review."
