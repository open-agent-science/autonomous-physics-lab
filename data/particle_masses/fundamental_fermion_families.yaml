          plus: 8.6
          minus: 3.4
          unit: MeV
        mass_type: running
        scheme: MS-bar
        scale: "2 GeV"
        source:
          authority: Particle Data Group
          edition: "2024"
          citation: "PDG 2024 Table of Particle Properties."
      - particle: bottom quark
        symbol: b
        family: down_quark
        mass_value_mev: 4183.0
        uncertainty:
          type: symmetric
          value: 7.0
          unit: MeV
        mass_type: running
