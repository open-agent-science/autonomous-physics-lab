limitations:
  - "The dataset intentionally excludes neutrinos because absolute neutrino masses are scenario-dependent."
  - "The dataset intentionally excludes cross-family triplets by current numerology guardrails."
  - "Quark values mix schemes and scales exactly as documented in KN-0006; no RGE running is applied."
  - "This dataset is for falsifier calibration, not for explanatory particle-mass claims."
