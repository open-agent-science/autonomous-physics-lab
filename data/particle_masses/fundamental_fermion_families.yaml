dataset_id: DATASET-PM-0003
title: Guardrail-compliant charged fermion family triplets for Koide falsifier MVP
status: DRAFT
description: >
  Source-explicit charged fermion triplets used by the first particle-mass
  relation falsifier MVP. The dataset intentionally includes only within-family
  charged triplets: charged leptons, up-type quarks, and down-type quarks.
  Cross-family triplets are excluded by current numerology guardrails.

source_policy:
  primary_authority: Particle Data Group
  policy_note: >
    Preserve mass type, scheme, and scale metadata. Charged leptons use PDG
    2025 pole masses copied from DATASET-PM-0001. Quark entries use the stored
    PDG 2024 MS-bar/direct-measurement values from KN-0006.

families:
  - id: charged_leptons
    label: Charged leptons
    limitation: "Cleanest input family: pole masses with high precision."
    entries:
      - particle: electron
        symbol: e
        family: charged_lepton
        mass_value_mev: 0.51099895000
        uncertainty:
          type: symmetric
          value: 0.00000000015
          unit: MeV
        mass_type: pole
        scheme: null
        scale: null
        source:
          authority: Particle Data Group
          edition: "2025 update"
          citation: "PDG 2025 electron listing; 2018 CODATA value in MeV."
      - particle: muon
        symbol: mu
        family: charged_lepton
        mass_value_mev: 105.6583755
        uncertainty:
          type: symmetric
          value: 0.0000023
          unit: MeV
        mass_type: pole
        scheme: null
        scale: null
        source:
          authority: Particle Data Group
          edition: "2025 update"
          citation: "PDG 2025 muon listing; 2018 CODATA value in MeV."
      - particle: tau
        symbol: tau
        family: charged_lepton
        mass_value_mev: 1776.93
        uncertainty:
          type: symmetric
          value: 0.09
          unit: MeV
        mass_type: pole
        scheme: null
        scale: null
        source:
          authority: Particle Data Group
          edition: "2025 update"
          citation: "PDG 2025 tau listing average mass value in MeV."

  - id: up_quarks
    label: Up-type quarks
    limitation: "Mixed quark mass schemes/scales are preserved as an explicit limitation."
    entries:
      - particle: up quark
        symbol: u
        family: up_quark
        mass_value_mev: 2.16
        uncertainty:
          type: asymmetric
          plus: 0.49
          minus: 0.26
          unit: MeV
        mass_type: running
        scheme: MS-bar
        scale: "2 GeV"
        source:
          authority: Particle Data Group
          edition: "2024"
          citation: "PDG 2024 Table of Particle Properties."
      - particle: charm quark
        symbol: c
        family: up_quark
        mass_value_mev: 1270.0
        uncertainty:
          type: symmetric
          value: 20.0
          unit: MeV
        mass_type: running
        scheme: MS-bar
        scale: "mc(mc)"
        source:
          authority: Particle Data Group
          edition: "2024"
          citation: "PDG 2024 charm mass mc(mc)."
      - particle: top quark
        symbol: t
        family: up_quark
        mass_value_mev: 172690.0
        uncertainty:
          type: symmetric
          value: 300.0
          unit: MeV
        mass_type: direct_measurement
        scheme: direct_measurement
        scale: null
        source:
          authority: Particle Data Group
          edition: "2024"
          citation: "PDG 2024 top mass world average from collider measurements."

  - id: down_quarks
    label: Down-type quarks
    limitation: "Mixed quark mass schemes/scales are preserved as an explicit limitation."
    entries:
      - particle: down quark
        symbol: d
        family: down_quark
        mass_value_mev: 4.67
        uncertainty:
          type: asymmetric
          plus: 0.48
          minus: 0.17
          unit: MeV
        mass_type: running
        scheme: MS-bar
        scale: "2 GeV"
        source:
          authority: Particle Data Group
          edition: "2024"
          citation: "PDG 2024 Table of Particle Properties."
      - particle: strange quark
        symbol: s
        family: down_quark
        mass_value_mev: 93.4
