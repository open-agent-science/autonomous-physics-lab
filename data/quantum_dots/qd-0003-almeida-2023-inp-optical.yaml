dataset_id: qd-0003-almeida-2023-inp-optical
title: "Almeida 2023 InP colloidal quantum dot direct size-energy rows (Figure 2b, This work)"
status: curated
description: >
  Direct (edge length, E1s) rows for InP colloidal quantum dots, deterministically
  digitized from the "This work" filled-triangle markers of Figure 2b (E1s vs
  Edge Length sizing curve) in Almeida et al., Nano Letters 2023, 23 (18),
  8697-8703 (doi:10.1021/acs.nanolett.3c02630, CC-BY 4.0). Edge lengths were
  extracted by scripts/extract_almeida_sizing.py (deterministic, SHA-gated,
  byte-replayable) and independently verified Gate-B-style: byte-identical replay
  plus an independent by-eye re-read agreeing within <= 0.04 nm, smallest dot
  1.50 nm matching the source text, monotonic size-energy ordering, and points on
  the published fit within scatter (residuals <= 0.10 eV). Five samples are
  included as direct "This work" rows; the sixth (lambda1s 620 nm) is excluded
  because its Figure 2b marker is a Xu et al. open triangle, not a "This work"
  filled marker.
source_policy: >
  Source metadata is pinned in data/quantum_dots/source_manifest.yaml as
  almeida-2023-nano-letters-inp-optical (CC-BY 4.0 version-of-record, confirmed by
  TASK-0741). Edge length L is the figure-digitized tetrahedral edge length;
  E1s = 1239.84 / lambda1s from the published panel labels. The publisher figure
  asset is not vendored (SHA-256 + locator only). Full digitization package:
  data/quantum_dots/digitization/almeida-2023-nano-letters-inp-optical/. These
  are figure-derived rows (deterministic_figure_extraction tier), not source-table
  rows.
property_kind_covered: absorption_peak_eV
