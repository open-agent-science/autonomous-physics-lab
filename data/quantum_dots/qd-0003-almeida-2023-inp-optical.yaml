dataset_id: qd-0003-almeida-2023-inp-optical
title: "Almeida 2023 InP colloidal quantum dot direct size-energy rows (SI Figure S2b TEM)"
status: curated
description: >
  Six direct (edge length, E1s) rows for InP colloidal quantum dots from
  Almeida et al., Nano Letters 2023, 23 (18), 8697-8703
  (doi:10.1021/acs.nanolett.3c02630, CC-BY 4.0). Edge length L is the per-sample
  mean from the SI Figure S2b TEM edge-length distribution histograms, extracted
  by a deterministic gray-histogram weighted-centroid extractor
  (digitization/.../extract_s2b_histograms.py; byte-reproducible). E1s =
  1239.84 / lambda1s from the published panel labels. The extraction was produced
  and audited by a second, independent agent and cross-validated against an
  independent extraction of the main-article Figure 2b sizing curve
  (digitization/.../extract_almeida_sizing.py): the five non-620 samples agree
  to <= 0.62 Angstrom (<= 0.06 nm). The lambda620 sample is included from the
  clean SI S2b TEM histogram (its Figure 2b scatter marker is a Xu et al. open
  triangle and was not used).
source_policy: >
  Source metadata is pinned in data/quantum_dots/source_manifest.yaml as
  almeida-2023-nano-letters-inp-optical (CC-BY 4.0 version-of-record, TASK-0741).
  Edge length L is the figure-digitized tetrahedral edge length (TEM histogram
  mean, SI Figure S2b). The publisher PDF/figure rasters are not vendored
  (SHA-256 + locator only; SI SHA-256
  2d0080214d9f7116561cbd80659d40463f868b57ca211179f5d854d12ad265ee). Full
  digitization package + both deterministic extractors:
  data/quantum_dots/digitization/almeida-2023-nano-letters-inp-optical/. These
  are figure-derived rows (deterministic_figure_extraction tier).
property_kind_covered: absorption_peak_eV
