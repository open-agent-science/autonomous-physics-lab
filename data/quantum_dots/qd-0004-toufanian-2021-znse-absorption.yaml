dataset_id: qd-0004-toufanian-2021-znse-absorption
title: "Toufanian 2021 ZnSe colloidal quantum dot direct SAXS size - 1S absorption rows (Table 1)"
status: curated
description: >
  Ten direct (SAXS diameter, 1S absorption-peak) rows for ZnSe colloidal quantum
  dots from Toufanian, R.; Zhong, X.; Kays, J. C.; Saeboe, A. M.; Dennis, A. M.,
  "Correlating ZnSe Quantum Dot Absorption with Particle Size and Concentration",
  Chemistry of Materials 2021, 33 (18), 7527-7536
  (doi:10.1021/acs.chemmater.1c02501; CC BY-NC-ND 4.0). Particle diameter is the
  per-sample mean +/- SD from small-angle X-ray scattering (SAXS), modelled with
  a spherical log-normal form factor (Table 1, "Summary of MP-AES Data"); the
  size axis is a DIRECT structural measurement, not an optical-inversion sizing
  curve, so these rows are non-circular for a size-energy transfer holdout. The
  1S absorption-peak position is the sample nomenclature (each sample is named
  for its 1S peak in nm, 361-422 nm); E1s = 1239.84 / lambda1s. ZnSe is
  independent of the committed InP (Almeida qd-0003), CdSe (Yu qd-0001), and PbS
  (Moreels qd-0002) sets; these rows must never be mixed with the Yu/Moreels
  calibration-curve sizing equations.
source_policy: >
  Source metadata is pinned in data/quantum_dots/source_manifest.yaml as
  toufanian-2021-znse. License CONFIRMED CC BY-NC-ND 4.0 on the ACS open-access
  version-of-record and the ChemRxiv v4 preprint. Only the factual numeric
  values (SAXS diameter, 1S peak) are committed, re-expressed in this schema with
  attribution; the publisher PDF / figures / Supporting Information / Table 1
  image are NOT vendored (locator + SHA-256 only; VoR PDF SHA-256
  9963096332e4fc37b389fe72f839e347cba9dc92f402634b30c8a17a30302b51). Per the
  source-rights framework: local_analysis allowed; source_bytes redistribution
  not allowed; derived_rows publication basis limited_factual_extract (facts are
  not copyrightable; non-commercial research use with attribution preserves the
  BY-NC-ND terms). See
  docs/reviews/quantum-toufanian-2021-znse-source-artifact-and-extraction.md.
  These are direct table-derived rows (table_derived tier).
property_kind_covered: absorption_peak_eV
