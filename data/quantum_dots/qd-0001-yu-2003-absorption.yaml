dataset_id: qd-0001-yu-2003-absorption
title: "Yu 2003 CdTe/CdSe/CdS absorption sizing-curve seed"
status: curated
description: >
  Small absorption_peak_eV row-level seed derived from the DOI-pinned Yu 2003
  CdTe, CdSe, and CdS empirical sizing curves. Rows are calibration-derived
  points selected from the source's first excitonic absorption peak wavelength
  axis; they are not copied source table rows or digitized figure points.
source_policy: >
  Source metadata is pinned in data/quantum_dots/source_manifest.yaml as
  yu-2003-cm-absorption. Values below are derived from published empirical
  sizing-curve formulas and selected wavelengths for reviewable benchmark
  seeding. No source tables, spectra, or figure coordinates are redistributed.
property_kind_covered: absorption_peak_eV
