fixture_id: QD-DIGITIZATION-FIXTURE-0002
task_id: TASK-0655
status: synthetic_fixture_only
description: >
  Synthetic non-spherical figure-digitization ledger used to validate tetrahedral
  edge-length and volume size axes, source-axis conversion metadata, uncertainty,
  and schema round-trip before any real Almeida or other non-spherical quantum
  dot figure-derived measurement rows are curated.
synthetic: true
contains_real_measurement_rows: false
baseline_metrics_allowed: false
claim_promotion_allowed: false
non_spherical: true
source_policy: >
  Fabricated fixture only. No Almeida 2023 figure, PDF page, image crop, or real
  digitized point is committed by this file.
digitization_context:
  source_id: synthetic_quantum_nonspherical_digitization_fixture
  figure_ref: synthetic_figure_1_panel_b
  property_kind: absorption_peak_eV
  material: InP
  morphology: tetrahedral
  extraction_tool:
    name: synthetic_webplotdigitizer_class_fixture
    version: "0.0"
    export_format: yaml_fixture
  future_artifact_layout:
    - data/quantum_dots/digitization/<source_id>/README.md
    - data/quantum_dots/digitization/<source_id>/axis_calibration.csv
    - data/quantum_dots/digitization/<source_id>/extracted_points.csv
    - data/quantum_dots/digitization/<source_id>/notes.md
axis_calibration:
  x_axis:
    label: edge_length_nm
    units: nm
    figure_axis_label: average_tetrahedral_edge_length
    source_axis_conversion:
      figure_quantity: tetrahedral_edge_length
      schema_size_axis: edge_length_nm
      morphology: tetrahedral
      conversion_rule: >
        Synthetic fixture: figure x-axis reports average tetrahedral edge length
        in nanometres without coercing to spherical diameter.
    anchors:
      - anchor_id: x0
        pixel_x: 120.0
        pixel_y: 520.0
        axis_value: 1.5
      - anchor_id: x1
        pixel_x: 880.0
        pixel_y: 520.0
        axis_value: 4.5
  y_axis:
    label: absorption_peak_eV
    units: eV
    figure_axis_label: first_absorption_transition_E1s
    anchors:
      - anchor_id: y0
        pixel_x: 120.0
        pixel_y: 520.0
        axis_value: 1.95
      - anchor_id: y1
        pixel_x: 120.0
        pixel_y: 120.0
        axis_value: 1.35
  alternate_size_axis:
    label: volume_nm3
    units: nm3
    figure_axis_label: geometrical_volume
    source_axis_conversion:
      figure_quantity: tetrahedral_volume
      schema_size_axis: volume_nm3
      morphology: tetrahedral
      conversion_rule: >
        Synthetic fixture: alternate panel reports geometrical volume in cubic
        nanometres as a separate non-spherical size axis.
    anchors:
      - anchor_id: v0
        pixel_x: 140.0
        pixel_y: 500.0
        axis_value: 4.0
      - anchor_id: v1
        pixel_x: 860.0
        pixel_y: 500.0
        axis_value: 28.0
