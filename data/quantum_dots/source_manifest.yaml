  - source_id: norris-bawendi-1996-prb-cdse-band-edge
    title: "Measurement and Assignment of the Size-Dependent Optical Spectrum in CdSe Quantum Dots"
    authors: "Norris, D. J.; Bawendi, M. G."
    year: 1996
    doi: "10.1103/PhysRevB.53.16338"
    journal: "Physical Review B"
    volume: "53"
    pages: "16338-16346"
    table_reference: "metadata-only TASK-0347 open-direct-table triage candidate (rank 1); Article body table of size-versus-first-exciton-transition-energy for CdSe nanocrystal size series; verify APS open-access status and table contents before row curation"
    properties:
      - absorption_peak_eV
      - bandgap_eV
    materials:
      - CdSe
    measurement_type: optical_absorption
    size_axis: radius_nm
    inclusion_decision: excluded
    inclusion_rationale: >
      TASK-0347 ranks this as the top candidate (rank 1) for a table_derived
      CdSe direct-measurement seed on the absorption_peak_eV and bandgap_eV
      axes. APS Physical Review B 1996 articles are likely accessible via APS
      public-access policy. No source artifact, row table, licence
      verification, or deterministic extraction has been committed. Remains
      excluded until a future row-curation task verifies APS open-access
      status and article table content. **TASK-0364 (2026-05-25) verified
      the paper PDF via maintainer-provided sandbox copy: zero printed
      tables and zero inline (size → energy) body-text pairs; verified class
      = figure_derived; not admissible for table_derived row curation under
      TASK-0364 strict policy. See
      docs/reviews/quantum-pmc-arxiv-direct-table-source-attempt.md and the
      attempted_verifications block at the bottom of this manifest.**
    license_note: "APS publication (Physical Review B); DOI-pinned metadata only. APS public-access policy may allow free reading of articles older than one year, but redistribution of tables or figures requires compliance with APS copyright terms. Curator must verify per-article reuse terms before committing extracted table content."
    checksum_policy: doi_pinned
    notes: >
      Metadata-only candidate seed from TASK-0347 (rank 1 of 6). Bawendi
      group; widely cited CdSe size-series characterisation using PLE
      spectroscopy and SAXS sizing. Article body table of first-exciton
      transition energies versus nanocrystal size makes this a high-priority
      source-artifact attempt for TASK-0291 and TASK-0292. Dataset rows must
      not reference this source_id until a separate reviewed task commits a
      checksum-pinned source artifact confirming table accessibility and
      direct-measurement provenance.

  - source_id: kang-wise-1997-prb-pbs-band-edge
    title: "Electronic structure and optical properties of PbS and PbSe quantum dots"
    authors: "Kang, I.; Wise, F. W."
    year: 1997
    doi: "10.1103/PhysRevB.56.9377"
    journal: "Physical Review B"
    volume: "56"
    pages: "9377-9382"
    table_reference: "metadata-only TASK-0347 open-direct-table triage candidate (rank 2); empirical band-edge comparison data for PbS nanocrystal size series; verify APS open-access and table contents before row curation"
    properties:
      - bandgap_eV
      - absorption_peak_eV
    materials:
      - PbS
    measurement_type: optical_absorption
    size_axis: diameter_nm
    inclusion_decision: excluded
    inclusion_rationale: >
      TASK-0347 ranks this as the second candidate (rank 2) for a PbS
      direct-measurement seed on the bandgap_eV and absorption_peak_eV axes.
      APS Physical Review B 1997 articles are likely accessible via APS
      public-access policy. The paper combines theory and empirical data;
      only the empirical comparison points are eligible for direct-measurement
      dataset rows. Remains excluded until a future row-curation task verifies
      APS access and confirms which data points are empirical versus
      model-derived. **TASK-0364 (2026-05-25) did not verify this paper in
      that round (PDF not provided by maintainer); the four other top
      candidates that were verified all turned out to be figure-only, so
      the publication-pattern prior used by the TASK-0347 triage is in
      doubt for this entry too. See attempted_verifications block below.**
    license_note: "APS publication (Physical Review B); DOI-pinned metadata only. APS public-access policy may allow free reading; redistribution of tables or figures requires APS copyright compliance. Curator must distinguish empirical rows from theory-derived rows before committing."
    checksum_policy: doi_pinned
    notes: >
      Metadata-only candidate seed from TASK-0347 (rank 2 of 6). Wise group;
      covers PbS in the 2-8 nm diameter range. Theory-derived values must be
      committed with mass_class: model_inferred and excluded from the
      direct-measurement benchmark axis. Dataset rows must not reference this
      source_id until a separate reviewed task commits a checksum-pinned
      source artifact and confirms empirical vs. model provenance for each
      data point.

