  - verification_round_id: TASK-0399-2026-05-27
    task_id: TASK-0399
    review_doc: docs/reviews/quantum-post-2015-machine-readable-supplement-triage.md
    method: |
      Probed five independent index surfaces for post-2015 quantum-dot
      publications carrying a machine-readable supplement (CSV / XLSX /
      TSV / plain-text) with direct size + first-exciton-energy or
      size + bandgap measurement points acceptable for `table_derived`
      row curation: (1) arXiv search API + ancillary-files endpoint;
      (2) NCBI PMC E-utilities (esearch.fcgi + esummary.fcgi);
      (3) Europe PMC `/search` + `/supplementaryFiles` API; (4) Zenodo
      dataset API; (5) Figshare dataset API. No publisher PDF, no
      supplement file, no instrument-data zip was committed to the
      repository in this round; all downloads stayed in `/tmp/`.
    surfaces_probed:
      - surface: arxiv_search_api
        queries: 4
        ancillary_endpoint_probes_returning_anc_files: 0
        outcome: no_ancillary_data_supplements_for_experimental_candidates
      - surface: ncbi_pmc_eutilities
        queries: 4
        oa_package_https_mirror_status: returned_404_for_every_probed_id
        outcome: index_layer_returned_candidate_ids_but_oa_package_layer_unreachable_via_https_mirror
      - surface: europepmc_search_supplementaryfiles
        candidates_probed: 12
        supplement_file_types_returned: ["pdf", "wmv"]
        machine_readable_data_supplements_returned: 0
        outcome: pdf_only_convention_across_all_probed_venues
        probed_venues:
          - "Nat Commun"
          - "Sci Adv"
