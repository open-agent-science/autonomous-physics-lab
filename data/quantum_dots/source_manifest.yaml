    license_note: "RSC publication; DOI-pinned metadata only. Do not redistribute article, SI, tables, or figures unless the future source-artifact task verifies compatible public reuse terms."
    checksum_policy: doi_pinned
    notes: >
      Metadata-only candidate seed from TASK-0347. Dataset rows must not
