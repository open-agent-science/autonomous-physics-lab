temporal_split_spec:
  split_name: frb_catalog2_version_locked_repeater_reveal_split_v0
  date_locking_alone_suffices: false
  version_locking_required: true
  reason: Catalog 2 reprocesses earlier bursts and source associations; a pre-T feature
    view read from one late table leaks future exposure, morphology, and repeater
    decisions.
  pre_t_feature_version: A catalog version or reconstruction that contains only information
    available at T; for a retrospective pilot, Catalog 1-native fields or a T-reconstructed
    Catalog 2 view are allowed, but late Catalog 2 morphology/source-association fields
    are not.
  label_version: A strictly later catalog version or external reveal record. A source
    is positive only when repeat evidence is published after T and is not encoded
    in the pre-T feature view.
  first_detection_time: minimum finite mjd_inf, falling back to mjd_400, over bursts
    assigned to a source
  forbidden_pre_t_features:
  - late-catalog repeater_name labels
  - post-T source association updates
  - post-T morphology reprocessing products
  - full-window exposure summaries when the pre-T view needs T-truncated exposure
exposure_only_baseline:
  baseline_name: log1p_total_exposure_only_v0
  score: log1p(max(exp_up + exp_low) over population-eligible bursts for the source)
  eligibility_filter: excluded_flag == '0'; sources require finite exp_up and exp_low
  label: source has non-empty repeater_name in Catalog 2 population-eligible rows
  morphology_features_used: []
  future_gate: Any future morphology model must beat this exposure-only baseline out-of-sample
    on the version-locked split before morphology evidence is interpreted.
