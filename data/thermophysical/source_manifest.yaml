# Thermophysical-property (boiling-point) source manifest -- metadata-only.
#
# Created by TASK-0841 under the maintainer-approved ThermoML local-fetch
# posture. This manifest records ONLY a source locator, the official pinned
# product/version, an official published SHA-256, the reuse posture, and a
# family-stratified selection protocol. It records NO measurement values, NO
# normalized corpus, and NO archive bytes. The raw ThermoML archive is NOT
# vendored: facts are extractable with attribution, but the file bytes are
# present under publisher permission to NIST and are not re-hosted here.
#
# See docs/reviews/thermoml-bounded-tb-transfer-benchmark.md for the bounded
# benchmark and TASK-0833 (docs/reviews/thermoml-joback-source-readiness-scout.md)
# for the source-readiness scout that pinned this route.

