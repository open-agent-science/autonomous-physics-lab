# Local fetch + verify command pattern (DO NOT run inside an agent task PR; this
# is a maintainer-run, one-time, license-cleared download). The official
# published SHA-256 above is the expected value to verify against.
fetch_verify_command_pattern: |
  # maintainer-run, one time, at license-cleared first fetch
  import hashlib, pathlib, urllib.request
  url = "https://data.nist.gov/od/ds/mds2-2422/ThermoML.v2020-09-30.tgz"
  dest = pathlib.Path("ThermoML.v2020-09-30.tgz")
  urllib.request.urlretrieve(url, dest)             # ~181 MB
  digest = hashlib.sha256(dest.read_bytes()).hexdigest()
  expected = "231161b5e443dc1ae0e5da8429d86a88474cb722016e5b790817bb31c58d7ec2"
  assert digest == expected, f"checksum mismatch: {digest} != {expected}"
  print("verified:", digest)   # then record as apl_computed_sha256

# Family-stratified selection protocol for the (deferred) Tb row-curation +
# transfer benchmark. Frozen here so a later benchmark cannot retrofit it.
selection_protocol:
  property: normal_boiling_point_Tb
  identity_rules:
    - "Resolve each ThermoML substance to a canonical structure (registry id / name -> InChI primary key, isomeric SMILES secondary); InChIKey is the dedup key."
    - "Exclude salts, ionic liquids, and any multi-component/charged species (no neutral single-molecule Tb in the Joback sense)."
    - "Exclude mixtures and binary/multinary systems (a system Tb is not a pure-component Tb)."
    - "Collapse stereoisomers/tautomers that map to the same connectivity to one identity; keep conflicting Tb values as a flagged disagreement, not averaged."
    - "Deduplicate repeated measurements of one compound across articles; fix the selection rule before scoring."
    - "Admit a compound only if it has at least one experimental Tb with reviewable unit and uncertainty semantics."
  joback_group_rules:
    - "Group set = canonical Joback & Reid (1987) 41-group table; scoring intercept pinned to 198.2 K."
    - "Distinguish ring vs non-ring group variants exactly as Joback defines them."
    - "Assignment must be deterministic and total; an unassignable atom -> molecule is out-of-coverage and excluded (never force-fit)."
    - "Exclude organometallics/metals, boron/silicon/phosphorus-centred groups, charged centres, and isotopically labelled species (out of Joback coverage)."
  family_taxonomy_priority:
    # highest-priority functional group present wins; families partition the set
    - acids
    - esters/lactones
    - aldehydes
    - ketones
    - alcohols/phenols
    - ethers
    - nitriles
    - amines
    - nitro
    - thiols/sulfides
    - halocarbons
    - aromatic hydrocarbons
    - alkenes/alkynes
    - alkanes/cycloalkanes
  split: leave_one_family_out
  controls:
    - global_median
    - molecular_weight_only
    - nearest_homolog
    - shuffled_group_counts
    - within_family_constant
  reporting:
    aggregation: compound_level
    uncertainty_aware_error: true
    covered_groups_only_subset_separated: true
    out_of_coverage_excluded: true

global_limitations:
  - "Metadata-only: this manifest records no measurement values and no corpus; the archive bytes are not vendored."
  - "Tb only; Tc excluded (Joback Tc depends on Tb -> leakage)."
  - "Counts (unique pure compounds with Tb, uncertainty coverage, identity-mapping success, family balance, Joback group coverage) are not enumerable without a license-cleared download + parse, which TASK-0841 did not perform."
  - "Do not live-fetch from this manifest inside an agent task PR; the fetch is a maintainer-run, checksum-pinned, one-time snapshot step."
