status: metadata_only_acquisition_package
created_by:
  contributor_id: roman
  agent_id: codex
live_external_fetch_allowed: false
live_fetch_performed: false
no_values_recorded_here: true

baseline_convention:
  formula: "L / L_sun = (M / M_sun)^alpha"
  frozen_alpha_for_first_audit: 3.5
  primary_audit_mass_range_solar:
    min: 0.5
    max: 2.0
  boundary_status: planning_frozen_before_source_acquisition
  notes:
    - "No exponent fitting or residual inspection is authorized by this manifest."
    - "Rows outside the first audit range are excluded or diagnostic, not formula failures."

candidate_sources:
  - source_id: gaia-dr3-archive
    title: "Gaia Data Release 3 archive"
    provider: "ESA Gaia Archive"
    candidate_role: astrometry_photometry_and_derived_luminosity_context
    locator_shape: "Pinned ADQL query against reviewed Gaia DR3 archive tables such as gaiadr3.gaia_source and DR3 astrophysical-parameter tables."
    acquisition_lane: T4_snapshot_approval
    blocker_type: T4_snapshot_approval
    license_status: to_be_verified_before_fetch
    redistribution_decision: metadata_only_until_snapshot_approved
    checksum_policy: sha256_raw_and_normalized_artifacts
    value_bearing_artifact_committed: false
    selected_field_groups:
      identity:
        - source_id
        - source_table
        - source_version
        - source_row_id
        - source_locator
      astrometry_photometry:
        - parallax_mas
        - parallax_uncertainty_mas
        - photometric_band
        - magnitude_or_flux
        - extinction_correction_notes
      stellar_context:
        - effective_temperature_k
        - radius_solar
        - luminosity_solar
        - evolutionary_class_source
        - multiplicity_flag
    row_class_policy:
      direct_observation: "Allowed only for directly observed/source-reported quantities with provenance and uncertainty semantics."
      derived_luminosity: "Allowed as a separate row class when luminosity is computed from pinned inputs and conversion notes."
      model_derived_mass: "Diagnostic or excluded unless a later task explicitly accepts model-derived mass rows."
      excluded: "Required for rows outside mass range, non-main-sequence rows, unresolved multiples, or missing provenance."
    notes:
      - "Gaia-derived mass/luminosity fields, if used, must not be silently treated as direct measurements."

  - source_id: literature-benchmark-stars
    title: "Reviewed literature benchmark-star or eclipsing-binary source set"
    provider: "DOI/VizieR/source-catalog records to be selected in a later acquisition task"
    candidate_role: dynamical_mass_and_luminosity_anchor_candidates
    locator_shape: "Exact DOI, VizieR catalog id, or source artifact path once a maintainer-approved source is selected."
    acquisition_lane: T1_access
    blocker_type: T1_access
    license_status: unknown_until_source_review
    redistribution_decision: metadata_only_until_license_review
    checksum_policy: sha256_if_artifact_is_committable
    value_bearing_artifact_committed: false
    selected_field_groups:
      identity:
        - star_name
        - source_row_id
        - source_locator
      stellar_values:
        - mass_solar
        - mass_uncertainty
        - luminosity_solar
        - luminosity_uncertainty
        - spectral_type
        - main_sequence_flag
      provenance:
        - mass_provenance_class
        - luminosity_provenance_class
        - uncertainty_semantics
        - citation
        - license_note
    row_class_policy:
      direct_observation: "Allowed for dynamical masses or directly reported luminosities when source provenance is clear."
      derived_luminosity: "Allowed only with conversion notes and uncertainty semantics."
      model_derived_mass: "Excluded from the primary empirical slice unless separately approved."
      excluded: "Required when license, multiplicity, class, uncertainty, or range gates fail."

  - source_id: debcat-detached-eclipsing-binaries
    title: "DEBCat catalogue of the physical properties of well-studied eclipsing binaries"
    provider: "John Southworth / Keele University"
    candidate_role: first_choice_independent_dynamical_mass_source
    locator_shape: "Catalogue page https://astro.keele.ac.uk/jkt/debcat/ with machine-readable ASCII table https://astro.keele.ac.uk/jkt/debcat/debs.dat."
    acquisition_lane: source_artifact_metadata_pinned
    blocker_type: row_schema_and_extraction_ledger_review
    license_status: public_catalogue_citation_requested_no_explicit_redistribution_license_found
    redistribution_decision: route2_normalized_rows_with_ledger_allowed_raw_not_committed
    checksum_policy: "sha256_remote_ascii_table_debs_dat=326902535b4da2fd94f227806ff339247d6df224ef8faea8857703e553b464da"
    value_bearing_artifact_committed: false
    source_artifact_package: data/textbook_formula_audit/stellar_ml/source_artifacts/debcat/
    retrieval:
      retrieval_date_utc: 2026-06-06
      artifact_last_modified_utc: "Sat, 16 May 2026 11:14:34 GMT"
      artifact_etag: "\"17441-651ed6f2a15a0\""
      artifact_content_length_bytes: 95297
      catalogue_log_system_count: 374
    selected_field_groups:
      identity:
        - binary_system_identifier
        - component_role
        - source_reference_notes
        - source_artifact_checksum
      stellar_values:
        - mass_solar
        - mass_uncertainty
        - radius_solar
        - radius_uncertainty
        - effective_temperature_k
        - log_luminosity_solar
        - metallicity
      provenance:
        - direct_dynamical_mass_source
        - uncertainty_semantics
        - catalogue_update_version
        - citation
        - license_note
    row_class_policy:
      direct_observation: "Allowed for component dynamical masses and for catalogue-reported log-luminosity when populated with traceable literature provenance (TASK-0688 primary path)."
      derived_luminosity: "Allowed when catalogue log-luminosity is absent: reconstruct from DEBCat radius and effective temperature via log10(L/L_sun) = 2 log10(R/R_sun) + 4 log10(Teff/5772 K); mass must not enter derivation (TASK-0688 fallback path)."
      model_derived_mass: "Forbidden as benchmark truth; Gaia or isochrone masses remain excluded."
      excluded: "Required when system identity, component pairing, uncertainty, license, multiplicity, row-schema, or luminosity-provenance gates fail."
    luminosity_provenance_policy:
      status: defined_by_task_0688
      review: docs/reviews/stellar-ml-luminosity-provenance-and-license-route.md
      primary_path:
        row_class: direct_observation
        field: log_luminosity_solar
        conversion: "L/L_sun = 10^(log10(L/L_sun))"
        requires: traceable source_reference_notes per component
      fallback_path:
        row_class: derived_luminosity
        inputs: [radius_solar, effective_temperature_k]
        conversion: "log10(L/L_sun) = 2 log10(R/R_sun) + 4 log10(Teff/5772 K)"
        teff_solar_k: 5772
      uncertainty:
        primary: preserve catalogue/literature uncertainty when present; unknown uncertainty -> diagnostic or excluded lane
        fallback: independent log-space propagation from radius and temperature uncertainties
      licence_route_recommended: metadata_only_checksum_with_extraction_ledger_no_raw_debs_dat
      licence_route_decision: route2_confirmed_by_task_0707
      storage_route_decision:
        route: metadata_only_checksum_with_extraction_ledger_no_raw_debs_dat
        decision_review: docs/reviews/stellar-ml-debcat-storage-route-decision.md
        raw_artifact_commit_allowed: false
        normalized_row_commit_allowed: true
        row_curation_requires:
          - extraction_ledger
          - source_checksum_binding
          - source_column_mapping
          - physical_binary_system_no_leakage_manifest
          - luminosity_provenance_class_per_row
          - citation_and_license_note_per_package
    no_leakage_policy:
      split_axis: physical_binary_system
      requirement: "Keep all components of the same binary system in the same train/test/holdout lane."
    notes:
      - "TASK-0628 pins locator, retrieval metadata, checksum, citation posture, and blockers only."
      - "No DEBCat value-bearing rows or raw table files are committed by TASK-0628."

planned_normalized_surface:
  path_shape: "data/textbook_formula_audit/stellar_ml/<snapshot-id>.yaml"
  schema_status: deferred_to_row_curation_task
  row_roles:
    - direct_observation
    - derived_luminosity
    - model_derived_mass
    - holdout
    - excluded
  holdout_policy:
    status: predeclared_required_before_metrics
    no_peek_requirement: true
    forbidden_after_holdout_inspection:
      - exponent_fitting
      - mass_range_tuning
      - exclusion_rule_tuning
      - residual_metric_selection

global_limitations:
  - "This manifest records a source-acquisition package only; it contains no stellar rows or values."
  - "Future source acquisition must fill source version, retrieval timestamp, row count, checksums, license, attribution, and no-peek attestation."
  - "No empirical validation, falsification, universal-law claim, prediction, result, or knowledge artifact is produced here."
