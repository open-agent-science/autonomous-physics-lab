  no_alpha_fit_performed: true
  no_residual_inspection_performed: true
split_policy:
  primary_key: physical_binary_system_id
  method: deterministic_sha256_of_system_id_mod_10
  rule: bucket = int(sha256(system_id).hexdigest(), 16) % 10; 0-4 -> train, 5-6 -> validation, 7-9 ->
    holdout
  proportions_target:
    train: 0.5
    validation: 0.2
    holdout: 0.3
  value_blind: true
  no_leakage_rule: All components of one physical binary share one lane; ambiguous or fully-inadmissible
    systems go to excluded.
