scope:
  purpose: |
    First curated direct-frequency-ratio seed rows for the Atomic-Clock
    Residuals campaign. Source: Beloy et al. 2021 / BACON. Per the TASK-0363
    extraction-shape lock, this first batch is limited to per-ratio totals
    only — no per-systematic-component table expansion.
  sandbox_only: true
  live_external_fetch_allowed: false
  benchmark_allowed: false
  drift_fitting_allowed: false
  derived_constants_constraint_allowed: false
  claim_promotion_allowed: false
  prediction_registry_allowed: false

source_artifact:
  artifact_id: ACLOCK-SRC-ARTIFACT-2021-BELOY-BACON
  preprint_locator: https://arxiv.org/pdf/2005.14694
  preprint_committed: false
  local_fetch_target: data/atomic_clocks/source_artifacts/2021-beloy-bacon/arxiv-2005.14694.pdf
  checksum_sidecar: data/atomic_clocks/source_artifacts/2021-beloy-bacon/arxiv-2005.14694.sha256
  expected_checksum_sha256: bec1548829e7d4697ffd78dec453c00990c2937b71cc624c420a58e31ca60467
  fetch_helper: scripts/fetch_source_artifact.py
  provenance: data/atomic_clocks/source_artifacts/2021-beloy-bacon/provenance.yaml
  version_check_with_publication_of_record:
    performed: true
    result: NO_DRIFT
    method_summary: |
      Maintainer locally cross-checked the three primary ratio values and
      final-uncertainty figure caption against the Nature paper PDF
      (doi:10.1038/s41586-021-03253-4). The Nature PDF was held locally on
      the maintainer machine and is NOT committed. All compared values matched
      bit-for-bit. Full details in
      data/atomic_clocks/source_artifacts/2021-beloy-bacon/provenance.yaml.

covariance_policy:
  branch: B
  branch_label: per_ratio_totals_with_explicit_fold_in
  branch_rationale: |
    Per the TASK-0363 covariance-handling contract:
      * Branch A (full 3x3 covariance matrix between ratios published) does NOT
        apply: neither the arXiv preprint nor the Nature version-of-record
        publishes a 3x3 ratio covariance matrix.
      * Branch B applies: per-ratio totals are published in Table 1 of the
        paper, and the explicit text "We make the conservative assumption that
        these systematic effects are fully correlated across all days of
        measurement" (arXiv:2005.14694 Sec. 4.5 "Comprehensive Bayesian model",
        pages 25-27) establishes that systematic contributions are folded into
        each ratio's final 1-sigma uncertainty via the Bayesian model.
      * Branch C (halt) does NOT apply.
    The per-row `total` field below is the Bayesian-model standard deviation
    reported in Table 1's final row, which is the publication-of-record total
    uncertainty for each ratio.
  paragraph_cite: "arXiv:2005.14694 Sec. 4.5 'Comprehensive Bayesian model'; Nature Methods 'Bayesian model' subsection (cross-checked locally)."
  covariance_reference: diagonal_per_paper_explicit_fold_in_bayesian_sec_4_5
  cross_row_shared_clock_systematics_note: |
    Table 1 of the paper publishes per-clock systematic contributions to each
    ratio. These reveal that the same physical clock contributes systematic
    uncertainty to two different ratio rows in this dataset:
      - Yb clock: 1.4e-18 to Al+/Yb AND 1.4e-18 to Yb/Sr
      - Sr clock: 4.8e-18 to Al+/Sr AND 5.0e-18 to Yb/Sr
      - Al+ clock: 1.7e-18 to Al+/Yb AND 1.5e-18 to Al+/Sr
    These cross-row shared-clock systematics are visible from Table 1 but are
    NOT decomposed into a 3x3 cross-ratio covariance matrix in the source.
    Downstream benchmarks that combine two or more rows from this dataset MUST
    either (a) reconstruct an approximate cross-ratio covariance from Table 1's
    per-clock columns, or (b) explicitly document that cross-ratio
    correlations are ignored. The first-batch row commits make this visible
    via `uncertainty.systematic_components_e_minus_18` per row.

campaign_window:
  description: |
    Measurement campaign spanned November 2017 through June 2018 and
    consisted of 17 measurement days total (arXiv:2005.14694, "The optical
    network" section).
  start_yyyymm: 2017-11
  end_yyyymm: 2018-06
  measurement_day_count_total: 17

