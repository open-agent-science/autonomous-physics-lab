  - clock_id: BACON-CLOCK-YB171
    species: Yb
    isotope: "171"
    charge_state: neutral
    transition_label: 1S0_to_3P0
    used_in_rows: [ACR-0001-ROW-001, ACR-0001-ROW-003]
  - clock_id: BACON-CLOCK-SR87
