  notes: |
    TASK-0403, the accepted proposal, and the prior source_manifest entry named
    Nemitz 2016 but cited arXiv:1403.5836. That arXiv record is Akamatsu et al.
    2014, "Frequency ratio measurement of 171Yb and 87Sr optical lattice
    clocks", Optics Express, not Nemitz et al. 2016 / Nature Photonics. The
    correct Nemitz 2016 arXiv source is arXiv:1601.04582, whose arXiv page links
    DOI 10.1038/nphoton.2016.20 and lists the same title/authors as the Nature
    Photonics paper.

