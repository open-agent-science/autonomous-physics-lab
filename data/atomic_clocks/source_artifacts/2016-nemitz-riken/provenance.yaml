source_locator_correction:
  performed: true
  result: TRIAGE_LOCATOR_CORRECTED
  notes: |
    TASK-0403, the accepted proposal, and the prior source_manifest entry named
    Nemitz 2016 but cited arXiv:1403.5836. That arXiv record is Akamatsu et al.
    2014, "Frequency ratio measurement of 171Yb and 87Sr optical lattice
    clocks", Optics Express, not Nemitz et al. 2016 / Nature Photonics. The
    correct Nemitz 2016 arXiv source is arXiv:1601.04582, whose arXiv page links
    DOI 10.1038/nphoton.2016.20 and lists the same title/authors as the Nature
    Photonics paper.

version_check_with_publication_of_record:
  performed: true
  performed_on: 2026-05-30
  performer: "roman via Codex source-gate review"
  result: PARTIAL_NO_DRIFT_PUBLIC_ABSTRACT_ONLY_ROW_GATE_BLOCKED
  method: |
    Compared the arXiv:1601.04582 public abstract/title/authors/DOI metadata and
    locally inspected arXiv PDF text against the public Nature Photonics article page.
    The Nature public page reports the same title, authors, DOI, publication
    venue, and abstract-level value-bearing ratio statement:
    R = 1.207507039343337749(55), fractional uncertainty 4.6e-17, and
    instability 4e-16 (tau/s)^-1/2. The arXiv PDF text reports the same ratio
    and uncertainty in the abstract and body.
  blocker: |
    The public Nature page does not expose the full Table 1 uncertainty budget.
    Because TASK-0452 requires an arXiv-vs-Nature version-drift verdict before
    value-bearing rows are committed, the source artifact can be pinned but
    ACR-0002 rows remain blocked until a maintainer with version-of-record
    access performs the same table-level comparison used for the Beloy 2021
    artifact.
  nature_public_change_history_note: |
    The Nature page records a 2016-03-15 correction: in the originally published
    online Letter, a Table 2 column heading "171Yb" was mistakenly included and
    later corrected. This public correction does not mention the Yb/Sr ratio
    value or Table 1 uncertainty budget, but it reinforces that row curation
    needs a table-level version check before values are pinned.
  not_recheckable_from_committed_artifacts_alone: true
  required_follow_up: |
    Maintainer-side Nature Photonics PDF/table comparison against a locally
    fetched checksum-verified arXiv PDF for all value-bearing and row-defining fields before any
    data/atomic_clocks/acr-0002-nemitz-2016-direct-ratio.yaml rows are added.

