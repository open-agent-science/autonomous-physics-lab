  nature_public_change_history_note: |
    The Nature page records a 2016-03-15 correction: in the originally published
    online Letter, a Table 2 column heading "171Yb" was mistakenly included and
    later corrected. This public correction does not mention the Yb/Sr ratio
    value or Table 1 uncertainty budget, but it reinforces that row curation
    needs a table-level version check before values are pinned.
  not_recheckable_from_committed_artifacts_alone: true
  required_follow_up: |
