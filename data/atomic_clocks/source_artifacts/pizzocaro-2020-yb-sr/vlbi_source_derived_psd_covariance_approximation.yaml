omitted_components:
- component: cross_processing_path_vlbi_ippp_ppp_correlation
  rationale: VLBI and IPPP/PPP paths share y1 and y4 links; this file is VLBI-only and does not authorize
    mixed-path metrics.
- component: network_or_geopotential_terms_not_exposed_as_signed_cross_window_covariance
  rationale: No additional signed covariance decomposition is committed for these effects.
- component: deadtime_and_drift_cross_window_correlation
  rationale: udead and udrift terms are treated as campaign-window-specific diagonal contributions.
- component: statistical_cross_window_correlation
  rationale: Per-link statistical components are treated as independent across windows.
promotion_boundary:
  writes_acr_benchmark_rows: false
  writes_cross_window_aggregate_metric: false
  writes_benchmark_metrics: false
  writes_prediction_registry: false
  writes_canonical_result: false
  claim_promotion_allowed: false
  knowledge_promotion_allowed: false
  required_next_step: Maintainer-reviewed benchmark-readiness task may consume this only as approximate-covariance
    sensitivity input.
limitations:
- This is not a paper-published exact covariance matrix.
- Clock-term cross-window correlation is an explicit approximation; sensitivity bounds keep rho_clock=0
  and rho_clock=1 visible.
- The artifact does not aggregate windows into benchmark rows and does not authorize drift fits or cross-source
  metrics.
- All values are derived from committed Pizzocaro source artifacts; no live fetch is performed.
