        dataset_path: null
        covariance_artifact_path: data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/vlbi_source_derived_psd_covariance_approximation.yaml
        readiness_state: DIAGNOSTIC_SURFACE_READY_ACR_ROWS_BLOCKED
        readiness_evidence:
