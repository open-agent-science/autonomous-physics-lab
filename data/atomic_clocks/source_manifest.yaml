  - "The Nemitz 2016 entry has the ACR-0002 cross-source Yb/Sr row committed as a sandbox second-source seed (TASK-0704, NO_DRIFT version-of-record cross-check); cross-source benchmark and consistency comparison remain blocked until the first exploratory diagonal-only diagnostic task (TASK-0456)."
  - "The Pizzocaro/VLBI entry has pinned source files, ten mapped diagnostic windows, and approximate PSD covariance. TASK-0742 authorizes only diagnostic residual-axis use and keeps ACR rows blocked because no absolute-ratio row or approved aggregation contract exists."
  - "Sandbox-only. Do not ingest values, benchmark, fit drifts, derive constants constraints, or promote claims from this manifest."
