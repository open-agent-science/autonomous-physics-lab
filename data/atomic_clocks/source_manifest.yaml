          - docs/reviews/atomic-lange-ptb-source-artifact-preflight.md
          - docs/reviews/atomic-lange-ptb-artifact-retrieval-route.md
        triage_role: |
          Different source family from the Yb/Sr direct-ratio members: this is a
          PTB Yb+ E3/Cs absolute-frequency plus intra-ion E3/E2 optical-ratio
          source (Lange et al. 2021). It carries no Yb/Sr row, so it does not
          unblock the TASK-0456 first Yb/Sr cross-source benchmark. It is retained
          as the named alternate high-precision fresh-data path to reduce
          single-source dependence if Pizzocaro stays covariance-blocked.
          TASK-0652 pins the locator, citation, reuse posture, and checksum/archive
          feasibility at metadata level only; artifact retrieval and extraction are
          deferred to a follow-up task. TASK-0669 keeps the retrieval route
          metadata-only until explicit maintainer license approval, because the
          default arXiv nonexclusive-distrib license is not treated as an
          automatic third-party redistribution grant for this repository.
        ingestion_blockers:
