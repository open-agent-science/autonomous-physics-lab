          - docs/reviews/atomic-pizzocaro-source-artifact-review.md
          - docs/reviews/atomic-pizzocaro-yb-sr-row-admissibility-gate.md
          - docs/reviews/atomic-pizzocaro-source-to-row-extraction-ledger.md
          - docs/reviews/atomic-pizzocaro-source-derived-psd-covariance.md
          - docs/reviews/atomic-pizzocaro-row-admissibility-after-psd-covariance.md
          - docs/reviews/atomic-pizzocaro-observable-harmonization-contract.md
          - docs/reviews/atomic-pizzocaro-yb-sr-extraction-ledger-gate.md
        triage_role: |
          Diagnostic Yb/Sr fallback after the committed Beloy and Nemitz rows.
          The open Zenodo files, ten-window VLBI ledger, approximate PSD
          covariance, and residual-axis harmonization contract support a
          sensitivity-only diagnostic. TASK-0742 confirms that they do not
          supply an admissible third absolute-ratio ACR row: aggregation is
          forbidden, Figure 2b summaries lack row-construction semantics, and
          the diagnostic residual contract does not create an absolute ratio.
        source_artifact_files:
          - data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/galav-delay-resolution-function.csv
          - data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/Yb-Sr-ratio-measurements-IPPP.csv
          - data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/Yb-Sr-ratio-measuremets.csv
