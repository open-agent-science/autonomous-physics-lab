        triage_role: |
          Strongest direct independent cross-check for the Beloy 2021
          Yb/Sr row (ACR-0001-ROW-003) because the species pair matches
          and the lab is fully independent of the NIST + JILA + NIST
          BACON 2018 campaign. Resolves the candidate-selection step of
          TASK-0401 Blocker 4; ingestion is deferred to a follow-up task.
        source_locator_correction: |
          Prior triage text cited arXiv:1403.5836 while naming Nemitz 2016.
          That arXiv record is Akamatsu et al. 2014, not Nemitz et al. 2016.
          TASK-0452 pins the corrected Nemitz 2016 arXiv source:
          arXiv:1601.04582.
