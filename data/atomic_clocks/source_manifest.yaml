        checksum_scope: expected_arxiv_preprint_pdf_sha256_not_committed
        provenance_path: data/atomic_clocks/source_artifacts/2016-nemitz-riken/provenance.yaml
        license_note: metadata_only_arxiv_nonexclusive_pdf_not_redistributed
        preprint_committed: false
