        source_locator: https://arxiv.org/abs/2010.06620
        archive_url: https://arxiv.org/pdf/2010.06620
        retrieval_date: null
        checksum_sha256: null
        checksum_scope: pending_before_artifact_commit
        provenance_path: null
        license_note: >-
          PRL (APS) publication of record is not redistributable. arXiv:2010.06620
          is under the arXiv nonexclusive-distrib/1.0 licence, which grants arXiv
          (not third parties) a distribution right, so committing the preprint PDF
          is a license-review decision, not an automatic yes. Metadata and locators
          are committable as facts.
        publication_of_record:
          doi: 10.1103/PhysRevLett.126.011102
          journal: Physical Review Letters
          volume: 126
          page: 011102
          year: 2021
          redistributable_here: false
        value_status: metadata_only_no_values
        dataset_path: null
        covariance_artifact_path: null
        readiness_state: SOURCE_CANDIDATE_METADATA_PINNED_ARTIFACT_RETRIEVAL_DEFERRED
