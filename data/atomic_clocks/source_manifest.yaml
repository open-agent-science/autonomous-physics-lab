          - data/atomic_clocks/source_artifacts/pizzocaro-2020-yb-sr/vlbi_source_derived_psd_covariance_approximation.yaml
        ingestion_blockers:
          - no_admissible_absolute_yb_sr_ratio_row_surface
          - no_frozen_cross_window_aggregation_recipe
          - figure_2b_summary_lacks_campaign_and_component_semantics
          - residual_axis_contract_forbids_benchmark_row_admission
          - ippp_ppp_cross_path_covariance_not_modeled
          - holdout_or_reveal_freeze_manifest_unset

      - source_id: ACLOCK-SRC-CANDIDATE-2021-LANGE-PTB-YBPLUS
        status: candidate_metadata_only_locator_pinned
        ratio_set:
          - Yb+_E3/Cs
          - Yb+_E3/E2
        lab: PTB
        epoch_start: null
        epoch_end: null
        source_locator: https://arxiv.org/abs/2010.06620
        archive_url: https://arxiv.org/pdf/2010.06620
        retrieval_date: null
        checksum_sha256: null
        checksum_scope: pending_before_artifact_commit
        provenance_path: null
        license_note: >-
          PRL (APS) publication of record is not redistributable. arXiv:2010.06620
          is under the arXiv nonexclusive-distrib/1.0 licence, which grants arXiv
          (not third parties) a distribution right, so committing the preprint PDF
          is a license-review decision, not an automatic yes. Metadata and locators
          are committable as facts.
        publication_of_record:
          doi: 10.1103/PhysRevLett.126.011102
          journal: Physical Review Letters
          volume: 126
          page: 011102
          year: 2021
          redistributable_here: false
        value_status: metadata_only_no_values
        dataset_path: null
        covariance_artifact_path: null
        readiness_state: SOURCE_CANDIDATE_METADATA_PINNED_ARTIFACT_RETRIEVAL_DEFERRED
        readiness_evidence:
          - docs/reviews/atomic-second-yb-sr-fallback-source-scout.md
          - docs/reviews/atomic-lange-ptb-source-artifact-preflight.md
          - docs/reviews/atomic-lange-ptb-artifact-retrieval-route.md
        triage_role: |
          Different source family from the Yb/Sr direct-ratio members: this is a
          PTB Yb+ E3/Cs absolute-frequency plus intra-ion E3/E2 optical-ratio
          source (Lange et al. 2021). It carries no Yb/Sr row, so it does not
          unblock the TASK-0456 first Yb/Sr cross-source benchmark. It is retained
          as the named alternate high-precision fresh-data path to reduce
          single-source dependence if Pizzocaro stays covariance-blocked.
          TASK-0652 pins the locator, citation, reuse posture, and checksum/archive
          feasibility at metadata level only; artifact retrieval and extraction are
          deferred to a follow-up task. TASK-0669 keeps the retrieval route
          metadata-only until explicit maintainer license approval, because the
          default arXiv nonexclusive-distrib license is not treated as an
          automatic third-party redistribution grant for this repository.
        ingestion_blockers:
          - maintainer_license_approval_required_before_artifact_commit
          - arxiv_pdf_redistribution_license_review_required
          - direct_yb_sr_rows_not_present_different_source_family
          - value_bearing_table_extraction_from_pdf_not_started
          - checksum_not_pinned_artifact_retrieval_deferred
          - epoch_window_and_systematic_budget_not_locked
          - holdout_or_reveal_freeze_manifest_unset

manifest_global_stop_conditions:
  - SOURCE_ARTIFACT_VERSION_DRIFT
  - source_omits_uncertainty_semantics
  - source_mentions_covariance_or_shared_systematics_without_recoverable_notes
  - source_lacks_retrieval_date_or_archive_plan
  - source_license_or_reuse_terms_unclear

next_actions:
  - description: |
      TASK-0704 completed the table-level arXiv-vs-Nature version-drift
      comparison (NO_DRIFT) and locked the campaign window, then committed the
      ACR-0002-NEMITZ-2016-DIRECT-RATIO row as a sandbox second-source seed
      (cross_source_target). The remaining step is the first exploratory
      diagonal-only cross-source Yb/Sr diagnostic (TASK-0456); benchmark and
      consistency comparison stay blocked until that task runs.
    blocking_task: TASK-0456
    enables: first_exploratory_cross_source_yb_sr_diagnostic
  - description: |
      TASK-0742 completed the Pizzocaro extraction ledger after the VLBI
      per-window, PSD covariance, and observable-harmonization contracts.
      Diagnostic-only use is authorized under TASK-0706, but ACR row curation
      remains blocked until a new absolute-ratio source surface or an approved
      aggregation and uncertainty-propagation contract exists.
    blocking_task: new_absolute_ratio_or_aggregation_contract_required
    enables: pizzocaro_diagnostic_only_sensitivity_path
  - description: |
      Maintainer decision: keep one aggregate source_manifest.yaml (this
      shape) or split into per-source-family manifests as the campaign
      grows. This manifest currently follows the aggregate pattern with
      explicit member-level entries.
    blocking_task: maintainer_decision
    enables: campaign_structure_lock

