manifest_global_stop_conditions:
  - SOURCE_ARTIFACT_VERSION_DRIFT
  - source_omits_uncertainty_semantics
  - source_mentions_covariance_or_shared_systematics_without_recoverable_notes
  - source_lacks_retrieval_date_or_archive_plan
  - source_license_or_reuse_terms_unclear

