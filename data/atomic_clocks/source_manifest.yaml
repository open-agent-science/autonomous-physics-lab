scope:
  purpose: >
    Live atomic-clock direct-ratio source manifest. Lists the source
    families currently considered for the Atomic-Clock Residuals
    campaign, the status of each, and the gating evidence pointers.
    This manifest does not ingest any new clock value: pinned source
    artifacts and the rows derived from them live in their own
    dataset/provenance files.
  value_policy: no_new_measurement_values_recorded_in_this_manifest
  live_fetch_allowed: false
  benchmark_allowed: false
  claim_promotion_allowed: false
  prediction_registry_allowed: false

source_families:
