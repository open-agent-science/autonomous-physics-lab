id: HYP-PROPOSAL-0015
title: "Amplitude-squared only anharmonic collapse candidate"
campaign_profile_id: anharmonic-oscillator
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox negative-control candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0160

input_references:
  - "campaign_profiles/anharmonic-oscillator.yaml"
  - "experiments/EXP-0011-anharmonic-oscillator-period.yaml"
  - "results/EXP-0011/RUN-0001/result.yaml"

hypothesis:
  statement: "A candidate that depends only on A^2 and ignores lambda should overfit the anharmonic benchmark by collapsing one of the benchmark axes."
  variables:
    - "T0: harmonic period baseline"
    - "A: oscillation amplitude"
    - "c: train-fitted coefficient multiplying A^2"
  assumptions:
    - "The benchmark varies both amplitude and quartic coefficient across the same replay surface."
    - "A candidate that omits lambda is a deliberate negative-control execution."
  expected_scope: "Configured EXP-0011 slices only; expected to fail once lambda variation matters."
  expected_failure_modes:
    - "Large holdout and stress residuals because lambda dependence is omitted."
    - "Train-fit behavior that looks reasonable only because the weak slice is narrow."

novelty_check:
  checked_files:
    - "results/EXP-0011/RUN-0001/result.yaml"
    - "docs/results/anharmonic-oscillator-summary.md"
  possible_overlap: "No canonical amplitude-only family exists because it would collapse the quartic-coefficient axis."
  notes: "Selected deliberately as a negative-control sandbox execution."

falsification_plan:
  deterministic_check: "Fit T/T0 = 1 + c*A^2 on the train slice and compare holdout and stress residuals against RESULT-0014."
  baseline_or_reference: "Exact reference baseline from EXP-0011 plus the RESULT-0014 benchmark thresholds."
  pass_condition: "Sandbox pass only if the benchmark classifies the candidate as OVERFITTED or otherwise clearly weak outside the train slice."
  fail_condition: "Sandbox fail if the candidate looks broadly competitive despite collapsing the lambda axis."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not present a negative-control candidate as a benchmark improvement."
    - "Do not treat expected failure as a flaw in the canonical benchmark."
  mitigations:
    - "Label the execution as a deliberate negative control."
    - "Report holdout and stress residuals explicitly."

sandbox_evidence:
  commands:
    - "python3 -m physics_lab.cli preflight-research-proposal hypothesis_proposals/anharmonic/HYP-PROPOSAL-0015-amplitude-squared-collapse.yaml"
  code_references:
    - "physics_lab/engines/anharmonic_oscillator.py"
    - "tests/test_anharmonic_autonomous_pilot.py"
  metrics:
    - "train_mean_relative_error"
    - "holdout_mean_relative_error"
    - "stress_mean_relative_error"
    - "observed_verdict"
  output_paths:
    - "agent_runs/AGENT-RUN-0004/metrics.json"

limitations:
  - "Negative-control sandbox run only."
  - "The candidate intentionally omits lambda and is not a promotion candidate."

verdict: OVERFITTED
maintainer_decision_requested: "Retain as negative sandbox evidence that the benchmark rejects axis-collapse candidates."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "No promotion requested; keep as sandbox negative evidence."
