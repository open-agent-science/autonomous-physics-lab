id: HYP-PROPOSAL-0033
title: "Quartic isospin-asymmetry residual"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: claude
  task_id: TASK-0202

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "docs/nuclear-mass-robustness-gate.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
  - "agent_runs/AGENT-RUN-0006/"
  - "agent_runs/AGENT-RUN-0008/"

hypothesis:
  statement: "Extending the prior quadratic-asymmetry negative control to include a quartic term may either generalize its aggregate primary improvement or break it; this candidate is run primarily as a stability test on the shape of HYP-PROPOSAL-0022's improvement, not as a candidate for promotion."
  variables:
    - "r_base: frozen baseline residual in MeV"
    - "I = (N - Z) / A"
    - "a, b: train-fitted coefficients in MeV"
  assumptions:
    - "The frozen RESULT-0015 baseline remains unchanged."
    - "Both even powers I^2 and I^4 are included; odd powers are excluded by symmetry across N=Z."
    - "Any aggregate post-AME2020 win is judged against subset behavior, not as a discovered law."
  expected_scope: "The four active NMD-0002 holdout families and the 295-row post-AME2020 primary surface."
  expected_failure_modes:
    - "The quartic term may dominate on extreme neutron-rich rows and overshoot, regressing the aggregate primary MAE."
    - "If the candidate's primary improvement materially exceeds the HYP-0022 quadratic improvement, that is itself suspicious; large gains from one extra parameter on an 11-row training surface are characteristic of overfit, not generalization."

novelty_check:
  checked_files:
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
  possible_overlap: "Strict extension of HYP-PROPOSAL-0022 by one polynomial degree. Selected as a stability test."
  notes: "Designed to probe whether the prior negative-control behavior is shape-specific or generalizes."

falsification_plan:
  deterministic_check: "Fit r_corr = a * I^2 + b * I^4 on each NMD-0002 holdout complement and on the full NMD-0002 surface; evaluate on each holdout and on the 295-row post-AME2020 primary surface."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline; HYP-PROPOSAL-0022 metrics in AGENT-RUN-0008 as the negative-control reference."
  pass_condition: "Improve at least three of four structured holdouts with no holdout regression above 0.25 MeV AND improve the post-AME2020 primary MAE by at least the HYP-PROPOSAL-0022 magnitude without large subset regressions."
  fail_condition: "Two or more structured holdouts regress, or worst-regression is >= 1.0 MeV, or the post-AME2020 primary regresses."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not describe a polynomial fit as new asymmetry physics."
    - "Do not claim quartic structure if the candidate fails the gate."
  mitigations:
    - "Keep results sandbox-only."
    - "Report results against the HYP-PROPOSAL-0022 negative control by default."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_neutron_rich_batch.py"
    - "python3 -m pytest tests/test_nuclear_neutron_rich_batch.py"
  code_references:
    - "scripts/run_nuclear_neutron_rich_batch.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
  metrics:
    - "structured_holdout_delta_mae_mev"
    - "post_ame2020_primary_delta_mae_mev"
    - "feature_activation_counts"
    - "per_subset_delta_mae_mev"
  output_paths:
    - "agent_runs/AGENT-RUN-0010/metrics.json"

limitations:
  - "NMD-0002 has 11 nuclides; the structured-holdout coefficients are fitted on 8-9 rows."
  - "The post-AME2020 evaluation is retrospective time-split, not blind prediction."
  - "Two parameters on a small training surface raise overfit risk; this is a stability test, not a refined model proposal."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether the quartic-asymmetry result strengthens, weakens, or is neutral with respect to the existing HYP-PROPOSAL-0022 negative-control reading."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer review under docs/nuclear-mass-robustness-gate.md before any RESULT-* or claim update."
