id: HYP-PROPOSAL-0045
title: "Asymmetry-frontier adversarial stress scout batch"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox hypothesis batch only; no prediction registry, canonical result, or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: claude-code
  task_id: TASK-0289

input_references:
  - "docs/reviews/nuclear-neutron-rich-variant-scout-001.md"
  - "docs/reviews/nuclear-scout-lane-synthesis-after-pred-0062.md"
  - "docs/reviews/nuclear-midmass-isotope-gap-scout-001.md"
  - "docs/reviews/nuclear-prediction-registry-coverage-audit.md"
  - "data/nuclear_masses/nmd-0002-curated-measured-slice.yaml"
  - "data/nuclear_masses/post_ame2020_holdout.yaml"
  - "results/EXP-0012/RUN-0001/result.yaml"

hypothesis:
  statement: "Re-evaluating the small NR-SCOUT-003 and NR-SCOUT-004 asymmetry-frontier signals alongside the NR-SCOUT-005 overfit neighbor, a sign-inverted control, a clipped-above-0.25 variant, and a near-null sanity control will isolate whether any bounded asymmetry feature survives adversarial primary, frontier, and worst-subset thresholds."
  variables:
    - "A, Z, N: nuclide mass number, proton number, and neutron number"
    - "positive_asymmetry_fraction = max((N-Z)/A, 0)"
    - "frontier_excess_after_20_over_a = max(N-Z-20, 0) / A"
    - "clipped_asymmetry_above_0_25 = max((N-Z)/A - 0.25, 0)"
    - "quadratic_neutron_excess = max(N-Z, 0)^2 / A and cubic_neutron_excess = max(N-Z, 0)^3 / A^2 (NR-SCOUT-005 overfit-neighbor pair)"
    - "fitted residual coefficient relative to RESULT-0015"
  assumptions:
    - "The task is an adversarial scout lane, not a registry expansion."
    - "All candidates are fitted only on committed repository data."
    - "Subset-specific regressions, frontier-contrast, and sign-inversion are decisive against any small primary improvement."
  expected_scope: "Retrospective sandbox adversarial triage for the asymmetry-frontier lane."
  expected_failure_modes:
    - "Matched quadratic+cubic neutron-excess pair reproduces NR-SCOUT-005 catastrophic blow-up."
    - "Sign-inverted control should regress every subset by construction; if it improves anything, the sign of the asymmetry signal is unreliable."
    - "Clipped-above-0.25 variant may fit a dormant column because no training row crosses the 0.25 threshold."
    - "Small sub-MeV retrospective deltas are not prospective prediction evidence."

novelty_check:
  checked_files:
    - "docs/reviews/nuclear-neutron-rich-variant-scout-001.md"
    - "docs/reviews/nuclear-scout-lane-synthesis-after-pred-0062.md"
    - "docs/reviews/nuclear-midmass-isotope-gap-scout-001.md"
    - "agent_runs/AGENT-RUN-0013/"
    - "agent_runs/AGENT-RUN-0015/"
  possible_overlap: "Directly re-evaluates NR-SCOUT-003, NR-SCOUT-004, and NR-SCOUT-005 from AGENT-RUN-0013 with new adversarial controls. The lane is intentionally bounded and preserves negative evidence."
  notes: "This batch is the asymmetry-frontier counterpart to TASK-0288's shell-axis stress scout. It runs in parallel and shares no candidate features with the shell-axis lane."

falsification_plan:
  deterministic_check: "Run scripts/run_nuclear_asymmetry_frontier_stress_scout.py and compare committed metrics to recomputed metrics."
  baseline_or_reference: "Frozen RESULT-0015 baseline on committed NMD-0002 and post-AME2020 holdout data."
  pass_condition: "A candidate remains only sandbox evidence if metrics are deterministic, the OVERFITTED overfit-neighbor is preserved, the sign-inverted coefficient is the negation of the base candidate's, rejected candidates are documented, and no registry or claim files are written."
  fail_condition: "Fail if a candidate writes PRED entries, promotes a claim, hides primary or worst-subset regressions, frames retrospective deltas as prospective prediction, or removes the OVERFITTED negative-control neighbor."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not describe the scout as discovering an asymmetry-frontier correction."
    - "Do not treat retrospective subset deltas as registry-ready predictions."
    - "Do not present the OVERFITTED matched quadratic+cubic neighbor as physical evidence."
  mitigations:
    - "Keep outputs under agent_runs, review notes, scripts, tests, and the task file."
    - "Report OVERFITTED and INCONCLUSIVE verdicts explicitly."
    - "Require a separate maintainer-reviewed task for any registry or reveal-scoring work."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_asymmetry_frontier_stress_scout.py"
    - "python3 -m pytest tests/test_nuclear_asymmetry_frontier_stress_scout.py"
  code_references:
    - "scripts/run_nuclear_asymmetry_frontier_stress_scout.py"
    - "tests/test_nuclear_asymmetry_frontier_stress_scout.py"
  metrics:
    - "primary_delta_mae_mev"
    - "asymmetry_ge_0_25_delta_mae_mev"
    - "n_z_ge_20_delta_mae_mev"
    - "heavy_a_ge_100_delta_mae_mev"
    - "mid_mass_delta_mae_mev"
    - "frontier_contrast_mev"
    - "lane_recommendation"
  output_paths:
    - "agent_runs/AGENT-RUN-0017/"
    - "docs/reviews/nuclear-asymmetry-frontier-stress-scout-001.md"

limitations:
  - "The residual training surface has only 11 rows, and no training row has (N-Z)/A above 0.25."
  - "The lane is retrospective and sandbox-only."
  - "ASYM-STRESS-003 is preserved as a required overfit negative-control neighbor."

verdict: REVIEW_NEEDED
maintainer_decision_requested: "Decide whether the asymmetry-frontier lane should remain a future review surface, be demoted to watchlist, or be preserved only as negative evidence based on the deterministic lane_recommendation block."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Separate maintainer-reviewed registry, reveal, or dataset-expansion task before any promotion."
