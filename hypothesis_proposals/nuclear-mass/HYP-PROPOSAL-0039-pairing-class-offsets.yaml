id: HYP-PROPOSAL-0039
title: "Even-even and odd-odd pairing-class offsets"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: master
  agent_id: codex
  task_id: TASK-0201

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "docs/nuclear-mass-robustness-gate.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "agent_runs/AGENT-RUN-0008/"
  - "agent_runs/AGENT-RUN-0011/metrics.json"

hypothesis:
  statement: "Separate even-even and odd-odd offsets may expose whether the frozen pairing coefficient leaves class-specific residual bias after the baseline fit."
  variables:
    - "even_even_indicator = 1 when Z and N are both even, else 0"
    - "odd_odd_indicator = 1 when Z and N are both odd, else 0"
    - "a, b: train-fitted coefficients in MeV"
  assumptions:
    - "Odd-A rows remain the implicit reference class."
    - "The feature family is bounded to global pairing classes and does not target chains, shells, or individual rows."
  expected_scope: "The four active NMD-0002 holdout families and the 295-row post-AME2020 primary surface."
  expected_failure_modes:
    - "Sparse odd-odd coverage in NMD-0002 can yield unstable coefficients."
    - "The candidate can improve one diagnostic subset while regressing proton-rich or heavy rows."

novelty_check:
  checked_files:
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0021-shell-dual-heavy-anchor-odd-a.yaml"
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0038-odd-a-offset.yaml"
  possible_overlap: "Same broad pairing domain as HYP-PROPOSAL-0038, but uses even-even and odd-odd offsets with odd-A as reference."
  notes: "Executed as the second and final TASK-0201 candidate."

falsification_plan:
  deterministic_check: "Fit class-offset coefficients on each NMD-0002 holdout complement and once on full NMD-0002; evaluate structured holdouts and post-AME2020 subsets."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline."
  pass_condition: "Improve at least three structured holdouts and the post-AME2020 primary without material subset regression."
  fail_condition: "Regress two or more structured holdouts, produce worst structured regression >= 1 MeV, or regress the post-AME2020 primary."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not present class offsets as a physical correction law."
    - "Do not hide subset tradeoffs behind aggregate metrics."
  mitigations:
    - "Keep results sandbox-only."
    - "Report primary, odd-A, neutron-rich, proton-rich, and heavy subset behavior."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_pairing_batch.py"
    - "python3 -m pytest tests/test_nuclear_pairing_batch.py"
  code_references:
    - "scripts/run_nuclear_pairing_batch.py"
    - "tests/test_nuclear_pairing_batch.py"
  metrics:
    - "structured_holdout_delta_mae_mev"
    - "post_ame2020_primary_delta_mae_mev"
    - "post_ame2020_subset_delta_mae_mev"
    - "feature_activation_counts"
    - "fitted_coefficient_magnitude"
  output_paths:
    - "agent_runs/AGENT-RUN-0011/metrics.json"

limitations:
  - "The two-parameter class-offset fit is unstable on the 11-row NMD-0002 slice."
  - "The neutron-rich post-AME2020 subset improves, but the primary, proton-rich, and heavy subsets regress."
  - "This candidate is useful as an overfit/negative-control surface only."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Record this as an overfit control for pairing-class residual work."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer review under docs/nuclear-mass-robustness-gate.md before any RESULT-* or claim update."
