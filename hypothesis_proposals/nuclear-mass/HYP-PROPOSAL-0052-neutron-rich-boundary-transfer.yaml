id: HYP-PROPOSAL-0052
title: "Nuclear neutron-rich boundary transfer hypothesis"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox hypothesis only. No prediction registry, canonical result, claim, or knowledge promotion is authorized."

proposed_by:
  contributor_id: roman
  agent_id: claude
  task_id: TASK-0450

input_references:
  - "docs/campaigns/nuclear-mass-surface.md"
  - "docs/notes/nuclear-controls-first-hypothesis-gauntlet.md"
  - "docs/nuclear-residual-feature-no-leakage-contract.md"
  - "docs/reviews/nuclear-shell-axis-neutron-rich-tail-audit.md"
  - "docs/reviews/nuclear-shell-axis-isotope-chain-transfer-audit.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "data/nuclear_masses/nmd-0002-curated-measured-slice.yaml"
  - "data/nuclear_masses/post_ame2020_holdout.yaml"

hypothesis:
  statement: "If neutron-rich nuclear binding-energy residuals reflect a transferable physical signal (rather than a generic high-error or chain-local artifact), then a single bounded boundary-distance correction `r_corr = beta * max(0, (N - Z)/A - 0.18)` fit on the NMD-0002 training slice should improve baseline MAE on the post-AME2020 primary holdout, beat a matched high-error non-neutron-rich control by the 0.25 MeV survival margin from TASK-0352, beat a sign-inverted boundary control, and transfer across at least half of evaluable isotope chains on `full_known`."
  variables:
    - "Z, N, A: proton, neutron, mass number"
    - "asymmetry: (N - Z) / A"
    - "boundary_distance: max(0, asymmetry - 0.18) (residual-free, deterministic from Z/N/A)"
    - "baseline_residual_mev: signed binding-energy residual against frozen RESULT-0015 semi-empirical baseline (fit target, NOT a feature input)"
  assumptions:
    - "The boundary-distance feature is a deterministic function of Z, N, A. The target row's residual, baseline error rank, or any residual-derived quantity does NOT enter feature construction."
    - "The single coefficient beta is fit via least squares on NMD-0002 training rows against baseline residuals; no leave-one-out cache or per-fold rebuild is needed because the feature is a closed-form scalar."
    - "Frozen RESULT-0015 baseline is reused; no candidate-fit residuals feed downstream features."
    - "All controls share the same fit and evaluation surfaces as the candidate."
    - "No live data fetch; only committed NMD-0002 + post-AME2020 holdout rows are used."
  expected_scope: "Bounded retrospective test of one neutron-rich boundary correction with chain-transfer and matched high-error controls."
  expected_failure_modes:
    - "A matched high-error non-neutron-rich control may match the apparent improvement, indicating the signal is generic-high-error, not neutron-rich-specific."
    - "Sign-inverted boundary may also fit some rows, indicating coefficient-instability."
    - "Improvement may concentrate in 1-2 chains (chain-local artifact rather than transferable signal)."
    - "Light A<50 rows may regress sharply."
    - "Boundary threshold 0.18 may produce sparse neutron-rich training subset."

novelty_check:
  checked_files:
    - "docs/reviews/nuclear-shell-axis-neutron-rich-tail-audit.md"
    - "docs/reviews/nuclear-residual-free-high-error-cluster-hypothesis-audit.md"
    - "docs/notes/nuclear-controls-first-hypothesis-gauntlet.md"
  possible_overlap: "Distinct from shell-axis lanes (uses asymmetry-frontier feature, not magic-number-distance). Distinct from F2 cluster-correction (this fits a single coefficient, not per-cluster offset)."
  notes: "Stays inside the F1/F5 predictive-eligible classes broadly (closed-form feature, leave-one-out unnecessary), but treats this as a diagnostic lane only; no PRED authorization."

falsification_plan:
  deterministic_check: "Run scripts/run_nuclear_neutron_rich_boundary_transfer_lane.py and compare committed metrics to recomputed metrics."
  baseline_or_reference: "Frozen RESULT-0015 baseline on committed NMD-0002 and post-AME2020 holdout."
  pass_condition: "Sandbox pass if exactly one candidate is fit, all three controls (matched_high_error, sign_inverted, isotope_chain_transfer) report metrics, per-subset (light, sparse-chain, measured/extrapolated) regressions are reported, verdict is in {BOUNDED_FOLLOWUP_CANDIDATE, DIAGNOSTIC_ONLY, NEGATIVE_RESULT, INCONCLUSIVE}, and no PRED/CLAIM/KNOW/RESULT artifact is written."
  fail_condition: "Fail if controls are skipped, multiple candidate variants are run in the same PR, chain-transfer test is omitted, or any canonical artifact is written."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not describe the neutron-rich boundary correction as discovery, new nuclear law, or broad formula."
    - "Do not call retrospective full_known improvements predictive validation."
    - "Do not imply reveal readiness, registry promotion, or anomaly explanation."
  mitigations:
    - "Keep outputs sandbox-only with explicit promotion_boundary."
    - "Preserve controls, per-chain deltas, and subset regressions in the report."
    - "Require maintainer review before any follow-up."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_neutron_rich_boundary_transfer_lane.py"
    - "python3 -m pytest tests/test_nuclear_neutron_rich_boundary_transfer_lane.py"
  code_references:
    - "scripts/run_nuclear_neutron_rich_boundary_transfer_lane.py"
    - "tests/test_nuclear_neutron_rich_boundary_transfer_lane.py"
  metrics:
    - "candidate_coefficient_beta"
    - "baseline_mae_per_surface_mev"
    - "candidate_mae_per_surface_mev"
    - "matched_high_error_control_mae_per_surface_mev"
    - "sign_inverted_control_mae_per_surface_mev"
    - "per_chain_delta_mae_mev"
    - "isotope_chain_transfer_rate"
    - "per_subset_delta_mae_mev"
    - "verdict"
  output_paths:
    - "agent_runs/AGENT-RUN-0044/"
    - "docs/reviews/nuclear-neutron-rich-boundary-transfer-hypothesis-lane.md"

limitations:
  - "NMD-0002 has 11 training rows; the neutron-rich subset is sparse."
  - "Frozen baseline residuals are retrospective; this is not a blind prediction."
  - "The boundary threshold (0.18) is declared before the run and not retuned."
  - "Chain-transfer metric is computed only on chains with >=2 rows on the full_known surface."

verdict: REVIEW_NEEDED
maintainer_decision_requested: "Review whether the neutron-rich boundary transfer lane should remain diagnostic-only, motivate a bounded follow-up, or close as negative."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Separate maintainer-reviewed follow-up before any RESULT, PRED, claim, knowledge, or reveal-scoring work."
