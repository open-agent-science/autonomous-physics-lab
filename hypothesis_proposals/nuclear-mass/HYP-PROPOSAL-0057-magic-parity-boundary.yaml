id: HYP-PROPOSAL-0057
title: "Nuclear magic-parity boundary hypothesis"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox hypothesis only. No prediction registry, canonical result, claim, or knowledge promotion is authorized."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0475

input_references:
  - "docs/campaigns/nuclear-mass-surface.md"
  - "docs/notes/nuclear-controls-first-hypothesis-gauntlet.md"
  - "docs/nuclear-residual-feature-no-leakage-contract.md"
  - "docs/reviews/nuclear-shell-axis-post-audit-decision.md"
  - "docs/reviews/nuclear-magic-distance-interaction-control-lane.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "data/nuclear_masses/nmd-0002-curated-measured-slice.yaml"
  - "data/nuclear_masses/post_ame2020_holdout.yaml"

hypothesis:
  statement: "If magic-boundary behavior interacts with odd-even parity, then a single residual-free feature `r_corr = beta * pairing_sign(Z,N) * max(exp(-z_dist^2/8), exp(-n_dist^2/8))` should improve the frozen nuclear-mass baseline against parity-only, magic-distance-only, asymmetry-only, smooth-A, and shuffled-label controls without regressing the primary post-AME2020 holdout."
  variables:
    - "Z, N, A: proton number, neutron number, and mass number."
    - "z_dist, n_dist: nearest published magic-number distance on each axis."
    - "magic_boundary_score = max(exp(-z_dist^2/8), exp(-n_dist^2/8))."
    - "pairing_sign(Z,N): +1 for even-even, -1 for odd-odd, and 0 for odd-A nuclei."
    - "interaction_feature = pairing_sign(Z,N) * magic_boundary_score."
    - "baseline_residual_mev: signed binding-energy residual against frozen RESULT-0015, used only as the fit target."
  assumptions:
    - "The candidate family is exactly one closed-form magic-parity boundary feature."
    - "No residual, baseline error, or held-out target value enters feature construction."
    - "A single coefficient beta is fit by least squares on committed NMD-0002 training rows."
    - "Controls share the same committed data surfaces and frozen baseline."
    - "No live data fetch is allowed."
  expected_scope: "Bounded retrospective control-lane test of one magic-parity boundary interaction."
  expected_failure_modes:
    - "Parity-only or magic-distance-only controls may match the candidate."
    - "Smooth-A or asymmetry-only controls may explain the apparent improvement."
    - "The shuffled-label control may match the candidate."
    - "The candidate may improve full_known while regressing primary_holdout or sparse subsets."
    - "Leave-one-out coefficient refits may show sign flips or high relative instability."

novelty_check:
  checked_files:
    - "docs/notes/nuclear-controls-first-hypothesis-gauntlet.md"
    - "docs/nuclear-residual-feature-no-leakage-contract.md"
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0053-magic-distance-interaction.yaml"
  possible_overlap: "Related to the prior magic-distance interaction lane, but this task tests a parity-gated near-either-magic-boundary feature rather than a Z×N magic-distance product."
  notes: "The prior magic-distance interaction lane was control-dominated; this lane remains sandbox-only and does not reopen shell-axis registry expansion."

falsification_plan:
  deterministic_check: "Run scripts/run_nuclear_magic_parity_boundary_control_lane.py and compare committed metrics to recomputed metrics."
  baseline_or_reference: "Frozen RESULT-0015 baseline on committed NMD-0002 and post-AME2020 holdout rows, plus parity-only, magic-distance-only, asymmetry-only, smooth-A, and shuffled-label controls."
  pass_condition: "Sandbox pass only if exactly one candidate family is fit, all five controls report metrics, coefficient-stability diagnostics are reported, per-surface and per-subset metrics are present, verdict is in {CONTROL_DOMINATED, FRAGILE_INCONCLUSIVE, NEGATIVE_RESULT, BOUNDED_DIAGNOSTIC}, and no PRED/CLAIM/KNOW/RESULT artifact is written."
  fail_condition: "Fail if multiple candidate variants run, any required control is skipped, residual-derived features are used, TASK-0451 metrics are reused, or any canonical artifact is written."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not call the candidate a discovery, new nuclear law, or validated mass formula."
    - "Do not describe retrospective full_known improvement as predictive validation."
    - "Do not imply reveal readiness, registry expansion, or claim promotion."
  mitigations:
    - "Keep outputs sandbox-only with explicit promotion_boundary."
    - "Report all required controls and holdout/subset surfaces."
    - "Use conservative control-lane verdict language."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_magic_parity_boundary_control_lane.py"
    - "python3 -m pytest tests/test_nuclear_magic_parity_boundary_control_lane.py"
  code_references:
    - "scripts/run_nuclear_magic_parity_boundary_control_lane.py"
    - "tests/test_nuclear_magic_parity_boundary_control_lane.py"
  metrics:
    - "candidate_coefficient_beta_mev"
    - "candidate_coefficient_loo_std_mev"
    - "candidate_coefficient_loo_sign_flip_count"
    - "candidate_mae_per_surface_mev"
    - "control_parity_only_mae_per_surface_mev"
    - "control_magic_distance_only_mae_per_surface_mev"
    - "control_asymmetry_only_mae_per_surface_mev"
    - "control_smooth_a_mae_per_surface_mev"
    - "control_shuffled_label_mae_per_surface_mev"
    - "per_subset_delta_mae_mev"
    - "verdict"
  output_paths:
    - "agent_runs/AGENT-RUN-0047/"
    - "docs/reviews/nuclear-magic-parity-boundary-control-lane.md"

limitations:
  - "Retrospective committed-data lane only; not a blind prediction."
  - "NMD-0002 has a small training slice, so coefficient-stability diagnostics are low power."
  - "The magic-boundary score and pairing sign are coarse identifier-level proxies."
  - "The candidate is capped at sandbox review regardless of fit quality."

verdict: REVIEW_NEEDED
maintainer_decision_requested: "Review whether the magic-parity boundary lane should close as control-dominated, negative, or worthy of a separate maintainer-approved follow-up."

promotion_boundary:
