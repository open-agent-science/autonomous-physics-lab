id: HYP-PROPOSAL-0047
title: "Nuclear odd-even shell-interaction residual scout batch"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox hypothesis batch only; no prediction registry, canonical result, or claim promotion."

proposed_by:
  contributor_id: master
  agent_id: codex
  task_id: TASK-0340

input_references:
  - "docs/campaigns/nuclear-mass-surface.md"
  - "docs/reviews/nuclear-shell-axis-post-audit-decision.md"
  - "docs/reviews/nuclear-pairing-odd-even-variant-scout-001.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "data/nuclear_masses/nmd-0002-curated-measured-slice.yaml"
  - "data/nuclear_masses/post_ame2020_holdout.yaml"

hypothesis:
  statement: "Odd-even residual behavior may change near shell closures or mid-shell regions, but any apparent interaction must beat matched pairing-only, shell-only, smooth-A, and shuffled-interaction controls before it is more than sandbox evidence."
  variables:
    - "Z, N, A: committed proton, neutron, and mass numbers"
    - "pairing_sign(Z,N): even-even positive, odd-odd negative, odd-A neutral"
    - "shell proximity proxies derived from distance to magic Z and N"
    - "mid-shell occupancy proxies derived from adjacent magic-number intervals"
  assumptions:
    - "No external nuclear deformation or live measurement source is fetched."
    - "The fit surface remains the committed 11-row NMD-0002 residual slice."
    - "The completed shell-axis lane remains diagnostic-only."
    - "Matched lower-complexity controls can block interaction interpretation even when an interaction candidate improves a subset."
  expected_scope: "Retrospective sandbox comparison of bounded odd-even by shell-proximity interaction features."
  expected_failure_modes:
    - "The interaction can be explained by a pairing-only or shell-only term."
    - "The interaction can regress the primary full-known surface while improving a small subset."
    - "A shuffled interaction can match candidate behavior, indicating small-sample overfit."
    - "Odd-odd rows remain sparse enough to block strong interpretation."

novelty_check:
  checked_files:
    - "docs/reviews/nuclear-pairing-odd-even-variant-scout-001.md"
    - "docs/reviews/nuclear-shell-axis-post-audit-decision.md"
    - "docs/reviews/nuclear-deformation-proxy-hypothesis-lane.md"
  possible_overlap: "Builds on prior pairing-only, shell-axis-only, and deformation-proxy lanes but tests their bounded interaction explicitly."
  notes: "The lane preserves lower-complexity and shuffled controls as first-class review evidence."

falsification_plan:
  deterministic_check: "Run scripts/run_nuclear_odd_even_shell_interaction_lane.py and compare committed metrics to recomputed metrics."
  baseline_or_reference: "Frozen RESULT-0015 baseline on committed NMD-0002 and post-AME2020 holdout data."
  pass_condition: "Sandbox pass if metrics are deterministic, 4-8 generated variants are recorded, 1-3 interaction candidates and all required controls are evaluated, and no registry, result, claim, or knowledge files are written."
  fail_condition: "Fail if the lane fetches live data, hides control behavior, writes PRED entries, promotes a claim, or frames retrospective deltas as validated physics."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not call an interaction candidate a discovered nuclear correction."
    - "Do not treat sandbox deltas as claim support."
    - "Do not promote shell-axis or pairing-only evidence through this lane."
  mitigations:
    - "Keep outputs under agent_runs, review notes, scripts, tests, and the task file."
    - "Report lower-complexity and shuffled controls next to interaction candidates."
    - "Require maintainer review before any follow-up promotion."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_odd_even_shell_interaction_lane.py"
    - "python3 -m pytest tests/test_nuclear_odd_even_shell_interaction_lane.py"
  code_references:
    - "scripts/run_nuclear_odd_even_shell_interaction_lane.py"
    - "tests/test_nuclear_odd_even_shell_interaction_lane.py"
  metrics:
    - "primary_delta_mae_mev"
    - "even_even_delta_mae_mev"
    - "odd_even_delta_mae_mev"
    - "odd_odd_delta_mae_mev"
    - "magic_z_delta_mae_mev"
    - "magic_n_delta_mae_mev"
    - "light_a_warning_delta_mae_mev"
    - "neutron_rich_delta_mae_mev"
  output_paths:
    - "agent_runs/AGENT-RUN-0027/"
    - "docs/reviews/nuclear-odd-even-shell-interaction-lane.md"

limitations:
  - "The residual training surface has only 11 rows."
  - "Odd-odd rows are sparse in the committed training and evaluation surfaces."
  - "This is retrospective sandbox evidence, not live reveal scoring."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Review whether the odd-even shell-interaction lane should remain preserved as bounded sandbox evidence."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Separate maintainer-reviewed follow-up before any RESULT, PRED, claim, knowledge, or reveal-scoring work."
