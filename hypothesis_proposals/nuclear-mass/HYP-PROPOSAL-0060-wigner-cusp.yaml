id: HYP-PROPOSAL-0060
title: "Bounded nuclear Wigner-cusp hypothesis"
campaign_profile_id: nuclear-mass-surface
proposal_kind: falsification
status: REVIEW_READY
claim_ceiling: "Sandbox hypothesis only; no prediction, result, claim, or knowledge promotion."
