hypothesis:
  statement: "A multiplicative shell-proximity feature s = exp(-(d_z^2 + d_n^2) / (2 * sigma^2)) with sigma as a free fit parameter might capture combined Z and N shell proximity more tightly than the additive Z-and-N candidate."
  variables:
    - "d_z, d_n: distances from nearest magic numbers"
    - "sigma: free width parameter"
    - "c: train-fitted coefficient"
  assumptions:
    - "A free width parameter is a nonlinear knob."
  expected_scope: "Rejected before execution."
  expected_failure_modes:
    - "sigma as a free fit parameter exits the linear-additive correction protocol used by RESULT-0015 and AGENT-RUN-0005."
    - "On the 11-nuclide NMD-0002 slice, a nonlinear knob has high overfit risk relative to the available evidence."
    - "Removes the separable interpretation of Z vs N shell behavior that HYP-PROPOSAL-0028 and HYP-PROPOSAL-0029 preserve."

