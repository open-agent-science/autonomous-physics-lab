id: HYP-PROPOSAL-0022
title: "Quadratic asymmetry residual refinement candidate"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0170

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "docs/results/nuclear-mass-baseline-summary.md"

hypothesis:
  statement: "A quadratic asymmetry residual correction in (N-Z)/A may reduce some local errors but risks overfitting light-chain behavior on the pinned slice."
  variables:
    - "r_base: frozen baseline residual in MeV"
    - "I: (N-Z)/A"
    - "a, b: train-fitted coefficients in MeV"
  assumptions:
    - "The frozen RESULT-0015 baseline remains unchanged."
    - "The family is judged only through the reviewed structured holdout slices."
    - "Heavy-region regressions are meaningful negative evidence and must be preserved."
  expected_scope: "The active random, oxygen-chain, magic-heavy, and neutron-rich holdouts on NMD-0002."
  expected_failure_modes:
    - "Could improve one light-chain slice while failing heavy shell and neutron-rich holdouts."
    - "May behave like a flexible train fit with weak physical specificity on the tiny dataset."

novelty_check:
  checked_files:
    - "results/EXP-0012/RUN-0001/result.yaml"
    - "docs/results/nuclear-mass-baseline-summary.md"
  possible_overlap: "The frozen baseline already contains a coarse asymmetry term, but not a separate fitted residual refinement."
  notes: "Executed deliberately as a plausible-looking negative control."

falsification_plan:
  deterministic_check: "Fit r_corr = a*I + b*I^2 on each holdout complement and compare holdout MAE and RMSE against the frozen baseline residuals."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline plus the structured holdout protocol on NMD-0002."
  pass_condition: "Would need multi-holdout improvement with no heavy-slice collapse."
  fail_condition: "Regresses structured heavy holdouts or improves only one attractive subset."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not describe a residual fit as new asymmetry physics."
  mitigations:
    - "Keep the result sandbox-only."
    - "Preserve heavy-holdout regressions as explicit negative evidence."

sandbox_evidence:
  commands:
    - "python3 -m physics_lab.cli preflight-research-proposal hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
  code_references:
    - "physics_lab/engines/nuclear_masses.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
    - "tests/test_nuclear_mass_autonomous_pilot.py"
  metrics:
    - "holdout_delta_mae_mev"
    - "worst_regression_mev"
    - "regressed_holdout_count"
  output_paths:
    - "agent_runs/AGENT-RUN-0005/metrics.json"

limitations:
  - "This is an intentionally risky residual family chosen to test overfit detection."
  - "It does not justify any claim about true asymmetry corrections in nuclear theory."

verdict: OVERFITTED
maintainer_decision_requested: "Keep this candidate as negative sandbox evidence that attractive asymmetry refinements can still fail structured holdout."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "No promotion; retain as negative evidence unless a later task asks for a broader asymmetry benchmark."
