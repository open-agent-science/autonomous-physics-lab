id: HYP-PROPOSAL-0041
title: "Per-parity-class free offsets (in-batch negative control)"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox negative-control candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: claude
  task_id: TASK-0201

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "docs/nuclear-mass-robustness-gate.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
  - "agent_runs/AGENT-RUN-0008/"

hypothesis:
  statement: "Three independent free offsets, one for each parity class (even-even, odd-odd, odd-A), provide a maximally-flexible parity-only residual correction. With three parameters fitted on the 11-row NMD-0002 surface (only one odd-odd row), this is expected to overfit by construction and is included as an in-batch negative control to demonstrate that the protocol's OVERFITTED detection still fires on a trivially-flexible feature stack."
  variables:
    - "I[ee] = 1 if pairing_sign(Z, N) == +1 else 0"
    - "I[oo] = 1 if pairing_sign(Z, N) == -1 else 0"
    - "I[odd-A] = 1 if pairing_sign(Z, N) == 0 else 0"
    - "c_ee, c_oo, c_oA: train-fitted coefficients in MeV"
  assumptions:
    - "The frozen RESULT-0015 baseline remains unchanged."
    - "On NMD-0002 there is exactly one odd-odd row (N-14); on the post-AME2020 primary holdout the three classes have very different counts."
    - "This candidate exists to confirm overfit-detection symmetry and to expose subset behavior under maximum parity-class flexibility."
  expected_scope: "The four active NMD-0002 holdout families and the 295-row post-AME2020 primary surface."
  expected_failure_modes:
    - "Three-parameter fit on 8-9 row training complements is essentially memorizing class means and is expected to land in OVERFITTED."
    - "Per-complement coefficients may swing widely across the four structured holdouts because the odd-odd class has only one row."
    - "On the post-AME2020 primary surface the fit may absorb a small mean-residual offset per class but does not represent any new pairing physics."

novelty_check:
  checked_files:
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0028-shell-gaussian-proximity-zn.yaml"
    - "physics_lab/engines/nuclear_mass_baselines.py"
  possible_overlap: "Uses parity-class indicators as features. Does not duplicate HYP-PROPOSAL-0021 (no shell anchor and not gated on heavy A) or HYP-PROPOSAL-0022 (no asymmetry term)."
  notes: "Designed explicitly as an in-batch negative control. The expected OVERFITTED verdict is the diagnostic value of the candidate."

falsification_plan:
  deterministic_check: "Fit r_corr = c_ee * I[ee] + c_oo * I[oo] + c_oA * I[odd-A] on each NMD-0002 holdout complement and on the full NMD-0002 surface; evaluate on each holdout and on the 295-row post-AME2020 primary surface."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline; HYP-PROPOSAL-0022 metrics in AGENT-RUN-0008 as the external negative-control reference."
  pass_condition: "The candidate is in-batch negative control. Sandbox pass means the protocol records OVERFITTED on the structured holdouts and exposes per-subset behavior on the post-AME2020 surface, regardless of aggregate MAE sign."
  fail_condition: "The protocol fails to flag this candidate as OVERFITTED on the structured holdouts, indicating the overfit-detection is not symmetric."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not promote three free per-class offsets as a pairing law."
    - "Do not present an aggregate primary MAE delta on this candidate as discovery, even if negative."
  mitigations:
    - "Keep results sandbox-only."
    - "Always describe this candidate as an in-batch negative control."
    - "Report per-class activation counts and per-class fitted coefficients."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_pairing_batch.py"
    - "python3 -m pytest tests/test_nuclear_pairing_batch.py"
  code_references:
    - "scripts/run_nuclear_pairing_batch.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
  metrics:
    - "structured_holdout_delta_mae_mev"
    - "post_ame2020_primary_delta_mae_mev"
    - "feature_activation_counts (one per parity class)"
    - "per_subset_delta_mae_mev"
    - "fitted_coefficients_per_class"
  output_paths:
    - "agent_runs/AGENT-RUN-0011/metrics.json"

limitations:
  - "Three parameters on 11 training rows (one odd-odd row). Per-complement fits are dominated by the single odd-odd row when present in training, and undefined-class extrapolation when not."
  - "The candidate is asymmetric in informational content across classes (the odd-odd class is essentially overdetermined by N-14 only)."
  - "Post-AME2020 evaluation is retrospective time-split, not blind prediction."
  - "Activation count is by construction 295 across all rows (each row activates exactly one class indicator); the sum across the three counts must equal 295."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Confirm that an in-batch negative control whose feature shape is fundamentally informational (per-class offsets) is the right shape of overfit reference for the pairing lane."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "No promotion path. This candidate exists to make the protocol's overfit detection visible in this lane."
