id: HYP-PROPOSAL-0029
title: "Continuous Gaussian shell-proximity residual (N axis only)"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: claude
  task_id: TASK-0200

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "docs/nuclear-mass-robustness-gate.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "agent_runs/AGENT-RUN-0006/"
  - "agent_runs/AGENT-RUN-0008/"

hypothesis:
  statement: "A single-axis continuous Gaussian shell-proximity residual on the neutron number may capture the bulk of shell-stability signal because the post-AME2020 worst-baseline residuals cluster near the N=82 shell closure."
  variables:
    - "r_base: frozen baseline residual in MeV"
    - "s_n = exp(-d(N, MAGIC)^2 / (2 * sigma^2)) with sigma = 2"
    - "c_sn: train-fitted coefficient in MeV"
  assumptions:
    - "The frozen RESULT-0015 baseline remains unchanged."
    - "sigma = 2 is frozen at design time; only c_sn is fitted."
    - "The single-parameter family is intentionally minimal to test the neutron axis on its own."
  expected_scope: "The four NMD-0002 holdouts and the post-AME2020 primary surface."
  expected_failure_modes:
    - "Without a Z-axis counterpart, magic-Z but non-magic-N rows are not corrected."
    - "Proton-rich light/medium rows may regress because s_n is small there and the carrier coefficient is positive."

novelty_check:
  checked_files:
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0028-shell-gaussian-proximity-zn.yaml"
  possible_overlap: "Strict subset of HYP-PROPOSAL-0028. Selected as a separate minimal candidate, not as a duplicate."
  notes: "Motivated by the post-AME2020 worst-residual cluster at N=82 (In/Sb) without targeting N=82 specifically; the feature is symmetric across all magic-N values."

falsification_plan:
  deterministic_check: "Fit r_corr = c_sn * s_n on each NMD-0002 holdout complement and on the full NMD-0002 surface; evaluate on each holdout and on the 295-row post-AME2020 primary surface."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline on NMD-0002 and AGENT-RUN-0008 post-AME2020 metrics."
  pass_condition: "Improve at least three of four structured holdouts with no holdout regression above 0.25 MeV AND improve the post-AME2020 primary MAE without large subset regressions."
  fail_condition: "Two or more structured holdouts regress, or worst-regression is >= 1.0 MeV, or any subset regression on the post-AME2020 surface exceeds 0.5 MeV."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not describe a small primary MAE improvement as a new neutron shell correction."
    - "Do not present a one-way subset trade as a discovered law."
  mitigations:
    - "Keep results sandbox-only."
    - "Report the proton-rich subset alongside the neutron-rich subset."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_shell_batch.py"
    - "python3 -m pytest tests/test_nuclear_shell_batch.py"
  code_references:
    - "scripts/run_nuclear_shell_batch.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
  metrics:
    - "structured_holdout_delta_mae_mev"
    - "post_ame2020_primary_delta_mae_mev"
    - "post_ame2020_subset_delta_mae_mev"
    - "feature_activation_counts"
  output_paths:
    - "agent_runs/AGENT-RUN-0009/metrics.json"

limitations:
  - "Single fitted parameter; coefficient instability on the tiny NMD-0002 slice remains a concern."
  - "Proton-rich rows are expected to regress; this must remain a visible negative subset signal."
  - "The post-AME2020 evaluation is retrospective time-split, not blind prediction."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether the small primary post-AME2020 improvement, balanced against proton-rich regression and structured-holdout overfit, is enough to warrant a broader-dataset study or whether the family should remain a negative control."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer review under docs/nuclear-mass-robustness-gate.md before any RESULT-* or claim update."
