id: HYP-PROPOSAL-0021
title: "Shell dual heavy-anchor plus odd-A damping candidate"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0170

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "docs/results/nuclear-mass-baseline-summary.md"

hypothesis:
  statement: "Adding a small odd-A damping term to the shell dual heavy-anchor family may improve all active holdout slices on the frozen nuclear-mass benchmark without claiming broader nuclear theory."
  variables:
    - "r_base: frozen baseline residual in MeV"
    - "m2: 1 when both Z and N are magic, else 0"
    - "mh: 1 when the nuclide is both heavy and double-magic, else 0"
    - "oa: 1 for odd-A nuclei, else 0"
    - "c1, c2, c3: train-fitted coefficients in MeV"
  assumptions:
    - "The frozen benchmark surface is NMD-0002 with RESULT-0015 as the baseline reference."
    - "The candidate is refit separately on each holdout complement rather than using a pooled post hoc coefficient set."
    - "Any improvement remains sandbox-only until a maintainer requests a canonical benchmark-comparison task."
  expected_scope: "The four active holdout families defined for NMD-0002 in docs/nuclear-mass-holdout-protocol.md."
  expected_failure_modes:
    - "The observed gain may be specific to the tiny pinned slice rather than a broader mass surface."
    - "The odd-A damping term could be acting as a lightweight pairing proxy rather than a reusable correction family."

novelty_check:
  checked_files:
    - "results/EXP-0012/RUN-0001/result.yaml"
    - "docs/results/nuclear-mass-baseline-summary.md"
  possible_overlap: "The frozen baseline includes a pairing term but no additive residual family that combines double-magic and odd-A diagnostics."
  notes: "Chosen as the lead executed candidate because it stays compact while helping all active holdout slices."

falsification_plan:
  deterministic_check: "Fit r_corr = c1*m2 + c2*mh + c3*oa on each holdout complement and compare holdout MAE and RMSE against the frozen baseline residuals."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline plus the structured holdout protocol on NMD-0002."
  pass_condition: "Improve all four active holdout families with no positive holdout MAE regression."
  fail_condition: "Any active holdout regresses or the candidate requires broader explanatory language to sound meaningful."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not claim the family explains nuclear masses."
    - "Do not present the sandbox package as a canonical result update."
  mitigations:
    - "Keep outputs sandbox-only."
    - "Report improvements as holdout-relative deltas against RESULT-0015, not as new theory."

sandbox_evidence:
  commands:
    - "python3 -m physics_lab.cli preflight-research-proposal hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0021-shell-dual-heavy-anchor-odd-a.yaml"
  code_references:
    - "physics_lab/engines/nuclear_masses.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
    - "tests/test_nuclear_mass_autonomous_pilot.py"
  metrics:
    - "holdout_delta_mae_mev"
    - "holdout_delta_rmse_mev"
    - "improved_holdout_count"
    - "mean_delta_mae_mev"
  output_paths:
    - "agent_runs/AGENT-RUN-0005/metrics.json"

limitations:
  - "The family is only benchmarked on NMD-0002 and should not be promoted beyond sandbox evidence."
  - "Odd-A damping is still an empirical residual term layered on top of the frozen baseline, not a new pairing model."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether this family deserves a later canonical comparison task on a broader pinned dataset."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer-reviewed canonical comparison task before any RESULT-* or claim update."
