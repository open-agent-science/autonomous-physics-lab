id: HYP-PROPOSAL-0028
title: "Continuous Gaussian shell-proximity residual (Z and N)"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: claude
  task_id: TASK-0200

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "docs/nuclear-mass-robustness-gate.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "agent_runs/AGENT-RUN-0006/"
  - "agent_runs/AGENT-RUN-0008/"

hypothesis:
  statement: "A continuous Gaussian shell-proximity residual on both proton and neutron axes may capture shell-stability effects that the prior strict double-magic indicators miss, because the continuous features fire on every NMD-0002 and post-AME2020 row."
  variables:
    - "r_base: frozen baseline residual in MeV"
    - "s_z = exp(-d(Z, MAGIC)^2 / (2 * sigma^2)) with sigma = 2"
    - "s_n = exp(-d(N, MAGIC)^2 / (2 * sigma^2)) with sigma = 2"
    - "c_sz, c_sn: train-fitted coefficients in MeV"
  assumptions:
    - "The frozen RESULT-0015 baseline remains unchanged."
    - "Coefficients are fitted on the complement of each NMD-0002 holdout for the structured protocol, and on the full NMD-0002 surface once for the post-AME2020 evaluation."
    - "sigma = 2 is frozen before evaluation to keep the family linear; it is not a free fit parameter."
  expected_scope: "The four active NMD-0002 holdout families and the reviewed row-level post-AME2020 primary holdout."
  expected_failure_modes:
    - "The Z-axis term may pull in the wrong direction on proton-rich nuclei because near-magic-Z light/medium rows have small baseline error."
    - "Structured-holdout fits on 8 nuclides may produce unstable coefficients."

novelty_check:
  checked_files:
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0020-shell-dual-heavy-anchor.yaml"
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0021-shell-dual-heavy-anchor-odd-a.yaml"
    - "docs/reviews/post-ame2020-time-split-benchmark-result.md"
  possible_overlap: "Generalizes the strict (magic_both, heavy_double_magic) indicators of HYP-PROPOSAL-0020 into continuous proximity features; same physical motivation, different activation behavior."
  notes: "Selected as the broader continuous lane so the activation count is non-zero on every primary post-AME2020 row."

falsification_plan:
  deterministic_check: "Fit r_corr = c_sz * s_z + c_sn * s_n on each NMD-0002 holdout complement and on the full NMD-0002 surface; evaluate on each holdout and on the 295-row post-AME2020 primary surface."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline on NMD-0002 and AGENT-RUN-0008 post-AME2020 metrics."
  pass_condition: "Improve at least three of four structured holdouts with no holdout regression above 0.25 MeV AND improve the post-AME2020 primary MAE without large subset regressions."
  fail_condition: "Two or more structured holdouts regress, or worst-regression is >= 1.0 MeV, or the post-AME2020 primary regresses."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not present continuous shell-proximity features as a new shell model."
    - "Do not describe a small post-AME2020 win as discovery."
  mitigations:
    - "Keep results sandbox-only."
    - "Report subset behavior alongside aggregate metrics."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_shell_batch.py"
    - "python3 -m pytest tests/test_nuclear_shell_batch.py"
  code_references:
    - "scripts/run_nuclear_shell_batch.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
  metrics:
    - "structured_holdout_delta_mae_mev"
    - "post_ame2020_primary_delta_mae_mev"
    - "feature_activation_counts"
    - "per_subset_delta_mae_mev"
  output_paths:
    - "agent_runs/AGENT-RUN-0009/metrics.json"

limitations:
  - "NMD-0002 has 11 nuclides; structured-holdout coefficients are fitted on 8-9 rows."
  - "The post-AME2020 fit uses the full NMD-0002 surface once; this is retrospective time-split evaluation, not blind prediction."
  - "sigma = 2 is a frozen design choice, not a fitted parameter; varying it would expand the search space and require a separate proposal."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether HYP-PROPOSAL-0028 is a useful negative control or a candidate for a separate broader-dataset study."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer review under docs/nuclear-mass-robustness-gate.md before any RESULT-* or claim update."
