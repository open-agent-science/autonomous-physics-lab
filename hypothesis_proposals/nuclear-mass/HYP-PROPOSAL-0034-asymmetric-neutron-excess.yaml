id: HYP-PROPOSAL-0034
title: "Asymmetric neutron-excess residual (proton-rich neutral)"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: claude
  task_id: TASK-0202

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "docs/nuclear-mass-robustness-gate.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
  - "agent_runs/AGENT-RUN-0008/"

hypothesis:
  statement: "A residual correction that activates only when N > Z, with magnitude (N - Z)^2 / A, may improve neutron-rich subset behavior on the post-AME2020 surface without regressing the small proton-rich subset that HYP-PROPOSAL-0022 and HYP-PROPOSAL-0029 disturb."
  variables:
    - "r_base: frozen baseline residual in MeV"
    - "neutron_excess_sq_over_a = max(N - Z, 0)^2 / A (zero on proton-rich rows)"
    - "c: train-fitted coefficient in MeV"
  assumptions:
    - "The frozen RESULT-0015 baseline remains unchanged."
    - "The feature is asymmetric by design; this is not a discovered asymmetry."
    - "Coefficients are fitted on the complement of each NMD-0002 holdout for the structured protocol, and once on the full NMD-0002 surface for the post-AME2020 evaluation."
  expected_scope: "The four active NMD-0002 holdout families and the 295-row post-AME2020 primary surface."
  expected_failure_modes:
    - "The feature scales with (N - Z)^2 / A and grows large for heavy/neutron-rich rows; the linear fit on the 11-row NMD-0002 slice may produce a near-zero coefficient because the feature is poorly correlated with the residual under that scaling."
    - "Even if the candidate is approximately neutral on post-AME2020, the structured-holdout protocol may still regress because per-complement fits are unstable on tiny slices."

novelty_check:
  checked_files:
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0029-shell-gaussian-proximity-neutron-only.yaml"
  possible_overlap: "Same neutron-rich motivation as HYP-PROPOSAL-0022, but built so that the proton-rich subset is structurally untouched."
  notes: "Selected to address the one-way subset trade documented in docs/reviews/post-ame2020-timesplit-failure-analysis.md."

falsification_plan:
  deterministic_check: "Fit r_corr = c * max(N - Z, 0)^2 / A on each NMD-0002 holdout complement and on the full NMD-0002 surface; evaluate on each holdout and on the 295-row post-AME2020 primary surface."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline; HYP-PROPOSAL-0022 metrics as the negative-control reference."
  pass_condition: "Improve the post-AME2020 primary MAE without regressing the proton-rich subset by more than the candidate's own primary improvement AND avoid worst structured-holdout regressions above 1.0 MeV."
  fail_condition: "Structured-holdout worst regression >= 1.0 MeV OR post-AME2020 primary regression OR proton-rich subset behavior worse than the feature's asymmetric design predicts."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not present an asymmetric feature as a discovered N-Z asymmetry."
    - "Do not claim a one-parameter neutron-excess fit as a proven residual law."
  mitigations:
    - "Keep results sandbox-only."
    - "Report feature activation counts and per-subset deltas alongside aggregate metrics."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_neutron_rich_batch.py"
    - "python3 -m pytest tests/test_nuclear_neutron_rich_batch.py"
  code_references:
    - "scripts/run_nuclear_neutron_rich_batch.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
  metrics:
    - "structured_holdout_delta_mae_mev"
    - "post_ame2020_primary_delta_mae_mev"
    - "post_ame2020_subset_delta_mae_mev"
    - "feature_activation_counts"
    - "fitted_coefficient_magnitude"
  output_paths:
    - "agent_runs/AGENT-RUN-0010/metrics.json"

limitations:
  - "Single fitted parameter; coefficient instability on the tiny NMD-0002 slice remains a concern."
  - "The asymmetric (N - Z, capped at zero) construction is a design choice, not a discovered asymmetry; do not promote it as physics."
  - "The post-AME2020 evaluation is retrospective time-split, not blind prediction."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether the asymmetric neutron-excess result behaves as expected (near-zero correction on post-AME2020 with structured-protocol overfit) and whether the lane remains useful as a negative control."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer review under docs/nuclear-mass-robustness-gate.md before any RESULT-* or claim update."
