id: HYP-PROPOSAL-0020
title: "Shell dual heavy-anchor residual candidate"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0170

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "docs/results/nuclear-mass-baseline-summary.md"

hypothesis:
  statement: "A compact additive correction using a double-magic indicator plus a heavy double-magic anchor may reduce holdout residuals against the frozen RESULT-0015 baseline."
  variables:
    - "r_base: frozen baseline residual in MeV"
    - "m2: 1 when both Z and N are magic, else 0"
    - "mh: 1 when the nuclide is both heavy and double-magic, else 0"
    - "c1, c2: train-fitted coefficients in MeV"
  assumptions:
    - "The frozen benchmark surface is NMD-0002 with the fitted semi-empirical baseline from RESULT-0015."
    - "Each active holdout family fits the additive correction on the complement of the revealed holdout subset only."
    - "Any observed improvement remains sandbox evidence until a maintainer requests a canonical comparison task."
  expected_scope: "The four active holdout families defined in docs/nuclear-mass-holdout-protocol.md for the pinned NMD-0002 slice."
  expected_failure_modes:
    - "May simply proxy a heavy shell offset on a very small benchmark slice."
    - "Could improve shell-region subsets while slightly hurting the random holdout."

novelty_check:
  checked_files:
    - "results/EXP-0012/RUN-0001/result.yaml"
    - "docs/results/nuclear-mass-baseline-summary.md"
  possible_overlap: "RESULT-0015 includes only semi-empirical baselines and no additive shell-residual family."
  notes: "Selected as a bounded shell-aware candidate that is still simple enough for the first pilot."

falsification_plan:
  deterministic_check: "Fit r_corr = c1*m2 + c2*mh on each holdout complement and compare holdout MAE and RMSE against the frozen baseline residuals."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline plus the structured holdout protocol on NMD-0002."
  pass_condition: "Improve at least three active holdout families with no regression larger than 0.25 MeV."
  fail_condition: "Regress two or more active holdouts or require broader shell-law language to sound useful."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not claim a shell law for all nuclei."
    - "Do not present sandbox deltas as a canonical benchmark replacement."
  mitigations:
    - "Keep all evidence under hypothesis_proposals, experiment_proposals, agent_runs, tests, and review notes."
    - "Describe the family only as an additive residual correction against the frozen baseline."

sandbox_evidence:
  commands:
    - "python3 -m physics_lab.cli preflight-research-proposal hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0020-shell-dual-heavy-anchor.yaml"
  code_references:
    - "physics_lab/engines/nuclear_masses.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
    - "tests/test_nuclear_mass_autonomous_pilot.py"
  metrics:
    - "holdout_delta_mae_mev"
    - "holdout_delta_rmse_mev"
    - "improved_holdout_count"
    - "worst_regression_mev"
  output_paths:
    - "agent_runs/AGENT-RUN-0005/metrics.json"

limitations:
  - "The family is fit only on the pinned NMD-0002 slice and does not generalize beyond that benchmark surface."
  - "Indicator features are interpretable but still coarse; they do not justify any shell-model claim."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether this simpler shell-only family is useful enough to keep as follow-up candidate memory."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer-reviewed canonical comparison task before any RESULT-* or claim update."
