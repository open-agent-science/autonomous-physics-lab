id: HYP-PROPOSAL-0038
title: "Pairing A-inverse residual refinement"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: claude
  task_id: TASK-0201

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "docs/nuclear-mass-robustness-gate.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0021-shell-dual-heavy-anchor-odd-a.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
  - "agent_runs/AGENT-RUN-0006/"
  - "agent_runs/AGENT-RUN-0008/"

hypothesis:
  statement: "The frozen RESULT-0015 baseline contains a pairing term proportional to pairing_sign(Z, N) / sqrt(A). A residual correction proportional to pairing_sign(Z, N) / A would activate on the same even-even and odd-odd rows but decay faster with mass number; if the baseline pairing term mis-scales with A, a one-parameter A-inverse refinement should absorb the parity-dependent structure remaining after baseline subtraction."
  variables:
    - "r_base: frozen baseline residual in MeV"
    - "pairing_sign(Z, N): +1 (even-even), -1 (odd-odd), 0 (odd-A)"
    - "pairing_a_inverse = pairing_sign(Z, N) / A"
    - "c: train-fitted coefficient in MeV"
  assumptions:
    - "The frozen RESULT-0015 baseline remains unchanged."
    - "Coefficient c is fitted on the holdout complement for the structured protocol, and once on the full NMD-0002 surface for the post-AME2020 evaluation."
    - "Activation pattern is identical to the baseline pairing term (zero on odd-A rows)."
  expected_scope: "The four active NMD-0002 holdout families and the 295-row post-AME2020 primary surface."
  expected_failure_modes:
    - "The feature is colinear in sign with the existing baseline pairing term; any structure not absorbed by the baseline /sqrt(A) scaling is constrained to be small."
    - "On NMD-0002 the feature has only one odd-odd row (N-14) and eight even-even rows; per-complement structured-holdout fits may produce unstable c values."
    - "If the baseline pairing term is already approximately correct, c may be near zero and the post-AME2020 effect close to numerical noise."

novelty_check:
  checked_files:
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0021-shell-dual-heavy-anchor-odd-a.yaml"
    - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
    - "physics_lab/engines/nuclear_mass_baselines.py"
  possible_overlap: "Same activation pattern as the baseline pairing term but different A-dependence (1/A vs 1/sqrt(A)). Distinct from HYP-PROPOSAL-0021 (no shell anchor and no separate odd-A indicator) and from HYP-PROPOSAL-0022 (no asymmetry term)."
  notes: "Tests whether the parity-dependent residual after the frozen baseline shows a steeper A-decay than the baseline pairing term itself."

falsification_plan:
  deterministic_check: "Fit r_corr = c * pairing_sign(Z, N) / A on each NMD-0002 holdout complement and on the full NMD-0002 surface; evaluate on each holdout and on the 295-row post-AME2020 primary surface."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline; HYP-PROPOSAL-0022 metrics in AGENT-RUN-0008 as the external negative-control reference."
  pass_condition: "Improve at least three of four structured holdouts with no holdout regression above 0.25 MeV AND improve the post-AME2020 primary MAE without a one-way subset trade above the candidate's own primary improvement on the proton-rich subset."
  fail_condition: "Two or more structured holdouts regress, OR worst structured regression >= 1.0 MeV, OR post-AME2020 primary regresses, OR the candidate is numerically null on the time-split surface (coefficient at machine precision)."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not describe a refit of the pairing A-dependence as a new pairing law."
    - "Do not claim that a small primary improvement is generalization without time-split and split-sensitivity evidence."
  mitigations:
    - "Keep results sandbox-only."
    - "Report feature activation counts (expected 295 - count(odd-A) on post-AME2020 primary)."
    - "Report per-subset deltas, not aggregate MAE alone."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_pairing_batch.py"
    - "python3 -m pytest tests/test_nuclear_pairing_batch.py"
  code_references:
    - "scripts/run_nuclear_pairing_batch.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
  metrics:
    - "structured_holdout_delta_mae_mev"
    - "post_ame2020_primary_delta_mae_mev"
    - "feature_activation_counts"
    - "per_subset_delta_mae_mev"
  output_paths:
    - "agent_runs/AGENT-RUN-0011/metrics.json"

limitations:
  - "NMD-0002 has 11 nuclides; only one is odd-odd (N-14). Structured-holdout coefficients fitted on 8-9 rows are unstable."
  - "Post-AME2020 evaluation is retrospective time-split, not blind prediction."
  - "A one-parameter A-inverse correction is colinear with the existing baseline pairing term in sign; the lane cannot distinguish a true pairing-physics refinement from a noise fit on the tiny training surface."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether the A-inverse refinement carries any signal worth a broader-dataset follow-up, or whether the pairing lane closes here."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer review under docs/nuclear-mass-robustness-gate.md before any RESULT-* or claim update."
