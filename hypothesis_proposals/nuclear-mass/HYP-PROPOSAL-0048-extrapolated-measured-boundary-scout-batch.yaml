id: HYP-PROPOSAL-0048
title: "Nuclear measured/extrapolated boundary residual scout batch"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox hypothesis batch only; no prediction registry, canonical result, or claim promotion."

proposed_by:
  contributor_id: master
  agent_id: codex
  task_id: TASK-0341

input_references:
  - "docs/campaigns/nuclear-mass-surface.md"
  - "docs/reviews/nuclear-shell-axis-post-audit-decision.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "data/nuclear_masses/nmd-0002-curated-measured-slice.yaml"
  - "data/nuclear_masses/post_ame2020_holdout.yaml"

hypothesis:
  statement: "Residual behavior may differ around the AME2020 measured-versus-extrapolated comparison boundary, but any apparent signal must remain a source-status diagnostic unless it survives matched controls and maintainer review."
  variables:
    - "measurement_status: committed row-level measurement status"
    - "ame2020_comparison.was_extrapolated: source-status flag on the comparison column"
    - "comparison_uncertainty_mev: committed AME2020 comparison uncertainty"
    - "nearest_training_l1_distance: deterministic edge-of-known-surface proxy"
  assumptions:
    - "No live source is fetched."
    - "NMD-0002 is curated measured-only and cannot by itself train a measured/extrapolated contrast."
    - "Post-AME2020 rows contain new measured values with an AME2020 measured/extrapolated comparison flag."
    - "Source-status controls can block interpretation even when a candidate reduces aggregate residuals."
  expected_scope: "Retrospective sandbox comparison of bounded source-status boundary features."
  expected_failure_modes:
    - "The apparent signal can be explained by a measured-only or extrapolated-only offset."
    - "A shuffled source-status control can match candidate behavior."
    - "The source-status term can mostly reflect sample composition, uncertainty, or edge-of-surface coverage."
    - "Retrospective full-known fitting can reduce errors without supporting a prospective correction."

novelty_check:
  checked_files:
    - "docs/reviews/nuclear-shell-axis-post-audit-decision.md"
    - "docs/reviews/nuclear-deformation-proxy-hypothesis-lane.md"
    - "docs/reviews/nuclear-odd-even-shell-interaction-lane.md"
  possible_overlap: "Builds on the full-known nuclear audit surface but isolates source-status boundary metadata instead of shell, deformation, or parity proxies."
  notes: "The lane treats source-status effects as provenance diagnostics, not nuclear-structure evidence."

falsification_plan:
  deterministic_check: "Run scripts/run_nuclear_extrapolated_measured_boundary_lane.py and compare committed metrics to recomputed metrics."
  baseline_or_reference: "Frozen RESULT-0015 baseline on committed NMD-0002 and post-AME2020 holdout data."
  pass_condition: "Sandbox pass if source flags are audited, 3-6 generated variants are recorded, 1-3 candidates and required controls are evaluated where flags permit, and no registry, result, claim, or knowledge files are written."
  fail_condition: "Fail if the lane fetches live data, hides source-status controls, writes PRED entries, promotes a claim, or frames retrospective source-status deltas as validated physics."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not call a source-status diagnostic a nuclear correction."
    - "Do not treat retrospective boundary deltas as claim support."
    - "Do not imply reveal readiness or registry validation."
  mitigations:
    - "Keep outputs sandbox-only."
    - "Report measured-only, extrapolated-only, source-shuffled, and smooth-A controls."
    - "Require maintainer review before any follow-up promotion."

sandbox_evidence:
  commands:
    - "python3 scripts/run_nuclear_extrapolated_measured_boundary_lane.py"
    - "python3 -m pytest tests/test_nuclear_extrapolated_measured_boundary_lane.py"
  code_references:
    - "scripts/run_nuclear_extrapolated_measured_boundary_lane.py"
    - "tests/test_nuclear_extrapolated_measured_boundary_lane.py"
  metrics:
    - "primary_delta_mae_mev"
    - "measured_comparison_delta_mae_mev"
    - "extrapolated_comparison_delta_mae_mev"
    - "edge_of_known_surface_delta_mae_mev"
    - "neutron_rich_delta_mae_mev"
    - "magic_region_delta_mae_mev"
    - "high_error_delta_mae_mev"
  output_paths:
    - "agent_runs/AGENT-RUN-0028/"
    - "docs/reviews/nuclear-extrapolated-measured-boundary-lane.md"

limitations:
  - "The NMD-0002 fit slice is measured-only."
  - "The extrapolated flag belongs to the AME2020 comparison column, not the new measured row value."
  - "This is retrospective sandbox evidence, not reveal scoring."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Review whether the measured/extrapolated boundary lane should remain preserved as bounded source-status diagnostic evidence."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Separate maintainer-reviewed follow-up before any RESULT, PRED, claim, knowledge, or reveal-scoring work."
