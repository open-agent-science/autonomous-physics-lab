id: HYP-PROPOSAL-0001
title: "Pendulum rational x-pole candidate"
campaign_profile_id: pendulum-formula-falsification
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0153

input_references:
  - "campaign_profiles/pendulum-formula-falsification.yaml"
  - "docs/notes/pff-001-pade-rational-family.md"
  - "docs/notes/pendulum-gauntlet-100.md"

hypothesis:
  statement: "A two-parameter rational function of x = sin^2(theta/2) may improve moderate-to-large amplitude residuals compared with a theta^2-only baseline."
  variables:
    - "theta: pendulum amplitude in radians"
    - "x = sin^2(theta/2)"
    - "a, b: fitted dimensionless coefficients"
  assumptions:
    - "The exact reference is T/T0 = (2/pi) K(sin^2(theta/2))."
    - "The candidate is fitted only on the configured train range 0.01 <= theta <= 1.10 rad."
    - "The denominator is bounded during fitting so sandbox execution cannot chase an unstable pole."
  expected_scope: "Configured pendulum train/test ranges only; stress diagnostics are non-promotional."
  expected_failure_modes:
    - "The rational pole shape does not match the logarithmic separatrix divergence."
    - "The candidate may improve over theta^2 while still losing to the current t4_x1 reference candidate."

novelty_check:
  checked_files:
    - "docs/notes/pff-001-pade-rational-family.md"
    - "docs/notes/pendulum-gauntlet-100.md"
    - "results/EXP-0001/RUN-0003/leaderboard.md"
  possible_overlap: "Related to PFF-001 but not represented in the 100 linear gauntlet candidates."
  notes: "This proposal tests a bounded two-parameter rational version rather than treating the family as accepted."

falsification_plan:
  deterministic_check: "Fit (1 + a*x) / (1 - b*x) on the train range and compare relative residuals against exact reference values."
  baseline_or_reference: "Exact reference baseline plus theta2-only and current t4_x1 leaderboard reference comparisons."
  pass_condition: "Sandbox pass if test mean relative error is below 1e-3 and limitations record that it does not promote a canonical result."
  fail_condition: "Sandbox fail if test mean relative error is at or above 1e-3 or stress diagnostics show an unbounded or misleading fit."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not claim exactness."
    - "Do not claim validity outside the configured range."
    - "Do not frame sandbox fit quality as stronger physical interpretation."
  mitigations:
    - "Compare against the current t4_x1 reference candidate."
    - "Report stress-range residuals separately from pass criteria."
    - "Keep all outputs under agent_runs/ and proposal directories."

sandbox_evidence:
  commands:
    - "python3 -m physics_lab.cli preflight-research-proposal hypothesis_proposals/pendulum/HYP-PROPOSAL-0001-rational-x1-pole.yaml"
  code_references:
    - "physics_lab/registry/research_proposals.py"
    - "scipy.special.ellipk"
    - "scipy.optimize.curve_fit"
  metrics:
    - "train_mean_relative_error"
    - "test_mean_relative_error"
    - "stress_mean_relative_error"
  output_paths:
    - "agent_runs/AGENT-RUN-0001/metrics.json"

limitations:
  - "Sandbox-only fit, not a canonical experiment."
  - "Does not beat the current t4_x1 reference candidate on the configured test range."
  - "Stress-range behavior remains diagnostic only."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether this rational family deserves a later canonical gauntlet task or should remain sandbox memory."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer-reviewed canonical task before any RESULT-* creation or claim update."
