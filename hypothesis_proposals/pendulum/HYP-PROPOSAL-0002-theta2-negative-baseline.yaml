id: HYP-PROPOSAL-0002
title: "Pendulum theta-squared negative baseline"
campaign_profile_id: pendulum-formula-falsification
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox negative-control candidate only; no canonical result or claim promotion."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0153

input_references:
  - "campaign_profiles/pendulum-formula-falsification.yaml"
  - "docs/notes/pendulum-gauntlet-100.md"

hypothesis:
  statement: "A one-parameter theta^2 candidate is expected to work only as a weak small-angle baseline and fail the configured test range."
  variables:
    - "theta: pendulum amplitude in radians"
    - "a: fitted dimensionless coefficient"
  assumptions:
    - "The exact elliptic-integral reference is used for all residual calculations."
    - "The model intentionally has only one fitted coefficient."
    - "The candidate is included as a negative-control sandbox execution."
  expected_scope: "Small-angle orientation only; expected to fail moderate-amplitude test residual criteria."
  expected_failure_modes:
    - "Missing theta^4 and x-basis curvature terms."
    - "Large test residual relative to t4_x1 and rational candidates."

novelty_check:
  checked_files:
    - "docs/notes/pendulum-gauntlet-100.md"
    - "results/EXP-0001/RUN-0003/leaderboard.md"
  possible_overlap: "Known simple baseline family."
  notes: "Selected deliberately as negative sandbox evidence, not as a new candidate."

falsification_plan:
  deterministic_check: "Fit 1 + a*theta^2 on the train range and compare residuals with exact reference values."
  baseline_or_reference: "Exact reference baseline plus current t4_x1 leaderboard reference comparison."
  pass_condition: "Sandbox pass only if test mean relative error is below 1e-3, which is not expected."
  fail_condition: "Sandbox fail if test mean relative error is at or above 1e-3."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not present a weak small-angle fit as broadly useful."
    - "Do not treat negative-control output as a canonical result."
  mitigations:
    - "Label this as a negative-control execution."
    - "Compare directly against stronger known reference candidates."

sandbox_evidence:
  commands:
    - "python3 -m physics_lab.cli preflight-research-proposal hypothesis_proposals/pendulum/HYP-PROPOSAL-0002-theta2-negative-baseline.yaml"
  code_references:
    - "physics_lab/registry/research_proposals.py"
    - "scipy.special.ellipk"
    - "scipy.optimize.curve_fit"
  metrics:
    - "train_mean_relative_error"
    - "test_mean_relative_error"
    - "stress_mean_relative_error"
  output_paths:
    - "agent_runs/AGENT-RUN-0002/metrics.json"

limitations:
  - "Negative-control sandbox run only."
  - "Not intended as a candidate for canonical promotion."

verdict: SANDBOX_FAIL
maintainer_decision_requested: "Retain as negative sandbox evidence for the first autonomous pendulum pilot."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "No promotion requested; keep as sandbox negative evidence."
