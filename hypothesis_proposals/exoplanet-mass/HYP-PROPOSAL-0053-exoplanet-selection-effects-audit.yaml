id: HYP-PROPOSAL-0053
title: "Exoplanet host and uncertainty selection-effects audit hypothesis"
campaign_profile_id: exoplanet-mass-radius
proposal_kind: audit
status: REVIEW_READY

claim_ceiling: "Sandbox audit only; no canonical result, prediction registry entry, host-star causal claim, composition inference, habitability label, biosignature wording, target-prioritization output, claim update, or knowledge edit."

proposed_by:
  contributor_id: master
  agent_id: codex
  task_id: TASK-0392

input_references:
  - "docs/reviews/exoplanet-mass-radius-residual-failure-map.md"
  - "docs/reviews/exoplanet-true-mass-residual-slice-audit.md"
  - "data/exoplanets/exo-0001-pscomppars-snapshot.yaml"

hypothesis:
  statement: "On the committed PSCompPars residual surface, apparent frozen CK17 residual stress in host-star, uncertainty, detection-method, and missingness slices may be explained by catalog-selection surfaces and sample-size matched controls rather than by a promotable planet-law signal."
  variables:
    - "log10 observed transit radius"
    - "log10 frozen CK17-predicted radius"
    - "log10 residual = observed - CK17"
    - "host effective temperature, stellar mass, and stellar radius"
    - "detection method"
    - "mass and radius relative uncertainty"
    - "metadata missingness indicators"
    - "nearest-mass same-axis sample-size matched controls"
  assumptions:
    - "The committed exo-0001-pscomppars-snapshot.yaml is the sole data input."
    - "No live NASA Exoplanet Archive fetch is performed."
    - "The committed quality-filter chain is applied before residual metrics."
    - "The frozen Chen-Kipping 2017 baseline is reused without refitting any segment."
    - "True-mass and minimum-mass rows are separated throughout."
    - "Sample-size matched controls are diagnostic, not causal adjustments."
  expected_scope: "Sandbox-only selection-effects audit over host-star fields, uncertainty bands, detection method, and missingness indicators."
  expected_failure_modes:
    - "Minimum-mass rows may be too sparse for interpretable slice comparisons."
    - "Large detection-method slices may lack enough non-slice rows for matched controls."
    - "Matched controls may erase apparent slice signals."
    - "Metadata missingness may be correlated with selection and follow-up history."

novelty_check:
  checked_files:
    - "docs/reviews/exoplanet-mass-radius-residual-failure-map.md"
    - "docs/reviews/exoplanet-true-mass-residual-slice-audit.md"
    - "tasks/TASK-0392-audit-exoplanet-host-and-uncertainty-selection-effects.yaml"
  possible_overlap: "Builds directly on prior exoplanet residual maps, but packages a dedicated host, uncertainty, detection-method, and missingness control audit."
  notes: "First selection-effects audit in the exoplanet campaign that reports slice controls and a reusable limitations table."

falsification_plan:
  deterministic_check: "Run scripts/run_exoplanet_host_uncertainty_selection_effects.py against the committed snapshot and compare AGENT-RUN-0038 artifacts."
  baseline_or_reference: "Frozen Chen-Kipping 2017 piecewise median mass-radius baseline with same-axis nearest-mass sample-size controls."
  pass_condition: "Pass as a sandbox audit if the runner is deterministic, separates true-mass and minimum-mass axes, reports host/uncertainty/detection/missingness slices, and preserves control-erased and underpowered outcomes."
  fail_condition: "Fail if the runner fetches live data, refits CK17, mixes minimum-mass rows into headline metrics, omits matched controls, hides null outcomes, or frames residual slices as causal host-star physics, composition, habitability, target priority, or a universal law."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "No causal host-star physics claim."
    - "No composition inference from residual stress."
    - "No habitability, biosignature, or target-priority claim."
    - "No description of a residual slice as a universal planet law."
    - "No claim promotion or knowledge promotion."
  mitigations:
    - "Keep outputs sandbox-only."
    - "Use true-mass rows as the primary axis."
    - "Report minimum-mass rows as diagnostic-only."
    - "Preserve control-erased and underpowered slices."
    - "Require maintainer review before any follow-up promotion."

sandbox_evidence:
  commands:
    - "python3 scripts/run_exoplanet_host_uncertainty_selection_effects.py"
    - "python3 -m pytest tests/test_exoplanet_host_uncertainty_selection_effects.py"
  code_references:
    - "physics_lab/engines/exoplanet_mass_radius.py"
    - "physics_lab/datasets/exoplanets.py"
    - "scripts/run_exoplanet_host_uncertainty_selection_effects.py"
    - "tests/test_exoplanet_host_uncertainty_selection_effects.py"
  metrics:
    - "per_axis_log10_rmse"
    - "per_slice_log10_rmse"
    - "per_slice_sample_size_matched_control_log10_rmse"
    - "delta_log10_rmse_slice_minus_axis"
    - "delta_log10_rmse_slice_minus_control"
    - "control_erased_slice_count"
    - "underpowered_slice_count"
  output_paths:
    - "agent_runs/AGENT-RUN-0038/metrics.json"
    - "agent_runs/AGENT-RUN-0038/report.md"
    - "docs/reviews/exoplanet-host-uncertainty-selection-effects.md"

limitations:
  - "Residual summaries are retrospective diagnostics over the committed snapshot only."
  - "Sample-size matched controls are deterministic nearest-mass non-slice controls, not causal adjustments."
  - "Host-star fields, uncertainty fields, detection method, and missingness are catalog-selection surfaces."
  - "True-mass rows and minimum-mass rows are reported separately."
  - "No live fetch, baseline refit, canonical result, prediction, claim, or knowledge update is authorized."

verdict: INCONCLUSIVE
maintainer_decision_requested: "Review whether the limitations table should become the required citation surface for future exoplanet residual tasks."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer review before any RESULT-*, PRED-*, claim, knowledge, composition, habitability, biosignature, target-priority, or causal host-star wording."
