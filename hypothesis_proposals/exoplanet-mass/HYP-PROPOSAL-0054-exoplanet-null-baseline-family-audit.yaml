id: HYP-PROPOSAL-0054
title: "Exoplanet null-baseline family audit"
campaign_profile_id: exoplanet-mass-radius
proposal_kind: falsification
status: REVIEW_READY

claim_ceiling: "Sandbox audit only; no canonical result, prediction registry entry, composition inference, habitability label, biosignature wording, target-prioritization output, claim update, or knowledge edit."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0483

input_references:
  - "data/exoplanets/exo-0001-pscomppars-snapshot.yaml"
  - "docs/reviews/exoplanet-failure-map-result-promotion-scorecard.md"
  - "docs/reviews/exoplanet-compact-subneptune-matched-control-audit.md"
  - "docs/reviews/exoplanet-compact-radius-mass-quartile-scout.md"

hypothesis:
  statement: "On the committed PSCompPars snapshot, simple deterministic null baselines explain enough CK17 residual structure that compact-radius and related slices must remain benchmark diagnostics rather than physical claims."
  variables:
    - "log10 observed transit radius"
    - "log10 frozen CK17-predicted radius"
    - "CK17 log10 residual = observed - predicted"
    - "per-CK17-class median residual shift"
    - "nearest-mass residual shift"
    - "nearest-radius residual shift"
    - "uncertainty-band median residual shift"
    - "true-mass and minimum-mass residual axes"
  assumptions:
    - "The committed exo-0001-pscomppars-snapshot.yaml is the sole data input."
    - "No live NASA Exoplanet Archive fetch is performed."
    - "The frozen Chen-Kipping 2017 baseline is reused without refitting any segment."
    - "True-mass and minimum-mass rows are reported separately."
    - "Compact-radius, sub-Neptune, Jovian-radius, and hot-Jupiter slices are interpreted only when sample size allows."
    - "Negative, control-sensitive, null, and underpowered outcomes are preserved."
  expected_scope: "Sandbox-only control panel comparing CK17 residuals with at least three deterministic null baselines."
  expected_failure_modes:
    - "A nearest-radius diagnostic may explain residual structure because it uses the target coordinate."
    - "Per-class and uncertainty-band same-sample controls may absorb broad catalog-selection effects."
    - "The minimum-mass axis may remain underpowered."
    - "Hot-Jupiter or Jovian-radius slices may be control-sensitive rather than independently interpretable."

novelty_check:
  checked_files:
    - "agent_runs/AGENT-RUN-0032/metrics.json"
    - "agent_runs/AGENT-RUN-0042/metrics.json"
    - "agent_runs/AGENT-RUN-0049/metrics.json"
  possible_overlap: "Builds on existing CK17 and compact-radius audits but broadens the control panel to a null-baseline family across required slices."
  notes: "First exoplanet audit dedicated to comparing several deterministic null baseline families across compact, sub-Neptune, Jovian-radius, hot-Jupiter, true-mass, and minimum-mass surfaces."

falsification_plan:
  deterministic_check: "Run scripts/run_exoplanet_null_baseline_family_audit.py against the committed snapshot and inspect AGENT-RUN-0050."
  baseline_or_reference: "Frozen Chen-Kipping 2017 residuals compared with per-class, nearest-mass, nearest-radius, and uncertainty-band residual-shift null baselines."
  pass_condition: "Sandbox pass if the runner is deterministic, uses only the committed snapshot, reports the required axes and slices separately, includes at least three null baselines, and preserves underpowered or control-sensitive outcomes."
  fail_condition: "Fail if the runner fetches live data, refits CK17, mixes true-mass and minimum-mass rows, hides null outcomes, or frames residual stress as composition, habitability, target priority, or a new mass-radius law."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "No composition inference from residual stress."
    - "No habitability, biosignature, or target-priority claim."
    - "No description of residual structure as a universal planet law."
    - "No prediction registry, claim, or knowledge promotion."
  mitigations:
    - "Keep outputs sandbox-only."
    - "Report true-mass and minimum-mass axes separately."
    - "Mark nearest-radius as an oracle-like diagnostic control."
    - "Preserve control-sensitive and underpowered verdicts."

sandbox_evidence:
  commands:
    - "python3 scripts/run_exoplanet_null_baseline_family_audit.py"
    - "python3 -m pytest tests/test_exoplanet_null_baseline_family_audit.py"
  code_references:
    - "physics_lab/engines/exoplanet_mass_radius.py"
    - "physics_lab/datasets/exoplanets.py"
    - "scripts/run_exoplanet_null_baseline_family_audit.py"
    - "tests/test_exoplanet_null_baseline_family_audit.py"
  metrics:
    - "per_slice_ck17_log10_rmse"
    - "per_slice_null_family_log10_rmse"
    - "delta_log10_rmse_ck17_minus_best_null"
    - "best_null_per_slice"
    - "control_sensitive_slice_status"
    - "underpowered_slice_status"
  output_paths:
    - "agent_runs/AGENT-RUN-0050/metrics.json"
    - "agent_runs/AGENT-RUN-0050/report.md"
    - "docs/reviews/exoplanet-null-baseline-family-audit.md"

limitations:
  - "Null baselines are same-snapshot controls, not independent physical models."
  - "Nearest-radius uses the target coordinate and is diagnostic only."
  - "Minimum-mass rows are sparse diagnostics."
  - "No composition, habitability, biosignature, target-priority, prediction, claim, or knowledge output is authorized."

verdict: INCONCLUSIVE
maintainer_decision_requested: "Review whether the null-family control panel should gate future compact-radius follow-ups or remain sandbox diagnostic memory only."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer-reviewed follow-up task before any RESULT-*, PRED-*, claim, knowledge, composition, habitability, biosignature, target-priority, or planet-law promotion."
