id: HYP-PROPOSAL-0049
title: "Exoplanet mass-radius frozen-baseline benchmark hypothesis"
campaign_profile_id: exoplanet-mass-radius
proposal_kind: falsification
status: REVIEW_READY

claim_ceiling: "Sandbox benchmark hypothesis only; no canonical claim, prediction registry entry, habitability label, or target-prioritization promotion."

proposed_by:
  contributor_id: roman
  agent_id: claude
  task_id: TASK-0361

input_references:
  - "campaign_profiles/exoplanet-mass-radius.yaml"
  - "docs/campaigns/exoplanet-mass-radius.md"
  - "docs/exoplanet-mass-radius-baseline-protocol.md"
  - "docs/reviews/exoplanet-pscomppars-snapshot-ingestion.md"
  - "docs/reviews/exoplanet-loader-dry-run.md"
  - "data/exoplanets/exo-0001-pscomppars-snapshot.yaml"

hypothesis:
  statement: "A frozen Chen-Kipping-style piecewise median mass-radius relation reproduces the post-filter PSCompPars snapshot residuals well enough to beat a per-class median null baseline on log10 RMSE for both the true-mass-with-transit-radius and minimum-mass-with-transit-radius axes, without any new free parameters being fit to the snapshot."
  variables:
    - "log10(mass / Earth-mass) for both true-mass and minimum-mass rows"
    - "log10(radius / Earth-radius) for transit-radius rows"
    - "CK17 piecewise median predicted radius (frozen)"
    - "per-CK17-class median log10(radius) null baseline (trained on the same eligible rows)"
    - "log10 residual = log10(observed_radius) - log10(predicted_radius)"
  assumptions:
    - "The committed exo-0001-pscomppars-snapshot.yaml is the sole input; no live NASA Exoplanet Archive fetch is performed."
    - "The committed loader and quality-filter chain (sigma_M/M <= 0.30, sigma_R/R <= 0.15) is applied before any metric is computed."
    - "The frozen CK17 piecewise relation is treated as a published baseline; no segment slope, prefactor, or changepoint is re-fit on the snapshot."
    - "The per-class median null baseline is computed on the same eligible rows and is intended as a non-trivial floor, not as a candidate physical model."
    - "Negative or null-beats-baseline outcomes are reportable evidence and remain in sandbox memory."
  expected_scope: "Sandbox-only residual comparison on the post-filter snapshot, reporting overall, per-class, and per-detection-method metrics for both eligible residual axes."
  expected_failure_modes:
    - "Per-class median may beat CK17 on one or both axes when intra-class scatter is small."
    - "The minimum-mass axis is biased upward in mass and may inflate residuals against any true-mass baseline."
    - "Inflated hot-Jupiter and sub-Neptune transition rows can dominate the per-class metrics."
    - "Quality thresholds may admit rows with under-reported uncertainties that bias the residual distribution."

novelty_check:
  checked_files:
    - "docs/campaigns/exoplanet-mass-radius.md"
    - "docs/exoplanet-mass-radius-baseline-protocol.md"
    - "docs/reviews/exoplanet-loader-dry-run.md"
  possible_overlap: "Builds directly on the TASK-0346 baseline protocol and the TASK-0354 loader dry run; no prior committed agent run has executed this benchmark on the pinned snapshot."
  notes: "This is the first executed residual comparison for the exoplanet campaign and is intentionally limited to two frozen baselines."

falsification_plan:
  deterministic_check: "Run scripts/run_exoplanet_mass_radius_baseline.py against the committed snapshot and compare recomputed metrics against the committed agent_runs/AGENT-RUN-0032/metrics.json."
  baseline_or_reference: "Frozen Chen-Kipping 2017 piecewise median mass-radius baseline (ApJ 834, 17, DOI 10.3847/1538-4357/834/1/17), with a per-CK17-class median log10(radius) null baseline computed on the same eligible rows."
  pass_condition: "Sandbox pass if the runner is deterministic, both baselines are reported on both eligible residual axes, pre-filter and post-filter row counts are recorded, per-class and per-detection-method splits are recorded, and no canonical result, prediction registry entry, claim update, or habitability/biosignature/target-prioritization output is produced."
  fail_condition: "Fail if the runner fetches live data, fits a new free parameter to the snapshot, hides the null baseline, omits per-class or per-method splits, or frames residual improvements as a habitability, target-priority, or planet-discovery claim."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not frame residual improvement as a habitability or biosignature claim."
    - "Do not frame the benchmark as a target-prioritization tool."
    - "Do not call the CK17 baseline a discovery or a new physical law."
    - "Do not treat null-beats-baseline outcomes as failures to suppress."
  mitigations:
    - "Keep outputs sandbox-only."
    - "Report per-class, per-detection-method, and pre/post filter splits."
    - "Preserve null and inconclusive outcomes."
    - "Require maintainer review before any follow-up promotion."

sandbox_evidence:
  commands:
    - "python3 scripts/run_exoplanet_mass_radius_baseline.py"
    - "python3 -m pytest tests/test_exoplanet_mass_radius_baseline.py"
  code_references:
    - "physics_lab/engines/exoplanet_mass_radius.py"
    - "physics_lab/datasets/exoplanets.py"
    - "scripts/run_exoplanet_mass_radius_baseline.py"
    - "tests/test_exoplanet_mass_radius_baseline.py"
  metrics:
    - "log10_mae_chen_kipping_per_axis"
    - "log10_rmse_chen_kipping_per_axis"
    - "log10_mae_null_baseline_per_axis"
    - "log10_rmse_null_baseline_per_axis"
    - "per_class_log10_rmse_chen_kipping"
    - "per_detection_method_log10_rmse_chen_kipping"
    - "pre_filter_included_count"
    - "post_filter_included_count"
  output_paths:
    - "agent_runs/AGENT-RUN-0032/metrics.json"
    - "agent_runs/AGENT-RUN-0032/report.md"
    - "docs/reviews/exoplanet-mass-radius-baseline-benchmark.md"

limitations:
  - "CK17 segment slopes and changepoints are pinned; the snapshot is not used to refit any segment."
  - "The minimum-mass axis treats M sin i as a lower bound on true mass and therefore biases residuals on RV-only systems."
  - "Quality filters use only reported sigma_M and sigma_R; covariance with host-star parameters is not modelled."
  - "The per-class median null baseline shares training rows with its scoring rows; this is intentional as a floor, not as predictive evidence."
  - "No habitability, biosignature, target-priority, prediction registry, claim, or knowledge promotion is authorised."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Review whether the frozen-baseline benchmark should remain as the first preserved exoplanet residual surface and whether any narrower follow-up lane is warranted."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer-reviewed canonical experiment task before any RESULT-*, PRED-*, claim, knowledge, or habitability/target-prioritization promotion."
