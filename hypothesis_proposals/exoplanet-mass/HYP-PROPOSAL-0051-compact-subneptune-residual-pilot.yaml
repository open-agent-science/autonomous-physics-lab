id: HYP-PROPOSAL-0051
title: "Compact/sub-Neptune residual stress pilot hypothesis"
campaign_profile_id: exoplanet-mass-radius
proposal_kind: falsification
status: REVIEW_READY

claim_ceiling: "Sandbox pilot only; no canonical result, prediction registry entry, composition inference, habitability label, biosignature wording, target-prioritization output, claim update, or knowledge edit."

proposed_by:
  contributor_id: master
  agent_id: codex
  task_id: TASK-0390

input_references:
  - "docs/reviews/exoplanet-mass-radius-residual-failure-map.md"
  - "docs/reviews/exoplanet-true-mass-residual-slice-audit.md"
  - "agent_runs/AGENT-RUN-0032/metrics.json"
  - "agent_runs/AGENT-RUN-0034/metrics.json"
  - "data/exoplanets/exo-0001-pscomppars-snapshot.yaml"

hypothesis:
  statement: "On the committed PSCompPars true-mass/transit-radius surface, compact and sub-Neptune radius slices retain larger frozen CK17 log10-radius residual stress than the eligible true-mass surface and matched controls."
  variables:
    - "log10 observed transit radius"
    - "log10 frozen CK17-predicted radius"
    - "log10 residual = observed - CK17"
    - "planet radius in Earth radii for compact and sub-Neptune cuts"
    - "planet mass in Earth masses for CK17 class and matched-size controls"
    - "host effective temperature for generated host-context sensitivity"
    - "reported radius relative uncertainty for generated uncertainty sensitivity"
  assumptions:
    - "The committed exo-0001-pscomppars-snapshot.yaml is the sole data input."
    - "No live NASA Exoplanet Archive fetch is performed."
    - "The committed quality-filter chain is applied before residual metrics."
    - "The frozen Chen-Kipping 2017 baseline is reused without refitting any segment."
    - "True-mass rows are the primary interpretable axis."
    - "Minimum-mass rows remain diagnostic-only."
    - "Negative, null, and generated-only outcomes are preserved in sandbox evidence."
  expected_scope: "Sandbox-only compact/sub-Neptune residual pilot with 4-8 generated hypotheses and 1-3 executed hypotheses."
  expected_failure_modes:
    - "Per-class median controls may absorb much of the compact/sub-Neptune bias."
    - "Shuffled-label controls may match a candidate slice when the eligible residual distribution is broad."
    - "Matched-size controls may show that local mass composition explains the apparent residual stress."
    - "Generated host and uncertainty slices remain selection-sensitive and are not interpreted without a follow-up task."

novelty_check:
  checked_files:
    - "docs/reviews/exoplanet-mass-radius-residual-failure-map.md"
    - "docs/reviews/exoplanet-true-mass-residual-slice-audit.md"
    - "agent_runs/AGENT-RUN-0035/metrics.json"
  possible_overlap: "Builds directly on prior exoplanet residual maps and the regime scout, but narrows the task to compact/sub-Neptune residual stress on the true-mass axis."
  notes: "First compact/sub-Neptune-specific residual hypothesis pilot in the exoplanet campaign."

falsification_plan:
  deterministic_check: "Run scripts/run_exoplanet_compact_subneptune_residual_pilot.py against the committed snapshot and compare the generated AGENT-RUN-0036 artifacts."
  baseline_or_reference: "Frozen Chen-Kipping 2017 piecewise median mass-radius baseline, compared with per-class median, shuffled-label, and matched-size controls."
  pass_condition: "Sandbox pass if the runner is deterministic, executes 1-3 hypotheses, reports all generated hypotheses, and at least one executed compact/sub-Neptune hypothesis exceeds both the eligible true-mass surface and its adverse control by 0.022 log10 RMSE."
  fail_condition: "Fail if the runner fetches live data, refits CK17, mixes minimum-mass rows into headline metrics, omits controls, hides null outcomes, or frames residual stress as composition, habitability, target priority, or a universal law."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "No composition inference from residual stress."
    - "No habitability, biosignature, or target-priority claim."
    - "No description of a residual slice as a universal planet law."
    - "No claim promotion or knowledge promotion."
  mitigations:
    - "Keep outputs sandbox-only."
    - "Use true-mass rows as the primary axis."
    - "Report minimum-mass rows as diagnostic-only."
    - "Preserve generated-only, null, and weaker-control outcomes."
    - "Require maintainer review before any follow-up promotion."

sandbox_evidence:
  commands:
    - "python3 scripts/run_exoplanet_compact_subneptune_residual_pilot.py"
    - "python3 -m pytest tests/test_exoplanet_compact_subneptune_residual_pilot.py"
  code_references:
    - "physics_lab/engines/exoplanet_mass_radius.py"
    - "physics_lab/datasets/exoplanets.py"
    - "scripts/run_exoplanet_compact_subneptune_residual_pilot.py"
    - "tests/test_exoplanet_compact_subneptune_residual_pilot.py"
  metrics:
    - "per_hypothesis_candidate_log10_rmse"
    - "per_hypothesis_per_class_median_control_log10_rmse"
    - "per_hypothesis_shuffled_label_control_log10_rmse"
    - "per_hypothesis_matched_size_neighbor_control_log10_rmse"
    - "delta_log10_rmse_candidate_minus_eligible"
    - "delta_log10_rmse_candidate_minus_adverse_control"
    - "true_mass_axis_row_count"
    - "minimum_mass_diagnostic_row_count"
  output_paths:
    - "agent_runs/AGENT-RUN-0036/metrics.json"
    - "agent_runs/AGENT-RUN-0036/report.md"
    - "docs/reviews/exoplanet-compact-subneptune-residual-hypothesis-pilot.md"

limitations:
  - "Residual hypotheses use committed catalog fields and frozen CK17 residuals only."
  - "The shuffled-label control is one deterministic draw, not a Monte Carlo distribution."
  - "Controls share the same eligible true-mass surface and are diagnostic, not causal."
  - "Minimum-mass rows are reported only as sparse diagnostics."
  - "No composition, habitability, biosignature, target-priority, prediction, claim, or knowledge output is authorized."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Review whether the compact slice warrants a narrower follow-up task under the exoplanet baseline protocol, or whether this should remain a sandbox residual-stress note only."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer-reviewed follow-up task before any RESULT-*, PRED-*, claim, knowledge, composition, habitability, biosignature, or target-priority promotion."
