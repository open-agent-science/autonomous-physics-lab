id: HYP-PROPOSAL-0050
title: "Exoplanet regime residual scout hypothesis"
campaign_profile_id: exoplanet-mass-radius
proposal_kind: falsification
status: REVIEW_READY

claim_ceiling: "Sandbox scout only; no canonical claim, prediction registry entry, habitability label, composition inference, or target-prioritization promotion."

proposed_by:
  contributor_id: roman
  agent_id: claude
  task_id: TASK-0370

input_references:
  - "campaign_profiles/exoplanet-mass-radius.yaml"
  - "docs/campaigns/exoplanet-mass-radius.md"
  - "docs/exoplanet-mass-radius-baseline-protocol.md"
  - "docs/reviews/exoplanet-mass-radius-baseline-benchmark.md"
  - "agent_runs/AGENT-RUN-0032/metrics.json"
  - "data/exoplanets/exo-0001-pscomppars-snapshot.yaml"

hypothesis:
  statement: "Frozen Chen-Kipping 2017 log10-radius residuals on the committed PSCompPars eligible slice exhibit visible structure across at least one known physical regime boundary (super-Earth/sub-Neptune transition, Jovian-radius plateau, or hot-Jupiter high-irradiation), beyond what a per-class median shift, a shuffled-regime control, or a sample-size-matched neighbor control reproduces."
  variables:
    - "log10(observed radius / Earth-radius) for true-mass + transit-radius rows"
    - "log10(CK17-predicted radius / Earth-radius) (frozen)"
    - "log10 residual = observed - CK17"
    - "host-star effective temperature (K), used to select FGK / M-dwarf slices"
    - "equilibrium temperature (K) for hot-Jupiter regime selection"
    - "planet mass (Earth-masses) for regime mass cuts"
    - "orbital period (days) for ultra-short-period and long-period slices"
  assumptions:
    - "The committed exo-0001-pscomppars-snapshot.yaml is the sole input; no live NASA Exoplanet Archive fetch."
    - "The committed loader and quality-filter chain (sigma_M/M <= 0.30, sigma_R/R <= 0.15) is applied before any metric is computed."
    - "The frozen CK17 piecewise relation is treated as a published baseline; no segment slope, prefactor, or changepoint is re-fit."
    - "Regime predicates use only committed catalog fields; no derived physical model is fit per regime."
    - "Negative and inconclusive outcomes are reportable evidence and remain in sandbox memory."
  expected_scope: "Sandbox-only regime scout on the post-filter snapshot, reporting per-regime residual statistics plus three matched controls per executed regime."
  expected_failure_modes:
    - "Regimes that depend on equilibrium temperature or orbital period have smaller slices because those fields are present for a subset of rows."
    - "Per-class median and matched-neighbor controls share rows with the candidate; the controls beat or tie the candidate when the regime cut does not add structure."
    - "Shuffled-regime control may visually match the candidate when the eligible-set residual distribution is narrow."
    - "Quality-filter rows with under-reported uncertainties may bias the per-regime residual distribution."

novelty_check:
  checked_files:
    - "docs/reviews/exoplanet-mass-radius-baseline-benchmark.md"
    - "docs/exoplanet-mass-radius-baseline-protocol.md"
  possible_overlap: "Builds directly on the TASK-0361 frozen-baseline benchmark and the TASK-0346 baseline protocol; no prior committed agent run has executed a per-regime scout against CK17 residuals on the pinned snapshot."
  notes: "First per-regime scout for the exoplanet campaign."

falsification_plan:
  deterministic_check: "Run scripts/run_exoplanet_regime_residual_scout.py against the committed snapshot and compare recomputed metrics with the committed agent_runs/AGENT-RUN-0035/metrics.json."
  baseline_or_reference: "Frozen Chen-Kipping 2017 piecewise median mass-radius baseline (ApJ 834, 17, DOI 10.3847/1538-4357/834/1/17), compared against per-CK17-class median null baseline, shuffled-regime control, and sample-size-matched mass-neighbor control."
  pass_condition: "Sandbox pass if the runner is deterministic, at least one executed regime produces log10 RMSE lower than the eligible-set baseline AND lower than its strongest control by the survival margin (0.022 log10 RMSE), and no canonical result, prediction registry entry, claim update, knowledge file edit, or habitability / biosignature / target-prioritization output is produced."
  fail_condition: "Fail if the runner fetches live data, refits any CK17 segment, omits any of the three controls per executed regime, ignores the minimum-slice gate, or frames any regime as a habitability, biosignature, composition, or target-priority claim."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "No habitability, biosignature, or composition claim from a regime residual."
    - "No target-prioritization or planet-discovery framing."
    - "No description of CK17 as a discovery or as a new physical law."
    - "No promotion of a regime cut as a universal planet-class boundary."
  mitigations:
    - "Keep outputs sandbox-only."
    - "Three controls per executed regime."
    - "Minimum-slice gate of 30 rows enforced before any verdict."
    - "Preserve negative and inconclusive outcomes."
    - "Require maintainer review before any follow-up promotion."

sandbox_evidence:
  commands:
    - "python3 scripts/run_exoplanet_regime_residual_scout.py"
    - "python3 -m pytest tests/test_exoplanet_regime_residual_scout.py"
  code_references:
    - "physics_lab/engines/exoplanet_mass_radius.py"
    - "physics_lab/datasets/exoplanets.py"
    - "scripts/run_exoplanet_regime_residual_scout.py"
    - "tests/test_exoplanet_regime_residual_scout.py"
  metrics:
    - "per_regime_log10_rmse_candidate"
    - "per_regime_log10_rmse_per_class_median_control"
    - "per_regime_log10_rmse_shuffled_regime_control"
    - "per_regime_log10_rmse_matched_size_neighbor_control"
    - "delta_log10_rmse_eligible_minus_candidate"
    - "delta_log10_rmse_strongest_control_minus_candidate"
    - "regime_row_counts"
    - "eligible_true_mass_with_transit_radius"
  output_paths:
    - "agent_runs/AGENT-RUN-0035/metrics.json"
    - "agent_runs/AGENT-RUN-0035/report.md"
    - "docs/reviews/exoplanet-regime-residual-scout.md"

limitations:
  - "Regime predicates use only committed catalog fields and CK17; no per-regime CK17 refit is performed."
  - "Per-class median, shuffled-regime, and sample-size-matched controls share rows with the candidate where they overlap; the controls are interpreted as floors, not orthogonal nulls."
  - "Minimum slice count is 30 rows; smaller regimes are flagged under_minimum_slice and excluded from the verdict."
  - "Shuffled-regime control is single-draw with a deterministic seed; no Monte-Carlo distribution is computed."
  - "Equilibrium temperature and orbital period are present for only a subset of rows; regimes that depend on them are smaller by construction."
  - "No habitability, biosignature, composition, target-priority, prediction registry, claim, or knowledge promotion is authorised."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Review whether any executed regime warrants a narrower follow-up under the existing exoplanet baseline protocol."

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: "Maintainer-reviewed canonical experiment task before any RESULT-*, PRED-*, claim, knowledge, or habitability / biosignature / target-prioritization promotion."
