id: HYP-PROPOSAL-0059
title: "MD-0002 formation-energy cation-pair baseline sandbox hypothesis"
campaign_profile_id: materials-property-residuals
proposal_kind: falsification
status: REVIEW_READY

claim_ceiling: >
  Sandbox evidence about one frozen computed-DFT slice only; no materials law,
  measured-property claim, recommendation, claim update, or knowledge update.

proposed_by:
  contributor_id: romanhladun24-dot
  agent_id: codex
  task_id: TASK-0703

input_references:
  - "campaign_profiles/materials-property-residuals.yaml"
  - "docs/reviews/materials-md0002-benchmark-control-plan.md"
  - "docs/reviews/materials-md0002-acquisition-validation-and-holdout-freeze.md"
  - "data/materials/md-0002-materials-project-stable-ternary-oxides.yaml"
  - "data/materials/md0002_holdout_manifest.yaml"

hypothesis:
  statement: >
    On frozen MD-0002 formation-energy rows, a train-only exact cation-pair
    mean can beat global train statistics while surviving declared shuffle
    controls and seeded split-sensitivity checks.
  variables:
    - "formation energy per atom in eV/atom"
    - "unordered exact cation pair"
    - "cation-family pair"
    - "spacegroup symbol"
    - "frozen train, validation, and holdout lane"
  assumptions:
    - "Only committed computed-DFT rows are used."
    - "No live fetch occurs."
    - "Formation energy is not pooled with band gap."
    - "All group statistics are fitted on train rows only."
  expected_scope: >
    Sandbox comparison of global, composition-group, and structure-group
    baselines on the checksum-pinned 362-row MD-0002 formation-energy axis.
  expected_failure_modes:
    - "A global null may beat the composition baselines."
    - "A nominal holdout win may fail shuffle controls."
    - "The selected baseline may be split-sensitive."
    - "Unseen groups may collapse to the global fallback."

novelty_check:
  checked_files:
    - "docs/reviews/materials-md0002-benchmark-control-plan.md"
    - "docs/reviews/materials-md0002-acquisition-validation-and-holdout-freeze.md"
    - "agent_runs/AGENT-RUN-0072/metrics.json"
  possible_overlap: >
    Extends the predeclared MD-0002 plan and frozen acquisition; no prior
    committed agent run executes this formation-energy benchmark.
  notes: "The proposal mirrors the sandbox boundary required by agent_run.yaml."

falsification_plan:
  deterministic_check: >
    Run scripts/run_materials_md0002_formation_energy_benchmark.py twice and
    compare complete metrics, declared controls, and frozen split counts.
  baseline_or_reference: >
    Best global null baseline from train mean and median, plus declared
    random-label negative-comparison controls.
  pass_condition: >
    Pass only if a composition baseline clears both predeclared improvement
    margins, beats every shuffle-control seed, is row-order invariant, and wins
    at least four of five seeded split checks with margin above noise.
  fail_condition: >
    Fail or remain inconclusive if any frozen binding differs, a stop condition
    triggers, a control wins, or split robustness is not established.

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not call the cation-pair mean a universal materials law."
    - "Do not describe computed DFT values as experimental measurements."
    - "Do not recommend a material, synthesis, device, or biomedical use."
  mitigations:
    - "Keep the dataset and split scope explicit."
    - "Report nulls and negative controls alongside the selected baseline."
    - "Route claim and knowledge impact to none."

sandbox_evidence:
  commands:
    - "python scripts/run_materials_md0002_formation_energy_benchmark.py --config examples/benchmarks/materials_md0002_formation_energy.yaml --output-dir agent_runs/AGENT-RUN-0072"
  code_references:
    - "physics_lab/engines/materials_md0002_baseline.py"
    - "scripts/run_materials_md0002_formation_energy_benchmark.py"
    - "tests/test_materials_md0002_baseline.py"
  metrics:
    - "holdout MAE by baseline"
    - "absolute and relative improvement against best global null"
    - "shuffle-control MAE by seed"
    - "seeded split wins, mean margin, and across-seed noise"
    - "leave-group-out diagnostics"
  output_paths:
    - "agent_runs/AGENT-RUN-0072/metrics.json"
    - "agent_runs/AGENT-RUN-0072/report.md"
    - "docs/reviews/materials-md0002-formation-energy-baseline-benchmark.md"

limitations:
  - "Computed DFT values only."
  - "The accepted slice contains 362 materials."
  - "The selected comparator is descriptive and train-only."
  - "No claim or knowledge promotion is supported by the sandbox record."

verdict: SANDBOX_PASS
maintainer_decision_requested: >
  Review the sandbox evidence and decide whether to queue a separate
  task-authorized Gate A result package without promoting a claim or knowledge
  entry.

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: >
    Create a separate publication task with explicit protected-path authority;
    this proposal remains sandbox-only.
