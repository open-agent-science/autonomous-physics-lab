id: HYP-PROPOSAL-0063
title: "MD-0002 disjoint A-site cation-family transfer sandbox hypothesis"
campaign_profile_id: materials-property-residuals
proposal_kind: falsification
status: REVIEW_READY

claim_ceiling: >
  Sandbox evidence about one frozen computed-DFT slice only; a bounded
  model-vs-model generalization benchmark. No materials law, measured-property
  claim, material-design-law, property-prediction, recommendation, device,
  synthesis, claim update, or knowledge update.

proposed_by:
  contributor_id: gladunrv
  agent_id: claude
  task_id: TASK-0838

input_references:
  - "campaign_profiles/materials-property-residuals.yaml"
  - "docs/reviews/materials-independent-transfer-route-scout.md"
  - "results/EXP-0014/RUN-0001/result.yaml"
  - "data/materials/md-0002-materials-project-stable-ternary-oxides.yaml"
  - "data/materials/md0002_holdout_manifest.yaml"

hypothesis:
  statement: >
    The frozen RESULT-0021 baseline model (exact unordered non-oxygen
    cation-pair train-mean of formation_energy_per_atom, with a global-train-mean
    fallback) transfers across a chemically-disjoint A-site cation-family split:
    fitted on one family (alkali-transition or alkaline-earth-transition) it
    beats null / shuffled / per-class-median controls on the disjoint held-out
    family by a predeclared margin in both directions.
  variables:
    - "formation energy per atom in eV/atom"
    - "exact unordered non-oxygen cation pair (frozen descriptor)"
    - "disjoint A-site cation-family class (alkali-transition vs alkaline-earth-transition)"
    - "held-out-family holdout MAE"
  assumptions:
    - "Only committed computed-DFT MD-0002 rows are used."
    - "No live fetch occurs."
    - "Formation energy is not pooled with band gap."
    - "The frozen baseline model and descriptor are fixed before any transfer error is read."
  expected_scope: >
    Sandbox transfer benchmark of the frozen cation-pair model across the two
    disjoint A-site cation-family directions on the checksum-pinned 362-row
    MD-0002 formation-energy axis.
  expected_failure_modes:
    - "The two families share no cation pair, so the frozen model falls back to the global train mean on every held-out row."
    - "A held-out direction may not beat the per-class-median control."
    - "The cation-pair advantage may be family-localized and fail to transfer."

novelty_check:
  checked_files:
    - "docs/reviews/materials-independent-transfer-route-scout.md"
    - "results/EXP-0014/RUN-0001/result.yaml"
    - "agent_runs/AGENT-RUN-0072/metrics.json"
  possible_overlap: >
    Distinct from the TASK-0703 baseline (within-split cation-pair win) and from
    the TASK-0789 random-pair holdout; this binds the scout-selected disjoint
    A-site cation-family stress split and tests transfer of the frozen model.
  notes: "The proposal mirrors the sandbox boundary required by agent_run.yaml."

falsification_plan:
  deterministic_check: >
    Run scripts/run_materials_md0002_transfer.py twice and compare complete
    metrics, including both holdout directions and shuffle-control seeds.
  baseline_or_reference: >
    Null (global train mean), shuffled (cation-pair label permutation over fixed
    seeds), and per-class-median controls, evaluated on the held-out family.
  pass_condition: >
    Pass only if the frozen cation-pair model beats the best control's held-out
    MAE by at least 0.05 eV/atom in BOTH disjoint-family directions.
  fail_condition: >
    Fail (advantage is family-localized) if either direction does not clear the
    margin over its best control; record the honest negative without refit.

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not call the cation-pair mean a universal materials law."
    - "Do not describe computed DFT values as experimental measurements."
    - "Do not make a materials-discovery, material-design-law, property-prediction, device, or synthesis statement."
  mitigations:
    - "Keep the dataset, split, and computed-DFT scope explicit."
    - "Report all controls alongside the frozen model in both directions."
    - "Route claim and knowledge impact to none."

sandbox_evidence:
  commands:
    - "python scripts/run_materials_md0002_transfer.py --config examples/benchmarks/materials_md0002_formation_energy.yaml --output-dir agent_runs/AGENT-RUN-0081 --write-report"
  code_references:
    - "physics_lab/engines/materials_md0002_transfer.py"
    - "scripts/run_materials_md0002_transfer.py"
    - "tests/test_materials_md0002_transfer.py"
  metrics:
    - "frozen-model held-out-family holdout MAE per direction"
    - "null / shuffled / per-class-median control MAE per direction"
    - "margin over best control vs predeclared 0.05 eV/atom"
    - "held-out rows falling back to the global train mean"
  output_paths:
    - "agent_runs/AGENT-RUN-0081/metrics.json"
    - "agent_runs/AGENT-RUN-0081/report.md"
    - "docs/reviews/materials-md0002-cation-family-transfer-benchmark.md"

limitations:
  - "Computed DFT Materials Project values only (CC BY 4.0)."
  - "Bounded model-vs-model transfer benchmark on one frozen 362-row slice."
  - "Exactly one disjoint A-site cation-family split; a single family axis."
  - "No claim or knowledge promotion is supported by the sandbox record."

verdict: SANDBOX_FAIL
maintainer_decision_requested: >
  Review the sandbox negative-transfer evidence and decide whether to record the
  family-localized result as a diagnostic; no claim or knowledge promotion is
  requested.

promotion_boundary:
  canonical_result_allowed: false
  claim_promotion_allowed: false
  required_next_step: >
    This proposal remains sandbox-only; a published RESULT would require a
    separate task with explicit protected-path authority.
