id: EXP-0015
title: "Materials MD-0002 Formation-Energy Baseline Benchmark"
domain: materials_property_residuals
status: COMPLETED

hypothesis_id: HYP-0015

method:
  type: frozen_dataset_baseline_comparison
  simulator: materials_md0002_formation_energy_benchmark
  comparator: predeclared_global_composition_and_structure_baselines

data:
  dataset_path: ../data/materials/md-0002-materials-project-stable-ternary-oxides.yaml
  dataset_kind: computed_dft_materials_property_dataset
  benchmark_scope: >
    Checksum-pinned MD-0002 stable alkali/alkaline-earth plus first-row
    transition-metal ternary oxides; formation_energy_per_atom only.
  expected_item_count: 362
  sample_axes:
    - frozen_train_validation_holdout
    - unordered_cation_pair
    - cation_family_pair
    - spacegroup_symbol
    - formation_energy_range
  notes: >
    No live fetch. Band gap stays outside the scored surface. All group
    statistics are fitted on train rows only with global-train-mean fallback.

candidate_models:
  - id: model_global_mean
    formula: "train-set global mean formation energy"
  - id: model_global_median
    formula: "train-set global median formation energy"
  - id: model_cation_group_mean
    formula: "train-set cation-family-pair mean with global-mean fallback"
  - id: model_cation_pair_mean
    formula: "train-set unordered exact-cation-pair mean with global-mean fallback"
  - id: model_structure_or_prototype_mean
    formula: "train-set exact-spacegroup mean with global-mean fallback"

comparison_targets:
  - id: target_relative_holdout_mae_improvement
    label: "Relative holdout MAE improvement versus best global null"
    reference_value: 0.10
    unit: fraction
    notes: "Predeclared minimum; higher is better."
  - id: target_absolute_holdout_mae_improvement
    label: "Absolute holdout MAE improvement versus best global null"
    reference_value: 0.05
    unit: eV_per_atom
    notes: "Predeclared minimum; higher is better."
