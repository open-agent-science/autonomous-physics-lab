id: EXP-0015
title: "Stellar M-L DEBCat Controlled Baseline Benchmark (main-sequence slice)"
domain: astrophysics
status: COMPLETED

hypothesis_id: HYP-0015

method:
  type: dataset_reproduction
  simulator: stellar_ml_debcat_controlled_baseline_benchmark
  comparator: mass_luminosity_baseline_adequacy_and_stage_control_report

data:
  dataset_path: ../data/textbook_formula_audit/stellar_ml/debcat_component_rows.yaml
  dataset_kind: textbook_formula_audit_stellar_ml_rows
  benchmark_scope: "Frozen main-sequence-compatible DEBCat slice, mass 0.5-2.0 Msun (223 components: train 102 / validation 56 / holdout 65); evolved/subgiant/unknown diagnostics only."
  expected_item_count: 223
  sample_axes:
    - log_mass_solar
    - log_luminosity_solar
    - evolutionary_stage_flag
    - mass_band
    - lane
  notes: "Frozen system-level value-blind split defined by data/textbook_formula_audit/stellar_ml/debcat_holdout_manifest.yaml. CC BY 4.0 DEBCat normalized derived rows (TASK-0763 permission grant); raw debs.dat not committed (Route 2); no live fetch."

candidate_models:
  - id: model_train_fitted_alpha
    formula: "log L = alpha_hat * log M, alpha_hat ~ 4.526 fit on train lane only (fixed intercept)"
  - id: model_textbook_piecewise_4p0
    formula: "log L = 4.0 * log M (textbook piecewise mid-mass exponent, fixed intercept)"
  - id: model_textbook_single_3p5
    formula: "log L = 3.5 * log M (textbook single exponent, fixed intercept)"
  - id: model_massband_median_null
    formula: "per-mass-band train-median log L (global-median fallback)"

comparison_targets:
  - id: target_single_alpha_adequacy
    label: "Textbook single alpha=3.5 holdout MAE versus the best fitted/piecewise baseline"
    reference_value: 0.184954
    unit: dex
    notes: "Single alpha=3.5 holdout MAE 0.184954 dex; train-fitted 0.119925 dex; gap 0.065029 dex exceeds the 0.04 dex split-noise reference, so single 3.5 is inadequate as the sole baseline (not falsified as a textbook relation)."
