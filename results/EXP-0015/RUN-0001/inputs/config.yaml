# TASK-0703 frozen MD-0002 formation-energy benchmark contract.
task_id: TASK-0703
benchmark_id: materials-md0002-formation-energy-baseline-benchmark
dataset:
  dataset_family: MD-0002
  dataset_file: data/materials/md-0002-materials-project-stable-ternary-oxides.yaml
  holdout_manifest: data/materials/md0002_holdout_manifest.yaml
  property_kind: formation_energy_per_atom
  units: eV_per_atom
  provenance_class: computed_dft
  retrieval_policy: no_live_fetch
baselines:
  - global_mean
  - global_median
  - cation_group_mean
  - cation_pair_mean
  - structure_or_prototype_mean
controls:
  kinds:
    - label_shuffle
    - cation_pair_shuffle
    - train_only_statistics
    - row_order_invariance
  seeds: [0, 1, 2, 7, 11]
split_sensitivity:
  kind: seeded_random_70_30
  seeds: [0, 1, 2, 3, 4]
  minimum_seed_wins: 4
  margin_rule: seeded mean margin over runner-up must exceed both baselines' across-seed standard deviation
property_range_bins:
  - id: strongly_negative
    max: -3.0
  - id: moderate_negative
    min: -3.0
    max: -1.0
  - id: near_zero
    min: -1.0
success_margins:
  minimum_relative_mae_improvement: 0.10
  minimum_absolute_mae_improvement_eV_per_atom: 0.05
stop_conditions:
  - Stop if live external fetch is requested.
  - Stop if formation energy and band gap are pooled.
  - Stop if measured and computed rows are mixed.
  - Stop if the frozen split counts or checksum binding differ.
  - Stop if baseline definitions, seeds, bins, or margins change after scoring.
claim_ceiling: >
  Scoped computed-DFT benchmark evidence only. No material ranking, synthesis,
  device, biomedical, universal-law, or measured-property claim.
