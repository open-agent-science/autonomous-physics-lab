limitations:
- Agent-published, not yet independently validated or maintainer-reviewed.
- Scope is the frozen DEBCat main-sequence-compatible slice (mass 0.5-2.0 Msun, 223
  components); evolved/subgiant/unknown stages are diagnostics only. Not a universal
  mass-luminosity law, stellar-evolution, or application-domain claim.
- The textbook single exponent alpha=3.5 is evaluated as a sole frozen baseline on
  this slice; it beats the null but is materially worse than fitted/piecewise
  exponents. This does NOT falsify alpha=3.5 as a textbook relation.
- Luminosities mix catalogue-reported and Stefan-Boltzmann-derived values (per-row
  provenance flags); residuals inherit that heterogeneity.
- The committed DEBCat dataset header still carries seed-stage advisory scope flags
  (sandbox_only, benchmark_allowed=false, alpha_fit_allowed=false) authored in the
  TASK-0708 seed; these are superseded by TASK-0763 (full CC BY 4.0 publication) and
  the maintainer-merged benchmark audits TASK-0759/0762, and are slated for a
  separate header/extractor reconciliation. Rights are clear (CC BY 4.0).
