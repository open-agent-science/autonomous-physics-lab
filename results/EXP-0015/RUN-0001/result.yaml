  evidence_summary: >
    On the CC-BY-4.0, holdout-frozen DEBCat main-sequence slice (0.5-2.0 Msun; train
    102 / holdout 65), the textbook single exponent alpha=3.5 reaches holdout MAE
    0.184954 dex versus a per-mass-band null 0.331817 dex, so it beats the null; but
    a train-fitted exponent (alpha_hat=4.526, holdout MAE 0.119925 dex) and the
    textbook piecewise mid-mass alpha=4.0 (0.137608 dex) are better by 0.065 / 0.047
    dex, exceeding the 0.04 dex split-noise reference. The formula margin is positive
    in 5/5 seeded system-level re-splits and beats deterministic luminosity-shuffle
    controls in every seed. The deterministic replay reproduces all numbers within
    tol 1e-6.
  followup_for_maintainer: >
    Keep the trust qualifier explicit: agent-published, not independently validated
    or maintainer-reviewed. The headline is scope-limited: alpha=3.5 is inadequate as
    the sole frozen baseline on this slice, NOT falsified as a universal textbook
    law. No CLAIM/KNOW promotion is proposed. A separate task should reconcile the
    superseded seed-stage scope flags in the committed DEBCat dataset header.
