limitations:
- Curated ~97-nuclide AME2020 subset; not full ~3500-nuclide table.
- Standard BW liquid-drop coefficients used (not jointly refit with shell correction).
- Heavier nuclides (A > 140) have approximate B_exp values (~0.5 MeV uncertainty in
  dataset).
- Several multi-magic amplitudes hit fitting bounds (±20 MeV); light-nuclei (A < 10)
  corrections may absorb A-dependent BW errors.
- Gaussian width σ shared across all magic numbers; per-closure widths untested.
- Only stable AME2020 nuclides included; no radioactive isotopes.
- Simple distance-based models (d_N or d_Z only) provide <1% improvement; improvement
  requires per-magic-number amplitudes.
