  - "Curated subset only (~100 nuclides); not the full ~3500-nuclide AME2020 table."
  - "Heavier nuclides (A > 140) have values from memory/estimation; uncertainty ~0.5 MeV."
  - "Light nuclide values (A ≤ 60) are well-established from AME2020 to < 10 keV."
  - "Dataset intentionally biased toward magic-number neighborhoods for shell correction study."
  - "Does not include neutron-rich or proton-rich nuclides far from stability."
