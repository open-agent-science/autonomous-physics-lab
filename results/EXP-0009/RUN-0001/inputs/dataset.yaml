schema_version: '1'
dataset_id: NUCLEAR-BE-001
title: "Nuclear Binding Energies — Curated Subset (AME2020-based)"
domain: nuclear_physics
source: >
  Values taken from the AME2020 atomic mass evaluation
  (Wang et al., Chinese Physics C 45, 030003, 2021) via standard
  nuclear data tables. Lighter nuclides (A ≤ 60) are well-established
  with sub-keV precision. Heavier nuclides are taken from tabulated
  AME2020 values; uncertainties are < 10 keV for stable nuclides.
units:
  binding_energy: MeV
  uncertainty: MeV
notes: >
  This is a curated subset of ~100 nuclides chosen to cover:
  (a) the full mass range A = 4 to 208,
  (b) all magic neutron numbers N ∈ {2, 8, 20, 28, 50, 82, 126},
  (c) all magic proton numbers Z ∈ {2, 8, 20, 28, 50, 82},
  (d) nuclides one step above/below each magic number.
  Not a complete AME2020 download. For full dataset see AME2020 tables.
magic_numbers: [2, 8, 20, 28, 50, 82, 126]
