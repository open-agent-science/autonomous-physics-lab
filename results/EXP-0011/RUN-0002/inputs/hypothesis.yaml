id: HYP-0011
title: "Anharmonic oscillator period admits a benchmarkable weak-regime perturbative approximation"
domain: classical_mechanics
status: TESTING

hypothesis:
  statement: >
    For the conservative quartic anharmonic oscillator with
    V(x) = 1/2 k x^2 + lambda x^4, the leading-order perturbative period
    correction should stay accurate in a weak anharmonicity window, while a
    train-fitted quadratic correction should generalize better on a predeclared
    holdout slice without implying any broader physical discovery claim.
  formula_candidates:
    - "T_harmonic = 2*pi*sqrt(m/k)"
    - "T_perturbative ~= T0 * (1 - 3/2 * lambda*A^2/k)"
    - "T_empirical ~= T0 * (1 + a*epsilon + b*epsilon^2), epsilon = lambda*A^2/k"

assumptions:
  - "The system is 1D, conservative, undamped, and undriven."
  - "Quartic coefficients are non-negative; no double-well or softening cases are included."
  - "The benchmark uses a deterministic period-integral reference rather than an inferred zero-crossing estimate."
  - "Any fitted empirical correction is benchmark-only and does not imply a canonical physical law."

variables:
  A:
    unit: meter
    description: "Turning-point amplitude"
  T:
    unit: second
    description: "Oscillation period"
  m:
    unit: kilogram
    description: "Mass"
  k:
    unit: kilogram_per_second_squared
    description: "Quadratic stiffness coefficient"
  lambda:
    unit: kilogram_per_meter_squared_per_second_squared
    description: "Quartic stiffness coefficient in V(x) = 1/2 k x^2 + lambda x^4"
  epsilon:
    unit: dimensionless
    description: "Anharmonicity ratio lambda*A^2/k"

evidence:
  experiments:
    - EXP-0011
  results:
    - RESULT-0014
    - RESULT-0016

verdict: "The benchmark is designed to test weak-regime perturbative accuracy, holdout behavior, and breakdown boundaries for the anharmonic oscillator period."
