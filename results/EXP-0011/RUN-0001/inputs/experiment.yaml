id: EXP-0011
title: "Anharmonic Oscillator Period Benchmark"
domain: classical_mechanics
status: COMPLETED

hypothesis_id: HYP-0011

method:
  type: period_benchmark
  simulator: deterministic_period_integral
  fitter: empirical_quadratic_holdout_fit

data:
  mass: 1.0
  stiffness: 1.0
  amplitude_range:
    start: 0.2
    end: 1.4
    sample_count: 13
  quartic_coefficients:
    - 0.02
    - 0.04
    - 0.06
    - 0.08
    - 0.10
  train_max_anharmonicity: 0.05
  holdout_max_anharmonicity: 0.10
  stress_max_anharmonicity: 0.20

candidate_models:
  - id: model_harmonic
    formula: "T = 2*pi*sqrt(m/k)"
  - id: model_perturbative_leading
    formula: "T = T0 * (1 - 3/2 * epsilon), epsilon = lambda*A^2/k"
  - id: model_empirical_quadratic
    formula: "T = T0 * (1 + a*epsilon + b*epsilon^2), fit on train slice"
