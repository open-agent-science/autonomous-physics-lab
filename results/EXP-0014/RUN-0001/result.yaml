limitations:
- Agent-published, not yet independently validated or maintainer-reviewed.
- Scope is the frozen 362-row MD-0002 stable ternary-oxide slice (alkali/alkaline-earth
  + first-row transition); this is a benchmark/dataset evaluation, not a materials-discovery,
  design, or universal-law claim.
- Rows are computed DFT formation energies from the Materials Project (CC BY 4.0),
  not experimental measurements; absolute residuals inherit any DFT systematic offset.
- The cation-pair baseline predicts the train-mean of an unordered non-oxygen cation
  pair (global train-mean fallback); it carries no per-structure features and is not
  a predictive materials model.
- Band gap is diagnostic-only and is excluded from the promoted metrics.
