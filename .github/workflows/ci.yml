name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check .

      - name: Run tests
        run: |
          pytest

      - name: Run example workflow
        run: |
          python -m physics_lab.cli run examples/pendulum.yaml --output-dir /tmp/apl-results

      - name: Validate repository artifacts
        run: |
          python -m physics_lab.cli validate-repo .
