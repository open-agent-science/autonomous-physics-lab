name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify change set
    runs-on: ubuntu-latest
    outputs:
      docs_task_only: ${{ steps.classify.outputs.docs_task_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect docs/task-only pull request
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "docs_task_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          if git rev-parse --verify "$base_sha^{commit}" >/dev/null 2>&1 \
            && git rev-parse --verify "$head_sha^{commit}" >/dev/null 2>&1; then
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          else
            changed_files="$(git diff --name-only HEAD^1 HEAD^2)"
          fi

          echo "Changed files:"
          printf '%s\n' "$changed_files"

          docs_task_only=true
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              docs/*|tasks/*|CONTEXT.md|README.md|AGENTS.md|CODEX_TASK.md|CLAUDE.md|.github/pull_request_template.md)
                ;;
              *)
                docs_task_only=false
                ;;
            esac
          done <<< "$changed_files"

          echo "docs_task_only=$docs_task_only" >> "$GITHUB_OUTPUT"

  pull-request:
    name: Python fast tests (3.12)
    runs-on: ${{ fromJSON(vars.APL_PR_RUNNER_LABELS || '["self-hosted","linux","x64"]') }}
    needs: classify
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check .

      - name: Validate repository artifacts
        run: |
          python -m physics_lab.cli validate-repo .

      - name: Strict validate repository artifacts
        run: |
          python -m physics_lab.cli validate-repo . --strict --fail-on-warnings

      - name: Run targeted docs/task tests
        if: needs.classify.outputs.docs_task_only == 'true'
        run: |
          pytest \
            --durations=10 \
            tests/test_active_board.py \
            tests/test_task_views.py \
            tests/test_task_proposals.py \
            tests/test_task_reference_convention.py \
            tests/test_docs_links.py \
            tests/test_mission_control.py \
            tests/test_mission_freshness.py \
            tests/test_validate_repo_auto_sync.py

      - name: Run full tests
        if: needs.classify.outputs.docs_task_only != 'true'
        run: |
          pytest --durations=10 -n auto --dist loadgroup -m "not full_repo"

      # full_repo smoke tests are skipped by the steps above (fast lane) but run
      # cheaply here on every PR so full_repo breakage is caught at PR time, not
      # only post-merge on the main matrix. Runs for both docs/task-only and code
      # PRs, since docs/status.md and task-state changes can break full_repo.
      - name: Run full_repo smoke tests
        run: |
          pytest --durations=10 -m full_repo

  main-matrix:
    name: Python tests (main matrix)
    runs-on: ${{ fromJSON(vars.APL_MAIN_RUNNER_LABELS || '["self-hosted","linux","x64"]') }}
    needs: classify
    if: github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check .

      - name: Run tests
        run: |
          pytest --durations=10 -n auto --dist loadgroup

      - name: Run example workflows
        run: |
          python -m physics_lab.cli run examples/pendulum.yaml --output-dir /tmp/apl-pendulum
          python -m physics_lab.cli run examples/damped_oscillator.yaml --output-dir /tmp/apl-damped

      - name: Assert example runs are non-dirty
        run: |
          git diff --exit-code

      - name: Validate repository artifacts
        run: |
          python -m physics_lab.cli validate-repo .

      - name: Strict validate repository artifacts
        run: |
          python -m physics_lab.cli validate-repo . --strict --fail-on-warnings
