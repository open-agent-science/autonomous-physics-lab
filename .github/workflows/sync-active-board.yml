# Post-merge regeneration of tasks/ACTIVE.md and docs/task-views/*.md
#
# These files are derived from canonical tasks/TASK-*.yaml entries plus
# tasks/microtasks/*.yaml and tasks/proposals/*.yaml. Agents do not
# commit the regenerated files on their PR branches; this workflow
# regenerates them automatically after any merge that touches the
# task surface or mission metadata.
#
# Why this exists:
#
# - Every parallel PR that updated a task status used to regenerate
#   tasks/ACTIVE.md and docs/task-views/*.md, producing a chronic
#   merge conflict whenever two such PRs landed in sequence. The
#   conflict resolution dance was identical every time and burned
#   meaningful agent time.
# - The post-merge action centralizes regeneration so agents stop
#   committing derived files. After the repository became public and
#   `main` protection was enabled, direct generated commits require a
#   narrow repository-installed GitHub App identity instead of the broad
#   default GITHUB_TOKEN identity.
#
# Recursion guard:
#
# - This workflow ignores its own pushes by checking for the
#   "[skip-board-sync]" marker in the head commit message before
#   running. The commit message it emits always contains that marker.
#
# Concurrency:
#
# - The "sync-active-board" group ensures only one regen runs at a
#   time. cancel-in-progress is false so a long-running install does
#   not abandon a queued regen.
#
# Authentication:
#
# - This workflow requires an installed "APL Board Sync" GitHub App
#   token via vars.APL_BOARD_SYNC_APP_CLIENT_ID and
#   secrets.APL_BOARD_SYNC_APP_PRIVATE_KEY whenever it needs to push a
#   generated sync commit. Branch protection should grant that App, and
#   only that App, the bypass needed for this generated-maintenance
#   push. Do not grant a broad direct-push bypass to github-actions[bot].

name: Sync Active Board

on:
  push:
    branches:
      - main
    paths:
      - 'tasks/**'
      - 'missions/current.yaml'

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: sync-active-board
  cancel-in-progress: false

jobs:
  sync:
    name: Regenerate task navigation
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip-board-sync]') }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Auto-close safe tasks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/apl_closeout_sweep.py --auto-safe

      - name: Run sync-active-board
        run: |
          python -m physics_lab.cli sync-active-board .

      - name: Detect regeneration diff
        id: detect
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No regeneration or safe-closeout diff; board and task statuses are in sync."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected regeneration and/or safe-closeout diff."
            git --no-pager diff --stat
            unexpected_paths=()
            while IFS= read -r path; do
              case "${path}" in
                docs/task-views/*.md|tasks/TASK-*.yaml)
                  ;;
                *)
                  unexpected_paths+=("${path}")
                  ;;
              esac
            done < <(git diff --name-only)
            if (( ${#unexpected_paths[@]} > 0 )); then
              printf 'Unexpected board-sync diff paths:\n' >&2
              printf '  %s\n' "${unexpected_paths[@]}" >&2
              exit 1
            fi
          fi

      - name: Detect board-sync GitHub App credentials
        if: steps.detect.outputs.changed == 'true'
        id: board_sync_app
        shell: bash
        env:
          APP_CLIENT_ID: ${{ vars.APL_BOARD_SYNC_APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APL_BOARD_SYNC_APP_PRIVATE_KEY }}
        run: |
          if [[ -n "${APP_CLIENT_ID}" && -n "${APP_PRIVATE_KEY}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::error::APL board-sync GitHub App credentials are required for protected-main generated sync pushes."
            echo "::error::Configure vars.APL_BOARD_SYNC_APP_CLIENT_ID and secrets.APL_BOARD_SYNC_APP_PRIVATE_KEY, then allow that App to bypass the pull-request requirement for main."
            exit 1
          fi

      - name: Create board-sync GitHub App token
        if: steps.board_sync_app.outputs.configured == 'true'
        id: board_sync_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APL_BOARD_SYNC_APP_CLIENT_ID }}
          private-key: ${{ secrets.APL_BOARD_SYNC_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Commit regenerated navigation
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.board_sync_app_token.outputs.token }}
          BOARD_SYNC_TOKEN: ${{ steps.board_sync_app_token.outputs.token }}
          BOARD_SYNC_APP_SLUG: ${{ steps.board_sync_app_token.outputs.app-slug }}
        run: |
          app_bot_id="$(gh api "/users/${BOARD_SYNC_APP_SLUG}[bot]" --jq .id)"
          git config user.name "${BOARD_SYNC_APP_SLUG}[bot]"
          git config user.email "${app_bot_id}+${BOARD_SYNC_APP_SLUG}[bot]@users.noreply.github.com"
          git add docs/task-views/ tasks/
          {
            echo "### Sync Active Board"
            echo "- Source SHA: \`${GITHUB_SHA}\`"
            echo "- Changed files:"
            git diff --cached --name-only | sed 's/^/- `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"
          base_short="$(git rev-parse --short HEAD)"
          git commit -m "chore(board-sync): sync task navigation and safe closeouts after ${base_short} [skip-board-sync]"
          git remote set-url origin "https://x-access-token:${BOARD_SYNC_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
