id: EXP-PROPOSAL-0005
title: "Sandbox nuclear-mass residual candidate batch"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox experiment proposal only; no canonical result artifact."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0170

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/autonomous-research-loop.md"
  - "docs/research-quality-gate.md"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "experiments/EXP-0012-nuclear-mass-baseline.yaml"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0020-shell-dual-heavy-anchor.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0021-shell-dual-heavy-anchor-odd-a.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0022-quadratic-asymmetry-refinement.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0023-oxygen-chain-latch-rejected.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0024-lead-actinide-anchor-rejected.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0025-magic-step-cascade-rejected.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0026-advanced-model-surrogate-rejected.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0027-live-time-split-fetch-rejected.yaml"

question: "Can the autonomous loop produce one holdout-consistent shell-aware residual candidate, one weaker bounded comparator, and one explicit overfit candidate while rejecting five narrower or policy-violating proposals?"

method:
  summary: "Replay the frozen RESULT-0015 residual surface on NMD-0002, fit three selected additive correction families on holdout complements, and record five pre-execution rejections."
  code_references:
    - "physics_lab/engines/nuclear_masses.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
    - "tests/test_nuclear_mass_autonomous_pilot.py"
    - "physics_lab/registry/research_proposals.py"
  commands:
    - "python3 -m physics_lab.cli preflight-research-proposal experiment_proposals/nuclear-mass/EXP-PROPOSAL-0005-nuclear-mass-sandbox-batch.yaml"
    - "python3 -m pytest tests/test_nuclear_mass_autonomous_pilot.py"
  parameters:
    generated_proposals: 8
    executed_candidates: 3
    rejected_before_execution: 5
    active_holdout_count: 4

inputs:
  datasets:
    - "data/nuclear_masses/nmd-0002-curated-measured-slice.yaml as the frozen measured-only benchmark slice"
  constants:
    - "Frozen fitted baseline coefficients from RESULT-0015"
  prior_results:
    - "RESULT-0015"
  assumptions:
    - "Sandbox execution does not modify EXP-0012, RESULT-0015, or any claim or knowledge artifact."
    - "The active holdout families are fixed before judging candidate outcomes."
    - "Any promising family remains a follow-up candidate only until a maintainer asks for a canonical comparison task."

outputs:
  sandbox_output_paths:
    - "agent_runs/AGENT-RUN-0005/"
  metrics:
    - "generated_proposal_count"
    - "executed_candidate_count"
    - "rejected_before_execution_count"
    - "improved_all_holdouts_count"
    - "negative_or_overfit_count"
  plots:
    - "NONE"
  notes:
    - "agent_runs/AGENT-RUN-0005/report.md"
    - "agent_runs/AGENT-RUN-0005/limitations.md"
    - "docs/reviews/autonomous-nuclear-mass-pilot-01.md"

validation:
  pass_condition: "Sandbox pass if at least one executed candidate improves all active holdouts, one simpler comparator remains bounded, one explicit overfit candidate is preserved, and canonical memory is unchanged."
  fail_condition: "Sandbox fail if more than three candidates are executed, no negative control is preserved, or the frozen baseline and holdout protocol are edited post hoc."
  baseline_or_reference: "Frozen RESULT-0015 fitted semi-empirical baseline on NMD-0002 plus docs/nuclear-mass-holdout-protocol.md."
  expected_failure_modes:
    - "A compact family may help all active holdouts on the tiny slice and still remain too narrow for canonical promotion."
    - "A plausible asymmetry refinement may improve one visible slice while regressing shell and neutron-rich holdouts."
    - "Policy-violating proposals may look tempting but must still be rejected before execution."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not claim a new nuclear mass law."
    - "Do not present sandbox holdout deltas as canonical benchmark deltas."
    - "Do not imply that one pinned slice is enough for broad physical conclusions."
  mitigations:
    - "Keep outputs only under proposals, agent_runs, tests, and review notes."
    - "Compare every executed candidate only to the frozen RESULT-0015 baseline."
    - "Require a later maintainer-reviewed task before any canonical follow-up."

limitations:
  - "Sandbox-only pilot over three executed candidates and five rejected proposals."
  - "The dataset is intentionally tiny and measured-only, so no promotion beyond sandbox evidence is justified."
  - "A stronger sandbox family is still only a cue for later reviewed benchmark work."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether HYP-PROPOSAL-0021 deserves a later canonical comparison task on a broader pinned dataset."

promotion_boundary:
  writes_canonical_result: false
  writes_claim_update: false
  required_next_step: "Maintainer-reviewed canonical comparison or dataset-expansion task before any RESULT-* change."
