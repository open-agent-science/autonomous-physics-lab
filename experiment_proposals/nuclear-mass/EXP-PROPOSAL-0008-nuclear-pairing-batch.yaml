id: EXP-PROPOSAL-0008
title: "Sandbox nuclear-mass pairing and odd-even residual batch"
campaign_profile_id: nuclear-mass-surface
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox experiment proposal only; no canonical result artifact."

proposed_by:
  contributor_id: oleg
  agent_id: claude
  task_id: TASK-0201

input_references:
  - "campaign_profiles/nuclear-mass-surface.yaml"
  - "docs/nuclear-mass-holdout-protocol.md"
  - "docs/nuclear-mass-robustness-gate.md"
  - "results/EXP-0012/RUN-0001/result.yaml"
  - "agent_runs/AGENT-RUN-0006/"
  - "agent_runs/AGENT-RUN-0008/"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0038-differential-pairing-ee-oo.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0039-wigner-energy-n-eq-z.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0040-odd-a-subclass-pairing-rejected.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0041-pairing-exponent-refinement-rejected.yaml"
  - "hypothesis_proposals/nuclear-mass/HYP-PROPOSAL-0042-two-body-valence-pairing-rejected.yaml"

question: "Do pairing-class constant offsets or a Wigner N=Z energy term improve residuals over the frozen RESULT-0015 baseline, and what does NMD-0002 data sparsity reveal about the identifiability of pairing corrections on a small nuclear-mass slice?"

method:
  summary: >
    Generate five pairing/odd-even residual proposals, execute two linear
    families (differential even-even/odd-odd pairing and Wigner N=Z energy
    term), and reject three (odd-A sub-class sparsity, pairing exponent
    collinearity, feature redundancy). Evaluate the two executed candidates on
    the NMD-0002 four-holdout protocol and on the 295-row post-AME2020 primary
    holdout, with per-subset MAE and against HYP-PROPOSAL-0022 negative-control
    reference metrics.
  code_references:
    - "scripts/run_nuclear_pairing_batch.py"
    - "physics_lab/engines/nuclear_mass_baselines.py"
    - "physics_lab/engines/nuclear_masses.py"
    - "tests/test_nuclear_pairing_batch.py"
  commands:
    - "python3 scripts/run_nuclear_pairing_batch.py"
    - "python3 -m pytest tests/test_nuclear_pairing_batch.py"
  parameters:
    generated_proposals: 5
    executed_candidates: 2
    rejected_before_execution: 3
    structured_holdout_count: 4
    post_ame2020_primary_holdout_row_count: 295

inputs:
  datasets:
    - "data/nuclear_masses/nmd-0002-curated-measured-slice.yaml as the frozen measured-only training slice"
    - "data/nuclear_masses/post_ame2020_holdout.yaml as the reviewed row-level post-AME2020 holdout"
  constants:
    - "Frozen fitted baseline coefficients from RESULT-0015 (model_fitted_semi_empirical)"
  prior_results:
    - "RESULT-0015"
    - "AGENT-RUN-0005"
    - "AGENT-RUN-0006"
    - "AGENT-RUN-0008"
    - "AGENT-RUN-0009"
    - "AGENT-RUN-0010"
  assumptions:
    - "Sandbox execution does not modify EXP-0012, RESULT-0015, or any claim, knowledge, or canonical dataset."
    - "Coefficients are fitted on the complement of each NMD-0002 holdout for the structured protocol, and once on the full NMD-0002 surface for the post-AME2020 evaluation."

outputs:
  sandbox_output_paths:
    - "agent_runs/AGENT-RUN-0011/"
  metrics:
    - "generated_proposal_count"
    - "executed_candidate_count"
    - "rejected_before_execution_count"
    - "structured_holdout_delta_mae_mev"
    - "post_ame2020_primary_delta_mae_mev"
    - "feature_activation_counts"
    - "per_subset_delta_mae_mev"
  plots:
    - "NONE"
  notes:
    - "agent_runs/AGENT-RUN-0011/report.md"
    - "agent_runs/AGENT-RUN-0011/limitations.md"
    - "docs/reviews/autonomous-nuclear-pairing-batch-01.md"

validation:
  pass_condition: >
    Sandbox pass if both executed candidates produce deterministic metrics
    satisfying the gate evidence-package requirement and rejections are
    documented; the proposal does not pre-commit to a positive scientific
    verdict.
  fail_condition: >
    Sandbox fail if more than two candidates are executed, if any rejection is
    silently relaxed, if canonical results / claims / knowledge / datasets are
    modified, or if a retrospective subset win is framed as prospective prediction.
  baseline_or_reference: >
    Frozen RESULT-0015 baseline on NMD-0002 and HYP-PROPOSAL-0022 metrics in
    AGENT-RUN-0008 as the negative-control reference.
  expected_failure_modes:
    - "HYP-PROPOSAL-0038: OVERFITTED because NMD-0002 has only 1 odd-odd row (N-14)."
    - "HYP-PROPOSAL-0039: near-zero post-AME2020 activation because the holdout is neutron-rich."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not describe constant class offsets as new pairing physics."
    - "Do not present near-zero Wigner activation as confirming or denying the Wigner effect."
    - "Do not frame retrospective time-split evidence as prospective prediction."
  mitigations:
    - "Keep outputs only under proposals, agent_runs, scripts, tests, and review notes."
    - "Compare every executed candidate to RESULT-0015 and to HYP-PROPOSAL-0022 retrospective metrics."
    - "Report activation counts explicitly as the primary Wigner-term limitation."

limitations:
  - "Sandbox-only batch over two executed candidates and three rejected proposals."
  - "NMD-0002 has 11 nuclides and only 1 odd-odd nucleus; structured holdouts have 8-9 training rows."
  - "Post-AME2020 evaluation is retrospective time-split, not blind prediction."
  - "Neither executed candidate improves post-AME2020 primary MAE."

verdict: SANDBOX_PASS
maintainer_decision_requested: >
  Decide whether the executed candidates close out the pairing/odd-even lane at
  the current NMD-0002 scale, and whether the Wigner term should be revisited
  if a broader dataset with more N=Z coverage becomes available.

promotion_boundary:
  writes_canonical_result: false
  writes_claim_update: false
  required_next_step: >
    Maintainer-reviewed canonical comparison or dataset-expansion task before
    any RESULT-* change.
