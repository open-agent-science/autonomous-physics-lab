id: EXP-PROPOSAL-0028
title: "Sandbox FIRAS Wien-peak consistency slice"
campaign_profile_id: textbook-formula-audit
proposal_kind: audit
status: REVIEW_READY

claim_ceiling: "Sandbox spectral-domain consistency experiment only; no canonical result artifact, prediction, claim, knowledge update, or universal Wien/blackbody promotion."

proposed_by:
  contributor_id: gladunrv
  agent_id: claude
  task_id: TASK-0802

input_references:
  - "campaign_profiles/textbook-formula-audit.yaml"
  - "docs/reviews/textbook-wien-firas-source-artifact.md"
  - "docs/reviews/textbook-wien-firas-temperature-domain-contract.md"
  - "data/textbook_formula_audit/wien_firas/firas_monopole_rows.yaml"
  - "data/textbook_formula_audit/fixtures/wien_displacement_exact_reference.yaml"
  - "hypothesis_proposals/textbook-formula-audit/HYP-PROPOSAL-0062-firas-wien-peak-consistency.yaml"

question: "On the pinned COBE/FIRAS absolute monopole spectrum, does the wavelength-domain spectral-radiance peak obtained after the declared B_nu -> B_lambda Jacobian agree with the frozen textbook reference lambda_peak = b / T at the separately pinned Fixsen 2009 temperature, while a no-Jacobian relabel and a wrong temperature are rejected?"

method:
  summary: "Read the committed checksum-pinned FIRAS rows and the frozen Wien exact-reference fixture, convert the native wavenumber axis to wavelength with the explicit B_lambda = B_nu * nu^2 / c Jacobian, locate the wavelength-domain peak (raw-bin plus a fixed parabolic refinement), and compare it to lambda_peak = b / T_ref. Report the frequency-domain peak, the no-Jacobian relabel, and a wrong-temperature offset as predeclared controls. Emit exactly one admissible scoped verdict and write metrics.json, report.md, limitations.md, preflight.md, review_summary.md, and agent_run.yaml under AGENT-RUN-0079."
  code_references:
    - "physics_lab/engines/textbook_wien_firas_peak.py"
    - "scripts/run_textbook_wien_firas_peak_consistency.py"
    - "tests/test_textbook_wien_firas_peak.py"
  commands:
    - "python3 scripts/run_textbook_wien_firas_peak_consistency.py --out-dir agent_runs/AGENT-RUN-0079"
  parameters:
    wien_constant_m_k: 0.002897771955
    reference_temperature_k: 2.72548
    speed_of_light_m_s: 299792458.0
    jacobian: "B_lambda = B_nu * nu^2 / c"
    raw_bin_relative_tolerance: 0.02
    interpolated_relative_tolerance: 0.005
    fitted_free_parameters: 0

inputs:
  datasets:
    - "Committed checksum-pinned COBE/FIRAS absolute monopole rows (data/textbook_formula_audit/wien_firas/firas_monopole_rows.yaml; sha256 df793c3dca09ebfa7dbc5aa0ec1951daa8884431bc30eff28a710d7516cf50fa for the source artifact)."
    - "Committed frozen Wien wavelength-domain exact-reference fixture (data/textbook_formula_audit/fixtures/wien_displacement_exact_reference.yaml)."
  constants:
    - "Wien wavelength displacement constant b = 2.897771955e-3 m K (CODATA 2022 / NIST)."
    - "Reference temperature T_ref = 2.72548 K (Fixsen 2009, ApJ 707, 916)."
    - "Speed of light c = 299792458 m/s (exact)."
  prior_results:
    - "docs/reviews/textbook-wien-firas-source-artifact.md"
    - "docs/reviews/textbook-wien-firas-temperature-domain-contract.md"
  assumptions:
    - "The committed product is an absolute monopole spectrum, not a residual-only or model-normalized product."
    - "No exponent, normalization, or temperature is fit; the parabolic refinement is a fixed deterministic interpolation."
    - "Only committed inputs are read; no live fetch or source re-pin occurs."
    - "No RESULT, PRED, CLAIM, KNOW, or public dashboard promotion is produced."

outputs:
  sandbox_output_paths:
    - "agent_runs/AGENT-RUN-0079/"
    - "docs/reviews/textbook-firas-wien-peak-consistency-slice.md"
  metrics:
    - "reference_wavelength_peak_m"
    - "wavelength_domain_peak_raw_bin_m"
    - "wavelength_domain_peak_interpolated_m"
    - "raw_bin_relative_difference"
    - "interpolated_relative_difference"
    - "frequency_domain_peak_wavenumber_cm_inverse"
    - "no_jacobian_relabel_relative_difference"
    - "wrong_temperature_relative_difference"
    - "controls.all_passed"
  plots:
    - "NONE"
  notes:
    - "agent_runs/AGENT-RUN-0079/report.md"
    - "agent_runs/AGENT-RUN-0079/limitations.md"
    - "agent_runs/AGENT-RUN-0079/review_summary.md"
    - "docs/reviews/textbook-firas-wien-peak-consistency-slice.md"

validation:
  pass_condition: "Sandbox consistency-in-scope if the wavelength-domain peak matches the reference within the predeclared tolerance, the run is deterministic, input hashes and command are preserved, and no canonical promotion artifacts are created."
  fail_condition: "Fail if the source is re-pinned or fetched live, a blackbody spectrum is fit, the temperature is chosen after seeing output, the Jacobian or any control is omitted, or the outcome is framed as a universal Wien/blackbody validation or falsification."
  baseline_or_reference: "Frozen textbook wavelength-domain Wien exact reference (exact-reference fixture) lambda_peak = b / T at T_ref = 2.72548 K, used as the baseline, with a no-Jacobian relabel negative control and a wrong-temperature negative control as null comparisons."
  expected_failure_modes:
    - "FIRAS bin spacing may keep the raw-bin peak outside the tight tolerance so only the interpolated peak passes."
    - "A residual-only product would yield an inconclusive product-semantics verdict."
    - "An omitted Jacobian would collapse the wavelength and frequency peaks and yield a domain-conversion mismatch."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not state that Wien displacement or blackbody physics has been universally validated or falsified."
    - "Do not call this a CMB-physics or cosmology discovery."
    - "Do not promote sandbox evidence to RESULT, PRED, CLAIM, or KNOW artifacts."
  mitigations:
    - "Report the wavelength-domain metric and the domain-conversion handling separately."
    - "State the circularity caveat that the reference temperature is FIRAS-derived."
    - "Keep outputs under agent_runs and docs/reviews and require maintainer review."

limitations:
  - "The slice uses a single pinned FIRAS monopole product and one reference temperature."
  - "The reference temperature is FIRAS-derived, so this is a blackbody self-consistency check, not independent validation."
  - "Raw-bin peak precision is limited by FIRAS bin spacing."
  - "Sandbox-only; no canonical artifact is created."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether this sandbox consistency slice should be preserved as AGENT-RUN-0079 only or followed by a separate Gate A result-packaging task."

promotion_boundary:
  writes_canonical_result: false
  writes_claim_update: false
  required_next_step: "Maintainer-reviewed Gate A result-packaging task before any RESULT-*, PRED-*, CLAIM, KNOW, or public Wien-verdict promotion."
