id: EXP-PROPOSAL-0001
title: "Sandbox rational x-pole pendulum check"
campaign_profile_id: pendulum-formula-falsification
proposal_kind: formula_search
status: REVIEW_READY

claim_ceiling: "Sandbox experiment proposal only; no canonical result artifact."

proposed_by:
  contributor_id: roman
  agent_id: codex
  task_id: TASK-0153

input_references:
  - "hypothesis_proposals/pendulum/HYP-PROPOSAL-0001-rational-x1-pole.yaml"
  - "campaign_profiles/pendulum-formula-falsification.yaml"
  - "docs/notes/pendulum-gauntlet-100.md"

question: "Can the bounded rational x-pole candidate beat a theta2-only baseline on the configured pendulum test range while remaining sandbox-only?"

method:
  summary: "Fit (1 + a*x)/(1 - b*x) to exact pendulum ratios on 0.01 <= theta <= 1.10 rad, then report train, test, and stress residuals."
  code_references:
    - "scipy.special.ellipk"
    - "scipy.optimize.curve_fit"
    - "physics_lab/registry/research_proposals.py"
  commands:
    - "python3 -m physics_lab.cli preflight-research-proposal experiment_proposals/pendulum/EXP-PROPOSAL-0001-rational-x1-pole.yaml"
  parameters:
    train_range_rad: [0.01, 1.10]
    test_range_rad: [1.10, 1.57]
    stress_range_rad: [1.57, 2.80]
    denominator_bound: "b <= 0.95"

inputs:
  datasets:
    - "Exact elliptic-integral pendulum ratio generated in sandbox."
  constants:
    - "pi"
  prior_results:
    - "RESULT-0004"
  assumptions:
    - "The exact pendulum period ratio is the evaluation reference."
    - "Stress-range diagnostics do not affect claim status."
    - "The current t4_x1 reference remains the stronger known candidate unless a later canonical task says otherwise."

outputs:
  sandbox_output_paths:
    - "agent_runs/AGENT-RUN-0001/"
  metrics:
    - "mean_relative_error"
    - "max_relative_error"
  plots:
    - "NONE"
  notes:
    - "agent_runs/AGENT-RUN-0001/report.md"
    - "agent_runs/AGENT-RUN-0001/limitations.md"

validation:
  pass_condition: "Test mean relative error below 1e-3 and no canonical promotion requested."
  fail_condition: "Test mean relative error at or above 1e-3, or denominator behavior makes stress diagnostics misleading."
  baseline_or_reference: "Exact reference baseline, theta2-only negative baseline, and current t4_x1 leaderboard reference."
  expected_failure_modes:
    - "Does not match logarithmic separatrix behavior."
    - "Does not beat the current t4_x1 reference candidate."

overclaim_risk:
  public_claim_allowed: false
  forbidden_language:
    - "Do not describe the candidate as exact."
    - "Do not describe sandbox residuals as public evidence."
  mitigations:
    - "Report t4_x1 comparison in the sandbox report."
    - "Keep outputs under agent_runs/."

limitations:
  - "Sandbox-only fit."
  - "Does not update canonical leaderboard or result artifacts."
  - "Stress diagnostics are informative but not promotional."

verdict: SANDBOX_PASS
maintainer_decision_requested: "Decide whether to request a later canonical rational-family gauntlet task."

promotion_boundary:
  writes_canonical_result: false
  writes_claim_update: false
  required_next_step: "Maintainer-reviewed canonical experiment task before RESULT-* creation."
