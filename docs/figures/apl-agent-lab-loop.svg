<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Autonomous Physics Lab agent workflow</title>
  <desc id="desc">A simple visual workflow showing an agent turning a mission into a hypothesis, deterministic test, verdict, and public memory.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.55" stop-color="#142635"/>
      <stop offset="1" stop-color="#10251f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172536"/>
      <stop offset="1" stop-color="#0f1a24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .grid { stroke: #ffffff; stroke-opacity: 0.055; stroke-width: 1; }
      .title { fill: #f8fafc; font: 700 54px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .sub { fill: #cbd5e1; font: 400 25px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #93a4b8; font: 500 19px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .card { fill: url(#panel); stroke: #31465c; stroke-width: 1.5; rx: 22; filter: url(#shadow); }
      .cardTitle { fill: #f8fafc; font: 700 26px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .cardText { fill: #b8c7d8; font: 400 19px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .pill { fill: #0f1720; stroke-width: 1.4; rx: 18; }
      .pillText { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .arrow { fill: none; stroke: #8bd3dd; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowHead); }
      .memory { fill: #173129; stroke: #2dd4bf; }
      .test { fill: #2d2614; stroke: #fbbf24; }
      .fail { fill: #351c22; stroke: #fb7185; }
      .agent { fill: #182841; stroke: #60a5fa; }
    </style>
    <marker id="arrowHead" markerWidth="16" markerHeight="16" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8bd3dd"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="720"/>
  <g>
    <path class="grid" d="M0 80H1600M0 160H1600M0 240H1600M0 320H1600M0 400H1600M0 480H1600M0 560H1600M0 640H1600"/>
    <path class="grid" d="M120 0V720M240 0V720M360 0V720M480 0V720M600 0V720M720 0V720M840 0V720M960 0V720M1080 0V720M1200 0V720M1320 0V720M1440 0V720"/>
  </g>

  <text class="title" x="96" y="104">Autonomous Physics Lab</text>
  <text class="sub" x="100" y="148">Agents propose. Code tests. The repository remembers.</text>
  <text class="tiny" x="102" y="194">python3 scripts/apl_mission.py</text>

  <g transform="translate(95 270)">
    <rect class="card agent" width="260" height="170"/>
    <text class="cardTitle" x="28" y="52">Mission</text>
    <text class="cardText" x="28" y="88">An agent reads the</text>
    <text class="cardText" x="28" y="116">current research lane</text>
    <rect class="pill agent" x="28" y="132" width="150" height="34"/>
    <text class="pillText" x="46" y="155" fill="#93c5fd">AGENT</text>
  </g>

  <path class="arrow" d="M380 355 C430 335 455 335 505 355"/>

  <g transform="translate(520 270)">
    <rect class="card" width="260" height="170"/>
    <text class="cardTitle" x="28" y="52">Hypothesis</text>
    <text class="cardText" x="28" y="88">A bounded idea</text>
    <text class="cardText" x="28" y="116">becomes testable</text>
    <rect class="pill" x="28" y="132" width="150" height="34" stroke="#a78bfa"/>
    <text class="pillText" x="46" y="155" fill="#c4b5fd">PROPOSE</text>
  </g>

  <path class="arrow" d="M805 355 C855 335 880 335 930 355"/>

  <g transform="translate(945 270)">
    <rect class="card test" width="260" height="170"/>
    <text class="cardTitle" x="28" y="52">Test</text>
    <text class="cardText" x="28" y="88">Simulation, replay,</text>
    <text class="cardText" x="28" y="116">metrics, limits</text>
    <rect class="pill test" x="28" y="132" width="150" height="34"/>
    <text class="pillText" x="46" y="155" fill="#fde68a">VERIFY</text>
  </g>

  <path class="arrow" d="M1230 355 C1280 335 1305 335 1355 355"/>

  <g transform="translate(1370 270)">
    <rect class="card memory" width="170" height="170"/>
    <text class="cardTitle" x="24" y="52">Memory</text>
    <text class="cardText" x="24" y="88">claims,</text>
    <text class="cardText" x="24" y="116">failures,</text>
    <text class="cardText" x="24" y="144">PRs</text>
  </g>

  <g transform="translate(380 520)">
    <rect class="pill" x="0" y="0" width="850" height="58" stroke="#2dd4bf"/>
    <text class="pillText" x="28" y="37" fill="#99f6e4">public memory grows from reviewable experiments, not unsupported claims</text>
  </g>

  <path class="arrow" d="M1435 475 C1390 610 235 650 190 470"/>

  <g transform="translate(96 508)">
    <rect class="pill fail" x="0" y="0" width="210" height="44"/>
    <text class="pillText" x="26" y="29" fill="#fecdd3">FAILURES STAY</text>
  </g>
</svg>
