    reason: "sqrt([m]/[m·s⁻²]) = [s]. Dimensionally correct. KNOWN_LIMIT_FAIL because the formula assumes sin(θ) ≈ θ; the exact period is T = (2/π)·T₀·K(sin²(θ/2)) involving the complete elliptic integral K. Error exceeds 1% above ~14° and grows without bound near the separatrix."

