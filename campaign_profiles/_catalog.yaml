- id: textbook-formula-audit
  title: Textbook Formula Audit
  status: scaffold
  domain: cross_domain_physics
  surface_type: formula_audit
  lifecycle_stage: scaffold
  activity_status: active
  curator:
    primary_pool: verifier_quality_floor
    secondary_pools:
    - source_data_benchmark
    - result_promotion
    review_cadence: weekly
    transfer_requires:
    - scientific_director_or_maintainer_pr
    - curator_cycle_review
    - updated_campaign_profile
  current_stage: campaign scaffold and candidate slate; first source/baseline planning task
    is ready
  agent_capacity:
    recommended_parallel_agents: 1
    coordination_notes: Use one formula slice at a time until source, schema, baseline, and
      holdout conventions are proven.
  best_next_actions:
  - task_id: TASK-0444
    label: Plan Stellar Mass-Luminosity OOD source and baseline
  required_gates:
  - Source and range assumptions before metrics.
  - Baseline and OOD failure-map plan.
  - No universal formula-audit claims.
  allowed_work:
  - Published textbook or canonical formula candidates with named primary source, declared
    validity range, and named independent variables.
  - Compact agent-proposed range or boundary modifications of a published formula that add
    no new free parameters fit on the full snapshot.
  - Null-baseline floors (per-slice median, per-class median, constant offset) that quantify
    a minimum non-trivial signal against which the audited formula is compared.
  - Negative-control candidates that intentionally collapse one diagnostic axis (e.g. shuffled-label,
    uncertainty-equalized subset).
  - Deterministic per-slice residual replay of a frozen textbook formula against a pinned
    public catalog or compendium snapshot.
  - Baseline-versus-null-baseline comparisons under the committed inclusion/exclusion filter
    chain.
  - Sandbox-only matched-control audits that preserve explicit negative, inconclusive, or
    control-sensitive results.
  - Verification-gate runs (dimensional consistency, limiting behaviour, asymptotic alignment,
    monotonicity, evenness, separatrix where relevant) applied to the audited formula.
  forbidden_work:
  - Any audit validated or falsified a textbook formula in universal terms.
  - A single slice's pass or failure generalizes across the whole formula or to other formulas.
  - Application-domain inference (composition, evolutionary fate, habitability, biosignatures,
    drug efficacy, target priority, treatment recommendation, biological body-plan generalization,
    etc.).
  - Discovery framing such as 'APL discovered that X formula fails for Y class'.
  - Universal physical-law statements derived from any audit slice.
  - Refitting a frozen baseline formula on the full snapshot inside an audit task.
  - Live external fetch that bypasses snapshot pinning.
  - Auto-promotion of any audited formula's CLAIM status (claim endorsement remains maintainer-only).
  current_results:
  - docs/campaigns/textbook-formula-audit.md
  - docs/notes/textbook-formula-audit-candidate-list.md
