id: materials-property-residuals
title: "Materials property residuals"
autonomy_status: SCAFFOLD_ONLY
pilot_rank: null

source_docs:
  - docs/campaigns/materials-property-residuals.md
  - data/materials/README.md
  - docs/autonomous-research-loop.md
  - docs/research-quality-gate.md

allowed_hypothesis_families:
  - "Planning-only notes that define scope, admissible source classes, schema, or limitations for future benchmark work."
  - "Conservative property-residual baseline proposals (per-class median, simple composition/structure descriptors) described only in planning text until a pinned source snapshot and baseline task land."
  - "Negative-control candidate sketches that intentionally overfit one material family or one property regime."
  - "Holdout, source, or subset-definition proposals that do not claim benchmark improvements."

allowed_experiment_families:
  - "No canonical experiments yet."
  - "Planning notes for future source-manifest, schema, baseline, holdout, and residual-map experiments once a pinned snapshot policy exists."

required_inputs:
  - "Explicit property kind with units (e.g. formation energy per atom in eV/atom, band gap in eV, bulk or shear modulus in GPa)."
  - "Material identity and structure semantics (composition, prototype/space group, and whether the row is a relaxed or as-reported structure)."
  - "Source provenance pinned to a database/version, record id, citation, and where possible a checksum or pinned snapshot."
  - "Computation vs measurement provenance (DFT functional or experimental method) kept explicit and never silently mixed."
  - "Inclusion or exclusion status for entries that are derived, theoretical, duplicated, or out of scope."

required_quality_checks:
  - "State that no claim about material discovery, property prediction, or device/synthesis performance is being made."
  - "Separate property kinds (formation energy, band gap, elastic moduli) instead of merging them under one residual metric."
  - "Keep computed (DFT) and measured properties on separate residual axes with explicit provenance."
  - "Exclude synthesis recipes, lab protocols, chemical handling guidance, device fabrication steps, and biomedical claims."
  - "State that this profile is scaffold-only and that no canonical result, dataset, or pinned snapshot exists yet."
  - "Run the shared research quality gate before any later autonomy PR handoff."

forbidden_claims:
  - "APL has discovered a new material or a material-design law."
  - "Property-residual improvements imply a new materials-science theory."
  - "The campaign supports material selection, synthesis, device fabrication, or biomedical applications."
  - "Formation energy, band gap, and elastic-property targets may be silently merged under one residual metric."
  - "Computed and measured properties may be mixed on one residual axis without provenance."
  - "Live materials-database fetches may run before a pinned snapshot policy exists."
  - "Autonomous correction search may run before a frozen baseline and pinned snapshot land."
  - "Sandbox fit improvements are evidence of a broader physical or materials conclusion."

sandbox_permissions:
  may_create:
    - scoped_notes
    - planning_only_proposals
  must_not_edit:
    - claims
    - canonical_hypotheses
    - canonical_experiments
    - canonical_results
    - canonical_materials_datasets

validation_commands:
  - "python3 -m ruff check ."
  - "python3 -m pytest"
  - "python3 -m physics_lab.cli validate-repo ."
  - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

handoff_requires:
  - task_id_or_microtask_id
  - campaign_profile_id
  - planning_artifact_path
  - scope_statement
  - limitations
  - maintainer_decision_requested

portfolio:
  status: active_secondary
  domain: materials_science
  surface_type: source_pinned_benchmark
  lifecycle_stage: active_benchmark
  activity_status: active
  curator:
    primary_pool: source_data_benchmark
    secondary_pools:
      - verifier_quality_floor
      - result_promotion
    review_cadence: weekly
    transfer_requires:
      - scientific_director_or_maintainer_pr
      - curator_cycle_review
      - source_readiness_pass
      - updated_campaign_profile
  current_stage: "MD-0001 reusable dataset and controls complete; MD-0002 narrowed snapshot is AGENT_PUBLISHED as RESULT-0021 and needs Gate B replay before broader Materials interpretation."
  recommended_parallel_agents: 2
  coordination_notes: "Run RESULT-0021 Gate B first when possible. Follow-up stress tasks must use committed MD-0002 rows, frozen controls, and no materials-claim wording."
  best_next_actions:
    - task_id: TASK-0775
      label: "Run Gate B replay for RESULT-0021 without changing metrics or materials-claim wording"
    - task_id: TASK-0789
      label: "Preflight one MD-0002 family-holdout stress axis before any new metric task"
    - task_id: TASK-0790
      label: "Run one bounded descriptor/control ablation without opening a feature factory"
  required_gates:
    - "Use the committed MD-0002 source snapshot, checksums, and attribution."
    - "Respect the frozen no-peek holdout binding before residual metrics."
    - "Computed-vs-measured and per-property-kind separation before any baseline."
    - "Holdout/no-peek protocol before benchmark comparison."
  current_results:
    - "docs/campaigns/materials-property-residuals.md"
    - "data/materials/source_manifest.yaml"
    - "data/materials/md-0001/"
    - "data/materials/md-0002/"
    - "docs/reviews/materials-md0001-split-sensitivity-audit.md"
    - "docs/reviews/materials-md0002-acquisition-validation-and-holdout-freeze.md"
    - "docs/reviews/materials-md0002-formation-energy-baseline-benchmark.md"
    - "docs/reviews/materials-md0002-formation-energy-result-path-adjudication.md"
    - "results/EXP-0014/RUN-0001/result.yaml"
    - "agent_runs/AGENT-RUN-0072/"
  open_questions:
    - "Does RESULT-0021 pass independent Gate B replay from its committed command and hashes?"
    - "Does the cation-pair baseline survive family-holdout or descriptor-control stress without overclaiming?"
    - "Does band gap remain diagnostic-only after the wider snapshot?"
  curator_review:
    status: current
    last_reviewed: "2026-06-19"
    review_interval: quarterly_planning
    next_review_due: "2026-09-01"
    review_reason: benchmark_monitoring
    source: "RESULT-0021, TASK-0775, and TASK-0788 mission-wave sync"
    notes: "MD-0002 formation energy is now AGENT_PUBLISHED as a computed-DFT, slice-limited benchmark. Gate B replay is first priority; follow-up stress audits stay benchmark/control-only with no materials claim or band-gap promotion."
