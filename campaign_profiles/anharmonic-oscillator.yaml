id: anharmonic-oscillator
title: "Anharmonic oscillator benchmark"
autonomy_status: WHITELISTED_LIMITED
pilot_rank: 3

source_docs:
  - docs/results/anharmonic-oscillator-summary.md
  - docs/drafts/anharmonic-period-experiment-plan.md
  - docs/autonomous-research-loop.md
  - docs/research-quality-gate.md

allowed_hypothesis_families:
  - "Epsilon-based ratio candidates evaluated on the EXP-0011 train, holdout, and stress slices."
  - "Negative-control candidates that intentionally collapse one benchmark axis."
  - "Breakdown-mapping probes that remain scoped to approximation quality only."

allowed_experiment_families:
  - "Deterministic replay of the EXP-0011 anharmonic reference surface."
  - "Train-fit and holdout comparison against the RESULT-0014 canonical baseline."
  - "Sandbox-only contrast between one promising candidate and one negative-control candidate."

required_inputs:
  - "EXP-0011 train, holdout, and stress slice definitions."
  - "Candidate formula specification with named variables and fit parameters."
  - "Exact-reference or deterministic-integral baseline path."
  - "Reference to RESULT-0014 when claiming relative improvement inside sandbox only."

required_quality_checks:
  - "State that no exactness or broad-range claim is made."
  - "Report train, holdout, and stress relative error metrics."
  - "State why rejected proposals were not executed."
  - "Keep all evidence under proposal or agent-run paths only."
  - "Run the shared research quality gate before PR handoff."

forbidden_claims:
  - "A sandbox candidate replaces RESULT-0014 automatically."
  - "A train-fitted candidate is a discovered physical law."
  - "A sandbox fit is exact or valid for all anharmonicities."
  - "Negative-control failure means the benchmark itself is invalid."

sandbox_permissions:
  may_create:
    - hypothesis_proposals
    - experiment_proposals
    - scoped_notes
    - temporary_outputs
  must_not_edit:
    - claims
    - canonical_hypotheses
    - canonical_experiments
    - canonical_results
    - knowledge

validation_commands:
  - "python3 -m ruff check ."
  - "python3 -m pytest"
  - "python3 -m physics_lab.cli validate-repo ."
  - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

handoff_requires:
  - task_id_or_microtask_id
  - campaign_profile_id
  - hypothesis_proposal_path
  - experiment_proposal_path
  - method
  - metrics
  - limitations
  - verdict
  - maintainer_decision_requested

portfolio:
  status: quality_floor
  domain: classical_mechanics
  current_stage: "validated-in-range benchmark with replay and candidate-limit comparison value"
  recommended_parallel_agents: 1
  coordination_notes: "Use as a bounded replay/follow-up benchmark; avoid broad candidate expansion without a task."
  best_next_actions:
    - task_id: null
      label: "Replay and compare candidate limits when a maintainer asks for benchmark hygiene"
  required_gates:
    - "Train, holdout, and stress metrics must remain separated."
    - "No exactness or broad-range wording."
  current_results:
    - "results/EXP-0011/"
    - "docs/results/anharmonic-oscillator-summary.md"
  open_questions:
    - "Which candidate limits are useful enough to become a public replay capsule?"
  curator_review:
    status: current
    last_reviewed: "2026-05-29"
    review_interval: semiannual_quality_floor
    next_review_due: "2026-12-01"
    review_reason: quality_floor_hygiene
    source: "docs/status.md"
    notes: "Quality-floor benchmark that is useful for replay and range-limit discipline."
