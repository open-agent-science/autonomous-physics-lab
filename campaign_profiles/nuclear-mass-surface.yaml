id: nuclear-mass-surface
title: "Nuclear mass surface"
autonomy_status: WHITELISTED_LIMITED
pilot_rank: 4

source_docs:
  - docs/campaigns/nuclear-mass-surface.md
  - docs/notes/nuclear-mass-campaign-plan.md
  - docs/nuclear-mass-holdout-protocol.md
  - docs/notes/nuclear-mass-split-rationale.md
  - docs/autonomous-research-loop.md
  - docs/research-quality-gate.md

allowed_hypothesis_families:
  - "Shell-aware residual corrections with explicit frozen-baseline comparison."
  - "Pairing or asymmetry refinement proposals with compact parameterization."
  - "Negative-control candidates that intentionally overfit one subset or collapse one diagnostic axis."
  - "Source-policy or subset-definition proposals that do not claim benchmark improvements."

allowed_experiment_families:
  - "Deterministic residual replay against a pinned nuclear mass dataset."
  - "Baseline-versus-candidate comparisons under a reviewed holdout protocol."
  - "Sandbox-only comparisons that preserve explicit negative results."

required_inputs:
  - "Pinned dataset source, version, and checksum policy."
  - "Explicit measured-versus-extrapolated field semantics."
  - "Named baseline residual target and unit conventions."
  - "Reviewed subset definitions for shell, chain, and neutron-rich diagnostics."
  - "Holdout protocol approved before any candidate-improvement interpretation."
  - "Recorded active holdout families and their fixed split definitions."
  - "Recorded complexity penalty and negative-control plan."

required_quality_checks:
  - "State that no universal mass-formula or broad-claim wording is used."
  - "Keep dataset provenance and field semantics explicit."
  - "Report baseline-relative metrics and subset behavior, not fit quality alone."
  - "Preserve negative or overfit results as valid review surfaces."
  - "Report which holdout families were active and whether any shell, chain, or neutron-rich slice regressed."
  - "Run the shared research quality gate before any later autonomy PR handoff."

forbidden_claims:
  - "A sandbox candidate explains all nuclear masses."
  - "Residual improvement alone is evidence of a broader physical conclusion."
  - "Measured and extrapolated entries may be mixed without explicit semantics."
  - "Advanced-model comparisons are required before the simple baseline exists."
  - "Autonomous work may skip the frozen baseline, holdout protocol, or negative-control plan."
  - "Random holdout improvement alone is enough to claim generalization."

sandbox_permissions:
  may_create:
    - scoped_notes
    - temporary_outputs
    - future_hypothesis_proposals
    - future_experiment_proposals
  must_not_edit:
    - claims
    - canonical_hypotheses
    - canonical_experiments
    - canonical_results
    - canonical_nuclear_mass_datasets

validation_commands:
  - "python3 -m ruff check ."
  - "python3 -m pytest"
  - "python3 -m physics_lab.cli validate-repo ."
  - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

handoff_requires:
  - task_id_or_microtask_id
  - campaign_profile_id
  - dataset_source_and_version
  - baseline_definition
  - holdout_protocol_reference
  - metrics
  - limitations
  - verdict
  - maintainer_decision_requested

allowed_factory_families:
  - id: shell_distance
    description: "Distance-to-magic-number and shell-closure residual features."
    required_guard: "Apply the no-leakage residual-feature contract; use a shuffled-shell control."
  - id: odd_even_pairing
    description: "Odd-even staggering and pairing-term residual features."
    required_guard: "Use a parity-matched control."
  - id: asymmetry
    description: "Isospin / (N-Z) asymmetry residual features."
    required_guard: "Use a matched-(N,Z) control."
  - id: residual_free_local_topology
    description: "Local residual-cluster topology features."
    required_guard: "Apply the local-curvature no-leakage freeze protocol; use a null-neighbor control."
  - id: separation_energy_derived
    description: "Features derived from separation energies."
    required_guard: "Verify the prediction target is not encoded (leakage check)."
  - id: local_curvature
    description: "Local curvature of the mass surface."
    required_guard: "Only under the no-leakage freeze protocol with mandatory adversarial controls."

required_factory_controls:
  - "Null-baseline comparison against the frozen Nuclear residual surface is mandatory."
  - "Per-family shuffled-label / destroyed-structure negative control is mandatory."
  - "Matched controls (matched (N,Z), matched shell region) for slice candidates."
  - "No-leakage verification for every residual feature (nuclear-residual-feature-no-leakage-contract.md)."
  - "Holdout and post-AME2020 time-split must be reported separately, not pooled."
  - "Complexity penalty for every added feature, split, or parameter."
  - "No baseline refit and no live fetch from a factory run by default."

factory_stop_rules:
  - "Stop if the no-leakage contracts are not satisfied for a residual feature."
  - "Stop if the candidate pool exceeds the declared cap or expands after metrics are seen."
  - "Stop if a feature encodes the prediction target (leakage)."
  - "Stop if a factory run would create RESULT, PRED, CLAIM, or KNOW artifacts, or trigger reveal scoring, without a maintainer-approved promotion task."
  - "Stop if baseline refit or live fetch is requested."

portfolio:
  status: flagship_validation
  domain: nuclear_physics
  surface_type: prediction_reveal
  lifecycle_stage: reveal_blocked
  activity_status: active
  curator:
    primary_pool: prediction_reveal
    secondary_pools:
      - result_promotion
      - verifier_quality_floor
    review_cadence: weekly
    transfer_requires:
      - scientific_director_or_maintainer_pr
      - curator_cycle_review
      - updated_campaign_profile
  current_stage: "frozen baseline, sandbox diagnostics, RESULT-0018 AGENT_VALIDATED diagnostic memory, reveal scoring blocked, and one non-F2 no-leakage lane selection queued"
  recommended_parallel_agents: 3
