id: thermophysical-property-residuals
title: "Thermophysical property residuals"
autonomy_status: WHITELISTED_LIMITED
pilot_rank: null

source_docs:
  - docs/campaigns/thermophysical-property-residuals.md
  - data/thermophysical/source_manifest.yaml
  - data/thermophysical/thermoml_tb_audit_fixture.yaml
  - results/EXP-0020/RUN-0001/result.yaml
  - docs/result-promotion-protocol.md
  - docs/research-quality-gate.md

allowed_hypothesis_families:
  - "Scoped thermophysical property-estimation baseline audits against pinned public data surfaces."
  - "Frozen baseline, split, control, replay, and negative-memory work for normal boiling temperature (Tb) only unless a later task explicitly admits another property."
  - "Source-readiness and corpus-expansion planning that records rights, identity mapping, row class, and extraction blockers without committing raw archive bytes."
  - "Negative-control candidate sketches that intentionally test family leakage, molecular-weight-only explanations, shuffled groups, or failed chemical families."

allowed_experiment_families:
  - "Independent replay of RESULT-0026 and its source-limited ThermoML Tb fixture."
  - "Value-blind source and fixture expansion preflights for ThermoML Tb rows."
  - "Bounded family-stratified transfer audits with frozen baselines and predeclared controls."
  - "Result-review packets or negative-memory notes that do not mutate RESULT metrics."

required_inputs:
  - "Property kind and units, with normal boiling temperature (Tb, K) as the only currently admitted scored property."
  - "Source provenance pinned to archive DOI, archive filename, published checksum, citation, and rights boundary."
  - "Pure-component identity semantics, including InChI/InChIKey or an explicit blocker when identity cannot be resolved."
  - "Row class and system class: pure component only; mixtures, salts, ionic liquids, charged species, and ambiguous systems excluded unless a later task explicitly defines a separate surface."
  - "Frozen baseline definition, group table, intercept, and any implementation-fidelity fixture used before scoring."
  - "Family split, holdout, and control definitions before any metric comparison."

required_quality_checks:
  - "State that no universal Joback accuracy, chemical-design, process-design, safety, synthesis, or broad property-estimation claim is being made."
  - "Keep Tb separate from Tc, critical properties, vapor pressure, heat capacity, or any other ThermoML property until a separate source and leakage gate exists."
  - "Do not use experimental Tb as an upstream input for a downstream-property audit."
  - "Do not vendor raw ThermoML archive bytes or a substantial normalized corpus."
  - "Report failed families and controls next to aggregate wins."
  - "Run the shared research quality gate and strict repository validation before handoff."

forbidden_claims:
  - "Campaign outputs may be framed as a new thermophysical law."
  - "Joback may be framed as globally reliable or globally failed."
  - "A bounded 40-row ThermoML fixture supports chemical design, process design, safety guidance, or property prediction in production."
  - "Normal boiling temperature results imply support for critical-temperature, vapor-pressure, heat-capacity, or other property estimates."
  - "Raw ThermoML archive contents or a substantial normalized corpus are covered by the repository license."
  - "A family-stratified aggregate win can hide a failed family without negative-memory routing."

sandbox_permissions:
  may_create:
    - scoped_notes
    - replay_reviews
    - source_readiness_notes
    - negative_memory_reviews
    - task_queue_entries
  must_not_edit:
    - claims
    - knowledge
    - canonical_results
    - thermoml_raw_archive_bytes

validation_commands:
  - "python3 -m ruff check ."
  - "python3 -m pytest tests/test_joback_tb.py tests/test_thermoml_family_transfer.py tests/test_docs_links.py"
  - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

handoff_requires:
  - task_id_or_microtask_id
  - campaign_profile_id
  - source_or_result_reference
  - property_scope
  - rights_boundary
  - limitations
  - verdict
  - maintainer_decision_requested

portfolio:
  status: active_secondary
  domain: thermophysical_property_estimation
  surface_type: source_pinned_benchmark
  lifecycle_stage: active_benchmark
  activity_status: active
  curator:
    primary_pool: source_data_benchmark
    secondary_pools:
      - verifier_quality_floor
      - result_promotion
    review_cadence: weekly
    transfer_requires:
      - scientific_director_or_maintainer_pr
      - curator_cycle_review
      - source_readiness_pass
      - updated_campaign_profile
  current_stage: "ThermoML Tb RESULT-0026 is AGENT_PUBLISHED on a bounded 40-row family-stratified fixture; independent numeric replay returned zero drift, but formal Gate B is helper-blocked, while corpus-expansion and esters/lactones negative-memory preflights remain separate gates."
  recommended_parallel_agents: 2
  coordination_notes: "Split work by artifact surface: one agent can bridge RESULT-0026 into formal Gate B, one can run TASK-0906 local-only identity/count preflight, and one can preflight failed-family negative-result packaging. Do not broaden beyond Tb, commit raw archive bytes, or rerun Gate A packaging."
  next_validity_gate:
