id: particle-mass-relations
title: "Particle-mass relations"
autonomy_status: GUARDRAIL_ONLY
pilot_rank: 3

source_docs:
  - docs/campaigns/particle-mass-relations.md
  - docs/results/koide-campaign-summary.md
  - docs/notes/particle-mass-relation-track.md
  - docs/notes/particle-mass-numerology-guardrails.md
  - docs/autonomous-research-loop.md
  - docs/research-quality-gate.md

allowed_hypothesis_families:
  - "Falsification-first checks for already specified relation forms."
  - "Null-baseline and complexity-penalty proposals."
  - "Dataset provenance, uncertainty, scheme, or scale audit proposals."
  - "Negative-result memory for failed candidate relations."

allowed_experiment_families:
  - "Sandbox falsification of a predeclared relation against stored data."
  - "Baseline comparison against random or combinatorial alternatives."
  - "Uncertainty propagation or source-audit checks."
  - "Complexity penalty ledger proposals."

required_inputs:
  - "Particle family and exact mass fields used."
  - "Data source and citation path already present in the repository."
  - "Mass type, scheme, scale, and uncertainty assumptions."
  - "Predeclared target relation."
  - "Null baseline or falsification criterion."

required_quality_checks:
  - "State that the work is not discovery-oriented."
  - "State that fit quality alone is not evidence of explanation."
  - "Include a baseline or explain why the run is only an audit proposal."
  - "Include source, scheme, scale, and uncertainty limitations."
  - "Run the shared research quality gate before PR handoff."

forbidden_claims:
  - "A relation explains particle mass generation."
  - "Charged-lepton behavior generalizes to all particle families."
  - "A numerical fit is evidence of a stronger physical interpretation."
  - "Sandbox evidence promotes a claim."
  - "A broad search is authorized without a reviewed baseline."

sandbox_permissions:
  may_create:
    - hypothesis_proposals
    - experiment_proposals
    - scoped_negative_notes
    - temporary_outputs
  must_not_edit:
    - claims
    - canonical_hypotheses
    - canonical_results
    - canonical_particle_mass_datasets

validation_commands:
  - "python3 -m ruff check ."
  - "python3 -m pytest"
  - "python3 -m physics_lab.cli validate-repo ."
  - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

handoff_requires:
  - task_id_or_microtask_id
  - campaign_profile_id
  - hypothesis_or_audit_proposal_path
  - data_sources
  - relation_under_test
  - baseline_or_falsification_criterion
  - metrics
  - limitations
  - verdict
  - maintainer_decision_requested

portfolio:
  status: guardrail
  domain: particle_physics
  surface_type: guardrail_falsification
  lifecycle_stage: mature
  activity_status: active_support
  curator:
    primary_pool: verifier_quality_floor
    secondary_pools:
      - result_promotion
      - frontier_planning
    review_cadence: as_needed
    transfer_requires:
      - scientific_director_or_maintainer_pr
      - curator_cycle_review
      - updated_campaign_profile
  current_stage: "falsification-first quality floor with strict numerology guardrails; CLAIM-0007 evidence handoff prepared, and RESULT-0011 needs Gate B replay before stronger negative-memory support"
  recommended_parallel_agents: 1
  coordination_notes: "Use for provenance, uncertainty, replay, or negative-result memory only; keep broad formula search closed."
  best_next_actions:
    - task_id: TASK-0811
      label: "Run RESULT-0011 Gate B replay before any CLAIM-0007 Gate C decision"
  required_gates:
    - "Complexity penalty and uncertainty semantics before any relation comparison."
    - "No broad particle-mass formula search without a reviewed baseline."
  current_results:
    - "docs/results/koide-campaign-summary.md"
    - "docs/negative-results-registry.md"
    - "results/EXP-0009/RUN-0001/result.yaml"
    - "docs/reviews/claim-0007-particle-mass-falsifier-evidence-handoff.md"
  open_questions:
    - "Does RESULT-0011 replay cleanly under current tooling, and how should mixed quark mass scheme/scale limitations constrain CLAIM-0007?"
  curator_review:
    status: current
    last_reviewed: "2026-06-17"
    review_interval: semiannual_quality_floor
    next_review_due: "2026-12-01"
    review_reason: quality_floor_hygiene
    source: "RESULT-0011, TASK-0784 evidence handoff, and TASK-0811 replay routing"
    notes: "Guardrail track stays useful by resisting numerology, preserving falsifications, and strengthening deterministic replay before maintainer-only claim review."
