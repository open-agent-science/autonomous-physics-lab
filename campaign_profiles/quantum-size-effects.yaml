id: quantum-size-effects
title: "Quantum size effects"
autonomy_status: SCAFFOLD_ONLY
pilot_rank: null

source_docs:
  - docs/campaigns/quantum-size-effects.md
  - docs/notes/quantum-size-effects-campaign-plan.md
  - docs/future-research-portfolio.md
  - docs/autonomous-research-loop.md
  - docs/research-quality-gate.md

allowed_hypothesis_families:
  - "Planning-only notes that define scope, semantics, or limitations for future benchmark work."
  - "Conservative size-scaling baseline interpretation, source/license follow-up proposals, or negative-memory routing only after the source-scoped Almeida baseline."
  - "Negative-control candidate sketches that intentionally overfit one material or one size regime."
  - "Holdout, source, or subset-definition proposals that do not claim benchmark improvements."

allowed_experiment_families:
  - "No canonical experiments yet."
  - "Planning notes for conservative visualization, independent-source expansion, source/license review, negative-memory routing, and gated pilot work after explicit maintainer approval."

required_inputs:
  - "Explicit property kind such as absorption peak, emission peak, or bandgap in eV."
  - "Material and composition identification with explicit semantics for alloys or mixed compositions."
  - "Size field semantics: diameter_nm or radius_nm, with one canonical choice per benchmark surface."
  - "Source provenance pinned to a citation, year, and where possible a checksum or pinned copy."
  - "Measurement type and temperature when known."
  - "Inclusion or exclusion status for entries that are derived, theoretical, or out of scope."

required_quality_checks:
  - "State that no claim about quantum-dot design laws, material discovery, or device performance is being made."
  - "Separate absorption peak, emission peak, and bandgap entries in planning text instead of merging them under one residual metric."
  - "Exclude synthesis recipes, lab protocols, chemical handling guidance, device fabrication steps, and biomedical claims."
  - "State that the current baseline is source-scoped sandbox evidence, not a canonical public result."
  - "Run the shared research quality gate before any later autonomy PR handoff."

forbidden_claims:
  - "APL has discovered a quantum-dot design law."
  - "Baseline residuals imply a new condensed-matter theory."
  - "The campaign supports material selection, fabrication, or biomedical applications."
  - "Absorption, emission, and bandgap targets may be silently merged under one residual metric."
  - "Autonomous correction search may run before source/license and transfer/negative-memory gates clear a bounded pilot."
  - "Sandbox fit improvements are evidence of a broader physical conclusion."

sandbox_permissions:
  may_create:
    - scoped_notes
    - planning_only_proposals
  must_not_edit:
    - claims
    - canonical_hypotheses
    - canonical_experiments
    - canonical_results
    - canonical_quantum_dot_datasets

validation_commands:
  - "python3 -m ruff check ."
  - "python3 -m pytest"
  - "python3 -m physics_lab.cli validate-repo ."
  - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

handoff_requires:
  - task_id_or_microtask_id
  - campaign_profile_id
  - planning_artifact_path
  - scope_statement
  - limitations
  - maintainer_decision_requested

portfolio:
  status: source_readiness
  domain: condensed_matter
  surface_type: source_pinned_benchmark
  lifecycle_stage: active_benchmark
  activity_status: active
  curator:
    primary_pool: source_data_benchmark
    secondary_pools:
      - verifier_quality_floor
    review_cadence: weekly
    transfer_requires:
      - scientific_director_or_maintainer_pr
      - curator_cycle_review
      - source_readiness_pass
      - updated_campaign_profile
  current_stage: "Six direct Almeida InP rows passed readiness and TASK-0225 produced a source-scoped sandbox baseline; follow-up transfer attempts now show source/license and material-specific blockers rather than an admissible correction-search lane"
  recommended_parallel_agents: 1
  coordination_notes: "Do not route agents to archived TASK-0226 or TASK-0336. Current work is source/license verification for the ZnSe route and negative-memory routing for the effective-mass transfer failure; no correction search or design-law claim."
  next_validity_gate:
    type: source_and_negative_memory
    blocker: "The current baseline is single-source Almeida InP; the ZnSe second-material route is license-limited, and fixed effective-mass scaling did not transfer cleanly across InP/ZnSe."
    target_artifact: "TASK-0870"
  best_next_actions:
    - task_id: TASK-0870
      label: "Verify the ZnSe direct-size source license route before any row task"
    - task_id: TASK-0871
      label: "Route the effective-mass scaled confinement transfer failure as negative memory"
  required_gates:
    - "Direct measurement row provenance or approved weaker calibration-consistency scope."
    - "Source artifact package before benchmark metrics."
    - "Dataset schema and source manifest checks."
  current_results:
    - "data/quantum_dots/source_manifest.yaml"
    - "data/quantum_dots/qd-0003-almeida-2023-inp-optical.yaml"
    - "docs/campaigns/quantum-size-effects.md"
    - "docs/reviews/quantum-size-row-level-data-readiness-after-direct-seed.md"
    - "agent_runs/AGENT-RUN-0076/report.md"
    - "docs/results/quantum-size-effects-baseline-summary.md"
    - "docs/reviews/quantum-open-tabular-transfer-source-scout.md"
    - "docs/reviews/quantum-effective-mass-scaled-confinement-transfer.md"
  open_questions:
    - "Can the ZnSe/Toufanian route be confirmed under a redistributable license, or should it remain source-limited memory?"
    - "Should the effective-mass transfer failure be routed as durable negative memory before any new quantum source lane is opened?"
  curator_review:
    status: current
    last_reviewed: "2026-06-28"
    review_interval: quarterly_active
    next_review_due: "2026-09-01"
    review_reason: benchmark_monitoring
    source: "TASK-0293 direct-row readiness pass, TASK-0225 source-scoped sandbox baseline, TASK-0277 pilot-blocked verdict, TASK-0829 ZnSe source scout, TASK-0848 Vossmeyer source memory, TASK-0850 effective-mass transfer failure, and TASK-0870/TASK-0871 routing"
    notes: "The direct-row blocker for Almeida InP is resolved and a deterministic sandbox baseline exists, but transfer remains blocked by source licensing and negative transfer evidence. Archived TASK-0226/TASK-0336 should not be offered as current work."
