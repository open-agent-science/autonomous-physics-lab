id: atomic-clock-residuals
title: "Atomic-clock residuals"
autonomy_status: SOURCE_READINESS
pilot_rank: 6

source_docs:
  - docs/campaigns/atomic-clock-residuals.md
  - data/atomic_clocks/README.md
  - data/atomic_clocks/schema.md
  - docs/notes/atomic-clock-source-candidates.md
  - docs/research-quality-gate.md

allowed_hypothesis_families:
  - "Source-readiness and provenance notes for direct frequency-ratio rows."
  - "Holdout/no-peek manifest proposals before any benchmark consumer runs."
  - "Covariance-policy and version-drift reviews with explicit blockers."

allowed_experiment_families:
  - "Deterministic loader dry-runs against committed real or synthetic rows."
  - "Baseline-readiness gates that return go/no-go status without fitting drift."
  - "Cross-source consistency benchmark planning after required source gates pass."

required_inputs:
  - "Pinned primary source or source-artifact package."
  - "Direct-vs-derived row classification."
  - "Frequency-ratio, epoch, uncertainty, and covariance semantics."
  - "Version-drift stop condition when source versions disagree."
  - "Holdout/no-peek manifest before any benchmark interpretation."

required_quality_checks:
  - "State that no constants-drift or new-constant claim is made."
  - "Keep direct measurements separate from derived constraints."
  - "Preserve covariance and uncertainty semantics before benchmark metrics."
  - "Stop on source-artifact version drift."

forbidden_claims:
  - "APL has found constants drift."
  - "Atomic-clock residuals imply a new constant or anomaly explanation."
  - "A benchmark may run before real rows, second-source policy, and holdout/no-peek manifest exist."
  - "Covariance can be ignored for high-precision interpretation."

sandbox_permissions:
  may_create:
    - source_artifact_notes
    - loader_dry_run_outputs
    - holdout_manifest_proposals
    - readiness_gate_reviews
  must_not_edit:
    - claims
    - canonical_results
    - knowledge

validation_commands:
  - "python3 -m ruff check ."
  - "python3 -m pytest"
  - "python3 -m physics_lab.cli validate-repo ."
  - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

handoff_requires:
  - task_id_or_microtask_id
  - campaign_profile_id
  - source_or_manifest_reference
  - row_or_covariance_semantics
  - limitations
  - verdict
  - maintainer_decision_requested

