id: dimensional-analysis-validator
title: "Dimensional analysis validator"
autonomy_status: WHITELISTED_LIMITED
pilot_rank: 2

source_docs:
  - docs/campaigns/dimensional-analysis-validator.md
  - docs/results/dimensional-analysis-validator-summary.md
  - docs/notes/dimensional-analysis-challenge-set.md
  - docs/autonomous-research-loop.md
  - docs/research-quality-gate.md

allowed_hypothesis_families:
  - "Challenge-entry proposals with explicit expected dimensional verdicts."
  - "Known-limit or semantic-suspicion examples with clear rationale."
  - "Validator limitation probes that do not rewrite the frozen MVP result."

allowed_experiment_families:
  - "Sandbox classification of proposed formulas."
  - "Comparison of expected and observed validator verdicts."
  - "Ambiguity notes for SUSPICIOUS or KNOWN_LIMIT_FAIL cases."
  - "Follow-up benchmark rebaseline proposals."

required_inputs:
  - "Formula expression."
  - "Variable dimension map."
  - "Expected verdict."
  - "Rationale for expected verdict."
  - "Reference to the current challenge set or result summary."

required_quality_checks:
  - "Do not change frozen RESULT-0007 replay scope."
  - "Separate live curation examples from canonical MVP metrics."
  - "State whether the example is SI-focused or outside current scope."
  - "State why dimensional consistency is or is not enough for the example."
  - "Run the shared research quality gate before PR handoff."

forbidden_claims:
  - "Dimensional consistency proves full physical correctness."
  - "Live challenge additions update RESULT-0007 metrics."
  - "Natural-unit workflows are supported unless explicitly scoped."
  - "Sandbox classification is a canonical benchmark rebaseline."

sandbox_permissions:
  may_create:
    - hypothesis_proposals
    - experiment_proposals
    - scoped_notes
    - temporary_outputs
  must_not_edit:
    - claims
    - canonical_results
    - frozen_mvp_replay_inputs

validation_commands:
  - "python3 -m ruff check ."
  - "python3 -m pytest"
  - "python3 -m physics_lab.cli validate-repo ."
  - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

handoff_requires:
  - task_id_or_microtask_id
  - campaign_profile_id
  - proposal_path
  - formula
  - expected_verdict
  - observed_verdict
  - limitation
  - verdict
  - maintainer_decision_requested

portfolio:
  status: quality_floor
  domain: physics_validation
  surface_type: quality_floor
  lifecycle_stage: mature
  activity_status: active_support
  curator:
    primary_pool: verifier_quality_floor
    secondary_pools:
      - result_promotion
    review_cadence: as_needed
    transfer_requires:
      - scientific_director_or_maintainer_pr
      - curator_cycle_review
      - updated_campaign_profile
  current_stage: "RESULT-0007 frozen MVP plus AGENT_PUBLISHED RESULT-0020 live 74-item replay; RESULT-0020 Gate B remains a packaging-contest decision, not validated claim support"
  recommended_parallel_agents: 1
  coordination_notes: "Prioritize the RESULT-0020 packaging-contest adjudication brief before adding more live challenge examples or claim support."
  next_validity_gate:
    type: ratification
    blocker: "RESULT-0020 Gate B packaging contest is unresolved, so CLAIM-0005 cannot lean on RESULT-0020 as validated evidence."
    target_artifact: "TASK-0807"
  best_next_actions:
    - task_id: TASK-0807
      label: "Prepare the RESULT-0020 Gate B packaging-contest adjudication brief for maintainer decision"
  required_gates:
    - "Do not change frozen RESULT-0007 replay scope."
    - "Separate live curation from canonical MVP metrics."
  current_results:
    - "results/EXP-0006/RUN-0006/result.yaml"
    - "results/EXP-0006/RUN-0007/result.yaml"
    - "docs/results/dimensional-analysis-validator-summary.md"
  open_questions:
    - "Which RESULT-0020 verification checks are code-reproducible versus hand-authored Gate A packaging?"
    - "What conservative CLAIM-0005 wording is supportable if RESULT-0020 remains AGENT_PUBLISHED?"
  curator_review:
    status: current
    last_reviewed: "2026-06-16"
    review_interval: semiannual_quality_floor
    next_review_due: "2026-12-01"
    review_reason: quality_floor_hygiene
    source: "RESULT-0020 scientific-memory index and TASK-0807 packaging-contest adjudication routing"
    notes: "Quality-floor track has a high-value live result but the validation tier is blocked by packaging provenance. Do not treat RESULT-0020 as AGENT_VALIDATED or use it for CLAIM-0005 until maintainer adjudication."
