id: exoplanet-mass-radius
title: "Exoplanet mass-radius benchmark"
autonomy_status: WHITELISTED_LIMITED
pilot_rank: 5

source_docs:
  - docs/campaigns/exoplanet-mass-radius.md
  - docs/exoplanet-mass-radius-baseline-protocol.md
  - docs/exoplanet-mass-radius-holdout-protocol.md
  - docs/reviews/exoplanet-pscomppars-snapshot-ingestion.md
  - docs/reviews/exoplanet-loader-dry-run.md
  - docs/autonomous-research-loop.md
  - docs/research-quality-gate.md

allowed_hypothesis_families:
  - "Frozen published mass-radius baselines compared against the pinned PSCompPars snapshot."
  - "Per-class median or other null-baseline floors that quantify a minimum non-trivial signal."
  - "Compact agent-proposed residual corrections with explicit frozen-baseline comparison and no new free parameters fit to the full snapshot."
  - "Negative-control candidates that intentionally collapse one diagnostic axis."

allowed_experiment_families:
  - "Deterministic residual replay against a pinned NASA Exoplanet Archive PSCompPars snapshot."
  - "Baseline-versus-null-baseline comparisons under the committed loader/filter chain."
  - "Sandbox-only comparisons that preserve explicit negative or inconclusive results."

required_inputs:
  - "Pinned exoplanet dataset source, version, and SHA-256 checksum policy."
  - "Explicit mass_class and radius_class semantics from the committed schema."
  - "Named baseline residual target and unit conventions (log10 mass, log10 radius, Earth units)."
  - "Reviewed inclusion/exclusion filter chain (TASK-0345 / TASK-0346 / TASK-0354)."
  - "Pre-filter and post-filter row counts reported before any metric is computed."
  - "Recorded baseline definition (frozen published or null per-class median) with reference."

required_quality_checks:
  - "State that no universal mass-radius law, habitability claim, or target-prioritization wording is used."
  - "Keep dataset provenance and inclusion/exclusion reasons explicit."
  - "Report baseline-relative metrics, per-class and per-method subset behaviour, not aggregate fit alone."
  - "Preserve negative, inconclusive, or null-beats-baseline outcomes as valid review surfaces."
  - "Report which axes were active (true-mass-with-transit-radius, minimum-mass-with-transit-radius) and whether any class or method slice regressed."
  - "Run the shared research quality gate before any later autonomy PR handoff."

allowed_factory_families:
  - id: radius_regime
    description: "Compact, sub-Neptune, Jovian-radius, hot-Jupiter, and declared transition slices against frozen baselines."
    required_guard: "Compare against nearest-radius and shuffled/null controls before any positive route."
  - id: mass_provenance
    description: "True-mass and minimum-mass axes as separate candidate surfaces."
    required_guard: "Never pool true mass with minimum mass or M sin i in headline metrics."
  - id: detection_method
    description: "Detection-method and method-missingness diagnostics when count-supported."
    required_guard: "Use sample-size and mass/radius matched controls."
  - id: host_context
    description: "Host Teff, stellar radius, and metallicity fields only after coverage gates."
    required_guard: "Compact-radius host context remains conditional/underpowered after TASK-0481."
  - id: irradiation_proxy
    description: "Equilibrium-temperature and irradiation-flux proxy diagnostics when present."
    required_guard: "Report missingness and forbid habitability or target-priority wording."
  - id: measurement_quality
    description: "Mass/radius uncertainty bands and missing-uncertainty flags."
    required_guard: "Use uncertainty-matched controls and route missingness blockers explicitly."
  - id: null_baseline_family
    description: "Per-class medians, nearest-neighbor nulls, shuffled labels, and other deterministic null competitors."
    required_guard: "A null that matches or beats the candidate routes to negative/control memory."

required_factory_controls:
  - "Null-baseline comparison is mandatory; TASK-0483 showed highlighted slices are control-sensitive."
  - "Host-context coverage gate is mandatory; TASK-0481 found no compact-radius host-context axis benchmark-usable under the current coarse-bin floor."
  - "True-mass and minimum-mass rows must be evaluated and routed separately."
  - "Matched controls, shuffled/null controls, and uncertainty controls must be declared before metrics."
  - "Every candidate must record a complexity penalty for added splits, features, or parameters."
  - "No live fetch, baseline refit, prediction entry, claim promotion, result promotion, or knowledge edit is allowed from a factory run by default."

factory_stop_rules:
  - "Stop if the task does not name a pinned snapshot and source policy."
  - "Stop if live NASA Exoplanet Archive fetches are requested."
  - "Stop if true-mass and minimum-mass rows are pooled in one headline metric."
  - "Stop if compact-radius host context is treated as benchmark-usable without a new maintainer-approved task that revises the TASK-0481 blocker."
  - "Stop if a null baseline matches or beats a candidate and the candidate is still routed as positive."
  - "Stop if habitability, biosignature, atmosphere, composition, discovery, or target-priority wording appears in a candidate family."
  - "Stop if a factory run would create RESULT, PRED, CLAIM, or KNOW artifacts without a separate maintainer-approved promotion task."

forbidden_claims:
  - "A sandbox candidate explains all exoplanet masses or radii."
  - "Residual improvement alone is evidence of a broader physical conclusion about planet structure."
  - "Habitability, biosignature, target-prioritization, or planet-discovery framing is forbidden."
  - "Advanced-model comparisons are required before the frozen Chen-Kipping-style baseline exists."
  - "Random or full-snapshot improvement alone is enough to claim generalization."
  - "Live NASA Exoplanet Archive fetches may bypass the snapshot pinning policy."

sandbox_permissions:
  may_create:
    - scoped_notes
    - temporary_outputs
    - future_hypothesis_proposals
    - future_experiment_proposals
  must_not_edit:
    - claims
    - canonical_hypotheses
    - canonical_experiments
    - canonical_results
    - canonical_exoplanet_datasets

validation_commands:
  - "python3 -m ruff check ."
  - "python3 -m pytest"
  - "python3 -m physics_lab.cli validate-repo ."
  - "python3 -m physics_lab.cli validate-repo . --strict --fail-on-warnings"

handoff_requires:
  - task_id_or_microtask_id
  - campaign_profile_id
  - dataset_source_and_version
  - baseline_definition
  - filter_chain_reference
  - metrics
  - limitations
  - verdict
  - maintainer_decision_requested

portfolio:
  status: active_secondary
  domain: astrophysics
  surface_type: fresh_data_benchmark
  lifecycle_stage: monitor_only
  activity_status: active_monitor
  curator:
    primary_pool: prediction_reveal
    secondary_pools:
      - source_data_benchmark
      - verifier_quality_floor
      - result_promotion
    review_cadence: weekly
    transfer_requires:
      - scientific_director_or_maintainer_pr
      - curator_cycle_review
      - updated_campaign_profile
  current_stage: "pinned PSCompPars snapshots, control-sensitive residual memory, closed EXO-0002 reopen gate, and monitor-only EXO-0003 trigger posture after TASK-0781 NO_NOTIFY"
  recommended_parallel_agents: 2
  coordination_notes: "Parallel-safe for metadata-only trigger decisions and evidence packaging; do not reopen residual scoring without a materially changed reviewed snapshot or coverage-gate amendment."
  next_validity_gate:
    type: source_readiness
    blocker: "The latest source-version monitor returned NO_NOTIFY; no material snapshot, coverage, or source-version trigger currently justifies residual scoring."
    target_artifact: "docs/reviews/exoplanet-source-version-monitor-check-2.md"
  best_next_actions:
    - task_id: TASK-0808
      label: "Draft the control-sensitivity negative-memory capsule; keep residual scoring closed unless a future NOTIFY class appears"
  required_gates:
    - "Pinned snapshot and checksum state must remain explicit."
    - "Benchmark outputs must keep BENCHMARK_SUMMARY_ONLY wording until stronger review passes."
    - "No live-fetch second snapshot without the no-live-fetch protocol."
  current_results:
    - "docs/reviews/exoplanet-failure-map-result-promotion-scorecard.md"
    - "docs/reviews/exoplanet-compact-subneptune-matched-control-audit.md"
    - "docs/reviews/exoplanet-null-baseline-family-audit.md"
    - "docs/reviews/exoplanet-compact-radius-host-context-preflight.md"
    - "data/exoplanets/exo-0001-pscomppars-snapshot.yaml"
    - "docs/reviews/exoplanet-source-version-monitor-check.md"
    - "docs/reviews/exoplanet-next-snapshot-trigger-decision.md"
    - "docs/reviews/exoplanet-source-version-monitor-check-2.md"
  open_questions:
    - "Which future NOTIFY class, if any, will justify an EXO-0003 metadata scout without row-value inspection?"
    - "What source-version or coverage-gate change would justify reopening residual scoring?"
  curator_review:
    status: current
    last_reviewed: "2026-06-17"
    review_interval: quarterly_active
    next_review_due: "2026-09-01"
    review_reason: benchmark_monitoring
    source: "TASK-0781 source-version monitor check"
    notes: "Monitor-only lane with useful negative/control memory; TASK-0781 returned NO_NOTIFY with unchanged aggregate counts. Next useful work is negative-memory packaging plus continued metadata-only monitoring, not residual scoring."
