id: EXP-0017
title: "Stellar M-L High-Mass DEBCat Transfer Benchmark"
domain: astrophysics
status: COMPLETED

hypothesis_id: HYP-0017

method:
  type: transfer_benchmark
  simulator: stellar_ml_high_mass_transfer
  comparator: frozen_result_0022_relation_vs_predeclared_controls

data:
  dataset_path: ../data/textbook_formula_audit/stellar_ml/debcat_component_rows.yaml
  dataset_kind: textbook_formula_audit_stellar_ml_rows
  benchmark_scope: "Frozen RESULT-0022 relation transferred without refit to the high-mass DEBCat regime (mass_solar > 2.0); primary lane is main-sequence-compatible high-mass components, with all-stage, stage, and luminosity-provenance diagnostics."
  sample_axes:
    - log_mass_solar
    - log_luminosity_solar
    - evolutionary_stage_flag
    - luminosity_source
    - mass_band
  notes: "Uses committed CC BY 4.0 DEBCat normalized rows from TASK-0763. The raw debs.dat source is not committed (Route 2). No live fetch, no RESULT-0022 edit, and no high-mass refit."

candidate_models:
  - id: model_result0022_frozen_alpha_transfer
    formula: "log L = 4.526004 * log M (RESULT-0022 train-fitted alpha, fixed intercept, no high-mass refit)"
  - id: model_control_null_massband_median
    formula: "per-mass-band train-median log L control"
  - id: model_control_mass_matched_massband_mean
    formula: "per-mass-band train-mean log L control"
  - id: model_control_shuffled_target_best
    formula: "best deterministic shuffled-luminosity target control across predeclared seeds"

comparison_targets:
  - id: target_high_mass_transfer_primary
    label: "Frozen RESULT-0022 relation versus the best control on the high-mass main-sequence-compatible DEBCat holdout"
    reference_value: 0.483879
    unit: dex
    notes: "Best control MAE is mass_matched_massband_mean; frozen relation MAE is 0.334564 dex, giving a 0.149315 dex survival margin against the predeclared 0.04 dex threshold."
