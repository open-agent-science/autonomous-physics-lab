# First Nuclear residual-law factory sprint config (TASK-0507).
# Bounded high-throughput sweep across approved structural feature families over a
# committed nuclide slice with a frozen committed baseline. Controls and the
# leakage guard are mandatory; it never promotes a claim, prediction, or result.
factory_id: nuclear-residual-factory-sprint-001
campaign_id: nuclear-mass-surface
adapter_id: nuclear_residual_factory
adapter_version: "0.2"
task_id: TASK-0507
dataset:
  snapshot_ref: data/nuclear_masses/nmd-0002-curated-measured-slice.yaml
  retrieval_policy: no_live_fetch
  checksum_policy: source recorded in the curated-slice manifest
baseline:
  baseline_id: nuclear-semi-empirical-fit
  baseline_type: frozen
  coefficients_ref: results/EXP-0012/RUN-0001/result.yaml
  coefficients_model_id: model_fitted_semi_empirical
families:
  - shell_distance
  - valence_z
  - valence_n
  - odd_even_pairing
  - asymmetry
  - local_curvature
controls:
  - null_baseline
  - shuffled_feature
  - matched_random_slice
  - complexity_penalty
  - leakage_check
candidate_cap: 100
options:
  candidate_grid: sweep
splits:
  policy: deterministic 70/30 train/holdout by sorted (A, Z, N)
limitations:
  - "Bounded sprint over a committed 11-nuclide measured slice; holdout is small and underpowered."
  - "Frozen baseline coefficients are slice-specific (RESULT-0012); not a holdout-validated surface."
  - "post-AME2020 time-split check is not applicable on this slice and is deferred."
  - "Sandbox factory run; no claim, prediction, result, or knowledge promotion."
reproducibility:
  code_reference: physics_lab/factories/nuclear.py
  command: python3 scripts/run_research_factory.py --config examples/factories/nuclear_residual_factory_sprint.yaml --output-dir <dir>
  run_date: "2026-06-01"
