dataset_id: synthetic-pscomppars-snapshot-001
title: Synthetic PSCompPars dry-run fixture for TASK-0354 loader
status: draft
description: >
  Synthetic exoplanet rows for exercising the loader's inclusion/exclusion
  filter chain (TASK-0345 + TASK-0346). Every numerical value in this file
  is fabricated and must not be cited as a measured exoplanet parameter.
  The fixture intentionally spans the canonical row classes so each
  filter branch in physics_lab/datasets/exoplanets.py is touched at least
  once.
source_policy: >
  Synthetic dry-run fixture. No NASA Exoplanet Archive TAP query was run
  to produce this file. No real planet values, no real host-star values,
  and no real reference IDs are recorded. The synthetic source family id
  is reused from EXO-SRC-CLASS-001 so the fixture exercises the same
  source-family branch the production loader will use.
snapshot_provenance:
  source_family_id: EXO-SRC-CLASS-001
  source_locator: synthetic://dry-run/synthetic-pscomppars-snapshot-001
  retrieval_date_utc: "2026-05-23T00:00:00Z"
  release_date_or_publication_date: null
  snapshot_kind: synthetic_dry_run
  live_external_fetch_allowed: false
  raw_checksum_sha256: null
  normalized_checksum_sha256: null
  parser_or_normalizer: null
  license_or_reuse_notes: "Synthetic test fixture; no real data."
row_class_coverage:
  - direct_mass_radius_measurement
  - transit_radius_with_rv_minimum_mass
  - transit_radius_only
  - rv_minimum_mass_only
  - microlensing_or_astrometry_mass
  - model_inferred
fake_source_warning: >
  All entries below are fabricated toy rows used by the TASK-0354 loader
  dry-run tests. They are not measured exoplanet parameters, must not be
  cited as observations, and must not be promoted to any claim, knowledge
  entry, prediction registry entry, or canonical result.
