  - The fixture exists only to exercise loader filter branches; it does
    not represent any physically realistic planet population.
  - Tests should not assume the row IDs or row counts in this file are
    stable for downstream benchmarks; this fixture is owned by TASK-0354
    and may be extended only with synthetic rows that exercise
    additional filter paths.
